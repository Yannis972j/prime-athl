# Render.com deploy config — Prime Athl
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: prime-athl
    runtime: node
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: JWT_SECRET
        generateValue: true
      - key: MAIN_COACH_EMAIL
        value: yannisgym972@gmail.com
      # ⚠️ IMPORTANT si le service est déjà déployé : synchroniser ce blueprint fera générer
      # par Render une NOUVELLE valeur aléatoire pour MAIN_COACH_PASSWORD et UNLOCK_SECRET,
      # ce qui changera le mot de passe de connexion du compte coach principal. Après sync,
      # va dans Render > le service > Environment pour récupérer la nouvelle valeur générée
      # avant de te reconnecter (ou fixe `value:` toi-même ci-dessous avec le mot de passe
      # que tu utilises déjà si tu préfères ne pas le changer).
      - key: MAIN_COACH_PASSWORD
        generateValue: true
      - key: UNLOCK_SECRET
        generateValue: true
      # DB_PATH stays default → /opt/render/project/src/backend/data.json
      # ⚠️ Free tier disk is EPHEMERAL — data resets at each redeploy.
      # For persistence : add a Render Disk (1GB ~ $0.25/mo) and set DB_PATH=/data/data.json
