<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0e"/>
      <stop offset="100%" stop-color="#13131a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97757"/>
      <stop offset="50%" stop-color="#c97586"/>
      <stop offset="100%" stop-color="#8e6cb6"/>
    </linearGradient>
    <radialGradient id="glow1" cx="75%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#d97757" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0a0a0e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="80%" r="35%">
      <stop offset="0%" stop-color="#7ca8c4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0a0a0e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Logo mark -->
  <rect x="80" y="220" width="64" height="64" rx="18" fill="url(#accent)"/>
  <text x="112" y="261" font-family="-apple-system,Inter,sans-serif" font-size="26" font-weight="800" fill="white" text-anchor="middle">PA</text>

  <!-- Brand name -->
  <text x="160" y="261" font-family="-apple-system,Inter,sans-serif" font-size="28" font-weight="800" fill="#f4f1ed" letter-spacing="-0.5">Prime Athl</text>

  <!-- Main headline -->
  <text x="80" y="340" font-family="-apple-system,Inter,sans-serif" font-size="62" font-weight="800" letter-spacing="-2" fill="#f4f1ed">Le suivi coach-athlète,</text>
  <text x="80" y="415">
    <tspan font-family="-apple-system,Inter,sans-serif" font-size="62" font-weight="800" letter-spacing="-2" fill="url(#accent)">enfin simple.</tspan>
  </text>

  <!-- Subline -->
  <text x="80" y="480" font-family="-apple-system,Inter,sans-serif" font-size="24" fill="#a8a097" letter-spacing="-0.3">Programmes · Nutrition · Messagerie · Sync temps réel</text>

  <!-- Pills -->
  <rect x="80" y="510" width="110" height="34" rx="8" fill="rgba(217,119,87,0.15)" stroke="rgba(217,119,87,0.35)" stroke-width="1"/>
  <text x="135" y="532" font-family="-apple-system,Inter,sans-serif" font-size="13" font-weight="600" fill="#d97757" text-anchor="middle">Gratuit</text>

  <rect x="204" y="510" width="146" height="34" rx="8" fill="rgba(124,196,161,0.12)" stroke="rgba(124,196,161,0.30)" stroke-width="1"/>
  <text x="277" y="532" font-family="-apple-system,Inter,sans-serif" font-size="13" font-weight="600" fill="#7cc4a1" text-anchor="middle">iOS &amp; Android</text>

  <rect x="364" y="510" width="136" height="34" rx="8" fill="rgba(124,168,196,0.12)" stroke="rgba(124,168,196,0.30)" stroke-width="1"/>
  <text x="432" y="532" font-family="-apple-system,Inter,sans-serif" font-size="13" font-weight="600" fill="#7ca8c4" text-anchor="middle">Temps réel</text>

  <!-- Right side phone mockup (simplified) -->
  <rect x="780" y="80" width="340" height="470" rx="44" fill="#1a1a24" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="880" y="92" width="140" height="26" rx="13" fill="#000"/>

  <!-- Phone screen content -->
  <rect x="796" y="130" width="308" height="404" rx="36" fill="none"/>

  <!-- Exercise card inside phone -->
  <rect x="800" y="148" width="300" height="52" rx="10" fill="rgba(217,119,87,0.12)" stroke="rgba(217,119,87,0.22)" stroke-width="1"/>
  <rect x="812" y="156" width="44" height="16" rx="4" fill="rgba(217,119,87,0.25)"/>
  <text x="816" y="168" font-family="-apple-system,Inter,sans-serif" font-size="8" fill="#d97757" font-weight="700">PECTORAUX</text>
  <text x="812" y="189" font-family="-apple-system,Inter,sans-serif" font-size="14" fill="white" font-weight="700">Développé couché</text>

  <!-- Sets -->
  <rect x="800" y="210" width="300" height="32" rx="8" fill="rgba(217,119,87,0.08)" stroke="rgba(217,119,87,0.20)" stroke-width="1"/>
  <rect x="808" y="218" width="16" height="16" rx="4" fill="#d97757"/>
  <text x="816" y="230" font-family="-apple-system,Inter,sans-serif" font-size="9" fill="white" font-weight="700" text-anchor="middle">✓</text>
  <text x="836" y="230" font-family="-apple-system,Inter,sans-serif" font-size="11" fill="white" font-weight="600">80 kg  ×  8 reps</text>

  <rect x="800" y="248" width="300" height="32" rx="8" fill="rgba(217,119,87,0.08)" stroke="rgba(217,119,87,0.20)" stroke-width="1"/>
  <rect x="808" y="256" width="16" height="16" rx="4" fill="#d97757"/>
  <text x="816" y="268" font-family="-apple-system,Inter,sans-serif" font-size="9" fill="white" font-weight="700" text-anchor="middle">✓</text>
  <text x="836" y="268" font-family="-apple-system,Inter,sans-serif" font-size="11" fill="white" font-weight="600">80 kg  ×  8 reps</text>

  <rect x="800" y="286" width="300" height="32" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(217,119,87,0.40)" stroke-width="1"/>
  <rect x="808" y="294" width="16" height="16" rx="4" fill="rgba(217,119,87,0.18)"/>
  <text x="816" y="306" font-family="-apple-system,Inter,sans-serif" font-size="9" fill="#d97757" font-weight="700" text-anchor="middle">3</text>
  <text x="836" y="306" font-family="-apple-system,Inter,sans-serif" font-size="11" fill="white" font-weight="600">82.5 kg  ×  — reps</text>

  <!-- Timer -->
  <text x="800" y="340" font-family="-apple-system,Inter,sans-serif" font-size="12" fill="#7cc4a1" font-weight="700">⏱  Repos · 01:42</text>

  <!-- Nutrition mini -->
  <rect x="800" y="360" width="300" height="90" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="812" y="378" font-family="-apple-system,Inter,sans-serif" font-size="11" fill="white" font-weight="700">🥗  Plan nutrition · Lundi</text>
  <!-- macro bars -->
  <rect x="812" y="386" width="276" height="4" rx="2" fill="rgba(255,255,255,0.07)"/>
  <rect x="812" y="386" width="200" height="4" rx="2" fill="#d97757"/>
  <text x="812" y="402" font-family="-apple-system,Inter,sans-serif" font-size="9" fill="#a8a097">Calories  1 840 / 2 450 kcal</text>
  <rect x="812" y="410" width="276" height="4" rx="2" fill="rgba(255,255,255,0.07)"/>
  <rect x="812" y="410" width="208" height="4" rx="2" fill="#7cc4a1"/>
  <text x="812" y="426" font-family="-apple-system,Inter,sans-serif" font-size="9" fill="#a8a097">Protéines  142 / 190 g</text>
  <rect x="812" y="434" width="276" height="4" rx="2" fill="rgba(255,255,255,0.07)"/>
  <rect x="812" y="434" width="170" height="4" rx="2" fill="#7ca8c4"/>
  <text x="812" y="444" font-family="-apple-system,Inter,sans-serif" font-size="9" fill="#a8a097">Glucides  180 / 270 g</text>
</svg>
