<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#000000"/>
  <!-- Background diagonal accent shape -->
  <polygon points="60,320 460,280 480,370 40,390" fill="#111111" opacity="0.6"/>

  <!-- Speed line accent (like in the logo) -->
  <g transform="translate(60, 340)">
    <!-- Main diagonal slash -->
    <polygon points="0,28 340,8 390,18 50,38" fill="#ffffff" opacity="0.15"/>
    <polygon points="0,32 340,12 380,15 40,35" fill="#ffffff" opacity="0.10"/>
  </g>

  <!-- PRIME text -->
  <text
    x="58"
    y="240"
    font-family="Arial Black, Impact, Helvetica Neue, sans-serif"
    font-weight="900"
    font-size="155"
    font-style="italic"
    fill="#ffffff"
    letter-spacing="-4"
  >PRIME</text>

  <!-- ATHL text -->
  <text
    x="58"
    y="340"
    font-family="Arial Black, Impact, Helvetica Neue, sans-serif"
    font-weight="900"
    font-size="155"
    font-style="italic"
    fill="#ffffff"
    letter-spacing="-4"
  >ATHL</text>

  <!-- Speed lines accent (bottom right) -->
  <g opacity="0.7">
    <line x1="330" y1="348" x2="480" y2="335" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <line x1="360" y1="360" x2="475" y2="350" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="385" y1="370" x2="472" y2="362" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Bottom left diagonal slash (base) -->
  <polygon points="55,352 445,330 455,345 65,367" fill="#ffffff" opacity="0.12"/>
</svg>
