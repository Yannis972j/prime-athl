.title{font-size:22px;font-weight:800;color:#18181b;letter-spacing:-0.4px;line-height:1.2}
.subtitle{font-size:11px;color:#71717a;margin-top:4px}
.badge{display:inline-block;padding:4px 10px;border-radius:6px;background:#fff7f4;border:1px solid #fbd5c5;font-size:10px;font-weight:700;color:#BFA060;letter-spacing:0.3px}
/* Semaine */
.week-block{margin-bottom:40px}
.week-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding:12px 16px;background:linear-gradient(135deg,#fff7f4,#fff);border:1px solid #fbd5c5;border-radius:10px;page-break-before:auto}
.week-title{font-size:16px;font-weight:800;color:#BFA060;letter-spacing:0.4px;text-transform:uppercase}
.week-avg{display:flex;gap:14px;align-items:center}
.week-avg-item{text-align:center}
.week-avg-val{font-size:15px;font-weight:800;color:#18181b}
.week-avg-lbl{font-size:8px;color:#71717a;font-weight:600;text-transform:uppercase;letter-spacing:0.3px}
.week-sep{width:1px;height:28px;background:#f0ebe7}
/* Jour */
.day{margin-bottom:24px;page-break-inside:avoid}
.day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.day-name{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:0.6px;color:#18181b;position:relative;padding-left:10px}
.day-name::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:14px;background:#BFA060;border-radius:2px}
.day-chip{font-size:10px;font-weight:700;color:#BFA060;background:#fff7f4;border:1px solid #fbd5c5;border-radius:20px;padding:2px 10px}
/* Repas */
.meal{margin-bottom:10px;border:1px solid #f4f4f5;border-radius:8px;overflow:hidden}
.meal-head{display:flex;align-items:center;gap:8px;padding:7px 12px;background:#fafafa;border-bottom:1px solid #f4f4f5}
.meal-emoji{font-size:15px;line-height:1}
.meal-name{font-size:11.5px;font-weight:700;color:#27272a}
.meal-time{font-size:10px;color:#a1a1aa;margin-left:auto;font-weight:500}
.meal-kcal-badge{font-size:10px;font-weight:700;color:#BFA060;background:#fff7f4;border-radius:4px;padding:2px 7px;margin-left:8px}
table{width:100%;border-collapse:collapse}
thead tr{background:#f9f9f9}
th{padding:5px 10px;font-size:10px;font-weight:700;color:#71717a;text-transform:uppercase;letter-spacing:0.3px;text-align:left;border-bottom:1px solid #f0f0f0}
th.r,td.r{text-align:right}
td{padding:5px 10px;border-bottom:1px solid #f9f9f9;font-size:11px;color:#3f3f46}
tr:last-child td{border-bottom:none}
tr.alt{background:#fafafa}
tr.subtotal td{background:#fff7f4;font-weight:700;color:#BFA060;font-size:11px;border-top:1px solid #fbd5c5}
.unit{color:#a1a1aa;font-size:10px;margin-left:2px}
.day-total{display:flex;align-items:center;gap:6px;margin-top:8px;padding:8px 14px;background:#f9f9f9;border-radius:8px;font-size:11px}
.day-total-label{font-weight:700;color:#71717a;margin-right:4px}
.macro-pill{padding:3px 9px;border-radius:20px;font-weight:700;font-size:10.5px}
.pill-kcal{background:#fff7f4;color:#BFA060;border:1px solid #fbd5c5}
.pill-p{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.pill-g{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}
.pill-l{background:#fefce8;color:#ca8a04;border:1px solid #fef08a}
/* Footer */
.footer{margin-top:32px;padding-top:14px;border-top:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
.footer-brand{font-size:10px;font-weight:800;color:#BFA060;letter-spacing:0.8px;text-transform:uppercase}
.footer-note{font-size:9.5px;color:#a1a1aa}
/* Liste de courses */
.shop-section{margin-bottom:36px;page-break-after:always}
.shop-title-row{display:flex;align-items:baseline;gap:10px;margin-bottom:6px}
.shop-h1{font-size:18px;font-weight:800;color:#18181b;letter-spacing:-0.3px}
.shop-meta{font-size:10.5px;color:#71717a;font-weight:500}
.shop-intro{font-size:11px;color:#71717a;margin-bottom:18px;padding-bottom:14px;border-bottom:2px solid #f0f0f0}
.shop-cat{margin-bottom:14px;page-break-inside:avoid}
.shop-cat-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.shop-cat-bar{width:4px;height:13px;border-radius:2px}
.shop-cat-name{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.6px}
.shop-cat-count{font-size:10px;color:#a1a1aa;font-weight:600}
.shop-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #f0f0f0;border-radius:8px;overflow:hidden}
.shop-table td{padding:6px 12px;font-size:11px;border-bottom:1px solid #f9f9f9}
.shop-table tr:last-child td{border-bottom:none}
.shop-table tr.alt td{background:#fafafa}
.shop-prod{color:#18181b;font-weight:600}
.shop-qty{text-align:right;color:#BFA060;font-weight:700;font-size:11.5px;font-variant-numeric:tabular-nums;white-space:nowrap}
@media print{
  .page{padding:20px 24px}
  .day{page-break-inside:avoid}
  .week-header{page-break-before:always}
  .week-header:first-of-type{page-break-before:avoid}
  .shop-section{page-break-after:always}
  body{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}

function parseNutritionExcel(file,onSuccess,onError){
  const reader=new FileReader();
  reader.onerror=()=>onError('Lecture du fichier impossible');
  reader.onload=ev=>{
    try{
      if(typeof XLSX==='undefined'){onError('Librairie Excel non chargée. Recharge la page.');return;}
      const data=new Uint8Array(ev.target.result);
      const wb=XLSX.read(data,{type:'array',raw:true,cellDates:false});
      if(!wb||!wb.SheetNames||wb.SheetNames.length===0){onError('Fichier Excel vide ou illisible');return;}
      const normLabel=s=>String(s||'').trim().toUpperCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^A-Z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
      const findMeal=lbl=>{
        const n=normLabel(lbl);
        return NUTRI_MEAL_TEMPLATES.find(m=>normLabel(m.label)===n);
      };
      const upperSheetNames=wb.SheetNames.map(n=>({orig:n,norm:normLabel(n)}));
      const dayNamesNorm=DAYS_OF_WEEK.map(d=>({orig:d,norm:normLabel(d)}));

      // Parse a single sheet into a day object
      function parseSheet(sheetOrig){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[sheetOrig],{header:1,defval:'',raw:true});
        let headerIdx=-1;
        for(let i=0;i<Math.min(rows.length,10);i++){
          const r=rows[i].map(c=>String(c||'').toUpperCase());
          if(r.includes('PRODUITS')||r.includes('REPAS')){headerIdx=i;break;}
        }
        if(headerIdx===-1)return null;
        const header=rows[headerIdx].map(c=>normLabel(c));
        const col={
          repas:header.indexOf('REPAS'),heure:header.indexOf('HEURE'),
          produits:header.indexOf('PRODUITS'),qty:header.indexOf('QUANTITE'),
          unite:header.indexOf('UNITE'),
          kcal:header.findIndex(h=>h==='CALORIE'||h==='CALORIES'),
          p:header.findIndex(h=>h==='PROTEINE'||h==='PROTEINES'),
          c:header.findIndex(h=>h==='GLUCIDE'||h==='GLUCIDES'),
          f:header.findIndex(h=>h==='LIPIDE'||h==='LIPIDES'),
        };
        const mealById={};let currentId=null;
        for(let i=headerIdx+1;i<rows.length;i++){
          const row=rows[i];
          if(!row||row.every(c=>!String(c||'').trim()))continue;
          const label=String(row[col.repas]||'').trim();
          const horaire=String(row[col.heure]||'').trim();
          const name=String(row[col.produits]||'').trim();
          const qty=parseFloat(row[col.qty])||0;
          const unit=normalizeUnit(String(row[col.unite]||'G').trim());
          const kcal=parseFloat(row[col.kcal])||0;
          const p=parseFloat(row[col.p])||0;
          const cc=parseFloat(row[col.c])||0;
          const fat=parseFloat(row[col.f])||0;
          if(label){
            const t=findMeal(label);
            if(t){
              currentId=t.id;
              if(!mealById[currentId]){
                let ts=t.timeStart,te=t.timeEnd;
                const parsed=parseExcelTime(horaire);
                if(parsed){ts=parsed[0];te=parsed[1];}
                mealById[currentId]={id:t.id,label:t.label,emoji:t.emoji,timeStart:ts,timeEnd:te,items:[],note:''};
              }
            }
          }
          if(name&&currentId&&mealById[currentId]){
            mealById[currentId].items.push({name,qty,unit,kcal,p,c:cc,f:fat});
          }
        }
        return{meals:NUTRI_MEAL_TEMPLATES.map(t=>mealById[t.id]||{...t,items:[],note:''})};
      }

      // Detect and parse S1→S4 (suffix: none, " 2", " 3", " 4")
      const parsedWeeks=[];
      let totalNbItems=0;
      for(let wn=1;wn<=4;wn++){
        const days={};let weekHasContent=false;
        for(const{orig:day,norm:dayNorm} of dayNamesNorm){
          const targetNorm=wn===1?dayNorm:dayNorm+' '+wn;
          const match=upperSheetNames.find(s=>s.norm===targetNorm);
          if(!match){days[day]=emptyDay();continue;}
          const parsed=parseSheet(match.orig);
          if(!parsed){days[day]=emptyDay();continue;}
          days[day]=parsed;
          const cnt=parsed.meals.reduce((a,m)=>a+m.items.length,0);
          if(cnt>0){weekHasContent=true;totalNbItems+=cnt;}
        }
        if(weekHasContent)parsedWeeks.push({label:'S'+wn,days});
      }

      if(parsedWeeks.length===0){
        onSuccess({dailyCalories:0,dailyProtein:0,dailyCarbs:0,dailyFat:0,days:emptyWeek(),weeks:[],_itemsImported:0,_sheetsFound:upperSheetNames.map(s=>s.orig).join(', ')});
        return;
      }

      // Compute daily targets from S1 average
      const s1days=parsedWeeks[0].days;
      let totalDays=0;const sums={kcal:0,p:0,c:0,f:0};
      for(const d of DAYS_OF_WEEK){
        const meals=s1days[d]&&s1days[d].meals||[];
        if(!meals.some(m=>m.items.length>0))continue;
        totalDays++;
        for(const m of meals)for(const it of m.items){sums.kcal+=+it.kcal||0;sums.p+=+it.p||0;sums.c+=+it.c||0;sums.f+=+it.f||0;}
      }
      const denom=totalDays||1;
      onSuccess({
        dailyCalories:Math.round(sums.kcal/denom),
        dailyProtein:Math.round(sums.p/denom),
        dailyCarbs:Math.round(sums.c/denom),
        dailyFat:Math.round(sums.f/denom),
        days:parsedWeeks[0].days,
        weeks:parsedWeeks,
        _itemsImported:totalNbItems,
        _sheetsFound:upperSheetNames.map(s=>s.orig).join(', '),
      });
    }catch(e){onError('Excel invalide : '+(e.message||e));}
  };
  reader.readAsArrayBuffer(file);
}

// ── Nutrition Editor (coach) ──────────────────────────────
const DEFAULT_NUTRI_TEMPLATE={
  dailyCalories:2500,dailyProtein:180,dailyCarbs:280,dailyFat:75,
  days:emptyWeek(),
};

// Normalize plan: ensure 7-day structure + weeks array
function normalizePlan(p){
  if(!p)return DEFAULT_NUTRI_TEMPLATE;
  function ensureWeekDays(days){
    const out=days?{...days}:{};
    if(!days&&p.meals){
      for(const d of DAYS_OF_WEEK)out[d]={meals:p.meals.map(m=>({...m,items:(m.items||[]).map(it=>({...it}))})),note:''};
    }
    for(const d of DAYS_OF_WEEK){
      if(!out[d])out[d]=emptyDay();
      if(!out[d].meals)out[d].meals=emptyDay().meals;
    }
    return out;
  }
  let weeks;
  if(p.weeks&&p.weeks.length>0){
    weeks=p.weeks.map(w=>({label:w.label||'S?',days:ensureWeekDays(w.days)}));
  } else {
    weeks=[{label:'S1',days:ensureWeekDays(p.days)}];
  }
  return{
    dailyCalories:p.dailyCalories||0,
    dailyProtein:p.dailyProtein||0,
    dailyCarbs:p.dailyCarbs||0,
    dailyFat:p.dailyFat||0,
    days:weeks[0].days,
    weeks,
  };
}

function findFirstFilledDay(plan){
  for(const d of DAYS_OF_WEEK){
    if((plan&&plan.days&&plan.days[d]&&plan.days[d].meals||[]).some(m=>(m.items||[]).length>0))return d;
  }
  return todayDayName();
}
function findFirstFilledMeal(plan,day){
  const meals=plan&&plan.days&&plan.days[day]&&plan.days[day].meals||[];
  const m=meals.find(mm=>(mm.items||[]).length>0);
  return m?m.id:null;
}

function FoodItemRow({item,inp,onCommit,onDelete}){
  const[name,setName]=React.useState(item.name||'');
  const[qty,setQty]=React.useState(String(item.qty||0));
  const hasPer100=!!(item._per100);
  const r=(v,q)=>Math.round(v*q/100*10)/10;
  const qtyNum=parseFloat(qty)||0;
  const macros=hasPer100
    ?{kcal:r(item._per100.k,qtyNum),p:r(item._per100.p,qtyNum),c:r(item._per100.g,qtyNum),f:r(item._per100.l,qtyNum)}
    :{kcal:item.kcal||0,p:item.p||0,c:item.c||0,f:item.f||0};
  const commitQty=val=>{
    const q=parseFloat(val)||0;
    if(hasPer100){
      onCommit({qty:q,kcal:r(item._per100.k,q),p:r(item._per100.p,q),c:r(item._per100.g,q),f:r(item._per100.l,q)});
    }else{
      onCommit({qty:q});
    }
  };
  return(
    <div style={{padding:'8px 10px',borderRadius:10,background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.07)'}}>
      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
        <input value={name} onChange={e=>setName(e.target.value)} onBlur={e=>onCommit({name:e.target.value})}
          placeholder="Aliment" style={{...inp,flex:1,fontSize:12,height:30,padding:'0 8px'}}/>
        <input type="number" inputMode="decimal" value={qty}
          onChange={e=>setQty(e.target.value)}
          onBlur={e=>commitQty(e.target.value)}
          style={{width:56,height:30,background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:8,color:T.text,fontSize:12,fontWeight:700,textAlign:'center',outline:'none',fontFamily:'inherit'}}/>
        <span style={{fontSize:10,color:T.textDim,flexShrink:0}}>g</span>
        <DelConfirm onDelete={onDelete}/>
      </div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        {[{l:'kcal',v:macros.kcal,c:'#BFA060'},{l:'P',v:macros.p,c:'#B85070'},{l:'G',v:macros.c,c:'#5A8AE0'},{l:'L',v:macros.f,c:'#C89040'}].map(m=>(
          <span key={m.l} style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:6,background:'rgba(255,255,255,0.05)',color:m.c}}>{m.l} {m.v}</span>
        ))}
        {hasPer100&&<span style={{fontSize:9,color:T.textFaint,padding:'2px 4px',marginLeft:'auto'}}>auto ✓</span>}
      </div>
    </div>
  );
}

function NutritionEditor({athleteId,athleteName,initialPlan,onSaved,onImported}){
  const[data,setData]=React.useState(()=>normalizePlan(initialPlan));
  const[activeWeek,setActiveWeek]=React.useState(0);
  const[activeDay,setActiveDay]=React.useState(()=>{
    const plan=normalizePlan(initialPlan);
    const t=todayDayName();
    const meals=plan.days[t]&&plan.days[t].meals||[];
    if(meals.some(m=>(m.items||[]).length>0))return t;
    return findFirstFilledDay(plan);
  });
  const[openMeal,setOpenMeal]=React.useState(()=>findFirstFilledMeal(normalizePlan(initialPlan),todayDayName())||null);
  const[saveStatus,setSaveStatus]=React.useState(null);
  const[notifyStatus,setNotifyStatus]=React.useState(null); // null|sending|done|error

  const notifyAthlete=async()=>{
    setNotifyStatus('sending');
    try{
      await apiCall('/api/coach/nutrition/'+athleteId+'/notify',{method:'POST'});
      setNotifyStatus('done');
      setTimeout(()=>setNotifyStatus(null),3000);
    }catch(e){setNotifyStatus('error');setTimeout(()=>setNotifyStatus(null),3000);}
  };
  const[importMsg,setImportMsg]=React.useState(null);
  const[foodSearchMeal,setFoodSearchMeal]=React.useState(null);
  const timerRef=React.useRef(null);
  const fileRef=React.useRef(null);

  // Re-sync data quand on change d'athlète (toujours)
  React.useEffect(()=>{
    const n=normalizePlan(initialPlan);
    setData(n);
    // Set activeDay sur le 1er jour rempli si dispo, sinon today
    setActiveDay(prev=>{
      const meals=n.days[prev]&&n.days[prev].meals||[];
      if(meals.some(m=>(m.items||[]).length>0))return prev;
      return findFirstFilledDay(n);
    });
  },[athleteId]);

  // Re-sync data si initialPlan change ET que l'éditeur n'a pas de modifs locales
  // (utile pour le 1er import quand on n'avait pas de plan)
  const lastSyncedRef=React.useRef(initialPlan);
  React.useEffect(()=>{
    if(initialPlan===lastSyncedRef.current)return;
    // Si le data local est vide (pas de modifs locales), sync depuis backend
    const isLocalEmpty=Object.values(data.days||{}).every(d=>(d.meals||[]).every(m=>(m.items||[]).length===0));
    if(isLocalEmpty&&initialPlan){
      const n=normalizePlan(initialPlan);
      setData(n);
      setActiveDay(findFirstFilledDay(n));
      setOpenMeal(findFirstFilledMeal(n,findFirstFilledDay(n)));
    }
    lastSyncedRef.current=initialPlan;
    // eslint-disable-next-line
  },[initialPlan]);

  // Save immediate (pas de debounce) — utilisé pour Excel import
  const saveImmediate=React.useCallback(async(next)=>{
    if(timerRef.current)clearTimeout(timerRef.current);
    setSaveStatus('saving');
    try{
      await apiCall('/api/coach/nutrition/'+athleteId,{method:'PUT',body:{plan:next}});
      setSaveStatus('saved');
      if(onSaved)onSaved();
      setTimeout(()=>setSaveStatus(null),1500);
      return true;
    }catch(e){setSaveStatus('error');return false;}
  },[athleteId,onSaved]);

  const handleExcelImport=e=>{
    const file=e.target.files[0];
    if(!file)return;
    e.target.value='';
    setImportMsg('⏳ Import en cours...');
    parseNutritionExcel(file,async plan=>{
      try{
        if(!plan._itemsImported){
          setImportMsg('✗ 0 aliment détecté. Vérifie le format Excel (7 feuilles LUNDI→DIMANCHE).');
          setTimeout(()=>setImportMsg(null),6000);
          return;
        }
        const norm=normalizePlan(plan);
        setData(norm);
        setActiveWeek(0);
        const firstFilledDay=findFirstFilledDay(norm);
        setActiveDay(firstFilledDay);
        setOpenMeal(findFirstFilledMeal(norm,firstFilledDay));
        lastSyncedRef.current=norm;
        const ok=await saveImmediate(norm);
        const wc=norm.weeks&&norm.weeks.length||1;
        setImportMsg(ok?`✓ ${plan._itemsImported} aliments · ${wc} semaine${wc>1?'s':''} importées`:'✗ Échec sauvegarde');
        setTimeout(()=>setImportMsg(null),3500);
      }catch(ex){
        setImportMsg('✗ '+(ex.message||ex));
        setTimeout(()=>setImportMsg(null),6000);
        console.error('handleExcelImport:',ex);
      }
    },err=>{
      setImportMsg('✗ '+err);
      setTimeout(()=>setImportMsg(null),6000);
    });
  };

  const handleExcelExport=()=>{
    exportNutritionExcel(data,athleteName);
  };


  const save=React.useCallback((next)=>{
    if(timerRef.current)clearTimeout(timerRef.current);
    timerRef.current=setTimeout(async()=>{
      setSaveStatus('saving');
      try{
        await apiCall('/api/coach/nutrition/'+athleteId,{method:'PUT',body:{plan:next}});
        setSaveStatus('saved');
        if(onSaved)onSaved();
        setTimeout(()=>setSaveStatus(null),1500);
      }catch(e){setSaveStatus('error');}
    },500);
  },[athleteId,onSaved]);

  // activeDays = jours de la semaine active
  const activeDays=data.weeks&&data.weeks[activeWeek]?data.weeks[activeWeek].days:data.days;

  const updField=(k,v)=>{const nd={...data,[k]:v};setData(nd);save(nd);};
  const updMeals=(dayName,newMeals)=>{
    let nd;
    if(data.weeks&&data.weeks.length>0){
      const weeks=data.weeks.map((w,i)=>i===activeWeek?{...w,days:{...w.days,[dayName]:{...w.days[dayName],meals:newMeals}}}:w);
      nd={...data,weeks,days:weeks[0].days};
    } else {
      nd={...data,days:{...data.days,[dayName]:{...data.days[dayName],meals:newMeals}}};
    }
    setData(nd);save(nd);
  };
  const updMeal=(mid,patch)=>{
    const ms=activeDays[activeDay].meals.map(m=>m.id===mid?{...m,...patch}:m);
    updMeals(activeDay,ms);
  };
  const addItem=(mid,foodData)=>{
    const item=foodData||{name:'',qty:100,unit:'g',kcal:0,p:0,c:0,f:0};
    const ms=activeDays[activeDay].meals.map(m=>m.id===mid?{...m,items:[...(m.items||[]),item]}:m);
    updMeals(activeDay,ms);
  };
  const updItem=(mid,idx,patch)=>{
    const ms=activeDays[activeDay].meals.map(m=>m.id===mid?{...m,items:m.items.map((it,i)=>i===idx?{...it,...patch}:it)}:m);
    updMeals(activeDay,ms);
  };
  const delItem=(mid,idx)=>{
    const ms=activeDays[activeDay].meals.map(m=>m.id===mid?{...m,items:m.items.filter((_,i)=>i!==idx)}:m);
    updMeals(activeDay,ms);
  };
  const copyFromDay=fromDay=>{
    if(!confirm(`Copier le plan de ${fromDay} vers ${activeDay} ?`))return;
    const src=activeDays[fromDay]&&activeDays[fromDay].meals||emptyDay().meals;
    const cloned=src.map(m=>({...m,items:(m.items||[]).map(it=>({...it}))}));
    updMeals(activeDay,cloned);
  };

  const inp={width:'100%',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:8,color:T.text,fontSize:13,fontWeight:600,padding:'8px 10px',outline:'none',fontFamily:'inherit',boxSizing:'border-box'};
  const num={...inp,textAlign:'center',padding:'6px 4px'};

  return(
    <div>
      <input ref={fileRef} type="file" accept=".xlsx,.xls,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel,application/octet-stream" style={{display:'none'}} onChange={handleExcelImport}/>

      {/* Excel I/O buttons */}
      <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:10}}>
        <button onClick={()=>fileRef.current.click()} style={{flex:'1 1 80px',height:40,borderRadius:11,border:'1px solid rgba(191,160,96,0.35)',background:'rgba(191,160,96,0.08)',color:T.accent,fontSize:12,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6,letterSpacing:0.2}}>
          <span style={{fontSize:13}}>📥</span> Importer
        </button>
        <button onClick={handleExcelExport} style={{flex:'1 1 80px',height:40,borderRadius:11,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.textDim,fontSize:12,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6,letterSpacing:0.2}}>
          <span style={{fontSize:13}}>📤</span> Excel
        </button>
        <button onClick={()=>exportNutritionPDF(data,athleteName)} style={{flex:'1 1 80px',height:40,borderRadius:11,border:'1px solid rgba(44,196,160,0.3)',background:'rgba(44,196,160,0.06)',color:T.good,fontSize:12,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6,letterSpacing:0.2}}>
          <span style={{fontSize:13}}>📄</span> PDF
        </button>
        <button onClick={async()=>{
          if(!confirm(`Supprimer le plan nutrition de ${athleteName} ?`))return;
          try{
            await apiCall('/api/coach/nutrition/'+athleteId,{method:'DELETE'});
            setData(normalizePlan(null));
            setImportMsg('✓ Plan nutrition supprimé');setTimeout(()=>setImportMsg(null),3000);
            if(onSaved)onSaved();
          }catch(e){setImportMsg('✗ '+(e.message||e));setTimeout(()=>setImportMsg(null),5000);}
        }} title="Supprimer le plan nutrition" style={{width:42,height:38,borderRadius:11,border:'1px solid rgba(191,160,96,0.25)',background:'rgba(191,160,96,0.06)',color:T.accent,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <Icon name="trash" size={15} stroke={T.accent}/>
        </button>
      </div>
      {importMsg&&(
        <div style={{marginBottom:10,padding:'8px 12px',borderRadius:10,background:'rgba(44,196,160,0.12)',border:'1px solid rgba(44,196,160,0.3)',color:T.good,fontSize:12,fontWeight:600,textAlign:'center'}}>{importMsg}</div>
      )}

      {/* Bouton validation → push notification athlète */}
      <button onClick={notifyAthlete} disabled={notifyStatus==='sending'} style={{width:'100%',height:46,borderRadius:13,border:'none',background:notifyStatus==='done'?'linear-gradient(135deg,#2CC4A0,#5A8AE0)':'linear-gradient(135deg,#BFA060,#B85070)',color:'#fff',fontSize:13,fontWeight:700,cursor:notifyStatus==='sending'?'wait':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginBottom:12,boxShadow:notifyStatus==='done'?'0 6px 18px rgba(44,196,160,0.4)':'0 6px 18px rgba(191,160,96,0.4)',opacity:notifyStatus==='sending'?0.7:1,transition:'all 0.3s ease'}}>
        {notifyStatus==='sending'?<span style={{fontSize:15}}>⏳</span>:notifyStatus==='done'?<span style={{fontSize:15}}>✅</span>:notifyStatus==='error'?<span style={{fontSize:15}}>✗</span>:<Icon name="check" size={16} stroke="#fff" strokeWidth={2.5}/>}
        {notifyStatus==='sending'?'Envoi en cours…':notifyStatus==='done'?'Notification envoyée !':notifyStatus==='error'?'Erreur — réessaie':"Valider & notifier l'athlète"}
      </button>

      {/* Sélecteur semaine */}
      {data.weeks&&data.weeks.length>1&&(
        <div style={{display:'flex',gap:4,marginBottom:8}}>
          {data.weeks.map((w,i)=>(
            <button key={w.label} onClick={()=>setActiveWeek(i)} style={{flex:1,height:30,borderRadius:9,border:i===activeWeek?'1px solid rgba(191,160,96,0.6)':'1px solid rgba(255,255,255,0.1)',background:i===activeWeek?T.accentSoft:'rgba(255,255,255,0.03)',color:i===activeWeek?T.accent:T.textDim,fontSize:11,fontWeight:700,cursor:'pointer'}}>
              {w.label}
            </button>
          ))}
        </div>
      )}

      {/* Totaux auto-calculés depuis les aliments du jour actif */}
      {(()=>{
        const dayMeals=(activeDays&&activeDays[activeDay]&&activeDays[activeDay].meals)||[];
        const t=dayMeals.reduce((acc,m)=>{const mm=mealMacros(m.items);return{kcal:acc.kcal+mm.kcal,p:acc.p+mm.p,c:acc.c+mm.c,f:acc.f+mm.f};},{kcal:0,p:0,c:0,f:0});
        return(
          <div style={{padding:12,borderRadius:14,background:'linear-gradient(160deg,rgba(191,160,96,0.08),rgba(90,138,224,0.04))',border:'1px solid rgba(255,255,255,0.07)',marginBottom:10}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
              <span style={{fontSize:11,color:T.textFaint,fontWeight:700,letterSpacing:0.4,textTransform:'uppercase'}}>Total {activeDay} (somme des aliments)</span>
              {saveStatus&&<span style={{fontSize:9,color:saveStatus==='saved'?T.good:saveStatus==='error'?T.danger:T.warn,fontWeight:700,letterSpacing:0.3,marginLeft:'auto'}}>
                {saveStatus==='saving'?'…':saveStatus==='saved'?'✓ Sauvegardé':'✗ Erreur'}
              </span>}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:6}}>
              {[
                {l:'kcal',v:Math.round(t.kcal),c:'#BFA060'},
                {l:'P g',v:Math.round(t.p),c:'#B85070'},
                {l:'C g',v:Math.round(t.c),c:'#5A8AE0'},
                {l:'L g',v:Math.round(t.f),c:'#C89040'},
              ].map(f=>(
                <div key={f.l} style={{textAlign:'center'}}>
                  <div style={{fontSize:9,color:f.c,fontWeight:700,marginBottom:4,letterSpacing:0.4,textTransform:'uppercase'}}>{f.l}</div>
                  <div style={{padding:'8px 4px',borderRadius:8,background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',fontSize:17,fontWeight:700,color:f.c,fontVariantNumeric:'tabular-nums'}}>{f.v}</div>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {/* Day selector */}
      <div style={{display:'flex',gap:4,marginBottom:10,overflowX:'auto',paddingBottom:4}}>
        {DAYS_OF_WEEK.map(d=>{
          const hasContent=(activeDays[d]&&activeDays[d].meals||[]).some(m=>(m.items||[]).length>0);
          const isToday=d===todayDayName();
          const active=d===activeDay;
          return(
            <button key={d} onClick={()=>setActiveDay(d)} style={{flexShrink:0,height:38,padding:'0 11px',borderRadius:11,border:active?'1px solid transparent':'1px solid rgba(255,255,255,0.1)',background:active?T.accentSoft:'rgba(255,255,255,0.03)',color:active?T.accent:T.textDim,fontSize:11,fontWeight:700,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:1,minWidth:46,position:'relative'}}>
              <span>{d.slice(0,3)}</span>
              {hasContent&&<span style={{position:'absolute',top:5,right:5,width:5,height:5,borderRadius:3,background:T.good}}/>}
              {isToday&&<span style={{fontSize:7,color:T.textFaint}}>auj.</span>}
            </button>
          );
        })}
      </div>

      {/* Copy-from — visible uniquement si d'autres jours ont du contenu */}
      {(()=>{
        const srcDays=DAYS_OF_WEEK.filter(d=>d!==activeDay&&(activeDays[d]&&activeDays[d].meals||[]).some(m=>(m.items||[]).length>0));
        if(!srcDays.length)return null;
        return(
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:10,padding:'8px 12px',borderRadius:11,background:'rgba(90,138,224,0.06)',border:'1px solid rgba(90,138,224,0.15)'}}>
            <span style={{fontSize:11,color:'#5A8AE0',fontWeight:600,flexShrink:0}}>📋 Copier depuis :</span>
            <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
              {srcDays.map(d=>(
                <button key={d} onClick={()=>copyFromDay(d)} style={{height:28,padding:'0 10px',borderRadius:8,border:'1px solid rgba(90,138,224,0.35)',background:'rgba(90,138,224,0.1)',color:'#5A8AE0',fontSize:11,fontWeight:700,cursor:'pointer'}}>
                  {d.slice(0,3)}
                </button>
              ))}
            </div>
          </div>
        );
      })()}

      {/* Dupliquer vers — visible si le jour actif a du contenu */}
      {(()=>{
        const curMeals=(activeDays[activeDay]&&activeDays[activeDay].meals)||[];
        const hasCur=curMeals.some(m=>(m.items||[]).length>0);
        if(!hasCur)return null;
        const targets=DAYS_OF_WEEK.filter(d=>d!==activeDay);
        return(
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:10,padding:'8px 12px',borderRadius:11,background:'rgba(191,160,96,0.06)',border:'1px solid rgba(191,160,96,0.15)'}}>
            <span style={{fontSize:11,color:T.accent,fontWeight:600,flexShrink:0}}>📤 Dupliquer vers :</span>
            <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
              {targets.map(d=>(
                <button key={d} onClick={()=>{
                  if(!confirm(`Dupliquer ${activeDay} → ${d} ? Le contenu de ${d} sera remplacé.`))return;
                  const src=curMeals.map(m=>({...m,items:(m.items||[]).map(it=>({...it}))}));
                  updMeals(d,src);
                }} style={{height:28,padding:'0 10px',borderRadius:8,border:'1px solid rgba(191,160,96,0.35)',background:'rgba(191,160,96,0.10)',color:T.accent,fontSize:11,fontWeight:700,cursor:'pointer'}}>
                  {d.slice(0,3)}
                </button>
              ))}
            </div>
          </div>
        );
      })()}

      {/* Real-time preview gauges: somme des aliments du jour actif vs objectifs */}
      {(()=>{
        const dayMeals=activeDays[activeDay]&&activeDays[activeDay].meals||[];
        const totals=dayMeals.reduce((acc,m)=>{
          const mm=mealMacros(m.items);
          acc.kcal+=mm.kcal;acc.p+=mm.p;acc.c+=mm.c;acc.f+=mm.f;
          return acc;
        },{kcal:0,p:0,c:0,f:0});
        const totalItems=dayMeals.reduce((s,m)=>s+(m.items||[]).length,0);
        if(totalItems===0)return null;
        return(
          <div style={{padding:12,borderRadius:14,background:'linear-gradient(160deg,rgba(191,160,96,0.06),rgba(90,138,224,0.04))',border:'1px solid rgba(255,255,255,0.08)',marginBottom:12}}>
            <div style={{fontSize:10,color:T.textFaint,fontWeight:700,letterSpacing:0.4,textTransform:'uppercase',marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span>Aperçu {activeDay} · total des repas</span>
              <span style={{fontSize:9,color:T.textFaint}}>{totalItems} aliments</span>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:6}}>
              {[
                {l:'kcal',v:totals.kcal,t:data.dailyCalories,c:'#BFA060'},
                {l:'P',v:totals.p,t:data.dailyProtein,c:'#B85070'},
                {l:'C',v:totals.c,t:data.dailyCarbs,c:'#5A8AE0'},
                {l:'L',v:totals.f,t:data.dailyFat,c:'#C89040'},
              ].map(g=>{
                const pct=g.t>0?Math.min(1,g.v/g.t):0;
                const over=g.t>0&&g.v>g.t*1.05;
                return(
                  <div key={g.l} style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
                    <div style={{fontSize:9,color:g.c,fontWeight:700,letterSpacing:0.4,textTransform:'uppercase',marginBottom:4}}>{g.l}</div>
                    <div style={{fontSize:14,fontWeight:700,color:over?T.danger:g.c}}>{Math.round(g.v)}</div>
                    <div style={{fontSize:9,color:T.textFaint,marginBottom:5}}>/{g.t||'?'}</div>
                    <div style={{width:'100%',height:5,background:'rgba(255,255,255,0.06)',borderRadius:3,overflow:'hidden'}}>
                      <div style={{height:'100%',width:`${Math.min(100,pct*100)}%`,background:over?T.danger:g.c,borderRadius:3,transition:'width 0.4s, background 0.2s'}}/>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {foodSearchMeal&&<FoodSearch onClose={()=>setFoodSearchMeal(null)} onSelect={food=>{addItem(foodSearchMeal,food);setFoodSearchMeal(null);}}/>}

      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {(activeDays[activeDay]&&activeDays[activeDay].meals||[]).map(m=>{
          const mm=mealMacros(m.items);
          const isOpen=openMeal===m.id;
          return(
            <div key={m.id} style={{borderRadius:14,background:'rgba(255,255,255,0.025)',border:'1px solid rgba(255,255,255,0.07)',overflow:'hidden'}}>

              {/* ── En-tête repas ── */}
              <div style={{padding:'12px 12px 10px',display:'flex',alignItems:'center',gap:10}}>
                <div onClick={()=>setOpenMeal(isOpen?null:m.id)} style={{fontSize:26,cursor:'pointer',flexShrink:0}}>{m.emoji}</div>
                <div onClick={()=>setOpenMeal(isOpen?null:m.id)} style={{flex:1,minWidth:0,cursor:'pointer'}}>
                  <div style={{fontSize:13,fontWeight:700,color:T.text}}>{m.label}</div>
                  <div style={{fontSize:10,color:T.textFaint,marginTop:1}}>{m.timeStart} – {m.timeEnd}</div>
                </div>
                {/* Bouton ＋ toujours visible */}
                <button onClick={()=>setFoodSearchMeal(m.id)} style={{flexShrink:0,height:34,padding:'0 12px',borderRadius:10,border:'none',background:'linear-gradient(135deg,rgba(191,160,96,0.25),rgba(184,80,112,0.15))',color:T.accent,fontSize:12,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:5,letterSpacing:0.2}}>
                  <span style={{fontSize:14}}>＋</span> Aliment
                </button>
                <div onClick={()=>setOpenMeal(isOpen?null:m.id)} style={{cursor:'pointer',padding:'4px 2px'}}>
                  <Icon name="chevronRight" size={15} stroke={T.textFaint} style={{transform:isOpen?'rotate(90deg)':'none',transition:'transform 0.2s'}}/>
                </div>
              </div>

              {/* Chips macros repas — toujours visibles si items */}
              {m.items.length>0&&(
                <div style={{display:'flex',gap:5,padding:'0 12px 10px',flexWrap:'wrap'}}>
                  <span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:6,background:'rgba(191,160,96,0.14)',color:'#BFA060'}}>{Math.round(mm.kcal)} kcal</span>
                  <span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:6,background:'rgba(184,80,112,0.12)',color:'#B85070'}}>P {Math.round(mm.p)}g</span>
                  <span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:6,background:'rgba(90,138,224,0.12)',color:'#5A8AE0'}}>G {Math.round(mm.c)}g</span>
                  <span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:6,background:'rgba(200,144,64,0.12)',color:'#C89040'}}>L {Math.round(mm.f)}g</span>
                  <span style={{fontSize:10,color:T.textFaint,padding:'2px 4px'}}>{m.items.length} aliment{m.items.length>1?'s':''}</span>
                </div>
              )}

              {/* ── Contenu déplié ── */}
              {isOpen&&(
                <div style={{padding:'0 12px 14px',borderTop:'1px solid rgba(255,255,255,0.05)'}}>

                  {/* Horaires */}
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginTop:10,marginBottom:12}}>
                    <div>
                      <div style={{fontSize:9,color:T.textFaint,fontWeight:700,marginBottom:3,letterSpacing:0.4,textTransform:'uppercase'}}>Début</div>
                      <input defaultValue={m.timeStart} onBlur={e=>updMeal(m.id,{timeStart:e.target.value})} style={inp} placeholder="HH:MM"/>
                    </div>
                    <div>
                      <div style={{fontSize:9,color:T.textFaint,fontWeight:700,marginBottom:3,letterSpacing:0.4,textTransform:'uppercase'}}>Fin</div>
                      <input defaultValue={m.timeEnd} onBlur={e=>updMeal(m.id,{timeEnd:e.target.value})} style={inp} placeholder="HH:MM"/>
                    </div>
                  </div>

                  {/* Liste aliments */}
                  {m.items.length===0?(
                    <div onClick={()=>setFoodSearchMeal(m.id)} style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'20px 0',cursor:'pointer',borderRadius:12,border:'1px dashed rgba(191,160,96,0.25)',background:'rgba(191,160,96,0.04)',marginBottom:10}}>
                      <div style={{fontSize:28,marginBottom:6}}>🔍</div>
                      <div style={{fontSize:13,fontWeight:700,color:T.accent}}>Rechercher un aliment</div>
                      <div style={{fontSize:11,color:T.textFaint,marginTop:3}}>200+ aliments sport disponibles</div>
                    </div>
                  ):(
                    <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:10}}>
                      {m.items.map((it,idx)=>(
                        <FoodItemRow key={idx} item={it} inp={inp}
                          onCommit={patch=>updItem(m.id,idx,patch)}
                          onDelete={()=>delItem(m.id,idx)}/>
                      ))}
                    </div>
                  )}

                  {/* Bouton recherche (toujours visible si items > 0) */}
                  {m.items.length>0&&(
                    <button onClick={()=>setFoodSearchMeal(m.id)} style={{width:'100%',height:38,border:'1px dashed rgba(191,160,96,0.35)',borderRadius:10,background:'rgba(191,160,96,0.04)',color:T.accent,fontSize:12,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6,marginBottom:10}}>
                      <span style={{fontSize:16}}>🔍</span> Ajouter un aliment depuis la base
                    </button>
                  )}

                  {/* Note coach */}
                  <div>
                    <div style={{fontSize:9,color:T.textFaint,fontWeight:700,marginBottom:3,letterSpacing:0.4,textTransform:'uppercase'}}>Note coach</div>
                    <textarea defaultValue={m.note||''} onBlur={e=>updMeal(m.id,{note:e.target.value})} placeholder="Conseil, consigne…" style={{...inp,resize:'vertical',minHeight:44,fontFamily:'inherit'}}/>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Athlete Calendar Summary (coach view) ─────────────────
function AthleteCalendarSummary({sessions,program,nutriHistory,nutriPlan,mode='all'}){
  const now=new Date();
  const[calYear,setCalYear]=React.useState(now.getFullYear());
  const[calMonth,setCalMonth]=React.useState(now.getMonth());
  const[sel,setSel]=React.useState(null);

  const JS_TO_DAY=['DIMANCHE','LUNDI','MARDI','MERCREDI','JEUDI','VENDREDI','SAMEDI'];
  const todayStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

  // programme days set (from all sheets)
  const programDayNames=React.useMemo(()=>{
    const s=new Set();
    Object.values(program?.data||{}).forEach(sheet=>Object.keys(sheet).forEach(d=>s.add(d)));
    return s;
  },[program]);

  // sessions done: map dateStr → session
  const sessionsByDate=React.useMemo(()=>{
    const m={};
    (sessions||[]).forEach(s=>{const d=s.date?.slice(0,10);if(d)m[d]=s;});
    return m;
  },[sessions]);

  // nutrition validated: map dateStr → bool
  const nutriDone=React.useMemo(()=>{
    const m={};
    Object.entries(nutriHistory||{}).forEach(([d,log])=>{
      if(Object.values(log.validated||{}).some(Boolean))m[d]=true;
    });
    return m;
  },[nutriHistory]);

  // has nutrition plan
  const hasNutriPlan=!!(nutriPlan?.data);

  const calDays=React.useMemo(()=>{
    const firstDow=(new Date(calYear,calMonth,1).getDay()+6)%7;
    const dim=new Date(calYear,calMonth+1,0).getDate();
    const c=[];
    for(let i=0;i<firstDow;i++)c.push(null);
    for(let d=1;d<=dim;d++)c.push(d);
    return c;
  },[calYear,calMonth]);

  const prevM=()=>{if(calMonth===0){setCalYear(y=>y-1);setCalMonth(11);}else setCalMonth(m=>m-1);setSel(null);};
  const nextM=()=>{if(calMonth===11){setCalYear(y=>y+1);setCalMonth(0);}else setCalMonth(m=>m+1);setSel(null);};

  return(
    <div style={{marginBottom:18}}>
      {/* Month nav */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
        <button onClick={prevM} style={{width:28,height:28,borderRadius:8,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.textDim,cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>‹</button>
        <span style={{fontSize:13,fontWeight:700,textTransform:'capitalize'}}>{new Date(calYear,calMonth).toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}</span>
        <button onClick={nextM} style={{width:28,height:28,borderRadius:8,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.textDim,cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>›</button>
      </div>

      {/* Legend */}
      <div style={{display:'flex',gap:10,marginBottom:8,flexWrap:'wrap'}}>
        {mode!=='nutrition'&&[['#BFA060','Prévu'],['#2CC4A0','Fait']].map(([c,l])=>(
          <div key={l} style={{display:'flex',alignItems:'center',gap:4,fontSize:10,color:T.textDim}}>
            <div style={{width:6,height:6,borderRadius:3,background:c}}/>{l}
          </div>
        ))}
        {mode!=='sport'&&<div style={{display:'flex',alignItems:'center',gap:4,fontSize:10,color:T.textDim}}><div style={{width:6,height:6,borderRadius:3,background:'#5A8AE0'}}/>Nutrition validée</div>}
      </div>

      {/* Week labels */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:3}}>
        {['L','M','M','J','V','S','D'].map((d,i)=><div key={i} style={{textAlign:'center',fontSize:9,fontWeight:700,color:T.textFaint}}>{d}</div>)}
      </div>

      {/* Grid */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
        {calDays.map((d,i)=>{
          if(!d)return<div key={i}/>;
          const dayName=JS_TO_DAY[new Date(calYear,calMonth,d).getDay()];
          const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const hasProg=mode!=='nutrition'&&programDayNames.has(dayName);
          const sessDone=mode!=='nutrition'&&sessionsByDate[dateStr];
          const nutriOk=mode!=='sport'&&nutriDone[dateStr];
          const isToday=dateStr===todayStr;
          const isSel=sel===dateStr;
          let bg='rgba(255,255,255,0.03)',border='1px solid rgba(255,255,255,0.05)';
          if(mode==='nutrition'){
            if(nutriOk){bg='rgba(90,138,224,0.12)';border='1px solid rgba(90,138,224,0.35)';}
          }else{
            if(sessDone){bg='rgba(44,196,160,0.1)';border='1px solid rgba(44,196,160,0.3)';}
            else if(hasProg){bg='rgba(191,160,96,0.08)';border='1px solid rgba(191,160,96,0.22)';}
            if(mode==='all'&&nutriOk&&!sessDone)border='1px solid rgba(90,138,224,0.25)';
          }
          if(isToday)border='2px solid rgba(191,160,96,0.6)';
          if(isSel){bg='rgba(191,160,96,0.18)';border='2px solid #BFA060';}
          const canClick=hasProg||sessDone||nutriOk;
          const numColor=mode==='nutrition'?(nutriOk?'#5A8AE0':T.textFaint):(sessDone?'#2CC4A0':hasProg?'#BFA060':T.textFaint);
          return(
            <div key={i} onClick={()=>canClick&&setSel(isSel?null:dateStr)}
              style={{aspectRatio:'1',borderRadius:9,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',cursor:canClick?'pointer':'default',background:bg,border,transition:'background 0.15s,border-color 0.15s',willChange:'auto'}}>
              <span style={{fontSize:11,fontWeight:600,color:numColor,lineHeight:1}}>{d}</span>
              <div style={{display:'flex',gap:2,marginTop:2}}>
                {sessDone&&<div style={{width:3,height:3,borderRadius:2,background:'#2CC4A0'}}/>}
                {!sessDone&&hasProg&&<div style={{width:3,height:3,borderRadius:2,background:'#BFA060'}}/>}
                {nutriOk&&mode!=='sport'&&<div style={{width:3,height:3,borderRadius:2,background:'#5A8AE0'}}/>}
              </div>
            </div>
          );
        })}
      </div>

      {/* Selected day panel */}
      {sel&&(()=>{
        const dayName=JS_TO_DAY[new Date(sel+'T12:00:00').getDay()];
        const sess=sessionsByDate[sel];
        const nutriOk=nutriDone[sel];
        const hasProg=programDayNames.has(dayName);
        const dateLabel=new Date(sel+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
        const progData=Object.values(program?.data||{}).reduce((acc,sheet)=>acc||sheet[dayName],null);
        return(
          <div style={{marginTop:8,padding:'12px 14px',borderRadius:14,background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.08)'}}>
            <div style={{fontSize:11,color:T.textDim,fontWeight:600,textTransform:'capitalize',marginBottom:10}}>{dateLabel}</div>
            {mode!=='nutrition'&&(
              <div style={{marginBottom:8,padding:'8px 10px',borderRadius:10,background:sess?'rgba(44,196,160,0.08)':hasProg?'rgba(191,160,96,0.06)':'rgba(255,255,255,0.02)',border:`1px solid ${sess?'rgba(44,196,160,0.25)':hasProg?'rgba(191,160,96,0.18)':'rgba(255,255,255,0.06)'}`}}>
                <div style={{fontSize:9,fontWeight:700,letterSpacing:0.4,textTransform:'uppercase',color:T.textFaint,marginBottom:6}}>Séance</div>
                {sess?(
                  <>
                    <div style={{fontSize:12,fontWeight:700,color:'#2CC4A0'}}>✓ {sess.name||dayName}</div>
                    <div style={{fontSize:10,color:T.textFaint,marginTop:2}}>{Math.round(sess.totalVolume||0).toLocaleString('fr-FR')} kg</div>
                  </>
                ):hasProg&&progData?(
                  <>
                    <div style={{fontSize:12,color:'#BFA060',fontWeight:600,marginBottom:6}}>{dayName} — non effectué</div>
                    {progData.exercises?.slice(0,3).map((ex,i)=>(
                      <div key={i} style={{fontSize:11,color:T.textDim,padding:'2px 0'}}>· {ex.name} — {ex.sets?.length}×{ex.sets?.[0]?.target||'?'}</div>
                    ))}
                    {(progData.exercises?.length||0)>3&&<div style={{fontSize:10,color:T.textFaint}}>+{progData.exercises.length-3} ex.</div>}
                  </>
                ):(
                  <div style={{fontSize:11,color:T.textFaint,fontStyle:'italic'}}>Jour de repos</div>
                )}
              </div>
            )}
            {mode!=='sport'&&hasNutriPlan&&(
              <div style={{padding:'8px 10px',borderRadius:10,background:nutriOk?'rgba(90,138,224,0.08)':'rgba(255,255,255,0.02)',border:`1px solid ${nutriOk?'rgba(90,138,224,0.25)':'rgba(255,255,255,0.06)'}`}}>
                <div style={{fontSize:9,fontWeight:700,letterSpacing:0.4,textTransform:'uppercase',color:T.textFaint,marginBottom:4}}>Nutrition</div>
                <div style={{fontSize:12,fontWeight:600,color:nutriOk?'#5A8AE0':T.textFaint}}>{nutriOk?'✓ Validée':'Non validée'}</div>
              </div>
            )}
          </div>
        );
      })()}
    </div>
  );
}

// ── Coach Nutrition Mirror (read-only view of athlete's daily progress) ──
// Coach reads athlete's program (read-only mirror)
// Modal import séance à l'unité — coach envoie une séance d'un jour à l'athlète
function CoachImportSessionModal({athleteId,athleteName,dayName,dayData,onClose,onDone}){
  const[date,setDate]=React.useState(()=>new Date().toISOString().slice(0,10));
  const[exos,setExos]=React.useState(()=>(dayData.exercises||[]).map(ex=>({
    name:ex.name,muscle:ex.muscle||'',
    sets:(ex.sets||[{weight:0,reps:0,target:10}]).map(s=>({weight:s.weight||0,reps:s.reps||s.target||0})),
  })));
  const[notes,setNotes]=React.useState('');
  const[sending,setSending]=React.useState(false);
  const[msg,setMsg]=React.useState('');

  const totalVol=exos.reduce((t,e)=>t+e.sets.reduce((s,x)=>s+(x.weight||0)*(x.reps||0),0),0);

  const updSet=(ei,si,field,val)=>setExos(prev=>prev.map((e,i)=>i!==ei?e:{...e,
    sets:e.sets.map((s,j)=>j!==si?s:{...s,[field]:parseFloat(val)||0})}));

  const send=async()=>{
    setSending(true);setMsg('');
    try{
      await apiCall('/api/coach/athletes/'+athleteId+'/sessions',{method:'POST',body:{
        name:dayData.category||dayName,
        date:new Date(date).toISOString(),
        exercises:exos,
        totalVolume:totalVol,
        notes,
      }});
      setMsg('✓ Séance envoyée à '+athleteName+' !');
      setTimeout(()=>{onDone&&onDone();onClose();},1400);
    }catch(e){setMsg('✗ '+(e.message||'Erreur'));setSending(false);}
  };

  return ReactDOM.createPortal(
    <div style={{position:'fixed',inset:0,zIndex:1000,background:'rgba(0,0,0,0.78)',backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)',display:'flex',flexDirection:'column',justifyContent:'flex-end'}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:T.bgRaise,borderRadius:'22px 22px 0 0',border:'1px solid rgba(255,255,255,0.09)',maxHeight:'92vh',display:'flex',flexDirection:'column'}}>
        {/* Drag handle */}
        <div style={{display:'flex',justifyContent:'center',padding:'10px 0 4px'}}>
          <div style={{width:36,height:4,borderRadius:2,background:'rgba(255,255,255,0.15)'}}/>
        </div>
        {/* Header */}
        <div style={{padding:'4px 18px 14px',borderBottom:'1px solid rgba(255,255,255,0.07)',display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,flexShrink:0}}>
          <div>
            <div style={{fontSize:11,color:T.accent,fontWeight:700,textTransform:'uppercase',letterSpacing:0.6,marginBottom:3}}>Importer séance</div>
            <div style={{fontSize:19,fontWeight:700,letterSpacing:-0.3}}>{dayName} · {dayData.category}</div>
            <div style={{fontSize:11,color:T.textFaint,marginTop:2}}>Pour {athleteName}</div>
          </div>
          <button onClick={onClose} style={{width:34,height:34,borderRadius:17,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.05)',color:T.textDim,fontSize:17,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>×</button>
        </div>
        {/* Scrollable */}
        <div style={{overflowY:'auto',flex:1,padding:'14px 16px 8px'}}>
          {/* Date */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:10,color:T.textFaint,fontWeight:700,letterSpacing:0.4,textTransform:'uppercase',marginBottom:5}}>Date de la séance</div>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)}
              style={{width:'100%',padding:'10px 12px',borderRadius:11,border:'1px solid rgba(255,255,255,0.12)',background:'rgba(255,255,255,0.05)',color:T.text,fontSize:14,outline:'none',boxSizing:'border-box'}}/>
          </div>
          {/* Exercices */}
          <div style={{fontSize:10,color:T.textFaint,fontWeight:700,letterSpacing:0.4,textTransform:'uppercase',marginBottom:8}}>Exercices · poids et reps réalisés</div>
          <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:14}}>
            {exos.map((ex,ei)=>(
              <div key={ei} style={{borderRadius:13,border:'1px solid rgba(255,255,255,0.08)',background:'rgba(255,255,255,0.025)',overflow:'hidden'}}>
                <div style={{padding:'9px 12px 6px',borderBottom:'1px solid rgba(255,255,255,0.05)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:700}}>{ex.name}</div>
                    {ex.muscle&&<div style={{fontSize:10,color:T.textFaint,marginTop:1}}>{ex.muscle}</div>}
                  </div>
                  <div style={{fontSize:10,color:T.textFaint}}>{ex.sets.length} série{ex.sets.length>1?'s':''}</div>
                </div>
                {/* Tableau séries */}
                <div style={{padding:'8px 12px'}}>
                  <div style={{display:'grid',gridTemplateColumns:'28px 1fr 1fr',gap:4,marginBottom:4}}>
                    {['#','Poids (kg)','Reps'].map((h,i)=>(
                      <div key={i} style={{fontSize:9,color:T.textFaint,fontWeight:700,letterSpacing:0.3,textAlign:i===0?'center':'left'}}>{h}</div>
                    ))}
                  </div>
                  {ex.sets.map((s,si)=>(
                    <div key={si} style={{display:'grid',gridTemplateColumns:'28px 1fr 1fr',gap:4,marginBottom:5,alignItems:'center'}}>
                      <div style={{textAlign:'center',fontSize:11,color:T.textFaint,fontWeight:600}}>{si+1}</div>
                      <input type="number" inputMode="decimal" value={s.weight} min="0" step="0.5"
                        onChange={e=>updSet(ei,si,'weight',e.target.value)}
                        style={{width:'100%',padding:'7px 8px',borderRadius:8,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.06)',color:'#fff',fontSize:14,fontWeight:700,textAlign:'center',outline:'none',boxSizing:'border-box'}}/>
                      <input type="number" inputMode="numeric" value={s.reps} min="0" step="1"
                        onChange={e=>updSet(ei,si,'reps',e.target.value)}
                        style={{width:'100%',padding:'7px 8px',borderRadius:8,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.06)',color:'#fff',fontSize:14,fontWeight:700,textAlign:'center',outline:'none',boxSizing:'border-box'}}/>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
          {/* Volume total */}
          <div style={{textAlign:'center',fontSize:12,color:T.textFaint,marginBottom:12}}>
            Volume total : <span style={{color:T.good,fontWeight:700}}>{Math.round(totalVol).toLocaleString('fr-FR')} kg</span>
          </div>
          {/* Notes coach */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:10,color:T.textFaint,fontWeight:700,letterSpacing:0.4,textTransform:'uppercase',marginBottom:5}}>Note pour l'athlète (optionnel)</div>
            <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Bon boulot aujourd'hui, continue comme ça…" rows={2}
              style={{width:'100%',padding:'10px 12px',borderRadius:11,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.05)',color:T.text,fontSize:13,outline:'none',resize:'none',boxSizing:'border-box',fontFamily:'inherit'}}/>
          </div>
        </div>
        {/* Footer */}
        <div style={{padding:'12px 16px max(16px,env(safe-area-inset-bottom))',borderTop:'1px solid rgba(255,255,255,0.07)',flexShrink:0}}>
          {msg&&<div style={{textAlign:'center',fontSize:13,fontWeight:700,color:msg.startsWith('✓')?T.good:T.danger,marginBottom:10}}>{msg}</div>}
          <button onClick={send} disabled={sending} style={{width:'100%',height:52,borderRadius:15,border:'none',background:sending?'rgba(191,160,96,0.3)':'linear-gradient(135deg,#BFA060,#B85070)',color:'#fff',fontSize:15,fontWeight:800,cursor:sending?'default':'pointer',letterSpacing:0.4,boxShadow:sending?'none':'0 8px 24px rgba(191,160,96,0.35)'}}>
            {sending?'Envoi…':'📥 Envoyer cette séance à '+athleteName}
          </button>
        </div>
      </div>
    </div>,
    document.body
  );
}

function CoachProgramMirror({athleteData,athleteId,athleteName,onSessionSent}){
