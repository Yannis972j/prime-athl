  </div>
</div>
<script>
// Splash : animer la barre pendant le chargement des CDN
(function(){
  const bar = document.getElementById('splash-bar');
  let w = 0;
  const t = setInterval(() => { w = Math.min(w + (w < 70 ? 8 : 1), 92); if(bar) bar.style.width = w + '%'; }, 200);
  window.__splashDone = function(){
    clearInterval(t);
    if(bar) bar.style.width = '100%';
    setTimeout(() => {
      const s = document.getElementById('splash');
      if(s){ s.style.opacity = '0'; setTimeout(() => s.remove(), 400); }
    }, 300);
  };
})();
</script>

function exerciseImageURL(name){
  if(!name)return null;
  const norm=String(name).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
  for(const[kw,slug]of EXERCISE_IMG_MAP){
    if(norm.includes(kw))return`${EXERCISE_IMG_BASE}/${slug}/0.jpg`;
  }
  return null;
}

function HoloCard({children,intense=false,style={},onClick,padding=18}){
  return(
    <div onClick={onClick} style={{position:'relative',borderRadius:22,padding:1,background:HOLO.iris,backgroundSize:'200% 200%',animation:'holoShift 12s linear infinite',cursor:onClick?'pointer':'default',...style}}>
      <div style={{position:'relative',borderRadius:21,background:intense?`linear-gradient(160deg,${T.cardAccentA},${T.cardAccentB} 60%)`:`linear-gradient(160deg,${T.cardA},${T.cardB})`,padding,overflow:'hidden'}}>
        <div style={{position:'absolute',inset:0,pointerEvents:'none',background:'radial-gradient(120% 80% at 0% 0%,rgba(191,160,96,0.10),transparent 40%),radial-gradient(120% 80% at 100% 100%,rgba(90,138,224,0.06),transparent 50%)'}}/>
        <div style={{position:'relative'}}>{children}</div>
      </div>
    </div>
  );
}

function GlassCard({children,style={},onClick,padding=16,accent=false}){
  return(
    <div onClick={onClick} style={{position:'relative',borderRadius:20,padding,background:accent?`linear-gradient(160deg,${T.glassAccentA},rgba(184,80,112,0.06) 60%,${T.glassAccentB})`:`linear-gradient(160deg,${T.glassA},${T.glassB})`,border:`1px solid ${accent?'rgba(191,160,96,0.35)':T.border}`,boxShadow:T.cardShadow,cursor:onClick?'pointer':'default',...style}}>{children}</div>
  );
}

// ── Cloud / Backend ─────────────────────────────────────
const API_BASE=(()=>{
  if(typeof window==='undefined')return '';
  const l=window.location;
  if(l.protocol==='file:')return 'http://localhost:3001';
  if(l.port==='3001'||!l.port)return ''; // same origin
  return `${l.protocol}//${l.hostname}:3001`;
})();

function apiCall(path,opts={}){
  const token=localStorage.getItem('pa_token');
  const isJson=opts.body&&typeof opts.body==='object'&&!(opts.body instanceof FormData);
  return fetch(API_BASE+path,{
    method:opts.method||'GET',
    headers:{
      ...(isJson?{'Content-Type':'application/json'}:{}),
      ...(token?{'Authorization':'Bearer '+token}:{}),
    },
    body:isJson?JSON.stringify(opts.body):opts.body,
  }).then(async r=>{
    const ct=r.headers.get('content-type')||'';
    const data=ct.includes('application/json')?await r.json():await r.text();
    if(!r.ok)throw Object.assign(new Error((data&&data.error)||('http_'+r.status)),{status:r.status,data});
    return data;
  });
}

function useAuth(){
  const[state,setState]=React.useState(()=>({
    token:localStorage.getItem('pa_token'),
    user:null,
    loading:!!localStorage.getItem('pa_token'),
    error:null,
  }));

  React.useEffect(()=>{
    if(!state.token){setState(s=>({...s,loading:false}));return;}
    apiCall('/api/me')
      .then(user=>setState({token:state.token,user,loading:false,error:null}))
      .catch(()=>{
        localStorage.removeItem('pa_token');
        setState({token:null,user:null,loading:false,error:null});
      });
    // eslint-disable-next-line
  },[]);

  const login=async(email,password)=>{
    const{token,user}=await apiCall('/api/auth/login',{method:'POST',body:{email,password}});
    localStorage.setItem('pa_token',token);
    setState({token,user,loading:false,error:null});
  };

  const signup=async(email,password,role,inviteCode)=>{
    const body={email,password,role};
    if(inviteCode)body.inviteCode=inviteCode;
    const res=await apiCall('/api/auth/signup',{method:'POST',body});
    if(res.pending){
      const err=new Error('pending_approval');
      err.pending=true;
      err.detail=res.message;
      err.emailVerification=res.emailVerification;
      err.coachName=res.coachName;
      throw err;
    }
    localStorage.setItem('pa_token',res.token);
    setState({token:res.token,user:res.user,loading:false,error:null});
  };

  const logout=()=>{
    localStorage.removeItem('pa_token');
    setState({token:null,user:null,loading:false,error:null});
  };

  const setUser=u=>setState(s=>({...s,user:typeof u==='function'?u(s.user):u}));

  return{...state,login,signup,logout,setUser};
}

function useSocket(token,handlers){
  const handlersRef=React.useRef(handlers);
  handlersRef.current=handlers;
  React.useEffect(()=>{
    if(!token||typeof io==='undefined')return;
    const s=io(API_BASE||undefined,{auth:{token},transports:['websocket','polling']});
    const wrap={};
    Object.keys(handlersRef.current||{}).forEach(ev=>{
      wrap[ev]=(...a)=>handlersRef.current[ev]&&handlersRef.current[ev](...a);
      s.on(ev,wrap[ev]);
    });
    return()=>{s.disconnect();};
  },[token]);
}

function useLocalState(key,defaultValue,onSave){
  const[state,setState]=React.useState(()=>{
    try{const s=localStorage.getItem(key);return s?JSON.parse(s):defaultValue;}
    catch(e){return defaultValue;}
  });
  const isInitial=React.useRef(true);
  React.useEffect(()=>{
    try{localStorage.setItem(key,JSON.stringify(state));}catch(e){}
    if(isInitial.current){isInitial.current=false;return;}
    if(onSave)onSave();
  },[key,state]);
  return[state,setState];
}

// ── Excel import (format Yannis - programme de sport.xlsx) ──
function parseYannisExcel(file, onSuccess, onError) {
  const reader = new FileReader();
  reader.onerror = () => onError('Lecture du fichier impossible');
  reader.onload = ev => {
    try {
      if (typeof XLSX === 'undefined') { onError('Librairie Excel non chargée (SheetJS). Recharge la page.'); return; }
      const data = new Uint8Array(ev.target.result);
      const wb = XLSX.read(data, {type:'array', raw:true, cellDates:false});
      if (!wb || !wb.SheetNames || wb.SheetNames.length === 0) { onError('Fichier Excel vide ou illisible'); return; }
      const programs = {};
      const DAYS = ['LUNDI','MARDI','MERCREDI','JEUDI','VENDREDI','SAMEDI','DIMANCHE'];
      const uid = () => Math.random().toString(36).slice(2);

      const norm = s => String(s||'').trim().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');

      const parseRest = str => {
        const s = String(str||'').trim();
        const m = s.match(/^(\d+)'(\d*)/);
        if (!m) return 90;
        return parseInt(m[1])*60 + (m[2] ? parseInt(m[2]) : 0);
      };

      const parseReps = val => {
        if (val === '' || val === null || val === undefined) return null;
        const s = String(val).trim().toUpperCase();
        if (!s || s === '_') return null;
        if (s === 'MAX' || s === 'ECHEC' || s === 'FAILURE') return 'MAX';
        const n = Number(s.replace(',','.'));
        if (!isNaN(n) && isFinite(n)) return n > 200 ? 10 : Math.round(n);
        return s;
      };

      const parseWeight = val => {
        const s = String(val||'').trim();
        if (!s || s === '_') return 0;
        const u = s.toUpperCase();
        if (u === 'PDC' || u === 'PC' || u === 'BW') return 0;
        const m = s.match(/[\d.]+/);
        return m ? parseFloat(m[0]) : 0;
      };

      const isHeaderRow = row => row.some(cell => {
        const s = norm(cell);
        return s === 'jour' || s.startsWith('exerci') || s.startsWith('repeti');
      });

      const isCategoryRow = (row, colJour) => {
        const a = String(row[0]||'').trim();
        if (!a || a === '_') return false;
        const rest = row.slice(1).every(c => !String(c||'').trim() || String(c||'').trim() === '_');
        if (!rest) return false;
        return !DAYS.some(d => a.toUpperCase() === d || a.toUpperCase().startsWith(d+' '));
      };

      wb.SheetNames.forEach(sheetName => {
        const ws = wb.Sheets[sheetName];
        if (!ws || !ws['!ref']) return;
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:'', raw:true});
        if (!rows.length) return;

        let colJour=0, colStyle=1, colExercice=2, colMuscle=3, colCharge=4;
        let colDist=5, colVitesse=6, colIncli=7, colDuree=8;
        let colSeries=9, colReps=10, colRest=11;

        const detectCols = row => {
          row.forEach((cell, i) => {
            const s = norm(cell);
            if (s === 'jour') colJour=i;
            else if (s === 'style') colStyle=i;
            else if (s.startsWith('exerci')) colExercice=i;
            else if (s.startsWith('muscle')) colMuscle=i;
            else if (s.includes('charge') || s === 'kg') colCharge=i;
            else if (s.includes('distance')) colDist=i;
            else if (s.includes('vitesse')) colVitesse=i;
            else if (s.includes('incli')) colIncli=i;
            else if (s.includes('dur') && !s.includes('repos')) colDuree=i;
            else if (s.startsWith('serie')) colSeries=i;
            else if (s.startsWith('repeti') || s === 'reps') colReps=i;
            else if (s.includes('repos')) colRest=i;
          });
        };

        // Styles qui s'héritent sur les lignes suivantes (cellule fusionnée Excel)
        const INHERITABLE = ['SUPERSET','TRISET','ABDOS','CARDIO'];
        const normalizeStyle = s => s === 'TRI-SET' ? 'TRISET' : s;

        const sheetData = {};
        let currentDay = null;
        let currentCategory = '';
        let lastSeriesCount = 3;
        let lastExplicitStyle = 'CLASSIQUE';

        rows.forEach(row => {
          if (!row || row.every(c => !String(c||'').trim())) return;
          if (isHeaderRow(row)) { detectCols(row); return; }
          if (isCategoryRow(row, colJour)) { currentCategory = String(row[0]).trim(); return; }

          const exName = String(row[colExercice]||'').trim().replace(/^\([ABC]\)\s*/i,'');
          if (!exName || exName === '_') return;

          const dayRaw = String(row[colJour]||'').trim().toUpperCase();
          if (DAYS.includes(dayRaw)) { currentDay = dayRaw; lastSeriesCount = 3; lastExplicitStyle = 'CLASSIQUE'; }
          if (!currentDay) return;

          if (!sheetData[currentDay]) sheetData[currentDay] = {category:currentCategory, exercises:[]};

          const rawStyle = normalizeStyle(String(row[colStyle]||'').trim().toUpperCase());
          const styleVal = rawStyle || (INHERITABLE.includes(lastExplicitStyle) ? lastExplicitStyle : 'CLASSIQUE');
          if (rawStyle) lastExplicitStyle = rawStyle;

          const muscleRaw = String(row[colMuscle]||'').trim();
          // Si la cellule muscle contient un nombre (ex: charge mise par erreur), utiliser currentCategory
          const muscleName = (muscleRaw && isNaN(parseFloat(muscleRaw))) ? muscleRaw : currentCategory;
          const seriesNum = parseFloat(String(row[colSeries]||'').replace(',','.'));
          // CARDIO = toujours 1 série (bouton "terminé" unique)
          const numSets = styleVal==='CARDIO' ? 1 : (!isNaN(seriesNum) && seriesNum > 0) ? Math.round(seriesNum) : lastSeriesCount;
          if (!isNaN(seriesNum) && seriesNum > 0 && styleVal!=='CARDIO') lastSeriesCount = numSets;

          const weight = parseWeight(row[colCharge]);
          const weightStr = String(row[colCharge]||'').trim();
          const repsVal = parseReps(row[colReps]);
          const repsStr = repsVal === null ? '' : String(repsVal);
          // Pour les fourchettes "10-12", target numérique = borne basse, targetStr = "10-12"
          const repsMin = repsVal === null ? 10 : repsVal === 'MAX' ? 10 : (typeof repsVal === 'string' ? (parseInt(repsVal)||10) : repsVal);
          const repsTarget = repsMin;
          const restStr = String(row[colRest]||'').trim();
          const restSecs = parseRest(restStr);

          // Cardio : champs spécifiques
          const cardio = styleVal === 'CARDIO' ? {
            distance: String(row[colDist]||'').trim(),
            vitesse:  String(row[colVitesse]||'').trim(),
            inclinaison: String(row[colIncli]||'').trim(),
            duree:    String(row[colDuree]||'').trim(),
          } : null;

          sheetData[currentDay].exercises.push({
            id: uid(), name: exName, muscle: muscleName, style: styleVal,
            rest: restStr, restSeconds: restSecs, weightStr, repsStr, cardio,
            sets: Array.from({length:numSets}, () => ({weight, reps:0, done:false, target:repsTarget, targetStr:repsStr})),
          });
        });

        if (Object.keys(sheetData).length > 0) programs[sheetName] = sheetData;
      });

      if (!Object.keys(programs).length) { onError('Aucun programme détecté. Vérifie que les feuilles contiennent les colonnes JOUR / EXERCICE / SERIES / REPETITIONS / REPOS et au moins une ligne avec un jour (LUNDI…DIMANCHE).'); return; }
      onSuccess(programs);
    } catch(e) { onError('Excel invalide : ' + (e.message || e)); }
  };
  reader.readAsArrayBuffer(file);
}

function excelExport(workout) {
  const rows = [];
  workout.exercises.forEach(ex => {
    ex.sets.forEach((s, i) => rows.push({
      'Exercice'       : ex.name,
      'Muscle'         : ex.muscle,
      'Série'          : i + 1,
      'Poids (kg)'     : s.weight,
      'Répétitions'    : s.target || s.reps,
      'Reps réalisées' : s.reps,
      'Validé'         : s.done ? 'Oui' : 'Non',
    }));
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  // column widths
  ws['!cols'] = [22,18,8,12,14,15,8].map(w=>({wch:w}));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, workout.name.slice(0,31) || 'Séance');
  XLSX.writeFile(wb, `${workout.name || 'Seance'}.xlsx`);
}

// ── Shared Excel import handler (programme) ───────────────
function makeHandleProgramExcel(fileRef, onImportPrograms, setMsg) {
  return e => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = '';
    parseYannisExcel(file,
      programs => {
        if (onImportPrograms) onImportPrograms(programs);
        const nS = Object.keys(programs).length;
        const nD = Object.values(programs).reduce((s,d)=>s+Object.keys(d).length,0);
        setMsg(`✓ ${nS} mois · ${nD} jours importés`);
        setTimeout(() => setMsg(null), 4000);
      },
      err => alert('Erreur lecture Excel : ' + err)
    );
  };
}

// Couleurs par style
// CLASSIQUE=gris, SUPERSET=bleu, TRISET=rose, ABDOS=vert, CARDIO=orange
const STYLE_COLORS={CLASSIQUE:'#C8C8DC',SUPERSET:'#5A8AE0',TRISET:'#A060D0',ABDOS:'#2CC4A0',CARDIO:'#C89040'};
function groupExercises(exercises){
  const groups=[];
  let i=0;
  while(i<exercises.length){
    const ex=exercises[i];
    const s=ex.style||'CLASSIQUE';
    if(s==='SUPERSET'||s==='TRISET'||s==='ABDOS'){
      // SUPERSET = 2 exos max, TRISET = 3 exos max, ABDOS = illimité (bloc ab)
      const maxItems=s==='SUPERSET'?2:s==='TRISET'?3:Infinity;
      const items=[{ex,idx:i}]; i++;
      while(i<exercises.length&&exercises[i].style===s&&items.length<maxItems){
        items.push({ex:exercises[i],idx:i});i++;
      }
      groups.push({style:s,color:STYLE_COLORS[s]||T.accent,items});
    } else if(s==='CARDIO'){
      groups.push({style:'CARDIO',color:STYLE_COLORS.CARDIO,items:[{ex,idx:i}]});i++;
    } else {
      groups.push({style:'CLASSIQUE',color:STYLE_COLORS.CLASSIQUE,items:[{ex,idx:i}]});i++;
    }
  }
  return groups;
}

// Champ numérique optimisé mobile : tap = sélection totale (remplacement direct),
// tampon texte pendant la saisie (autorise "12." et la virgule FR "12,5" sans blocage),
// commit live de la valeur parsée (steppers + validation toujours synchro).
function NumField({value,onCommit,decimal=false,placeholder,style}){
  const[buf,setBuf]=React.useState(null);
  const display=buf!==null?buf:(value?String(value):'');
  return(
    <input
      type="text" inputMode={decimal?'decimal':'numeric'} enterKeyHint="done"
      value={display} placeholder={placeholder}
      onFocus={e=>{const el=e.currentTarget;setBuf(value?String(value):'');requestAnimationFrame(()=>{try{el.select();}catch(_){}});}}
      onChange={e=>{
        const raw=e.target.value.replace(decimal?/[^0-9.,]/g:/[^0-9]/g,'').replace(',','.');
        setBuf(raw);
        const n=decimal?parseFloat(raw):parseInt(raw,10);
        onCommit(isFinite(n)&&n>=0?n:0);
      }}
      onBlur={()=>setBuf(null)}
      onKeyDown={e=>{if(e.key==='Enter')e.currentTarget.blur();}}
      style={style}/>
  );
}

      {/* header */}
      <div style={{padding:'6px 18px 12px',background:`linear-gradient(180deg,${T.bg} 60%,transparent)`,zIndex:5,flexShrink:0}}>
