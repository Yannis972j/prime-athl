function PushNotifToggle(){
  const[status,setStatus]=React.useState('loading'); // loading|unsupported|denied|off|on|subscribing
  const[error,setError]=React.useState(null);

  React.useEffect(()=>{
    if(!('serviceWorker' in navigator)||!('PushManager' in window)){setStatus('unsupported');return;}
    const perm=Notification.permission;
    if(perm==='denied'){setStatus('denied');return;}
    // Check browser subscription + sync with server if needed
    navigator.serviceWorker.ready.then(async reg=>{
      const sub=await reg.pushManager.getSubscription();
      if(!sub){setStatus('off');return;}
      // Browser has a subscription — verify server knows about it
      try{
        const s=await apiCall('/api/push/status');
        if(!s.subscribed){
          // Re-register silently
          await apiCall('/api/push/subscribe',{method:'POST',body:{subscription:sub.toJSON()}});
        }
      }catch(e){}
      setStatus('on');
    }).catch(()=>setStatus('off'));
  },[]);

  const enable=async()=>{
    setStatus('subscribing');setError(null);
    try{
      const perm=await Notification.requestPermission();
      if(perm!=='granted'){setStatus('denied');return;}
      const reg=await navigator.serviceWorker.ready;
      // Get VAPID public key
      const{key}=await apiCall('/api/push/vapid-public-key');
      if(!key){setError('Notifications non configurées sur le serveur.');setStatus('off');return;}
      // Convert base64 VAPID key to Uint8Array
      const raw=atob(key.replace(/-/g,'+').replace(/_/g,'/'));
      const vapidKey=new Uint8Array(raw.split('').map(c=>c.charCodeAt(0)));
      const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:vapidKey});
      await apiCall('/api/push/subscribe',{method:'POST',body:{subscription:sub.toJSON()}});
      setStatus('on');
    }catch(e){setError(e.message||'Erreur');setStatus('off');}
  };

  const disable=async()=>{
    try{
      const reg=await navigator.serviceWorker.ready;
      const sub=await reg.pushManager.getSubscription();
      if(sub)await sub.unsubscribe();
      await apiCall('/api/push/subscribe',{method:'DELETE'});
      setStatus('off');
    }catch(e){setError(e.message||'Erreur');}
  };

  if(status==='loading')return null;
  if(status==='unsupported')return(
    <div style={{padding:'10px 12px',borderRadius:11,background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.07)',marginBottom:10,fontSize:11,color:T.textFaint}}>
      🔔 Notifications push non supportées sur ce navigateur
    </div>
  );

  const isOn=status==='on';
  const isLoading=status==='subscribing';
  return(
    <div style={{padding:'12px 14px',borderRadius:12,background:isOn?'rgba(124,196,161,0.06)':'rgba(255,255,255,0.03)',border:`1px solid ${isOn?'rgba(124,196,161,0.2)':'rgba(255,255,255,0.08)'}`,marginBottom:10,display:'flex',alignItems:'center',gap:12}}>
      <div style={{fontSize:22,flexShrink:0}}>{isOn?'🔔':'🔕'}</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:12,fontWeight:700,color:T.text}}>Notifications push</div>
        <div style={{fontSize:10,color:T.textFaint,marginTop:2}}>
          {status==='denied'?'Bloquées dans les paramètres du navigateur':
           isOn?'Activées — tu recevras les alertes même app fermée':
           'Reçois les alertes (nouveau programme, message…)'}
        </div>
        {error&&<div style={{fontSize:10,color:T.danger,marginTop:2}}>{error}</div>}
      </div>
      {status!=='denied'&&(
        <button onClick={isOn?disable:enable} disabled={isLoading} style={{flexShrink:0,height:32,padding:'0 14px',borderRadius:9,border:'none',background:isOn?'rgba(201,117,134,0.15)':'linear-gradient(135deg,rgba(217,119,87,0.3),rgba(124,196,161,0.2))',color:isOn?T.danger:T.good,fontSize:11,fontWeight:700,cursor:isLoading?'default':'pointer',opacity:isLoading?0.6:1}}>
          {isLoading?'…':isOn?'Désactiver':'Activer'}
        </button>
      )}
    </div>
  );
}

  const now=new Date();

  const JS_TO_DAY=['DIMANCHE','LUNDI','MARDI','MERCREDI','JEUDI','VENDREDI','SAMEDI'];

  // Sessions done: set of 'YYYY-MM-DD'
  const doneDates=React.useMemo(()=>{

    (history||[]).forEach(h=>{
      if(h.date)s.add(h.date.slice(0,10));
    });
    return s;

  // Build calendar days for current month

    const firstDow=(new Date(calYear,calMonth,1).getDay()+6)%7; // Mon=0
    const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
    const cells=[];
    for(let i=0;i<firstDow;i++)cells.push(null);
    for(let d=1;d<=daysInMonth;d++)cells.push(d);

              if(isToday)border='2px solid rgba(217,119,87,0.7)';
              if(isSel){bg='rgba(217,119,87,0.22)';border='2px solid #d97757';}
              return(
                <div key={i} onClick={()=>{if(hasWorkout||isDone)setSelectedDay(isSel?null:{d,dayName,dateStr});}}
                  style={{aspectRatio:'1',borderRadius:10,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',cursor:(hasWorkout||isDone)?'pointer':'default',background:bg,border,transition:'all 0.15s'}}>
                  <span style={{fontSize:12,fontWeight:600,color}}>{d}</span>
                  {(hasWorkout||isDone)&&<div style={{width:4,height:4,borderRadius:2,background:isDone?'#7cc4a1':'#d97757',marginTop:2}}/>}
                </div>
              );
            })}
          </div>

          {/* Selected day detail */}
          {selectedDay&&(()=>{
            const d=days[selectedDay.dayName];
            const isDone=doneDates.has(selectedDay.dateStr);
            const dateLabel=new Date(selectedDay.dateStr+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
            return(
              <div style={{background:'linear-gradient(160deg,rgba(28,28,40,0.9),rgba(14,14,20,0.9))',border:'1px solid rgba(255,255,255,0.08)',borderRadius:18,padding:16,marginBottom:16}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                  <div>
                    <div style={{fontSize:11,color:T.textDim,fontWeight:600,textTransform:'capitalize'}}>{dateLabel}</div>
                    <div style={{fontSize:17,fontWeight:700,marginTop:2}}>{d?d.category||selectedDay.dayName:selectedDay.dayName}</div>
                  </div>
                  <div style={{padding:'3px 10px',borderRadius:20,fontSize:10,fontWeight:700,background:isDone?'rgba(124,196,161,0.15)':'rgba(217,119,87,0.15)',color:isDone?'#7cc4a1':'#d97757'}}>{isDone?'✓ Fait':'À faire'}</div>
                </div>
                {d&&(
                  <>
                    <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:14}}>
                      {d.exercises.slice(0,5).map((ex,i)=>(
                        <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 10px',borderRadius:10,background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.06)'}}>
                          <div style={{width:24,height:24,borderRadius:7,background:'rgba(217,119,87,0.12)',border:'1px solid rgba(217,119,87,0.25)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:T.accent,flexShrink:0}}>{i+1}</div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ex.name}</div>
                            <div style={{fontSize:10,color:T.textFaint,marginTop:1}}>{ex.sets.length} séries · {ex.sets[0]?.target||'?'} reps</div>
                          </div>
                        </div>
                      ))}
                      {d.exercises.length>5&&<div style={{fontSize:11,color:T.textFaint,paddingLeft:4}}>+{d.exercises.length-5} exercices</div>}
                    </div>
                    <button onClick={()=>startDay(selectedDay.dayName)} style={{width:'100%',height:46,borderRadius:13,border:'none',background:'linear-gradient(135deg,#d97757,#c97586)',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',boxShadow:'0 8px 24px rgba(217,119,87,0.35)',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
                      <Icon name="play" size={16} stroke="#fff"/>
                      {isDone?'Refaire la séance':'Démarrer la séance'}
                    </button>
                  </>
                )}
              </div>
            );
          })()}
        </>
      )}
    </div>
  );
}

// ── Nutrition (athlete view) ──────────────────────────────
function mealStatus(meal, nowHM){
  const [sh,sm]=meal.timeStart.split(':').map(Number);
  const [eh,em]=meal.timeEnd.split(':').map(Number);
  const start=sh*60+sm, end=eh*60+em;
  if(nowHM>=start&&nowHM<=end)return'now';
  if(nowHM<start)return'later';
  return'past';
}

function CircleGauge({value,max,size=120,color='#d97757',label,suffix=''}){
  const over=max>0&&value>max;
  const pct=Math.max(0,Math.min(1,max>0?value/max:0));
  const r=size/2-8;
  const c=2*Math.PI*r;
  const strokeColor=over?'#e05050':color;
  return(
    <div style={{position:'relative',width:size,height:size,display:'inline-block'}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="8"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={strokeColor} strokeWidth="8" strokeLinecap="round"
          strokeDasharray={c} strokeDashoffset={over?0:c*(1-pct)}
          style={{transition:'stroke-dashoffset 0.6s cubic-bezier(.34,1.56,.64,1)',filter:`drop-shadow(0 0 ${over?6:4}px ${strokeColor}aa)`}}/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
        <div style={{fontSize:size>80?22:14,fontWeight:700,letterSpacing:-0.5,color:strokeColor}}>{Math.round(value)}</div>
        <div style={{fontSize:9,color:T.textDim,fontWeight:600,letterSpacing:0.3,marginTop:size>80?-2:0}}>/{Math.round(max)}{suffix}</div>
        {label&&<div style={{fontSize:8,color:over?'#e05050':T.textFaint,fontWeight:700,letterSpacing:0.5,textTransform:'uppercase',marginTop:2}}>{over?'EXCÈS':label}</div>}
      </div>
    </div>
  );
}

function mealMacros(items){
  return(items||[]).reduce((s,it)=>({
    kcal:s.kcal+(+it.kcal||0),
    p:s.p+(+it.p||0),
    c:s.c+(+it.c||0),
    f:s.f+(+it.f||0),
  }),{kcal:0,p:0,c:0,f:0});
}

function NutritionScreen({authToken,profile,onRefresh:globalRefresh,refreshing:globalRefreshing}){
  const[plan,setPlan]=React.useState(null);
  const[todayLog,setTodayLog]=React.useState({validated:{},validatedAt:{}});
  const[history,setHistory]=React.useState({});
  const[loading,setLoading]=React.useState(true);
  const[expandedMeal,setExpandedMeal]=React.useState(null);
  const[viewDay,setViewDay]=React.useState(()=>todayDayName());
  const[importMsg,setImportMsg]=React.useState(null);
  const fileRef=React.useRef(null);
  const isCoach=profile&&profile.role==='coach';
  const nowN=new Date();
  const[calYear,setCalYear]=React.useState(nowN.getFullYear());
  const[calMonth,setCalMonth]=React.useState(nowN.getMonth());
  const[selectedDate,setSelectedDate]=React.useState(null);
  const JS_TO_DAY_N=['DIMANCHE','LUNDI','MARDI','MERCREDI','JEUDI','VENDREDI','SAMEDI'];
  const todayStrN=`${nowN.getFullYear()}-${String(nowN.getMonth()+1).padStart(2,'0')}-${String(nowN.getDate()).padStart(2,'0')}`;
  const calDaysN=React.useMemo(()=>{
    const firstDow=(new Date(calYear,calMonth,1).getDay()+6)%7;
    const dim=new Date(calYear,calMonth+1,0).getDate();
    const cells=[];
    for(let i=0;i<firstDow;i++)cells.push(null);
    for(let d=1;d<=dim;d++)cells.push(d);
    return cells;
  },[calYear,calMonth]);
  const prevMonthN=()=>{if(calMonth===0){setCalYear(y=>y-1);setCalMonth(11);}else setCalMonth(m=>m-1);};
  const nextMonthN=()=>{if(calMonth===11){setCalYear(y=>y+1);setCalMonth(0);}else setCalMonth(m=>m+1);};

  const handleSelfImport=e=>{
    const file=e.target.files[0];
    if(!file)return;
    e.target.value='';
    setImportMsg('⏳ Import en cours...');
    parseNutritionExcel(file,async planParsed=>{
      try{
        if(!planParsed._itemsImported){
          setImportMsg('✗ 0 aliment détecté');
          setTimeout(()=>setImportMsg(null),5000);return;
        }
        const norm=normalizePlan(planParsed);
        await apiCall('/api/my-nutrition',{method:'PUT',body:{plan:norm}});
        setImportMsg(`✓ ${planParsed._itemsImported} aliments importés`);
        await load();
        setTimeout(()=>setImportMsg(null),3000);
      }catch(ex){setImportMsg('✗ '+(ex.message||ex));setTimeout(()=>setImportMsg(null),5000);}
    },err=>{setImportMsg('✗ '+err);setTimeout(()=>setImportMsg(null),5000);});
  };

  const load=React.useCallback(async()=>{
    try{
      const r=await apiCall('/api/nutrition');
      setPlan(r.plan);
      setTodayLog(r.today||{validated:{},validatedAt:{}});
      setHistory(r.history||{});
    }catch(e){console.error(e);}
    setLoading(false);
  },[]);
  React.useEffect(()=>{load();},[load]);

  useSocket(authToken,{
    'nutrition-updated':({plan})=>{setPlan(p=>p?{...p,data:plan}:{data:plan});},
  });

  const toggleMeal=async(mealId)=>{
    // optimistic
    const wasValidated=todayLog.validated[mealId];
    setTodayLog(t=>({validated:{...t.validated,[mealId]:!wasValidated},validatedAt:{...t.validatedAt,[mealId]:!wasValidated?Date.now():null}}));
    try{await apiCall('/api/nutrition/validate/'+mealId,{method:'POST'});}
    catch(e){load();}
  };

  if(loading){
    return<div style={{padding:'18px 18px 100px',color:T.text}}><div style={{padding:30,textAlign:'center',color:T.textFaint,fontSize:13}}>Chargement…</div></div>;
  }

  if(!plan||!plan.data){
    return(
      <div style={{padding:'18px 18px 100px',color:T.text}}>
        <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={handleSelfImport}/>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,color:T.textDim,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase'}}>Nutrition</div>
          <div style={{fontSize:26,fontWeight:700,letterSpacing:-0.5,marginTop:2}}><HoloText>Mon plan</HoloText></div>
        </div>
        {importMsg&&<div style={{marginBottom:12,padding:'10px 14px',borderRadius:11,background:'rgba(124,196,161,0.12)',border:'1px solid rgba(124,196,161,0.3)',color:T.good,fontSize:13,fontWeight:600,textAlign:'center'}}>{importMsg}</div>}
        <div style={{padding:'40px 24px',borderRadius:22,background:'linear-gradient(160deg,rgba(28,28,40,0.8),rgba(14,14,20,0.8))',border:`1px solid ${T.border}`,textAlign:'center'}}>
          <div style={{fontSize:48,marginBottom:14}}>🍎</div>
          <div style={{fontSize:18,fontWeight:700,marginBottom:6}}>Pas encore de plan</div>
          <div style={{fontSize:13,color:T.textDim,lineHeight:1.5,maxWidth:280,margin:'0 auto 18px'}}>{isCoach?'Importe ton propre plan nutrition au format Excel.':'Demande à ton coach de te préparer un plan nutritionnel personnalisé.'}</div>
          {isCoach&&(
            <button onClick={()=>fileRef.current.click()} style={{padding:'12px 22px',borderRadius:12,border:'1px solid transparent',background:'linear-gradient(135deg,#d97757,#c97586)',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer'}}>Importer plan nutrition</button>
          )}
        </div>
      </div>
    );
  }

  const data=normalizePlan(plan.data);
  const isToday=viewDay===todayDayName();
  const meals=getDayMeals(data,viewDay);

  // Objectifs = somme des aliments du jour vu (toujours synchronisé avec les items)
  const dayTargets=meals.reduce((acc,m)=>{
    const mm=mealMacros(m.items);
    return{kcal:acc.kcal+mm.kcal,p:acc.p+mm.p,c:acc.c+mm.c,f:acc.f+mm.f};
  },{kcal:0,p:0,c:0,f:0});

  // TODAY : somme des items validés (progression réelle)
  // AUTRES JOURS : somme totale des items (aperçu du plan complet)
  const totals=meals.reduce((acc,m)=>{
    const include=isToday?todayLog.validated[m.id]:true;
    if(include){
      const mm=mealMacros(m.items);
      acc.kcal+=mm.kcal;acc.p+=mm.p;acc.c+=mm.c;acc.f+=mm.f;
    }
    return acc;
  },{kcal:0,p:0,c:0,f:0});

  const nowHM=(()=>{const d=new Date();return d.getHours()*60+d.getMinutes();})();
  const validatedCount=isToday?meals.filter(m=>todayLog.validated[m.id]).length:0;
  const totalMeals=meals.length;

  // Streak (consecutive days with at least 1 meal validated)
  const streak=(()=>{
    let s=0;
    const today=new Date();
    for(let i=0;i<14;i++){
      const d=new Date(today.getTime()-i*86400000);
      const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const log=history[k];
      if(log&&Object.values(log.validated||{}).filter(Boolean).length>0)s++;
      else if(i>0)break;
    }
    return s;
  })();

  // Score: % of daily target (capped)
  const kcalRatio=dayTargets.kcal>0?Math.min(1,totals.kcal/dayTargets.kcal):0;
  const pRatio=dayTargets.p>0?Math.min(1,totals.p/dayTargets.p):0;
  const cRatio=dayTargets.c>0?Math.min(1,totals.c/dayTargets.c):0;
  const fRatio=dayTargets.f>0?Math.min(1,totals.f/dayTargets.f):0;
  const score=Math.round((kcalRatio+pRatio+cRatio+fRatio)/4*100);

  return(
    <div style={{padding:'18px 18px 100px',color:T.text}}>
      <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={handleSelfImport}/>
      {importMsg&&<div style={{marginBottom:12,padding:'10px 14px',borderRadius:11,background:'rgba(124,196,161,0.12)',border:'1px solid rgba(124,196,161,0.3)',color:T.good,fontSize:13,fontWeight:600,textAlign:'center'}}>{importMsg}</div>}
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:14}}>
        <div>
          <div style={{fontSize:11,color:T.textDim,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase'}}>Nutrition · Aujourd'hui</div>
          <div style={{fontSize:26,fontWeight:700,letterSpacing:-0.5,marginTop:2}}><HoloText>{profile&&profile.firstName?profile.firstName:'Mon plan'}</HoloText></div>
          {isCoach&&(
            <div style={{display:'flex',gap:6,marginTop:8}}>
              <button onClick={()=>fileRef.current.click()} style={{padding:'6px 12px',borderRadius:9,border:'1px solid rgba(217,119,87,0.35)',background:'rgba(217,119,87,0.08)',color:T.accent,fontSize:11,fontWeight:700,cursor:'pointer',letterSpacing:0.3}}>↻ Réimporter</button>
              <button onClick={async()=>{
                if(!confirm('Supprimer ton plan nutrition importé ?'))return;
                try{await apiCall('/api/my-nutrition',{method:'DELETE'});setImportMsg('✓ Supprimé');await load();setTimeout(()=>setImportMsg(null),2500);}
                catch(e){setImportMsg('✗ '+(e.message||e));setTimeout(()=>setImportMsg(null),5000);}
              }} style={{padding:'6px 12px',borderRadius:9,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.03)',color:T.textDim,fontSize:11,fontWeight:700,cursor:'pointer',letterSpacing:0.3}}>✕ Supprimer</button>
            </div>
          )}
          {streak>0&&(
            <div style={{display:'inline-flex',alignItems:'center',gap:5,marginTop:6,padding:'4px 10px',borderRadius:999,background:'rgba(217,119,87,0.12)',border:'1px solid rgba(217,119,87,0.3)'}}>
              <span style={{fontSize:13}}>🔥</span>
              <span style={{fontSize:11,color:T.accent,fontWeight:700,letterSpacing:0.3}}>{streak} JOUR{streak>1?'S':''} D'AFFILÉE</span>
            </div>
          )}
        </div>
        <div style={{textAlign:'right',flexShrink:0}}>
          <div style={{fontSize:10,color:T.textFaint,fontWeight:500,letterSpacing:0.4,textTransform:'uppercase'}}>Score</div>
          <div style={{fontSize:28,fontWeight:600,letterSpacing:-0.6,color:score>=80?T.good:score>=50?T.warn:T.danger,lineHeight:1}}>{score}<span style={{fontSize:13,color:T.textDim,fontWeight:400}}>%</span></div>
        </div>
      </div>

      {/* Calendar selector */}
      <div style={{marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <button onClick={prevMonthN} style={{width:30,height:30,borderRadius:9,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.textDim,cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>‹</button>
          <div style={{fontSize:13,fontWeight:700,textTransform:'capitalize'}}>{new Date(calYear,calMonth).toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}</div>
          <button onClick={nextMonthN} style={{width:30,height:30,borderRadius:9,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.textDim,cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>›</button>
        </div>
        <div style={{display:'flex',gap:12,marginBottom:8}}>
          {[['#7cc4a1','Validé'],['#d97757','Planifié']].map(([c,l])=>(
            <div key={l} style={{display:'flex',alignItems:'center',gap:4,fontSize:10,color:T.textDim}}>
              <div style={{width:6,height:6,borderRadius:3,background:c}}/>
              {l}
            </div>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}}>
          {['L','M','M','J','V','S','D'].map((d,i)=>(
            <div key={i} style={{textAlign:'center',fontSize:9,fontWeight:700,color:T.textFaint,padding:'2px 0'}}>{d}</div>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
          {calDaysN.map((d,i)=>{
            if(!d)return<div key={i}/>;
            const dow=new Date(calYear,calMonth,d).getDay();
            const dayName=JS_TO_DAY_N[dow];
            const dayMeals=getDayMeals(data,dayName);
            const hasPlan=dayMeals.some(m=>(m.items||[]).length>0);
            const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const histLog=history[dateStr];
            const isDone=histLog&&Object.values(histLog.validated||{}).some(Boolean);
            const isToday2=dateStr===todayStrN;
            const isSel=selectedDate===dateStr;
            let bg='rgba(255,255,255,0.03)',border='1px solid rgba(255,255,255,0.05)',color=T.textFaint;
            if(isDone){bg='rgba(124,196,161,0.1)';border='1px solid rgba(124,196,161,0.3)';color='#7cc4a1';}
            else if(hasPlan){bg='rgba(217,119,87,0.08)';border='1px solid rgba(217,119,87,0.25)';color='#d97757';}
            if(isToday2)border='2px solid rgba(217,119,87,0.6)';
            if(isSel){bg='rgba(217,119,87,0.2)';border='2px solid #d97757';}
            return(
              <div key={i} onClick={()=>{if(hasPlan||isDone){setSelectedDate(isSel?null:dateStr);setViewDay(dayName);setExpandedMeal(null);}}}
                style={{aspectRatio:'1',borderRadius:9,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',cursor:(hasPlan||isDone)?'pointer':'default',background:bg,border,transition:'all 0.15s'}}>
                <span style={{fontSize:11,fontWeight:600,color}}>{d}</span>
                {(hasPlan||isDone)&&<div style={{width:4,height:4,borderRadius:2,background:isDone?'#7cc4a1':'#d97757',marginTop:1}}/>}
              </div>
            );
          })}
        </div>
        {selectedDate&&(
          <div style={{marginTop:8,padding:'8px 12px',borderRadius:11,background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.07)',fontSize:12,color:T.textDim,textAlign:'center',textTransform:'capitalize'}}>
            {new Date(selectedDate+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})} · <span style={{color:T.accent,fontWeight:700}}>{viewDay}</span>
          </div>
        )}
      </div>

      {/* Big calorie gauge */}
      <HoloCard intense padding={0} style={{marginBottom:14}}>
        <div style={{padding:'18px',position:'relative',display:'flex',alignItems:'center',gap:14}}>
          <div style={{position:'absolute',top:-30,right:-30,width:160,height:160,background:HOLO.iris,opacity:0.3,filter:'blur(38px)',borderRadius:'50%',pointerEvents:'none'}}/>
          <CircleGauge value={totals.kcal} max={dayTargets.kcal} size={130} color="#d97757" label="KCAL"/>
          <div style={{flex:1,position:'relative'}}>
            <div style={{fontSize:10,color:T.textFaint,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase'}}>{isToday?'Repas validés':'Plan '+viewDay}</div>
            <div style={{fontSize:24,fontWeight:700,marginTop:2,letterSpacing:-0.4}}>{isToday?validatedCount:totalMeals}<span style={{fontSize:14,color:T.textDim,fontWeight:500}}>/{totalMeals}</span></div>
            <div style={{height:6,background:'rgba(255,255,255,0.06)',borderRadius:3,marginTop:8,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${((isToday?validatedCount:totalMeals)/Math.max(1,totalMeals))*100}%`,background:HOLO.irisHorizon,backgroundSize:'200% 100%',animation:'holoText 6s linear infinite',borderRadius:3,transition:'width 0.4s'}}/>
            </div>
            <div style={{fontSize:11,color:T.textDim,marginTop:8,fontWeight:600}}>
              {isToday?`${Math.max(0,Math.round(dayTargets.kcal-totals.kcal))} kcal restantes`:`Total : ${Math.round(dayTargets.kcal)} kcal · ${Math.round(dayTargets.p)}P · ${Math.round(dayTargets.c)}C · ${Math.round(dayTargets.f)}L`}
            </div>
          </div>
        </div>
      </HoloCard>

      {/* Macros gauges */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:18}}>
        {[
          {label:'Protéines',val:totals.p,max:dayTargets.p,color:'#c97586',short:'P'},
          {label:'Glucides',val:totals.c,max:dayTargets.c,color:'#7ca8c4',short:'C'},
          {label:'Lipides',val:totals.f,max:dayTargets.f,color:'#c2a042',short:'L'},
        ].map(m=>(

const DAYS_OF_WEEK=['LUNDI','MARDI','MERCREDI','JEUDI','VENDREDI','SAMEDI','DIMANCHE'];
const todayDayName=()=>DAYS_OF_WEEK[(new Date().getDay()+6)%7];
const ymdKey=(d=new Date())=>{const x=new Date(d);return`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;};

const emptyDay=()=>({meals:NUTRI_MEAL_TEMPLATES.map(t=>({...t,items:[],note:''}))});
const emptyWeek=()=>{const d={};for(const day of DAYS_OF_WEEK)d[day]=emptyDay();return d;};

// Backward-compat: get meals for a specific day
function getDayMeals(plan,dayName){
  if(plan&&plan.days&&plan.days[dayName])return plan.days[dayName].meals||[];
  if(plan&&plan.meals)return plan.meals; // legacy single-day plan
  return emptyDay().meals;
}
function getDayNote(plan,dayName){
  if(plan&&plan.days&&plan.days[dayName])return plan.days[dayName].note||'';
  return '';
}

// Parse "5H - 8H" / "14H-17H" / "5h-8h" → ["05:00","08:00"]
function parseExcelTime(s){
  if(!s)return null;
  const m=String(s).match(/(\d+)\s*[hH:]\s*(\d*)?\s*[-–]\s*(\d+)\s*[hH:]\s*(\d*)?/);
  if(!m)return null;
  const fmt=(h,mn)=>`${String(parseInt(h)).padStart(2,'0')}:${String(parseInt(mn||0)||0).padStart(2,'0')}`;
  return[fmt(m[1],m[2]),fmt(m[3],m[4])];
}

// Export: one sheet per day (matches user's format)
function exportNutritionExcel(plan,athleteName){
  const wb=XLSX.utils.book_new();
  for(const dayName of DAYS_OF_WEEK){
    const meals=getDayMeals(plan,dayName);
    const aoa=[];
    aoa.push(['JOUR','REPAS','HEURE','PRODUITS','QUANTITE','UNITE','CALORIE','PROTEINE','GLUCIDE','LIPIDE','VALIDATION']);
    let firstMealOfDay=true;
    for(const m of meals){
      const horaire=`${m.timeStart.replace(':','H').replace(/H00$/,'H')} - ${m.timeEnd.replace(':','H').replace(/H00$/,'H')}`;
      if(!m.items||m.items.length===0){
        aoa.push([firstMealOfDay?dayName:'',m.label,horaire,'','','','','','','','']);
        firstMealOfDay=false;
        // Add ~10 empty rows after each meal section for readability (matches user template)
        for(let i=0;i<10;i++)aoa.push(['','','','','','','','','','','']);
      }else{
        m.items.forEach((it,i)=>{
          aoa.push([
            firstMealOfDay&&i===0?dayName:'',
            i===0?m.label:'',
            i===0?horaire:'',
            it.name||'',
            it.qty||0,
            it.unit||'G',
            it.kcal||0,
            it.p||0,
            it.c||0,
            it.f||0,
            'OK',
          ]);
        });
        firstMealOfDay=false;
        for(let i=0;i<10-m.items.length;i++)aoa.push(['','','','','','','','','','','']);
      }
    }
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols']=[{wch:12},{wch:14},{wch:14},{wch:24},{wch:11},{wch:8},{wch:10},{wch:11},{wch:11},{wch:10},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws,dayName);
  }
  const slug=(athleteName||'plan').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');
  XLSX.writeFile(wb,`nutrition_${slug}_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function parseNutritionExcel(file,onSuccess,onError){
  const reader=new FileReader();
  reader.onerror=()=>onError('Lecture du fichier impossible');
  reader.onload=ev=>{
    try{
      if(typeof XLSX==='undefined'){onError('Librairie Excel non chargée. Recharge la page.');return;}
      const data=new Uint8Array(ev.target.result);
      const wb=XLSX.read(data,{type:'array',raw:true,cellDates:false});
      if(!wb||!wb.SheetNames||wb.SheetNames.length===0){onError('Fichier Excel vide ou illisible');return;}
      const normLabel=s=>String(s||'').trim().toUpperCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^A-Z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
      const findMeal=lbl=>{
        const n=normLabel(lbl);
        return NUTRI_MEAL_TEMPLATES.find(m=>normLabel(m.label)===n);
      };

      const days={};
      let nbItems=0;
      const upperSheetNames=wb.SheetNames.map(n=>({orig:n,norm:normLabel(n)}));
      const dayNamesNorm=DAYS_OF_WEEK.map(d=>({orig:d,norm:normLabel(d)}));

      for(const{orig:day,norm:dayNorm} of dayNamesNorm){
        // find matching sheet
        const match=upperSheetNames.find(s=>s.norm===dayNorm||s.norm.startsWith(dayNorm));
        if(!match){days[day]=emptyDay();continue;}
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[match.orig],{header:1,defval:'',raw:true});

        // Detect header row (contains "PRODUITS" or "REPAS")
        let headerIdx=-1;
        for(let i=0;i<Math.min(rows.length,10);i++){
          const r=rows[i].map(c=>String(c||'').toUpperCase());
          if(r.includes('PRODUITS')||r.includes('REPAS')){headerIdx=i;break;}
        }
        if(headerIdx===-1){days[day]=emptyDay();continue;}

        const header=rows[headerIdx].map(c=>normLabel(c));
        const col={
          jour:header.indexOf('JOUR'),
          repas:header.indexOf('REPAS'),
          heure:header.indexOf('HEURE'),
          produits:header.indexOf('PRODUITS'),
          qty:header.indexOf('QUANTITE'),
          unite:header.indexOf('UNITE'),
          kcal:header.findIndex(h=>h==='CALORIE'||h==='CALORIES'),
          p:header.findIndex(h=>h==='PROTEINE'||h==='PROTEINES'),
          c:header.findIndex(h=>h==='GLUCIDE'||h==='GLUCIDES'),
          f:header.findIndex(h=>h==='LIPIDE'||h==='LIPIDES'),
        };

        const mealById={};
        let currentId=null;

        for(let i=headerIdx+1;i<rows.length;i++){
          const row=rows[i];
          if(!row||row.every(c=>!String(c||'').trim()))continue;
          const label=String(row[col.repas]||'').trim();
          const horaire=String(row[col.heure]||'').trim();
          const name=String(row[col.produits]||'').trim();
          const qty=parseFloat(row[col.qty])||0;
          const unit=String(row[col.unite]||'g').trim().toLowerCase()||'g';
          const kcal=parseFloat(row[col.kcal])||0;
          const p=parseFloat(row[col.p])||0;
          const cc=parseFloat(row[col.c])||0;
          const fat=parseFloat(row[col.f])||0;

          if(label){
            const t=findMeal(label);
            if(t){
              currentId=t.id;
              if(!mealById[currentId]){
                let ts=t.timeStart,te=t.timeEnd;
                const parsed=parseExcelTime(horaire);
                if(parsed){ts=parsed[0];te=parsed[1];}
                mealById[currentId]={id:t.id,label:t.label,emoji:t.emoji,timeStart:ts,timeEnd:te,items:[],note:''};
              }
            }
          }
          if(name&&currentId&&mealById[currentId]){
            mealById[currentId].items.push({name,qty,unit,kcal,p,c:cc,f:fat});
            nbItems++;
          }
        }

        days[day]={meals:NUTRI_MEAL_TEMPLATES.map(t=>mealById[t.id]||{...t,items:[],note:''})};
      }

      // Compute default daily targets = average of all days
      let totalDays=0;
      const sums={kcal:0,p:0,c:0,f:0};
      for(const d of DAYS_OF_WEEK){
        const meals=days[d].meals;
        const has=meals.some(m=>m.items.length>0);
        if(!has)continue;
        totalDays++;
        for(const m of meals){
          for(const it of m.items){
            sums.kcal+=+it.kcal||0;
            sums.p+=+it.p||0;
            sums.c+=+it.c||0;
            sums.f+=+it.f||0;
          }
        }
      }
      const denom=totalDays||1;

      onSuccess({
        dailyCalories:Math.round(sums.kcal/denom),
        dailyProtein:Math.round(sums.p/denom),
        dailyCarbs:Math.round(sums.c/denom),
        dailyFat:Math.round(sums.f/denom),
        days,
        _itemsImported:nbItems,
        _sheetsFound:upperSheetNames.map(s=>s.orig).join(', '),
      });
    }catch(e){onError('Excel invalide : '+(e.message||e));}
  };
  reader.readAsArrayBuffer(file);
}

// Normalize plan: ensure 7-day structure
function normalizePlan(p){
  if(!p)return DEFAULT_NUTRI_TEMPLATE;
  const out={
    dailyCalories:p.dailyCalories||0,
    dailyProtein:p.dailyProtein||0,
    dailyCarbs:p.dailyCarbs||0,
    dailyFat:p.dailyFat||0,
    days:p.days?{...p.days}:{},
  };
  // Migrate legacy plan.meals → applied to every day
  if(!p.days&&p.meals){
    for(const d of DAYS_OF_WEEK)out.days[d]={meals:p.meals.map(m=>({...m,items:(m.items||[]).map(it=>({...it}))})),note:''};
  }
  // Ensure all days exist
  for(const d of DAYS_OF_WEEK){
    if(!out.days[d])out.days[d]=emptyDay();
    if(!out.days[d].meals)out.days[d].meals=emptyDay().meals;
  }
  return out;
}

function findFirstFilledDay(plan){
  for(const d of DAYS_OF_WEEK){
    if((plan&&plan.days&&plan.days[d]&&plan.days[d].meals||[]).some(m=>(m.items||[]).length>0))return d;
  }
  return todayDayName();
}
function findFirstFilledMeal(plan,day){
  const meals=plan&&plan.days&&plan.days[day]&&plan.days[day].meals||[];
  const m=meals.find(mm=>(mm.items||[]).length>0);
  return m?m.id:null;
}

function DelConfirm({onDelete}){
  const[confirm,setConfirm]=React.useState(false);
  if(confirm)return(
    <div style={{display:'flex',gap:4,flexShrink:0}}>
      <button onClick={()=>setConfirm(false)} style={{height:26,padding:'0 7px',borderRadius:7,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.textDim,cursor:'pointer',fontSize:11,fontWeight:700}}>Non</button>
      <button onClick={onDelete} style={{height:26,padding:'0 7px',borderRadius:7,border:'none',background:'#c97586',color:'#fff',cursor:'pointer',fontSize:11,fontWeight:700}}>Oui</button>
    </div>
  );
  return <button onClick={()=>setConfirm(true)} style={{width:26,height:26,borderRadius:7,border:'1px solid rgba(201,117,134,0.3)',background:'rgba(201,117,134,0.06)',color:T.danger,cursor:'pointer',fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>×</button>;
}

function FoodItemRow({item,inp,onCommit,onDelete}){
  const[name,setName]=React.useState(item.name||'');
  const[qty,setQty]=React.useState(String(item.qty||0));
  const hasPer100=!!(item._per100);
  const r=(v,q)=>Math.round(v*q/100*10)/10;
  const qtyNum=parseFloat(qty)||0;
  const macros=hasPer100
    ?{kcal:r(item._per100.k,qtyNum),p:r(item._per100.p,qtyNum),c:r(item._per100.g,qtyNum),f:r(item._per100.l,qtyNum)}
    :{kcal:item.kcal||0,p:item.p||0,c:item.c||0,f:item.f||0};
  const commitQty=val=>{
    const q=parseFloat(val)||0;
    if(hasPer100){
      onCommit({qty:q,kcal:r(item._per100.k,q),p:r(item._per100.p,q),c:r(item._per100.g,q),f:r(item._per100.l,q)});
    }else{
      onCommit({qty:q});
    }
  };
  return(
    <div style={{padding:'8px 10px',borderRadius:10,background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.07)'}}>
      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
        <input value={name} onChange={e=>setName(e.target.value)} onBlur={e=>onCommit({name:e.target.value})}
          placeholder="Aliment" style={{...inp,flex:1,fontSize:12,height:30,padding:'0 8px'}}/>
        <input type="number" inputMode="decimal" value={qty}
          onChange={e=>setQty(e.target.value)}
          onBlur={e=>commitQty(e.target.value)}
          style={{width:56,height:30,background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:8,color:T.text,fontSize:12,fontWeight:700,textAlign:'center',outline:'none',fontFamily:'inherit'}}/>
        <span style={{fontSize:10,color:T.textDim,flexShrink:0}}>g</span>
        <DelConfirm onDelete={onDelete}/>
      </div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        {[{l:'kcal',v:macros.kcal,c:'#d97757'},{l:'P',v:macros.p,c:'#c97586'},{l:'G',v:macros.c,c:'#7ca8c4'},{l:'L',v:macros.f,c:'#c2a042'}].map(m=>(
          <span key={m.l} style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:6,background:'rgba(255,255,255,0.05)',color:m.c}}>{m.l} {m.v}</span>
        ))}
        {hasPer100&&<span style={{fontSize:9,color:T.textFaint,padding:'2px 4px',marginLeft:'auto'}}>auto ✓</span>}
      </div>
    </div>
  );
}

          {q&&<button onClick={()=>setQ('')} style={{background:'none',border:'none',color:T.textDim,cursor:'pointer',fontSize:16,padding:0}}>×</button>}
        </div>
        <div style={{display:'flex',gap:6,overflowX:'auto',scrollbarWidth:'none',marginBottom:14,paddingBottom:2}}>
          <button onClick={()=>setCat('')} style={{flexShrink:0,height:28,padding:'0 12px',borderRadius:20,border:cat===''?'1px solid rgba(217,119,87,0.4)':'1px solid rgba(255,255,255,0.1)',background:cat===''?'rgba(217,119,87,0.15)':'transparent',color:cat===''?'#d97757':T.textDim,fontSize:11,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap'}}>Tous</button>
          {FOOD_CATS.map(c=>(
            <button key={c} onClick={()=>setCat(cat===c?'':c)} style={{flexShrink:0,height:28,padding:'0 12px',borderRadius:20,border:cat===c?'1px solid rgba(217,119,87,0.4)':'1px solid rgba(255,255,255,0.1)',background:cat===c?'rgba(217,119,87,0.15)':'transparent',color:cat===c?'#d97757':T.textDim,fontSize:11,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap'}}>
              {FOOD_CAT_EMOJI[c]} {c}
            </button>
          ))}
        </div>
        <div style={{flex:1,overflowY:'auto',scrollbarWidth:'thin',scrollbarColor:'rgba(255,255,255,0.1) transparent'}}>
          {results.length===0&&<div style={{textAlign:'center',padding:32,color:T.textDim,fontSize:13}}>Aucun aliment trouvé</div>}
          {results.map((f,i)=>(
            <div key={i} onClick={()=>{setPicked(f);setQty(100);}} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:'1px solid rgba(255,255,255,0.05)',cursor:'pointer'}}>
              <div style={{width:36,height:36,borderRadius:10,background:'rgba(255,255,255,0.04)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>{f.e}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600,color:T.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.n}</div>
                <div style={{fontSize:10,color:T.textDim,marginTop:1}}>{f.c}</div>
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <div style={{fontSize:13,fontWeight:700,color:'#d97757'}}>{f.k} kcal</div>
                <div style={{fontSize:10,color:T.textDim,marginTop:1}}>P{f.p}g · G{f.g}g · L{f.l}g</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function NutritionEditor({athleteId,athleteName,initialPlan,onSaved,onImported}){
  const[data,setData]=React.useState(()=>normalizePlan(initialPlan));
  const[activeDay,setActiveDay]=React.useState(()=>{
    const plan=normalizePlan(initialPlan);
    const t=todayDayName();
    const meals=plan.days[t]&&plan.days[t].meals||[];
    if(meals.some(m=>(m.items||[]).length>0))return t;
    return findFirstFilledDay(plan);
  });
  const[openMeal,setOpenMeal]=React.useState(()=>findFirstFilledMeal(normalizePlan(initialPlan),todayDayName())||null);
  const[saveStatus,setSaveStatus]=React.useState(null);
  const[notifyStatus,setNotifyStatus]=React.useState(null); // null|sending|done|error

  const notifyAthlete=async()=>{
    setNotifyStatus('sending');
    try{
      await apiCall('/api/coach/nutrition/'+athleteId+'/notify',{method:'POST'});
      setNotifyStatus('done');
      setTimeout(()=>setNotifyStatus(null),3000);
    }catch(e){setNotifyStatus('error');setTimeout(()=>setNotifyStatus(null),3000);}
  };
  const[importMsg,setImportMsg]=React.useState(null);
  const[foodSearchMeal,setFoodSearchMeal]=React.useState(null);
  const timerRef=React.useRef(null);
  const fileRef=React.useRef(null);

  // Re-sync data quand on change d'athlète (toujours)
  React.useEffect(()=>{
    const n=normalizePlan(initialPlan);
    setData(n);
    // Set activeDay sur le 1er jour rempli si dispo, sinon today
    setActiveDay(prev=>{
      const meals=n.days[prev]&&n.days[prev].meals||[];
      if(meals.some(m=>(m.items||[]).length>0))return prev;
      return findFirstFilledDay(n);
    });
  },[athleteId]);

  // Re-sync data si initialPlan change ET que l'éditeur n'a pas de modifs locales
  // (utile pour le 1er import quand on n'avait pas de plan)
  const lastSyncedRef=React.useRef(initialPlan);
  React.useEffect(()=>{
    if(initialPlan===lastSyncedRef.current)return;
    // Si le data local est vide (pas de modifs locales), sync depuis backend
    const isLocalEmpty=Object.values(data.days||{}).every(d=>(d.meals||[]).every(m=>(m.items||[]).length===0));
    if(isLocalEmpty&&initialPlan){
      const n=normalizePlan(initialPlan);
      setData(n);
      setActiveDay(findFirstFilledDay(n));
      setOpenMeal(findFirstFilledMeal(n,findFirstFilledDay(n)));
    }
    lastSyncedRef.current=initialPlan;
    // eslint-disable-next-line
  },[initialPlan]);

  // Save immediate (pas de debounce) — utilisé pour Excel import
  const saveImmediate=React.useCallback(async(next)=>{
    if(timerRef.current)clearTimeout(timerRef.current);
    setSaveStatus('saving');
    try{
      await apiCall('/api/coach/nutrition/'+athleteId,{method:'PUT',body:{plan:next}});
      setSaveStatus('saved');
      if(onSaved)onSaved();
      setTimeout(()=>setSaveStatus(null),1500);
      return true;
    }catch(e){setSaveStatus('error');return false;}
  },[athleteId,onSaved]);

  const handleExcelImport=e=>{
    const file=e.target.files[0];
    if(!file)return;
    e.target.value='';
    setImportMsg('⏳ Import en cours...');
    parseNutritionExcel(file,async plan=>{
      try{
        if(!plan._itemsImported){
          setImportMsg('✗ 0 aliment détecté. Vérifie le format Excel (7 feuilles LUNDI→DIMANCHE).');
          setTimeout(()=>setImportMsg(null),6000);
          return;
        }
        const norm=normalizePlan(plan);
        setData(norm);
        const firstFilledDay=findFirstFilledDay(norm);
        setActiveDay(firstFilledDay);
        setOpenMeal(findFirstFilledMeal(norm,firstFilledDay));
        lastSyncedRef.current=norm;
        const ok=await saveImmediate(norm);
        setImportMsg(ok?`✓ ${plan._itemsImported} aliments importés`:'✗ Échec sauvegarde');
        setTimeout(()=>setImportMsg(null),3500);
      }catch(ex){
        setImportMsg('✗ '+(ex.message||ex));
        setTimeout(()=>setImportMsg(null),6000);
        console.error('handleExcelImport:',ex);
      }
    },err=>{
      setImportMsg('✗ '+err);
      setTimeout(()=>setImportMsg(null),6000);
    });
  };

  const handleExcelExport=()=>{
    exportNutritionExcel(data,athleteName);
  };

  React.useEffect(()=>{setData(initialPlan||DEFAULT_NUTRI_TEMPLATE);},[athleteId,initialPlan]);

  const save=React.useCallback((next)=>{
    if(timerRef.current)clearTimeout(timerRef.current);
    timerRef.current=setTimeout(async()=>{
      setSaveStatus('saving');
      try{
        await apiCall('/api/coach/nutrition/'+athleteId,{method:'PUT',body:{plan:next}});
        setSaveStatus('saved');
        if(onSaved)onSaved();
        setTimeout(()=>setSaveStatus(null),1500);
      }catch(e){setSaveStatus('error');}
    },500);
  },[athleteId,onSaved]);

  const updField=(k,v)=>{const nd={...data,[k]:v};setData(nd);save(nd);};
  const updMeals=(dayName,newMeals)=>{
    const nd={...data,days:{...data.days,[dayName]:{...data.days[dayName],meals:newMeals}}};
    setData(nd);save(nd);
  };
  const updMeal=(mid,patch)=>{
    const ms=data.days[activeDay].meals.map(m=>m.id===mid?{...m,...patch}:m);
    updMeals(activeDay,ms);
  };
  const addItem=(mid,foodData)=>{
    const item=foodData||{name:'',qty:100,unit:'g',kcal:0,p:0,c:0,f:0};
    const ms=data.days[activeDay].meals.map(m=>m.id===mid?{...m,items:[...(m.items||[]),item]}:m);
    updMeals(activeDay,ms);
  };
  const updItem=(mid,idx,patch)=>{
    const ms=data.days[activeDay].meals.map(m=>m.id===mid?{...m,items:m.items.map((it,i)=>i===idx?{...it,...patch}:it)}:m);
    updMeals(activeDay,ms);
  };
  const delItem=(mid,idx)=>{
    const ms=data.days[activeDay].meals.map(m=>m.id===mid?{...m,items:m.items.filter((_,i)=>i!==idx)}:m);
    updMeals(activeDay,ms);
  };
  const copyFromDay=fromDay=>{
    if(!confirm(`Copier le plan de ${fromDay} vers ${activeDay} ?`))return;
    const src=data.days[fromDay]&&data.days[fromDay].meals||emptyDay().meals;
    const cloned=src.map(m=>({...m,items:(m.items||[]).map(it=>({...it}))}));
    updMeals(activeDay,cloned);
  };

  const inp={width:'100%',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:8,color:T.text,fontSize:13,fontWeight:600,padding:'8px 10px',outline:'none',fontFamily:'inherit',boxSizing:'border-box'};
  const num={...inp,textAlign:'center',padding:'6px 4px'};

  return(
    <div>
      <input ref={fileRef} type="file" accept=".xlsx,.xls,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel,application/octet-stream" style={{display:'none'}} onChange={handleExcelImport}/>

      {/* Excel I/O buttons */}
      <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:10}}>
        <button onClick={()=>fileRef.current.click()} style={{flex:'1 1 80px',height:40,borderRadius:11,border:'1px solid rgba(217,119,87,0.35)',background:'rgba(217,119,87,0.08)',color:T.accent,fontSize:12,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6,letterSpacing:0.2}}>
          <span style={{fontSize:13}}>📥</span> Importer
        </button>
        <button onClick={handleExcelExport} style={{flex:'1 1 80px',height:40,borderRadius:11,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.textDim,fontSize:12,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6,letterSpacing:0.2}}>
          <span style={{fontSize:13}}>📤</span> Excel
        </button>
        <button onClick={()=>exportNutritionPDF(data,athleteName)} style={{flex:'1 1 80px',height:40,borderRadius:11,border:'1px solid rgba(124,196,161,0.3)',background:'rgba(124,196,161,0.06)',color:T.good,fontSize:12,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6,letterSpacing:0.2}}>
          <span style={{fontSize:13}}>📄</span> PDF
        </button>
        <button onClick={async()=>{
          if(!confirm(`Supprimer le plan nutrition de ${athleteName} ?`))return;
          try{
            await apiCall('/api/coach/nutrition/'+athleteId,{method:'DELETE'});
            setData(normalizePlan(null));
            setImportMsg('✓ Plan nutrition supprimé');setTimeout(()=>setImportMsg(null),3000);
            if(onSaved)onSaved();
          }catch(e){setImportMsg('✗ '+(e.message||e));setTimeout(()=>setImportMsg(null),5000);}
        }} title="Supprimer le plan nutrition" style={{width:42,height:38,borderRadius:11,border:'1px solid rgba(217,119,87,0.25)',background:'rgba(217,119,87,0.06)',color:T.accent,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <Icon name="trash" size={15} stroke={T.accent}/>
        </button>
      </div>
      {importMsg&&(
        <div style={{marginBottom:10,padding:'8px 12px',borderRadius:10,background:'rgba(124,196,161,0.12)',border:'1px solid rgba(124,196,161,0.3)',color:T.good,fontSize:12,fontWeight:600,textAlign:'center'}}>{importMsg}</div>
      )}

      {/* Bouton validation → push notification athlète */}
      <button onClick={notifyAthlete} disabled={notifyStatus==='sending'} style={{width:'100%',height:46,borderRadius:13,border:'none',background:notifyStatus==='done'?'linear-gradient(135deg,#7cc4a1,#7ca8c4)':'linear-gradient(135deg,#d97757,#c97586)',color:'#fff',fontSize:13,fontWeight:700,cursor:notifyStatus==='sending'?'wait':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginBottom:12,boxShadow:notifyStatus==='done'?'0 6px 18px rgba(124,196,161,0.4)':'0 6px 18px rgba(217,119,87,0.4)',opacity:notifyStatus==='sending'?0.7:1,transition:'all 0.3s ease'}}>
        {notifyStatus==='sending'?<span style={{fontSize:15}}>⏳</span>:notifyStatus==='done'?<span style={{fontSize:15}}>✅</span>:notifyStatus==='error'?<span style={{fontSize:15}}>✗</span>:<Icon name="check" size={16} stroke="#fff" strokeWidth={2.5}/>}
        {notifyStatus==='sending'?'Envoi en cours…':notifyStatus==='done'?'Notification envoyée !':notifyStatus==='error'?'Erreur — réessaie':"Valider & notifier l'athlète"}
      </button>

      {/* Totaux auto-calculés depuis les aliments du jour actif */}
      {(()=>{
        const dayMeals=(data.days&&data.days[activeDay]&&data.days[activeDay].meals)||[];
        const t=dayMeals.reduce((acc,m)=>{const mm=mealMacros(m.items);return{kcal:acc.kcal+mm.kcal,p:acc.p+mm.p,c:acc.c+mm.c,f:acc.f+mm.f};},{kcal:0,p:0,c:0,f:0});
        return(
          <div style={{padding:12,borderRadius:14,background:'linear-gradient(160deg,rgba(217,119,87,0.08),rgba(124,168,196,0.04))',border:'1px solid rgba(255,255,255,0.07)',marginBottom:10}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
              <span style={{fontSize:11,color:T.textFaint,fontWeight:700,letterSpacing:0.4,textTransform:'uppercase'}}>Total {activeDay} (somme des aliments)</span>
              {saveStatus&&<span style={{fontSize:9,color:saveStatus==='saved'?T.good:saveStatus==='error'?T.danger:T.warn,fontWeight:700,letterSpacing:0.3,marginLeft:'auto'}}>
                {saveStatus==='saving'?'…':saveStatus==='saved'?'✓ Sauvegardé':'✗ Erreur'}
              </span>}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:6}}>
              {[
                {l:'kcal',v:Math.round(t.kcal),c:'#d97757'},
                {l:'P g',v:Math.round(t.p),c:'#c97586'},
                {l:'C g',v:Math.round(t.c),c:'#7ca8c4'},
                {l:'L g',v:Math.round(t.f),c:'#c2a042'},
              ].map(f=>(
                <div key={f.l} style={{textAlign:'center'}}>
                  <div style={{fontSize:9,color:f.c,fontWeight:700,marginBottom:4,letterSpacing:0.4,textTransform:'uppercase'}}>{f.l}</div>
                  <div style={{padding:'8px 4px',borderRadius:8,background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',fontSize:17,fontWeight:700,color:f.c,fontVariantNumeric:'tabular-nums'}}>{f.v}</div>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {/* Day selector */}
      <div style={{display:'flex',gap:4,marginBottom:10,overflowX:'auto',paddingBottom:4}}>
        {DAYS_OF_WEEK.map(d=>{
          const hasContent=(data.days[d]&&data.days[d].meals||[]).some(m=>(m.items||[]).length>0);
          const isToday=d===todayDayName();
          const active=d===activeDay;
          return(
            <button key={d} onClick={()=>setActiveDay(d)} style={{flexShrink:0,height:38,padding:'0 11px',borderRadius:11,border:active?'1px solid transparent':'1px solid rgba(255,255,255,0.1)',background:active?T.accentSoft:'rgba(255,255,255,0.03)',color:active?T.accent:T.textDim,fontSize:11,fontWeight:700,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:1,minWidth:46,position:'relative'}}>
              <span>{d.slice(0,3)}</span>
              {hasContent&&<span style={{position:'absolute',top:5,right:5,width:5,height:5,borderRadius:3,background:T.good}}/>}
              {isToday&&<span style={{fontSize:7,color:T.textFaint}}>auj.</span>}
            </button>
          );
        })}
      </div>

      {/* Copy-from — visible uniquement si d'autres jours ont du contenu */}
      {(()=>{
        const srcDays=DAYS_OF_WEEK.filter(d=>d!==activeDay&&(data.days[d]&&data.days[d].meals||[]).some(m=>(m.items||[]).length>0));
        if(!srcDays.length)return null;
        return(
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:10,padding:'8px 12px',borderRadius:11,background:'rgba(124,168,196,0.06)',border:'1px solid rgba(124,168,196,0.15)'}}>
            <span style={{fontSize:11,color:'#7ca8c4',fontWeight:600,flexShrink:0}}>📋 Copier depuis :</span>
            <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
              {srcDays.map(d=>(
                <button key={d} onClick={()=>copyFromDay(d)} style={{height:28,padding:'0 10px',borderRadius:8,border:'1px solid rgba(124,168,196,0.35)',background:'rgba(124,168,196,0.1)',color:'#7ca8c4',fontSize:11,fontWeight:700,cursor:'pointer'}}>
                  {d.slice(0,3)}
                </button>
              ))}
            </div>
          </div>
        );
      })()}

      {/* Real-time preview gauges: somme des aliments du jour actif vs objectifs */}
      {(()=>{
        const dayMeals=data.days[activeDay].meals||[];
        const totals=dayMeals.reduce((acc,m)=>{
          const mm=mealMacros(m.items);
          acc.kcal+=mm.kcal;acc.p+=mm.p;acc.c+=mm.c;acc.f+=mm.f;
          return acc;
        },{kcal:0,p:0,c:0,f:0});
        const totalItems=dayMeals.reduce((s,m)=>s+(m.items||[]).length,0);
        if(totalItems===0)return null;
        return(
          <div style={{padding:12,borderRadius:14,background:'linear-gradient(160deg,rgba(217,119,87,0.06),rgba(124,168,196,0.04))',border:'1px solid rgba(255,255,255,0.08)',marginBottom:12}}>
            <div style={{fontSize:10,color:T.textFaint,fontWeight:700,letterSpacing:0.4,textTransform:'uppercase',marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span>Aperçu {activeDay} · total des repas</span>
              <span style={{fontSize:9,color:T.textFaint}}>{totalItems} aliments</span>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:6}}>
              {[
                {l:'kcal',v:totals.kcal,t:data.dailyCalories,c:'#d97757'},
                {l:'P',v:totals.p,t:data.dailyProtein,c:'#c97586'},
                {l:'C',v:totals.c,t:data.dailyCarbs,c:'#7ca8c4'},
                {l:'L',v:totals.f,t:data.dailyFat,c:'#c2a042'},
              ].map(g=>{
                const pct=g.t>0?Math.min(1,g.v/g.t):0;
                const over=g.t>0&&g.v>g.t*1.05;
                return(
                  <div key={g.l} style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
                    <div style={{fontSize:9,color:g.c,fontWeight:700,letterSpacing:0.4,textTransform:'uppercase',marginBottom:4}}>{g.l}</div>
                    <div style={{fontSize:14,fontWeight:700,color:over?T.danger:g.c}}>{Math.round(g.v)}</div>
                    <div style={{fontSize:9,color:T.textFaint,marginBottom:5}}>/{g.t||'?'}</div>
                    <div style={{width:'100%',height:5,background:'rgba(255,255,255,0.06)',borderRadius:3,overflow:'hidden'}}>
                      <div style={{height:'100%',width:`${Math.min(100,pct*100)}%`,background:over?T.danger:g.c,borderRadius:3,transition:'width 0.4s, background 0.2s'}}/>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {foodSearchMeal&&<FoodSearch onClose={()=>setFoodSearchMeal(null)} onSelect={food=>{addItem(foodSearchMeal,food);setFoodSearchMeal(null);}}/>}

      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {(data.days[activeDay].meals||[]).map(m=>{
          const mm=mealMacros(m.items);
          const isOpen=openMeal===m.id;
          return(
            <div key={m.id} style={{borderRadius:14,background:'rgba(255,255,255,0.025)',border:'1px solid rgba(255,255,255,0.07)',overflow:'hidden'}}>

              {/* ── En-tête repas ── */}
              <div style={{padding:'12px 12px 10px',display:'flex',alignItems:'center',gap:10}}>
                <div onClick={()=>setOpenMeal(isOpen?null:m.id)} style={{fontSize:26,cursor:'pointer',flexShrink:0}}>{m.emoji}</div>
                <div onClick={()=>setOpenMeal(isOpen?null:m.id)} style={{flex:1,minWidth:0,cursor:'pointer'}}>
                  <div style={{fontSize:13,fontWeight:700,color:T.text}}>{m.label}</div>
                  <div style={{fontSize:10,color:T.textFaint,marginTop:1}}>{m.timeStart} – {m.timeEnd}</div>
                </div>
                {/* Bouton ＋ toujours visible */}
                <button onClick={()=>setFoodSearchMeal(m.id)} style={{flexShrink:0,height:34,padding:'0 12px',borderRadius:10,border:'none',background:'linear-gradient(135deg,rgba(217,119,87,0.25),rgba(201,117,134,0.15))',color:T.accent,fontSize:12,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:5,letterSpacing:0.2}}>
                  <span style={{fontSize:14}}>＋</span> Aliment
                </button>
                <div onClick={()=>setOpenMeal(isOpen?null:m.id)} style={{cursor:'pointer',padding:'4px 2px'}}>
                  <Icon name="chevronRight" size={15} stroke={T.textFaint} style={{transform:isOpen?'rotate(90deg)':'none',transition:'transform 0.2s'}}/>
                </div>
              </div>

              {/* Chips macros repas — toujours visibles si items */}
              {m.items.length>0&&(
                <div style={{display:'flex',gap:5,padding:'0 12px 10px',flexWrap:'wrap'}}>
                  <span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:6,background:'rgba(217,119,87,0.14)',color:'#d97757'}}>{Math.round(mm.kcal)} kcal</span>
                  <span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:6,background:'rgba(201,117,134,0.12)',color:'#c97586'}}>P {Math.round(mm.p)}g</span>
                  <span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:6,background:'rgba(124,168,196,0.12)',color:'#7ca8c4'}}>G {Math.round(mm.c)}g</span>

                  {/* Liste aliments */}
                  {m.items.length===0?(
                    <div onClick={()=>setFoodSearchMeal(m.id)} style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'20px 0',cursor:'pointer',borderRadius:12,border:'1px dashed rgba(217,119,87,0.25)',background:'rgba(217,119,87,0.04)',marginBottom:10}}>

                    <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:10}}>
                      {m.items.map((it,idx)=>(

        })}

    </div>
  );
}

// ── Athlete Calendar Summary (coach view) ─────────────────
function AthleteCalendarSummary({sessions,program,nutriHistory,nutriPlan,mode='all'}){
  const now=new Date();
  const[calYear,setCalYear]=React.useState(now.getFullYear());
  const[calMonth,setCalMonth]=React.useState(now.getMonth());
  const[sel,setSel]=React.useState(null);

  const JS_TO_DAY=['DIMANCHE','LUNDI','MARDI','MERCREDI','JEUDI','VENDREDI','SAMEDI'];
  const todayStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

  // programme days set (from all sheets)
  const programDayNames=React.useMemo(()=>{
    const s=new Set();
    Object.values(program?.data||{}).forEach(sheet=>Object.keys(sheet).forEach(d=>s.add(d)));
    return s;
  },[program]);

  // sessions done: map dateStr → session
  const sessionsByDate=React.useMemo(()=>{
    const m={};
    (sessions||[]).forEach(s=>{const d=s.date?.slice(0,10);if(d)m[d]=s;});
    return m;
  },[sessions]);

  // nutrition validated: map dateStr → bool
  const nutriDone=React.useMemo(()=>{
    const m={};
    Object.entries(nutriHistory||{}).forEach(([d,log])=>{
      if(Object.values(log.validated||{}).some(Boolean))m[d]=true;
    });
    return m;
  },[nutriHistory]);

  // has nutrition plan
  const hasNutriPlan=!!(nutriPlan?.data);

  const calDays=React.useMemo(()=>{
    const firstDow=(new Date(calYear,calMonth,1).getDay()+6)%7;
    const dim=new Date(calYear,calMonth+1,0).getDate();
    const c=[];
    for(let i=0;i<firstDow;i++)c.push(null);
    for(let d=1;d<=dim;d++)c.push(d);
    return c;
  },[calYear,calMonth]);

  const prevM=()=>{if(calMonth===0){setCalYear(y=>y-1);setCalMonth(11);}else setCalMonth(m=>m-1);setSel(null);};
  const nextM=()=>{if(calMonth===11){setCalYear(y=>y+1);setCalMonth(0);}else setCalMonth(m=>m+1);setSel(null);};

  return(
    <div style={{marginBottom:18}}>
      {/* Month nav */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
        <button onClick={prevM} style={{width:28,height:28,borderRadius:8,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.textDim,cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>‹</button>
        <span style={{fontSize:13,fontWeight:700,textTransform:'capitalize'}}>{new Date(calYear,calMonth).toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}</span>
        <button onClick={nextM} style={{width:28,height:28,borderRadius:8,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.textDim,cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>›</button>
      </div>

      {/* Legend */}
      <div style={{display:'flex',gap:10,marginBottom:8,flexWrap:'wrap'}}>
        {mode!=='nutrition'&&[['#d97757','Prévu'],['#7cc4a1','Fait']].map(([c,l])=>(
          <div key={l} style={{display:'flex',alignItems:'center',gap:4,fontSize:10,color:T.textDim}}>
            <div style={{width:6,height:6,borderRadius:3,background:c}}/>{l}
          </div>
        ))}
        {mode!=='sport'&&<div style={{display:'flex',alignItems:'center',gap:4,fontSize:10,color:T.textDim}}><div style={{width:6,height:6,borderRadius:3,background:'#7ca8c4'}}/>Nutrition validée</div>}
      </div>

      {/* Week labels */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:3}}>
        {['L','M','M','J','V','S','D'].map((d,i)=><div key={i} style={{textAlign:'center',fontSize:9,fontWeight:700,color:T.textFaint}}>{d}</div>)}
      </div>

      {/* Grid */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
        {calDays.map((d,i)=>{
          if(!d)return<div key={i}/>;
          const dayName=JS_TO_DAY[new Date(calYear,calMonth,d).getDay()];
          const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const hasProg=mode!=='nutrition'&&programDayNames.has(dayName);
          const sessDone=mode!=='nutrition'&&sessionsByDate[dateStr];
          const nutriOk=mode!=='sport'&&nutriDone[dateStr];
          const isToday=dateStr===todayStr;
          const isSel=sel===dateStr;
          let bg='rgba(255,255,255,0.03)',border='1px solid rgba(255,255,255,0.05)';
          if(mode==='nutrition'){
            if(nutriOk){bg='rgba(124,168,196,0.12)';border='1px solid rgba(124,168,196,0.35)';}
          }else{
            if(sessDone){bg='rgba(124,196,161,0.1)';border='1px solid rgba(124,196,161,0.3)';}
            else if(hasProg){bg='rgba(217,119,87,0.08)';border='1px solid rgba(217,119,87,0.22)';}
            if(mode==='all'&&nutriOk&&!sessDone)border='1px solid rgba(124,168,196,0.25)';
          }
          if(isToday)border='2px solid rgba(217,119,87,0.6)';
          if(isSel){bg='rgba(217,119,87,0.18)';border='2px solid #d97757';}
          const canClick=hasProg||sessDone||nutriOk;
          const numColor=mode==='nutrition'?(nutriOk?'#7ca8c4':T.textFaint):(sessDone?'#7cc4a1':hasProg?'#d97757':T.textFaint);
          return(
            <div key={i} onClick={()=>canClick&&setSel(isSel?null:dateStr)}
              style={{aspectRatio:'1',borderRadius:9,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',cursor:canClick?'pointer':'default',background:bg,border,transition:'all 0.15s'}}>
              <span style={{fontSize:11,fontWeight:600,color:numColor,lineHeight:1}}>{d}</span>
              <div style={{display:'flex',gap:2,marginTop:2}}>
                {sessDone&&<div style={{width:3,height:3,borderRadius:2,background:'#7cc4a1'}}/>}
                {!sessDone&&hasProg&&<div style={{width:3,height:3,borderRadius:2,background:'#d97757'}}/>}
                {nutriOk&&mode!=='sport'&&<div style={{width:3,height:3,borderRadius:2,background:'#7ca8c4'}}/>}
              </div>
            </div>
          );
        })}
      </div>

      {/* Selected day panel */}
      {sel&&(()=>{
        const dayName=JS_TO_DAY[new Date(sel+'T12:00:00').getDay()];
        const sess=sessionsByDate[sel];
        const nutriOk=nutriDone[sel];
        const hasProg=programDayNames.has(dayName);
        const dateLabel=new Date(sel+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
        const progData=Object.values(program?.data||{}).reduce((acc,sheet)=>acc||sheet[dayName],null);
        return(
          <div style={{marginTop:8,padding:'12px 14px',borderRadius:14,background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.08)'}}>
            <div style={{fontSize:11,color:T.textDim,fontWeight:600,textTransform:'capitalize',marginBottom:10}}>{dateLabel}</div>
            {mode!=='nutrition'&&(
              <div style={{marginBottom:8,padding:'8px 10px',borderRadius:10,background:sess?'rgba(124,196,161,0.08)':hasProg?'rgba(217,119,87,0.06)':'rgba(255,255,255,0.02)',border:`1px solid ${sess?'rgba(124,196,161,0.25)':hasProg?'rgba(217,119,87,0.18)':'rgba(255,255,255,0.06)'}`}}>
                <div style={{fontSize:9,fontWeight:700,letterSpacing:0.4,textTransform:'uppercase',color:T.textFaint,marginBottom:6}}>Séance</div>
                {sess?(
                  <>
                    <div style={{fontSize:12,fontWeight:700,color:'#7cc4a1'}}>✓ {sess.name||dayName}</div>
                    <div style={{fontSize:10,color:T.textFaint,marginTop:2}}>{Math.round(sess.totalVolume||0).toLocaleString('fr-FR')} kg</div>
                  </>
                ):hasProg&&progData?(
                  <>
                    <div style={{fontSize:12,color:'#d97757',fontWeight:600,marginBottom:6}}>{dayName} — non effectué</div>
                    {progData.exercises?.slice(0,3).map((ex,i)=>(
                      <div key={i} style={{fontSize:11,color:T.textDim,padding:'2px 0'}}>· {ex.name} — {ex.sets?.length}×{ex.sets?.[0]?.target||'?'}</div>
                    ))}
                    {(progData.exercises?.length||0)>3&&<div style={{fontSize:10,color:T.textFaint}}>+{progData.exercises.length-3} ex.</div>}
                  </>
                ):(
                  <div style={{fontSize:11,color:T.textFaint,fontStyle:'italic'}}>Jour de repos</div>
                )}
              </div>
            )}
            {mode!=='sport'&&hasNutriPlan&&(
              <div style={{padding:'8px 10px',borderRadius:10,background:nutriOk?'rgba(124,168,196,0.08)':'rgba(255,255,255,0.02)',border:`1px solid ${nutriOk?'rgba(124,168,196,0.25)':'rgba(255,255,255,0.06)'}`}}>
                <div style={{fontSize:9,fontWeight:700,letterSpacing:0.4,textTransform:'uppercase',color:T.textFaint,marginBottom:4}}>Nutrition</div>
                <div style={{fontSize:12,fontWeight:600,color:nutriOk?'#7ca8c4':T.textFaint}}>{nutriOk?'✓ Validée':'Non validée'}</div>
              </div>
            )}
          </div>
        );
      })()}
    </div>
  );
}

                  <div style={{fontSize:13,fontWeight:600}}>{dayName}</div>

                </div>
                <div style={{fontSize:10,color:T.textFaint,fontWeight:600,flexShrink:0}}>{exCount} exo</div>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:3}}>
                {(d.exercises||[]).slice(0,4).map((ex,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:7,fontSize:11,color:T.textDim}}>
                    <div style={{width:16,height:16,borderRadius:4,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,fontWeight:700,background:ex.style==='SUPERSET'?'rgba(124,168,196,0.1)':'rgba(217,119,87,0.08)',color:ex.style==='SUPERSET'?'#7ca8c4':T.accent}}>{i+1}</div>
                    <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ex.name}</span>
                    <span style={{fontSize:10,color:T.textFaint,flexShrink:0}}>{ex.sets.length}×{ex.repsStr||ex.sets[0]&&ex.sets[0].target||'?'}</span>
                  </div>
                ))}
                {exCount>4&&<div style={{fontSize:10,color:T.textFaint,paddingLeft:23}}>+{exCount-4} exo</div>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function CoachNutritionMirror({athleteId,athleteName,authToken}){
  const[data,setData]=React.useState(null);
  const[viewDay,setViewDay]=React.useState(()=>todayDayName());
  const[expandedMeal,setExpandedMeal]=React.useState(null);
  const[loading,setLoading]=React.useState(true);
  const[justUpdated,setJustUpdated]=React.useState(false);

  const load=React.useCallback(async()=>{
    try{const d=await apiCall('/api/coach/athletes/'+athleteId+'/nutrition');setData(d);}catch(e){console.error(e);}
    setLoading(false);
  },[athleteId]);
  React.useEffect(()=>{load();},[load]);

  // Realtime: athlete validates → instantly reflect
  useSocket(authToken,{
    'nutrition-meal-validated':({athleteId:aid})=>{
      if(aid===athleteId){
        load();
        setJustUpdated(true);
        setTimeout(()=>setJustUpdated(false),2000);
      }
    },
  });

  if(loading)return<div style={{padding:20,textAlign:'center',color:T.textFaint,fontSize:12}}>Chargement…</div>;
  if(!data||!data.plan||!data.plan.data){
    return<div style={{padding:20,textAlign:'center',color:T.textDim,fontSize:13}}>Aucun plan assigné. Crée-le d'abord.</div>;
  }

  const plan=normalizePlan(data.plan.data);
  const isToday=viewDay===todayDayName();
  const todayKey=ymdKey(new Date());
  const log=isToday?((data.history&&data.history[todayKey])||{validated:{},validatedAt:{}}):{validated:{},validatedAt:{}};
  const meals=getDayMeals(plan,viewDay);

  // dayTargets = somme des aliments du jour vu (toujours synchronisé)
  const dayTargets=meals.reduce((acc,m)=>{
    const mm=mealMacros(m.items);
    return{kcal:acc.kcal+mm.kcal,p:acc.p+mm.p,c:acc.c+mm.c,f:acc.f+mm.f};
  },{kcal:0,p:0,c:0,f:0});

  // TODAY : somme items validés (suivi réel) — AUTRES JOURS : somme totale (aperçu plan)
  const totals=meals.reduce((acc,m)=>{
    const include=isToday?log.validated[m.id]:true;
    if(include){
      const mm=mealMacros(m.items);
      acc.kcal+=mm.kcal;acc.p+=mm.p;acc.c+=mm.c;acc.f+=mm.f;
    }
    return acc;
  },{kcal:0,p:0,c:0,f:0});

  const nowHM=(()=>{const d=new Date();return d.getHours()*60+d.getMinutes();})();
  const validatedCount=isToday?meals.filter(m=>log.validated[m.id]).length:0;
  const totalMeals=meals.length;

  // streak
  const streak=(()=>{
    let s=0;const today=new Date();
    for(let i=0;i<14;i++){
      const k=ymdKey(new Date(today.getTime()-i*86400000));
      const l=data.history&&data.history[k];
      if(l&&Object.values(l.validated||{}).filter(Boolean).length>0)s++;
      else if(i>0)break;
    }
    return s;
  })();

  const score=Math.round((
    (dayTargets.kcal>0?Math.min(1,totals.kcal/dayTargets.kcal):0)+
    (dayTargets.p>0?Math.min(1,totals.p/dayTargets.p):0)+
    (dayTargets.c>0?Math.min(1,totals.c/dayTargets.c):0)+
    (dayTargets.f>0?Math.min(1,totals.f/dayTargets.f):0)
  )/4*100);

  return(
    <div>
      {/* live sync badge */}
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,padding:'7px 11px',borderRadius:10,background:'rgba(124,196,161,0.06)',border:'1px solid rgba(124,196,161,0.25)'}}>
        <span style={{width:7,height:7,borderRadius:4,background:T.good,boxShadow:`0 0 8px ${T.good}`,animation:justUpdated?'pulse 1.4s ease':'none'}}/>
        <span style={{fontSize:10,color:T.good,fontWeight:700,letterSpacing:0.3,textTransform:'uppercase'}}>MIROIR LIVE · vue {athleteName}</span>
        {justUpdated&&<span style={{fontSize:10,color:T.good,fontWeight:700,marginLeft:'auto'}}>↻ mis à jour</span>}
      </div>

      {/* Header streak + score */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,padding:'8px 12px',borderRadius:11,background:'rgba(255,255,255,0.03)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          {streak>0&&(
            <div style={{display:'inline-flex',alignItems:'center',gap:5,padding:'4px 9px',borderRadius:999,background:'rgba(217,119,87,0.12)',border:'1px solid rgba(217,119,87,0.3)'}}>
              <span style={{fontSize:11}}>🔥</span>
              <span style={{fontSize:10,color:T.accent,fontWeight:700,letterSpacing:0.3}}>{streak}j</span>
            </div>
          )}
          <span style={{fontSize:11,color:T.textDim,fontWeight:600}}>{validatedCount}/{totalMeals} repas validés aujourd'hui</span>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:8,color:T.textFaint,fontWeight:700,letterSpacing:0.4,textTransform:'uppercase'}}>Score</div>
          <div style={{fontSize:20,fontWeight:700,letterSpacing:-0.4,color:score>=80?T.good:score>=50?T.warn:T.danger,lineHeight:1}}>{score}<span style={{fontSize:11,color:T.textDim,fontWeight:500}}>%</span></div>
        </div>
      </div>

      {/* Day selector */}
      <div style={{display:'flex',gap:4,marginBottom:10,overflowX:'auto',paddingBottom:4}}>
        {DAYS_OF_WEEK.map(d=>{
          const dayMeals=getDayMeals(plan,d);
          const hasContent=dayMeals.some(m=>(m.items||[]).length>0);
          const isCurDay=d===todayDayName();
          const active=d===viewDay;
          return(
            <button key={d} onClick={()=>setViewDay(d)} style={{flexShrink:0,height:38,padding:'0 10px',borderRadius:11,border:active?'1px solid transparent':'1px solid rgba(255,255,255,0.1)',background:active?(isCurDay?'linear-gradient(135deg,rgba(217,119,87,0.18),rgba(201,117,134,0.12))':T.accentSoft):'rgba(255,255,255,0.03)',color:active?T.accent:T.textDim,fontSize:10,fontWeight:700,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:1,minWidth:42}}>
              <span>{d.slice(0,3)}</span>
              <span style={{fontSize:7,color:isCurDay?T.accent:T.textFaint,fontWeight:600}}>{isCurDay?'AUJ.':hasContent?'•':''}</span>
