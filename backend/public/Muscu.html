// ── NutritionAIWizard ─────────────────────────────────────────────────────────
function NutritionAIWizard({authUser}){
  const[view,setView]=React.useState('home'); // home|form|loading|result
  const[step,setStep]=React.useState(1);
  const[form,setForm]=React.useState({
    gender:authUser?.gender||'',age:authUser?.age||'',weight:authUser?.weight||'',height:authUser?.height||'',
    activity:'Modérément actif',goal:'Maintien',mealsPerDay:3,allergies:'',
    targetCalories:'',targetProtein:'',targetCarbs:'',targetFat:'',useProductList:true,
  });
  const[plan,setPlan]=React.useState(null);
  const[error,setError]=React.useState('');
  const[loadMsg,setLoadMsg]=React.useState(0);
  const[selDay,setSelDay]=React.useState('LUNDI');
  const[expandMeal,setExpandMeal]=React.useState(null);
  const[regenLoading,setRegenLoading]=React.useState(null);
  const[applyLoading,setApplyLoading]=React.useState(false);
  const[applyDone,setApplyDone]=React.useState(false);
  const[coachSheet,setCoachSheet]=React.useState(false);
  const[athletes,setAthletes]=React.useState([]);
  const[assignLoading,setAssignLoading]=React.useState(null);
  const loadMsgs=['Analyse de ton profil…','Calcul des besoins caloriques…','Construction des repas…','Équilibre des macronutriments…'];
  const DAYS=['LUNDI','MARDI','MERCREDI','JEUDI','VENDREDI','SAMEDI','DIMANCHE'];
  const IA='#6366f1';
  const IA2='#8b5cf6';

  const setF=(k,v)=>setForm(f=>({...f,[k]:v}));

  const generate=async()=>{
    setError('');setView('loading');setLoadMsg(0);
    const iv=setInterval(()=>setLoadMsg(m=>(m+1)%4),1500);
    try{
      const r=await apiCall('/api/ai/generate-nutrition',{method:'POST',body:{
        gender:form.gender,age:Number(form.age),weight:Number(form.weight),height:Number(form.height),
        activity:form.activity,goal:form.goal,mealsPerDay:Number(form.mealsPerDay),
        allergies:form.allergies,
        targetCalories:form.targetCalories?Number(form.targetCalories):undefined,
        targetProtein:form.targetProtein?Number(form.targetProtein):undefined,
        targetCarbs:form.targetCarbs?Number(form.targetCarbs):undefined,
        targetFat:form.targetFat?Number(form.targetFat):undefined,
        useProductList:form.useProductList,
      }});
      clearInterval(iv);
      if(r.error)throw new Error(r.error);
      setPlan(r.plan);setSelDay('LUNDI');setExpandMeal(null);setApplyDone(false);setView('result');
    }catch(e){
      clearInterval(iv);
      setError(e.message==='ai_not_configured'?'IA non configurée sur ce serveur.':e.message||'Erreur génération.');
      setView('form');
    }
  };

  const regenMeal=async(dayKey,mealIdx)=>{
    if(!plan)return;
    const meal=plan.days[dayKey].meals[mealIdx];
    const key=`${dayKey}-${mealIdx}`;
    setRegenLoading(key);
    try{
      const r=await apiCall('/api/ai/regenerate-meal',{method:'POST',body:{
        dayLabel:dayKey,mealLabel:meal.label,goal:form.goal,
        targetKcal:Math.round(plan.dailyCalories/plan.days[dayKey].meals.length),
        targetProtein:Math.round(plan.dailyProtein/plan.days[dayKey].meals.length),
        allergies:form.allergies,
      }});
      if(r.items){
        setPlan(p=>{
          const np={...p,days:{...p.days}};
          np.days[dayKey]={...np.days[dayKey],meals:[...np.days[dayKey].meals]};
          np.days[dayKey].meals[mealIdx]={...np.days[dayKey].meals[mealIdx],items:r.items};
          return np;
        });
      }
    }catch(e){console.error(e);}
    setRegenLoading(null);
  };

  const applyToSelf=async()=>{
    if(!plan)return;
    setApplyLoading(true);
    try{
      await apiCall('/api/my-nutrition',{method:'PUT',body:{plan}});
      setApplyDone(true);
    }catch(e){console.error(e);}
    setApplyLoading(false);
  };

  const openCoachSheet=async()=>{
    setCoachSheet(true);
    try{const r=await apiCall('/api/coach/athletes');setAthletes(Array.isArray(r)?r:(r.athletes||[]));}catch(e){}
  };

  const assignToAthlete=async(athleteId)=>{
    if(!plan)return;
    setAssignLoading(athleteId);
    try{
      await apiCall(`/api/coach/nutrition/${athleteId}`,{method:'PUT',body:{plan}});
      try{await apiCall(`/api/coach/nutrition/${athleteId}/notify`,{method:'POST'});}catch(e){}
      setAssignLoading(null);setCoachSheet(false);
    }catch(e){setAssignLoading(null);}
  };

  const inputStyle={
    width:'100%',padding:'11px 13px',borderRadius:11,border:`1px solid rgba(99,102,241,0.25)`,
    background:'rgba(99,102,241,0.08)',color:T.text,fontSize:14,boxSizing:'border-box',outline:'none',
  };

  if(view==='home') return(
    <div style={{padding:'24px 18px 90px'}}>
      <div style={{textAlign:'center',marginBottom:32}}>
        <div style={{fontSize:52,marginBottom:12}}>🥗</div>
        <div style={{fontSize:22,fontWeight:800,letterSpacing:-0.5,background:`linear-gradient(135deg,${IA},${IA2})`,WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>
          Plan Nutrition IA
        </div>
        <div style={{fontSize:13,color:T.textDim,marginTop:8,lineHeight:1.6,maxWidth:300,margin:'8px auto 0'}}>
          L'IA analyse ton profil et génère un plan nutritionnel complet sur 7 jours, avec les macros et les repas détaillés.
        </div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:12,marginBottom:28}}>
        {[
          {emoji:'🎯',title:'Adapté à ton objectif',desc:'Prise de masse, sèche, maintien ou rééquilibrage'},
          {emoji:'📊',title:'Macros calculées',desc:'Calories, protéines, glucides, lipides optimaux'},
          {emoji:'🔄',title:'Repas régénérables',desc:'Remplace un repas qui ne te convient pas d\'un clic'},
        ].map(f=>(
          <div key={f.title} style={{display:'flex',gap:12,alignItems:'flex-start',padding:'12px 14px',borderRadius:14,background:'rgba(99,102,241,0.07)',border:'1px solid rgba(99,102,241,0.15)'}}>
            <div style={{fontSize:20,flexShrink:0,marginTop:1}}>{f.emoji}</div>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:T.text,marginBottom:2}}>{f.title}</div>
              <div style={{fontSize:12,color:T.textDim,lineHeight:1.5}}>{f.desc}</div>
            </div>
          </div>
        ))}
      </div>
      <button onClick={()=>{setView('form');setStep(1);}} style={{
        width:'100%',padding:'14px',borderRadius:14,border:'none',cursor:'pointer',
        background:`linear-gradient(135deg,${IA},${IA2})`,color:'#fff',fontWeight:800,fontSize:15,

  if(view==='loading') return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'60px 32px',minHeight:360}}>

        <div style={{height:'100%',borderRadius:2,background:`linear-gradient(90deg,${IA},${IA2})`,animation:'holoShift 2s linear infinite',backgroundSize:'200% 100%'}}/>
      </div>
      <div style={{fontSize:12,color:T.textFaint,marginTop:14}}>⏱ ~15 secondes</div>
    </div>
  );

  if(view==='form') return(
    <div style={{padding:'20px 18px 90px'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20}}>
        {step===2&&<button onClick={()=>setStep(1)} style={{width:34,height:34,borderRadius:10,border:`1px solid rgba(99,102,241,0.3)`,background:'rgba(99,102,241,0.08)',color:T.textDim,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="chevronLeft" size={16} stroke={T.textDim}/></button>}
        <div>
          <div style={{fontSize:11,color:'#a5b4fc',fontWeight:700,letterSpacing:0.5,textTransform:'uppercase'}}>Étape {step}/2</div>
          <div style={{fontSize:18,fontWeight:800,letterSpacing:-0.3,color:T.text}}>{step===1?'Ton profil':'Tes objectifs'}</div>
        </div>
      </div>
      {/* Progress bar */}
      <div style={{height:3,borderRadius:2,background:'rgba(255,255,255,0.06)',marginBottom:22,overflow:'hidden'}}>
        <div style={{width:`${step*50}%`,height:'100%',borderRadius:2,background:`linear-gradient(90deg,${IA},${IA2})`,transition:'width 0.4s ease'}}/>
      </div>

      {step===1&&(
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div>
            <div style={{fontSize:12,color:T.textDim,fontWeight:600,marginBottom:6}}>Genre</div>
            <div style={{display:'flex',gap:8}}>
              {['Homme','Femme'].map(g=>(
                <button key={g} onClick={()=>setF('gender',g)} style={{
                  flex:1,padding:'10px',borderRadius:11,border:`1px solid ${form.gender===g?IA:'rgba(99,102,241,0.2)'}`,
                  background:form.gender===g?'rgba(99,102,241,0.18)':'rgba(99,102,241,0.05)',

                }}>{g==='Homme'?'👨 Homme':'👩 Femme'}</button>
              ))}
            </div>
          </div>
          {[{k:'age',label:'Âge',unit:'ans',min:10,max:100},{k:'weight',label:'Poids',unit:'kg',min:30,max:250},{k:'height',label:'Taille',unit:'cm',min:100,max:250}].map(f=>(
            <div key={f.k}>
              <div style={{fontSize:12,color:T.textDim,fontWeight:600,marginBottom:6}}>{f.label}</div>
              <div style={{position:'relative'}}>
                <input type="number" placeholder={f.min+''} value={form[f.k]} onChange={e=>setF(f.k,e.target.value)} min={f.min} max={f.max} style={inputStyle}/>
                <span style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',fontSize:12,color:T.textFaint}}>{f.unit}</span>
              </div>
            </div>
          ))}
          <div>
            <div style={{fontSize:12,color:T.textDim,fontWeight:600,marginBottom:6}}>Niveau d'activité</div>
            <select value={form.activity} onChange={e=>setF('activity',e.target.value)} style={selectStyle}>
              {['Sédentaire','Légèrement actif','Modérément actif','Très actif','Extrêmement actif'].map(a=><option key={a} value={a}>{a}</option>)}

          </div>
          <button onClick={()=>{
            if(!form.gender||!form.age||!form.weight||!form.height){setError('Remplis tous les champs.');return;}
            setError('');setStep(2);
          }} style={{marginTop:8,padding:'13px',borderRadius:13,border:'none',cursor:'pointer',background:`linear-gradient(135deg,${IA},${IA2})`,color:'#fff',fontWeight:800,fontSize:14}}>
            Continuer →
          </button>
          {error&&<div style={{fontSize:12,color:T.danger,textAlign:'center'}}>{error}</div>}
        </div>
      )}

      {step===2&&(
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div>
            <div style={{fontSize:12,color:T.textDim,fontWeight:600,marginBottom:6}}>Objectif</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
              {[{v:'Prise de masse',e:'💪'},{v:'Sèche',e:'🔥'},{v:'Maintien',e:'⚖️'},{v:'Rééquilibrage',e:'🥗'}].map(g=>(

                  background:form.goal===g.v?'rgba(99,102,241,0.18)':'rgba(99,102,241,0.05)',

                  <span style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',fontSize:11,color:T.textFaint,fontWeight:600}}>{f.lbl}</span>
                </div>

// ── Gesture Navigation ──────────────────────────────────────
function useGestureNav({tabIds, tab, setTab, onBack, canBack, onRefresh, canRefresh}){
  const ref=React.useRef(null);
  const drag=React.useRef(0);
  const [dragX,setDragX]=React.useState(0);
  const [dragY,setDragY]=React.useState(0);
  const [transitioning,setTransitioning]=React.useState(false);
  const state=React.useRef({sx:0,sy:0,decided:false,tracking:false,axis:null,isBack:false,isPull:false});

  React.useEffect(()=>{
    const el=ref.current; if(!el) return;
    const onStart=e=>{
      if(e.touches.length!==1) return;
      const t=e.touches[0];
      state.current={sx:t.clientX,sy:t.clientY,decided:false,tracking:false,axis:null,isBack:false,isPull:false};
      drag.current=0;
    };
    const onMove=e=>{
      if(e.touches.length!==1) return;
      const s=state.current;
      const t=e.touches[0];
      const dx=t.clientX-s.sx, dy=t.clientY-s.sy;
      if(!s.decided){
        if(Math.abs(dx)<6&&Math.abs(dy)<6) return;
        s.decided=true;
        if(Math.abs(dy)>Math.abs(dx)){
          // Vertical — pull to refresh uniquement
          if(dy>0&&canRefresh){s.tracking=true;s.axis='y';s.isPull=true;}
          else return;
        } else {
          // Horizontal
          s.axis='x';
          // Swipe back : bord gauche (<40px) vers la droite, avec cible
          if(s.sx<40&&dx>0&&canBack){s.tracking=true;s.isBack=true;}
          // Swipe tab : partout
          else if(tabIds&&tabIds.length>1){s.tracking=true;}
          else return;
        }
      }
      if(!s.tracking) return;
      if(s.axis==='x'){
        const v=s.isBack?Math.max(0,dx):dx;
        drag.current=v;
        setDragX(v);
        e.preventDefault();
      } else {
        const v=Math.min(80,Math.max(0,dy));
        drag.current=v;
        setDragY(v);
        e.preventDefault();
      }
    };
    const onEnd=()=>{
      const s=state.current;
      if(!s.tracking){setDragX(0);setDragY(0);return;}
      const w=window.innerWidth;
      setTransitioning(true);
      if(s.axis==='y'){
        if(drag.current>55&&onRefresh){onRefresh();}
        setDragY(0);
      } else if(s.isBack){
        if(drag.current>w*0.28&&onBack){onBack();}
        setDragX(0);
      } else {
        const idx=tabIds.indexOf(tab);
        if(drag.current< -w*0.28&&idx<tabIds.length-1){setTab(tabIds[idx+1]);}
        else if(drag.current>w*0.28&&idx>0){setTab(tabIds[idx-1]);}
        setDragX(0);
      }
      setTimeout(()=>setTransitioning(false),320);
      drag.current=0;
    };
    el.addEventListener('touchstart',onStart,{passive:true});
    el.addEventListener('touchmove',onMove,{passive:false});
    el.addEventListener('touchend',onEnd,{passive:true});
    el.addEventListener('touchcancel',onEnd,{passive:true});
    return()=>{
      el.removeEventListener('touchstart',onStart);
      el.removeEventListener('touchmove',onMove);
      el.removeEventListener('touchend',onEnd);
      el.removeEventListener('touchcancel',onEnd);
    };
  },[tab,tabIds,canBack,canRefresh,onBack,onRefresh,setTab]);

  return{ref,dragX,dragY,transitioning};
}

  const saveDayChanges=w=>{

          ✓ Sync cloud

      {/* Pull-to-refresh indicator */}
      {dragY>8&&(

          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#BFA060" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{transform:`rotate(${dragY*4}deg)`}}><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </div>

      <div ref={gestureRef} style={{flex:1,overflow:'hidden',position:'relative',
        transform:dragX?`translateX(${dragX}px)`:(dragY>0?`translateY(${dragY*0.3}px)`:'none'),
        transition:dragX||dragY>0?'none':(transitioning?'transform 0.3s cubic-bezier(.25,1,.5,1)':'none'),
        willChange:'transform'}}>
        {/* Ombre swipe-back (bord gauche) */}
        {dragX>0&&<div style={{position:'absolute',left:0,top:0,bottom:0,width:4,background:`linear-gradient(90deg,rgba(191,160,96,${Math.min(0.5,dragX/200)}),transparent)`,zIndex:100,pointerEvents:'none'}}/>}
        {/* Session gardée montée (display:none) pour préserver la progression quand l'utilisateur navigue */}
        <div style={{height:'100%',overflow:'auto',display:screen==='session'?'block':'none'}}>
          {sessionActive&&<SessionScreen workout={workout} onUpdateWorkout={setWorkout} onClose={()=>setScreen(null)} onFinish={()=>{setSessionActive(false);setScreen(null);setShowCongrats(true);}} onImportPrograms={updateOwnProgram} onSaveSession={saveSession} history={history} firstName={profile.firstName}/>}

// ── Bibliothèque de séances (partagée par le coach, sans calendrier) ──────────
function BibliothequeScreen({sessionLibrary,onStartWorkout}){
  const sessions=sessionLibrary?.sessions||[];
  const[preview,setPreview]=React.useState(null);

  const launchSession=s=>{
    if(!s||!s.exercises||s.exercises.length===0)return;
    // Les exercices viennent directement du parseur Excel, même format que workout
    onStartWorkout({name:s.name,muscles:s.category||'',exercises:s.exercises});
    setPreview(null);
  };

  // Grouper par sheetName (phase/mois)
  const sheets=[...new Set(sessions.map(s=>s.sheetName))];

  if(preview){
    const sc='#5A8AE0';
    return(
      <div style={{padding:'18px 18px 90px',color:T.text}}>
        <button onClick={()=>setPreview(null)} style={{display:'flex',alignItems:'center',gap:8,marginBottom:18,background:'none',border:'none',color:T.textDim,cursor:'pointer',padding:0,fontSize:13,fontWeight:600}}>
          <Icon name="chevronLeft" size={16} stroke={T.textDim}/>Retour
        </button>
        <div style={{padding:'18px',borderRadius:18,background:'rgba(90,138,224,0.08)',border:'1px solid rgba(90,138,224,0.25)',marginBottom:16}}>
          <div style={{fontSize:28,marginBottom:6}}>💪</div>
          <div style={{fontSize:20,fontWeight:800,letterSpacing:-0.4,marginBottom:2}}>{preview.name}</div>
          {preview.sheetName&&<div style={{fontSize:11,color:T.textFaint,marginBottom:8}}>{preview.sheetName}</div>}
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {preview.category&&<Pill color={sc}>{preview.category}</Pill>}
            <Pill color={T.accent}>{preview.exercises.length} exercices</Pill>
          </div>
        </div>
        <div style={{fontSize:11,color:T.textFaint,fontWeight:700,letterSpacing:0.5,textTransform:'uppercase',marginBottom:8}}>Exercices</div>
        <div style={{display:'flex',flexDirection:'column',gap:4,marginBottom:20}}>
          {preview.exercises.map((ex,i)=>{
            const sc2=STYLE_COLORS[ex.style||'CLASSIQUE']||T.textFaint;
            return(
              <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:12,background:'rgba(255,255,255,0.03)',border:`1px solid ${T.border}`}}>
                <div style={{width:24,height:24,borderRadius:7,background:`${sc2}18`,border:`1px solid ${sc2}30`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:sc2,flexShrink:0}}>{i+1}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ex.name}</div>
                  <div style={{fontSize:10,color:T.textFaint}}>{ex.muscle}</div>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  <div style={{fontSize:11,fontWeight:700,color:sc2}}>{ex.sets?.length||'?'}×{ex.repsStr||'?'}</div>
                  <div style={{fontSize:10,color:T.textFaint}}>{ex.rest}</div>
                </div>
              </div>
            );
          })}
        </div>
        <button onClick={()=>launchSession(preview)} style={{width:'100%',height:54,borderRadius:16,border:'none',background:'linear-gradient(135deg,#5A8AE0,#9090c4)',color:'#fff',fontSize:15,fontWeight:800,cursor:'pointer',boxShadow:'0 10px 28px rgba(90,138,224,0.35)',display:'flex',alignItems:'center',justifyContent:'center',gap:10,letterSpacing:0.2}}>
          <Icon name="play" size={18} stroke="#fff"/>Commencer la séance
        </button>
      </div>
    );
  }

  if(sessions.length===0){
    return(
      <div style={{padding:'40px 24px',display:'flex',flexDirection:'column',alignItems:'center',textAlign:'center',color:T.textFaint}}>
        <div style={{fontSize:44,marginBottom:14}}>📂</div>
        <div style={{fontSize:16,fontWeight:700,color:T.textDim,marginBottom:8}}>Bibliothèque vide</div>
        <div style={{fontSize:13,lineHeight:1.6,maxWidth:280}}>Ton coach n'a pas encore partagé de séances. Contacte-le pour qu'il importe ta bibliothèque.</div>
      </div>
    );
  }

  return(
    <div style={{padding:'18px 18px 90px',color:T.text}}>
      <div style={{marginBottom:20}}>
        <div style={{fontSize:11,color:T.textFaint,fontWeight:700,letterSpacing:0.5,textTransform:'uppercase',marginBottom:4}}>Coaching</div>
        <div style={{fontSize:24,fontWeight:800,letterSpacing:-0.5}}>Ma bibliothèque</div>
        <div style={{fontSize:12,color:T.textDim,marginTop:4}}>{sessions.length} séance{sessions.length>1?'s':''} disponible{sessions.length>1?'s':''}</div>
      </div>
      {sheets.map(sheet=>(
        <div key={sheet} style={{marginBottom:20}}>
          {sheets.length>1&&<div style={{fontSize:11,color:T.textFaint,fontWeight:700,letterSpacing:0.5,textTransform:'uppercase',marginBottom:8}}>{sheet}</div>}
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {sessions.filter(s=>s.sheetName===sheet).map(s=>(
              <button key={s.id} onClick={()=>setPreview(s)} style={{width:'100%',textAlign:'left',padding:'14px 16px',borderRadius:16,border:'1px solid rgba(90,138,224,0.2)',background:'rgba(90,138,224,0.06)',cursor:'pointer',display:'flex',alignItems:'center',gap:12}}>
                <div style={{width:44,height:44,borderRadius:13,background:'linear-gradient(135deg,rgba(90,138,224,0.25),rgba(144,144,196,0.15))',border:'1px solid rgba(90,138,224,0.3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>💪</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.name}</div>
                  <div style={{fontSize:11,color:T.textFaint,marginTop:2}}>{s.category||'Musculation'} · {s.exercises.length} exercices</div>
                </div>
                <Icon name="chevronRight" size={16} stroke={T.textFaint}/>
              </button>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Error Boundary ──────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state={crashed:false,error:null}; }
  static getDerivedStateFromError(e){ return {crashed:true,error:e}; }
  componentDidCatch(e,info){ console.error('[Prime Athl] Crash:', e, info); }
  render(){
    if(!this.state.crashed) return this.props.children;
    return (
      <div style={{minHeight:'100vh',background:T.bg,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,textAlign:'center'}}>
        <div style={{fontSize:48,marginBottom:16}}>⚠️</div>
        <div style={{fontSize:20,fontWeight:800,color:T.text,marginBottom:8}}>Quelque chose s'est mal passé</div>
        <div style={{fontSize:14,color:T.textDim,marginBottom:28,maxWidth:340,lineHeight:1.6}}>
          {this.state.error?.message||'Erreur inattendue.'} <br/>Recharge la page pour reprendre.
        </div>
        <button
          onClick={()=>window.location.reload()}
          style={{padding:'12px 28px',borderRadius:12,background:T.accent,color:'#fff',fontWeight:700,fontSize:15,border:'none',cursor:'pointer'}}>
          Recharger l'app
        </button>
      </div>
    );
  }
}

const _root = ReactDOM.createRoot(document.getElementById('root'));
_root.render(<ErrorBoundary><App/></ErrorBoundary>);
if(window.__splashDone) window.__splashDone();

// Register Service Worker for push notifications + auto-update
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').then(reg=>{
    // Vérifie une mise à jour à chaque chargement (sinon il faut attendre 24h)
    reg.update().catch(()=>{});
    // Quand un nouveau SW prend la main → recharge la page pour avoir la dernière version
    let reloading=false;
    navigator.serviceWorker.addEventListener('controllerchange',()=>{
      if(reloading)return;reloading=true;window.location.reload();
    });
  }).catch(e=>console.warn('[SW] registration failed:',e));
}
</script>
</body>
</html>
