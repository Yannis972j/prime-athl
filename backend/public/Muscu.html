        </div>
      );
    })}
  </div>);
}




// ── Weight Chart ──────────────────────────────────────────
function WeightChartSection({userId}){
  const[logs,setLogs]=React.useState([]);
  const[newW,setNewW]=React.useState('');
  const[loading,setLoading]=React.useState(true);

  const load=React.useCallback(async()=>{
    try{const r=await apiCall('/api/weight');setLogs(r.logs||[]);}catch{}finally{setLoading(false);}
  },[]);

  React.useEffect(()=>{load();},[load]);

  const add=async()=>{
    const w=parseFloat(newW);
    if(!w||w<20||w>300)return;
    await apiCall('/api/weight',{method:'POST',body:{weight:w,date:Date.now()}});
    setNewW('');
    load();
  };

  const del=async(id)=>{
    await apiCall('/api/weight/'+id,{method:'DELETE'});
    load();
  };

  if(loading)return null;

  const sorted=[...logs].sort((a,b)=>a.date-b.date);
  const last=sorted[sorted.length-1];
  const first=sorted[0];
  const diff=last&&first&&last!==first?+(last.weight-first.weight).toFixed(1):null;

  // SVG line chart
  const W=300,H=90,pad=8;
  let chart=null;
  if(sorted.length>1){
    const weights=sorted.map(l=>l.weight);
    const minW=Math.min(...weights),maxW=Math.max(...weights);
    const range=maxW-minW||1;
    const pts=sorted.map((l,i)=>{
      const x=pad+(i/(sorted.length-1))*(W-2*pad);
      const y=H-pad-(l.weight-minW)/range*(H-2*pad);
      return `${x},${y}`;
    });
    const path=`M ${pts.join(' L ')}`;
    chart=(
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:H,display:'block',marginBottom:8}}>
        <defs>
          <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#BFA060" stopOpacity="0.3"/>
            <stop offset="100%" stopColor="#BFA060" stopOpacity="0"/>
          </linearGradient>
        </defs>
        <path d={`${path} L ${W-pad},${H} L ${pad},${H} Z`} fill="url(#wg)"/>
        <path d={path} fill="none" stroke="#BFA060" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        {sorted.map((l,i)=>{
          const x=pad+(i/(sorted.length-1))*(W-2*pad);
          const y=H-pad-(l.weight-minW)/range*(H-2*pad);
          return <circle key={l.id} cx={x} cy={y} r="3" fill="#BFA060"/>;
        })}
      </svg>
    );
  }

  return(
    <div style={{marginBottom:18}}>
      <div style={{fontSize:9,color:T.textFaint,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase',marginBottom:8,paddingLeft:2}}>Suivi du poids</div>
      <GlassCard padding={14}>
        {/* Current + diff */}
        <div style={{display:'flex',alignItems:'baseline',gap:8,marginBottom:10}}>
          <span style={{fontSize:28,fontWeight:700,letterSpacing:-1}}>{last?last.weight:'-'}</span>
          <span style={{fontSize:13,color:T.textDim}}>kg</span>
          {diff!==null&&<span style={{fontSize:12,fontWeight:600,color:diff<0?T.good:diff>0?T.accent:T.textDim,marginLeft:4}}>{diff>0?'+':''}{diff} kg</span>}
        </div>
        {/* Chart */}
        {chart}
        {sorted.length===0&&<div style={{fontSize:12,color:T.textFaint,textAlign:'center',padding:'12px 0',fontStyle:'italic'}}>Aucune donnée — ajoute ton poids ci-dessous</div>}
        {/* Add entry */}
        <div style={{display:'flex',gap:8,marginTop:8}}>
          <div style={{position:'relative',flex:1}}>
            <input type="number" inputMode="decimal" value={newW} onChange={e=>setNewW(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()} placeholder="Ex : 84.5" style={{width:'100%',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.12)',borderRadius:9,color:T.text,fontSize:14,fontWeight:600,padding:'7px 30px 7px 10px',fontFamily:'inherit',outline:'none',boxSizing:'border-box'}}/>
            <span style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',fontSize:10,color:T.textFaint}}>kg</span>
          </div>
          <button onClick={add} style={{height:36,padding:'0 14px',borderRadius:9,border:'none',background:T.accentSoft,color:T.accent,fontSize:12,fontWeight:700,cursor:'pointer'}}>Ajouter</button>
        </div>
        {/* History list (last 5) */}
        {sorted.length>0&&(
          <div style={{marginTop:10,display:'flex',flexDirection:'column',gap:4}}>
            {[...sorted].reverse().slice(0,5).map(l=>(
              <div key={l.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'4px 6px',borderRadius:7,background:'rgba(255,255,255,0.025)'}}>
                <span style={{fontSize:11,color:T.textDim}}>{new Date(l.date).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</span>
                <span style={{fontSize:13,fontWeight:600}}>{l.weight} kg</span>
                <button onClick={()=>del(l.id)} style={{border:'none',background:'transparent',color:T.textFaint,cursor:'pointer',fontSize:14,padding:'0 2px',lineHeight:1}}>×</button>
              </div>
            ))}
          </div>
        )}
      </GlassCard>
    </div>
  );
}

// ── Calendar View ─────────────────────────────────────────
function CalendarView({history}){
  const now=new Date();
  const[year,setYear]=React.useState(now.getFullYear());
  const[month,setMonth]=React.useState(now.getMonth());

  const sessionByDay=React.useMemo(()=>{
    const m={};
    history.forEach(h=>{
      const d=new Date(h.date);
      if(d.getFullYear()===year&&d.getMonth()===month){
        const key=d.getDate();
        if(!m[key])m[key]=[];
        m[key].push(h);
      }
    });
    return m;
  },[history,year,month]);

  const firstDay=new Date(year,month,1).getDay();
  const offset=(firstDay+6)%7; // Mon=0
  const daysInMonth=new Date(year,month+1,0).getDate();
  const cells=Array(offset).fill(null).concat(Array.from({length:daysInMonth},(_,i)=>i+1));
  while(cells.length%7!==0)cells.push(null);

  const MOIS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const JOURS=['L','M','M','J','V','S','D'];

  const prev=()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);};
  const next=()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);};

  const todayDay=now.getFullYear()===year&&now.getMonth()===month?now.getDate():null;

  return(
    <div style={{marginBottom:18}}>
      <div style={{fontSize:9,color:T.textFaint,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase',marginBottom:8,paddingLeft:2}}>Calendrier</div>
      <GlassCard padding={12}>
        {/* Nav */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <button onClick={prev} style={{width:28,height:28,borderRadius:7,border:'1px solid '+T.border,background:'rgba(255,255,255,0.03)',color:T.textDim,cursor:'pointer',fontSize:14}}>‹</button>
          <span style={{fontSize:13,fontWeight:700}}>{MOIS[month]} {year}</span>
          <button onClick={next} style={{width:28,height:28,borderRadius:7,border:'1px solid '+T.border,background:'rgba(255,255,255,0.03)',color:T.textDim,cursor:'pointer',fontSize:14}}>›</button>
        </div>
        {/* Day headers */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3,marginBottom:4}}>
          {JOURS.map((j,i)=><div key={i} style={{textAlign:'center',fontSize:9,color:T.textFaint,fontWeight:600}}>{j}</div>)}
        </div>
        {/* Days grid */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}}>
          {cells.map((d,i)=>{
            if(!d)return<div key={i}/>;
            const sessions=sessionByDay[d]||[];
            const hasSession=sessions.length>0;
            const isToday=d===todayDay;
            return(
              <div key={i} title={hasSession?sessions.map(s=>s.name||'Séance').join(', '):''}
                style={{aspectRatio:'1',borderRadius:7,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:hasSession?'rgba(191,160,96,0.18)':isToday?'rgba(255,255,255,0.06)':'rgba(255,255,255,0.025)',border:isToday?`1px solid ${T.accent}`:'1px solid transparent',cursor:hasSession?'default':'default'}}>
                <span style={{fontSize:11,fontWeight:hasSession||isToday?700:400,color:hasSession?T.accent:isToday?T.text:T.textDim}}>{d}</span>
                {hasSession&&<div style={{width:4,height:4,borderRadius:2,background:T.accent,marginTop:1}}/>}
              </div>
            );
          })}
        </div>
        {/* Legend */}
        <div style={{display:'flex',alignItems:'center',gap:6,marginTop:10,paddingTop:8,borderTop:'1px solid rgba(255,255,255,0.05)'}}>
          <div style={{width:10,height:10,borderRadius:3,background:'rgba(191,160,96,0.18)',border:'1px solid transparent'}}/>
          <span style={{fontSize:10,color:T.textFaint}}>Séance effectuée</span>
        </div>
      </GlassCard>
    </div>
  );
}

// ── Photo Gallery ─────────────────────────────────────────
function PhotoGallery({readOnly,userId}){
  const[photos,setPhotos]=React.useState([]);
  const[loading,setLoading]=React.useState(true);
  const[selected,setSelected]=React.useState(null);
  const[pending,setPending]=React.useState(null); // {dataUrl, note}
  const fileRef=React.useRef(null);

  const url=readOnly&&userId?'/api/coach/athletes/'+userId+'/photos':'/api/photos';

  const load=React.useCallback(async()=>{
    try{const r=await apiCall(url);setPhotos(r.photos||[]);}catch{}finally{setLoading(false);}
  },[url]);

  React.useEffect(()=>{load();},[load]);

  const[uploading,setUploading]=React.useState(false);

  const handleFile=async(e)=>{
    const file=e.target.files[0];
    e.target.value='';
    if(!file)return;
    // Compress via canvas before upload
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const maxDim=1200;
        const scale=Math.min(1,maxDim/Math.max(img.width,img.height));
        canvas.width=img.width*scale;canvas.height=img.height*scale;
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        canvas.toBlob(blob=>{
          // Store compressed file as dataUrl preview for the note modal
          const fr=new FileReader();
          fr.onload=ev2=>setPending({file:blob,preview:ev2.target.result,note:''});
          fr.readAsDataURL(blob);
        },'image/jpeg',0.82);
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  const confirmUpload=async()=>{
    if(!pending||uploading)return;
    setUploading(true);
    try{
      // 1. Upload fichier → Cloudinary (ou base64 fallback)
      const fd=new FormData();
      fd.append('file',pending.file,'photo.jpg');
      const token=localStorage.getItem('pa_token');
      const upRes=await fetch((typeof API_BASE!=='undefined'&&API_BASE?API_BASE:'')+'/api/upload',{method:'POST',headers:token?{Authorization:'Bearer '+token}:{},credentials:'include',body:fd});
      const upJson=await upRes.json();
      if(!upRes.ok)throw new Error(upJson.error||'upload_failed');
      // 2. Enregistre la photo (URL Cloudinary ou base64)
      await apiCall('/api/photos',{method:'POST',body:{url:upJson.url,note:pending.note,date:Date.now()}});
      load();setPending(null);
    }catch(err){
      if(err.message==='photo_limit_reached')alert('Album plein (50 photos max). Supprime des photos pour en ajouter.');
      else alert('Erreur upload: '+(err.message||err));
    }finally{setUploading(false);}
  };

  const del=async(id)=>{
    if(!confirm('Supprimer cette photo ?'))return;
    await apiCall('/api/photos/'+id,{method:'DELETE'});
    setSelected(null);
    load();
  };

  if(loading)return null;

  return(
    <div style={{marginBottom:18}}>
      {/* Modale confirmation upload avec note */}
      {pending&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:1100,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
          <div style={{width:'100%',maxWidth:360,background:'rgba(24,24,32,0.98)',borderRadius:20,border:'1px solid rgba(255,255,255,0.1)',padding:20,display:'flex',flexDirection:'column',gap:14}}>
            <div style={{fontSize:15,fontWeight:700,color:T.text}}>Ajouter une note</div>
            <img src={pending.preview} alt="" style={{width:'100%',borderRadius:12,objectFit:'cover',maxHeight:200}}/>
            <input value={pending.note} onChange={e=>setPending(p=>({...p,note:e.target.value}))} placeholder="Note optionnelle (ex: Semaine 4)" style={{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.12)',borderRadius:10,color:T.text,fontSize:13,padding:'9px 12px',fontFamily:'inherit',outline:'none'}}/>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setPending(null)} style={{flex:1,height:40,borderRadius:11,border:'1px solid rgba(255,255,255,0.1)',background:'transparent',color:T.textDim,fontSize:13,fontWeight:600,cursor:'pointer'}}>Annuler</button>
              <button onClick={confirmUpload} disabled={uploading} style={{flex:2,height:40,borderRadius:11,border:'none',background:'linear-gradient(135deg,#BFA060,#B85070)',color:'#fff',fontSize:13,fontWeight:700,cursor:uploading?'default':'pointer',opacity:uploading?0.7:1}}>{uploading?'Upload…':'Publier'}</button>
            </div>
          </div>
        </div>
      )}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8,paddingLeft:2}}>
        <div style={{fontSize:9,color:T.textFaint,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase'}}>Photos de progression</div>
        {!readOnly&&<button onClick={()=>fileRef.current.click()} style={{height:26,padding:'0 10px',borderRadius:7,border:'1px solid rgba(191,160,96,0.3)',background:'rgba(191,160,96,0.06)',color:T.accent,fontSize:10,fontWeight:700,cursor:'pointer'}}>+ Photo</button>}
      </div>
      {!readOnly&&<input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleFile}/>}
      {photos.length===0&&<div style={{fontSize:12,color:T.textFaint,textAlign:'center',padding:'16px',fontStyle:'italic',background:'rgba(255,255,255,0.02)',borderRadius:12,border:'1px solid rgba(255,255,255,0.05)'}}>{readOnly?'Aucune photo partagée':'Ajoute ta première photo de progression'}</div>}
      {photos.length>0&&(
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6}}>
          {photos.map(p=>(
            <div key={p.id} onClick={()=>setSelected(p)} style={{aspectRatio:'1',borderRadius:10,overflow:'hidden',cursor:'pointer',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)'}}>
              <img src={p.url||p.dataUrl} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
            </div>
          ))}
        </div>
      )}
      {/* Lightbox */}
      {selected&&(
        <div onClick={()=>setSelected(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.88)',zIndex:1000,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:20}}>
          <img src={selected.url||selected.dataUrl} alt="" onClick={e=>e.stopPropagation()} style={{maxWidth:'100%',maxHeight:'70vh',borderRadius:14,objectFit:'contain'}}/>
          <div style={{marginTop:10,fontSize:12,color:'rgba(255,255,255,0.5)',textAlign:'center'}}>
            {new Date(selected.date).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})}
          </div>
          {selected.note&&<div style={{fontSize:13,color:'rgba(255,255,255,0.75)',textAlign:'center',marginTop:4,fontStyle:'italic'}}>"{selected.note}"</div>}
          {!readOnly&&<button onClick={e=>{e.stopPropagation();del(selected.id);}} style={{marginTop:12,height:34,padding:'0 16px',borderRadius:9,border:'1px solid rgba(184,80,112,0.3)',background:'rgba(184,80,112,0.08)',color:T.danger,fontSize:12,fontWeight:600,cursor:'pointer'}}>Supprimer</button>}
        </div>
      )}
    </div>
  );
}

// ── Messages Screen ───────────────────────────────────────
function MessagesScreen({authUser}){
  const[partners,setPartners]=React.useState([]);
  const[selected,setSelected]=React.useState(null);
  const[messages,setMessages]=React.useState([]);
  const[text,setText]=React.useState('');
  const[unread,setUnread]=React.useState({});
  const bottomRef=React.useRef(null);
  const selectedRef=React.useRef(null);
  selectedRef.current=selected;

  // Own socket connection for real-time messages
  React.useEffect(()=>{
    if(typeof io==='undefined')return;
    const token=localStorage.getItem('pa_token');
    if(!token)return;
    const s=io(API_BASE||undefined,{auth:{token},transports:['websocket','polling']});
    s.on('new-message',({from,msg})=>{
      const sel=selectedRef.current;
      if(sel&&(from===sel.id||msg.senderId===authUser.id)){
        setMessages(m=>[...m.filter(x=>x.id!==msg.id),msg].sort((a,b)=>a.createdAt-b.createdAt));
      }else{
        setUnread(u=>({...u,[from]:(u[from]||0)+1}));
      }
    });
    return()=>s.disconnect();
  },[authUser.id]);

  // Build partner list
  React.useEffect(()=>{
    const load=async()=>{
      try{
        if(authUser.role==='athlete'){
          const coach=await apiCall('/api/my-coach').catch(()=>null);
          if(coach)setPartners([coach]);
        }else if(authUser.role==='coach'){
          const r=await apiCall('/api/coach/athletes');
          setPartners((Array.isArray(r)?r:(r.athletes||[])).filter(a=>a.status==='active'));
        }
      }catch{}
    };
    load();
  },[authUser.id,authUser.role]);

  // Load + poll messages when partner selected
  React.useEffect(()=>{
    if(!selected)return;
    const load=()=>apiCall('/api/messages/'+selected.id).then(r=>setMessages(r.messages||[])).catch(()=>{});
    load();
    setUnread(u=>({...u,[selected.id]:0}));
    const interval=setInterval(load,3000);
    return()=>clearInterval(interval);
  },[selected?.id]);

  // Scroll to bottom
  React.useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'});},[messages]);

  const send=async()=>{
    if(!text.trim()||!selected)return;
    const t=text.trim();
    setText('');
    try{
      const r=await apiCall('/api/messages/'+selected.id,{method:'POST',body:{text:t}});
      // Optimistic update in case socket is slow
      if(r.msg)setMessages(m=>[...m.filter(x=>x.id!==r.msg.id),r.msg].sort((a,b)=>a.createdAt-b.createdAt));
    }catch(e){setText(t);alert(e.message);}
  };

  const fmtTime=ts=>new Date(ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  const fmtDate=ts=>new Date(ts).toLocaleDateString('fr-FR',{day:'numeric',month:'short'});

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',color:T.text}}>
      {selected?(
        <>
          {/* Header */}
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 16px',borderBottom:'1px solid rgba(255,255,255,0.07)',flexShrink:0}}>
            <button onClick={()=>setSelected(null)} style={{width:32,height:32,borderRadius:10,border:'1px solid '+T.border,background:'rgba(255,255,255,0.04)',color:T.textDim,cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>‹</button>
            <div style={{width:32,height:32,borderRadius:16,background:'linear-gradient(135deg,#BFA060,#B85070)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'#fff',flexShrink:0}}>{(selected.firstName?.[0]||selected.email?.[0]||'?').toUpperCase()}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600}}>{selected.firstName||selected.email.split('@')[0]}</div>
              <div style={{fontSize:10,color:T.textFaint}}>{selected.role==='coach'?'Coach':'Athlète'}</div>
            </div>
          </div>
          {/* Messages */}
          <div style={{flex:1,overflow:'auto',padding:'12px 14px',display:'flex',flexDirection:'column',gap:8}}>
            {messages.length===0&&<div style={{textAlign:'center',fontSize:12,color:T.textFaint,marginTop:40,fontStyle:'italic'}}>Aucun message — dis bonjour 👋</div>}
            {messages.map((m,i)=>{
              const isMe=m.senderId===authUser.id;
              const showDate=i===0||fmtDate(messages[i-1].createdAt)!==fmtDate(m.createdAt);
              return(
                <React.Fragment key={m.id}>
                  {showDate&&<div style={{textAlign:'center',fontSize:10,color:T.textFaint,margin:'4px 0'}}>{fmtDate(m.createdAt)}</div>}
                  <div style={{display:'flex',flexDirection:'column',alignItems:isMe?'flex-end':'flex-start'}}>
                    <div style={{maxWidth:'80%',padding:'8px 12px',borderRadius:isMe?'14px 14px 4px 14px':'14px 14px 14px 4px',background:isMe?T.accentSoft:'rgba(255,255,255,0.06)',border:isMe?`1px solid rgba(191,160,96,0.3)`:'1px solid rgba(255,255,255,0.08)',fontSize:13,lineHeight:1.4,color:isMe?T.accent:T.text}}>
                      {m.text}
                    </div>
                    <span style={{fontSize:9,color:T.textFaint,marginTop:2,marginLeft:4,marginRight:4}}>{fmtTime(m.createdAt)}</span>
                  </div>
                </React.Fragment>
              );
            })}
            <div ref={bottomRef}/>
          </div>
          {/* Input */}
          <div style={{display:'flex',gap:8,padding:'10px 14px',borderTop:'1px solid rgba(255,255,255,0.07)',flexShrink:0,paddingBottom:'max(10px,env(safe-area-inset-bottom))'}}>
            <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&send()} placeholder="Message..." style={{flex:1,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.12)',borderRadius:20,color:T.text,fontSize:13,padding:'8px 14px',fontFamily:'inherit',outline:'none'}}/>
            <button onClick={send} disabled={!text.trim()} style={{width:36,height:36,borderRadius:18,border:'none',background:text.trim()?T.accent:'rgba(255,255,255,0.08)',color:'#fff',cursor:text.trim()?'pointer':'default',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'background 0.2s'}}>↑</button>
          </div>
        </>
      ):(
        <div style={{flex:1,overflow:'auto',padding:'14px 16px 90px'}}>
          <div style={{fontSize:22,fontWeight:700,letterSpacing:-0.5,marginBottom:16}}>Messages</div>
          {partners.length===0&&<div style={{textAlign:'center',fontSize:13,color:T.textFaint,marginTop:60,fontStyle:'italic'}}>{authUser.role==='coach'?'Aucun athlète actif pour l\'instant':'Aucun coach assigné'}</div>}
          {partners.map(p=>(
            <button key={p.id} onClick={()=>setSelected(p)} style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'12px',borderRadius:14,border:'1px solid rgba(255,255,255,0.07)',background:'rgba(255,255,255,0.03)',cursor:'pointer',marginBottom:8,textAlign:'left',position:'relative'}}>
              <div style={{width:40,height:40,borderRadius:20,background:'linear-gradient(135deg,#BFA060,#B85070)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:700,color:'#fff',flexShrink:0}}>{(p.firstName?.[0]||p.email?.[0]||'?').toUpperCase()}</div>
              <div style={{flex:1,minWidth:0}}>

                <div style={{fontSize:11,color:T.textFaint}}>{p.role==='coach'?'Coach':'Athlète'}</div>
              </div>
              {(unread[p.id]||0)>0&&<div style={{width:18,height:18,borderRadius:9,background:T.accent,color:'#fff',fontSize:10,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>{unread[p.id]}</div>}
              <span style={{color:T.textFaint,fontSize:16}}>›</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Exercise Progression Chart ────────────────────────────
function ExerciseProgressChart({history}){
  const[query,setQuery]=React.useState('');
  const[selected,setSelected]=React.useState(null);
  const[open,setOpen]=React.useState(false);

  // Build exercise list from history
  const exerciseNames=React.useMemo(()=>{
    const s=new Set();
    (history||[]).forEach(h=>(h.exercises||[]).forEach(e=>{if(e.name)s.add(e.name);}));
    return [...s].sort();
  },[history]);

  const filtered=query.trim()?exerciseNames.filter(n=>n.toLowerCase().includes(query.toLowerCase())):exerciseNames;

  // Build data points: one per session containing selected exercise (max weight)
  const dataPoints=React.useMemo(()=>{
    if(!selected)return[];
    const pts=[];
    const sorted=[...(history||[])].sort((a,b)=>new Date(a.date)-new Date(b.date));
    for(const h of sorted){
      const ex=(h.exercises||[]).find(e=>e.name===selected);
      if(!ex)continue;
      const maxW=Math.max(0,...(ex.sets||[]).map(s=>s.weight||0));
      if(maxW>0)pts.push({date:new Date(h.date),weight:maxW,reps:(ex.sets||[]).find(s=>(s.weight||0)===maxW)?.reps||0});
    }
    return pts;
  },[history,selected]);

  const W=300,H=90,pad=10;
  let chart=null;
  if(dataPoints.length>1){
    const weights=dataPoints.map(p=>p.weight);
    const minW=Math.min(...weights),maxW=Math.max(...weights);
    const range=maxW-minW||1;
    const pts=dataPoints.map((p,i)=>{
      const x=pad+(i/(dataPoints.length-1))*(W-2*pad);
      const y=H-pad-(p.weight-minW)/range*(H-2*pad-4);
      return{x,y,p};
    });
    const dPath='M '+pts.map(p=>`${p.x} ${p.y}`).join(' L ');
    chart=(
      <div style={{marginTop:14,position:'relative'}}>
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:H,display:'block'}} preserveAspectRatio="none">
          <defs>
            <linearGradient id="epgFill" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#2CC4A0" stopOpacity="0.4"/>
              <stop offset="100%" stopColor="#2CC4A0" stopOpacity="0"/>
            </linearGradient>
          </defs>
          <path d={`${dPath} L ${W-pad} ${H} L ${pad} ${H} Z`} fill="url(#epgFill)"/>
          <path d={dPath} fill="none" stroke="#2CC4A0" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{filter:'drop-shadow(0 0 4px rgba(44,196,160,0.5))'}}/>
          {pts.map((p,i)=>(
            <circle key={i} cx={p.x} cy={p.y} r="3.5" fill="#2CC4A0" stroke={T.bg} strokeWidth="1.5"/>
          ))}
        </svg>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:6,fontSize:10,color:T.textFaint,fontWeight:600}}>
          <span>{dataPoints[0].date.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</span>
          <span style={{color:T.good,fontWeight:700}}>{dataPoints[dataPoints.length-1].weight} kg</span>
          <span>{dataPoints[dataPoints.length-1].date.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</span>
        </div>
        {dataPoints.length>=2&&(()=>{
          const delta=+(dataPoints[dataPoints.length-1].weight-dataPoints[0].weight).toFixed(1);
          return delta!==0?(
            <div style={{marginTop:8,display:'flex',alignItems:'center',gap:6}}>
              <span style={{fontSize:11,fontWeight:700,color:delta>0?T.good:T.danger}}>{delta>0?'↑':'↓'} {Math.abs(delta)} kg</span>
              <span style={{fontSize:10,color:T.textFaint}}>depuis le début</span>
            </div>
          ):null;
        })()}
      </div>
    );
  }else if(dataPoints.length===1){
    chart=<div style={{marginTop:10,padding:'10px 0',fontSize:12,color:T.textDim,textAlign:'center'}}>Une seule séance — {dataPoints[0].weight} kg · reviens pour voir la progression !</div>;
  }

  return(
    <HoloCard padding={0} style={{marginBottom:16}}>
      <div style={{padding:18}}>
        <div style={{fontSize:11,color:T.textDim,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase',marginBottom:8}}>Progression par exercice</div>

        {/* Search / select */}
        <div style={{position:'relative'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',borderRadius:11,background:'rgba(255,255,255,0.05)',border:`1px solid ${selected?'rgba(44,196,160,0.4)':'rgba(255,255,255,0.1)'}`}} onClick={()=>setOpen(o=>!o)}>
            <Icon name="chart" size={14} stroke={T.textDim}/>
            <span style={{flex:1,fontSize:13,color:selected?T.text:T.textFaint,fontWeight:selected?600:400}}>{selected||'Choisir un exercice...'}</span>
            <Icon name="chevronRight" size={12} stroke={T.textFaint} style={{transform:open?'rotate(90deg)':'none',transition:'transform 0.2s'}}/>
          </div>
          {open&&(
            <div style={{position:'absolute',top:'100%',left:0,right:0,marginTop:4,background:'#13131e',border:'1px solid rgba(255,255,255,0.1)',borderRadius:12,zIndex:50,boxShadow:'0 8px 24px rgba(0,0,0,0.5)',maxHeight:220,overflow:'hidden',display:'flex',flexDirection:'column'}}>
              <div style={{padding:'8px 12px',borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
                <input autoFocus value={query} onChange={e=>setQuery(e.target.value)} placeholder="Rechercher..." style={{width:'100%',background:'transparent',border:'none',color:T.text,fontSize:13,outline:'none'}}/>
              </div>
              <div style={{overflowY:'auto',flex:1}}>
                {filtered.slice(0,30).map(n=>(
                  <button key={n} onClick={()=>{setSelected(n);setOpen(false);setQuery('');}} style={{width:'100%',padding:'10px 14px',background:n===selected?'rgba(44,196,160,0.1)':'transparent',border:'none',borderBottom:'1px solid rgba(255,255,255,0.04)',color:n===selected?T.good:T.text,fontSize:13,fontWeight:n===selected?600:400,cursor:'pointer',textAlign:'left'}}>
                    {n}
                  </button>
                ))}
                {filtered.length===0&&<div style={{padding:'12px 14px',fontSize:12,color:T.textFaint,textAlign:'center'}}>Aucun résultat</div>}
              </div>
            </div>
          )}
        </div>

        {selected&&chart}
        {selected&&dataPoints.length===0&&<div style={{marginTop:12,fontSize:12,color:T.textFaint,textAlign:'center'}}>Pas encore de données pour cet exercice</div>}
        {!selected&&<div style={{marginTop:12,fontSize:12,color:T.textFaint,textAlign:'center'}}>Sélectionne un exercice pour voir sa courbe de progression</div>}
      </div>
    </HoloCard>
  );
}

// ── Stats ─────────────────────────────────────────────────
function StatsScreen({history,profile}){
  const now=Date.now();
  const dayMs=24*60*60*1000;

  // Last 7 days volume (Mon-Sun)
  const todayDow=(new Date().getDay()+6)%7;
  const weekData=[0,0,0,0,0,0,0];
  history.forEach(h=>{
    const d=new Date(h.date);
    const diff=Math.floor((now-d.getTime())/dayMs);
    if(diff>=0&&diff<7){
      const idx=(todayDow-diff+7)%7;
      weekData[idx]+=h.totalVolume||0;
    }
  });
  const dayLabels=['L','M','M','J','V','S','D'];

  // Last 30 days totals
  const last30=history.filter(h=>now-new Date(h.date).getTime()<30*dayMs);
  const totalVol30=last30.reduce((s,h)=>s+(h.totalVolume||0),0);

  // Volume curve (last 30 days, daily)
  const dailyVol=Array.from({length:30},()=>0);
  history.forEach(h=>{
    const diff=Math.floor((now-new Date(h.date).getTime())/dayMs);
    if(diff>=0&&diff<30) dailyVol[29-diff]+=h.totalVolume||0;
  });

  // Muscle distribution
  const muscleVol={};
  history.forEach(h=>(h.exercises||[]).forEach(ex=>{
    const m=ex.muscle||'Autre';
    const vol=(ex.sets||[]).reduce((s,x)=>s+(x.weight||0)*(x.reps||0),0);
    if(vol>0) muscleVol[m]=(muscleVol[m]||0)+vol;
  }));
  const muscleArr=Object.entries(muscleVol).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxM=Math.max(1,...muscleArr.map(([_,v])=>v));

  if(history.length===0){
    return(
      <div style={{padding:'18px 18px 100px',color:T.text}}>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,color:T.textDim,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase'}}>Progression</div>
          <div style={{fontSize:26,fontWeight:700,letterSpacing:-0.5,marginTop:2}}>Statistiques</div>
        </div>
        <div style={{padding:'40px 24px',borderRadius:22,background:'linear-gradient(160deg,rgba(28,28,40,0.8),rgba(14,14,20,0.8))',border:`1px solid ${T.border}`,textAlign:'center',marginTop:10}}>
          <div style={{width:60,height:60,margin:'0 auto 16px',borderRadius:18,background:HOLO.iris,backgroundSize:'200% 200%',animation:'holoShift 8s linear infinite',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Icon name="chart" size={26} stroke="#fff" strokeWidth={1.8}/>
          </div>
          <div style={{fontSize:16,fontWeight:700,marginBottom:6}}>Pas encore de données</div>
          <div style={{fontSize:13,color:T.textDim,lineHeight:1.5,maxWidth:280,margin:'0 auto'}}>Termine ta 1re séance ou renseigne tes PR dans <b>Profil</b> pour voir tes courbes.</div>
        </div>
      </div>
    );
  }

  return(
    <div style={{padding:'18px 18px 100px',color:T.text}}>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:11,color:T.textDim,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase'}}>Progression</div>
        <div style={{fontSize:26,fontWeight:700,letterSpacing:-0.5,marginTop:2}}>Statistiques</div>
      </div>

      {history.length>0&&(
        <HoloCard padding={0} style={{marginBottom:16}}>
          <div style={{padding:18}}>
            <div style={{fontSize:11,color:T.textDim,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase'}}>Volume · 30 derniers jours</div>
            <div style={{display:'flex',alignItems:'baseline',gap:6,marginTop:4}}>
              <span style={{fontSize:32,fontWeight:700,letterSpacing:-0.6,lineHeight:1}}><HoloText>{Math.round(totalVol30).toLocaleString('fr-FR')}</HoloText></span>
              <span style={{fontSize:14,color:T.textDim,fontWeight:500}}>kg</span>
              <span style={{marginLeft:'auto',fontSize:12,color:T.textDim,fontWeight:600}}>{last30.length} séance{last30.length>1?'s':''}</span>
            </div>
            <VolumeAreaChart data={dailyVol}/>
          </div>
        </HoloCard>
      )}

      {history.length>0&&(
        <>
          <SectionHeader title="Volume · 7 derniers jours"/>
          <GlassCard padding={16} style={{marginBottom:18}}>
            <WeeklyBars data={weekData} labels={dayLabels}/>
          </GlassCard>
        </>
      )}


      {muscleArr.length>0&&(
        <>
          <SectionHeader title="Répartition musculaire"/>
          <GlassCard padding={16}>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {muscleArr.map(([m,v])=>(
                <div key={m}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:5,fontSize:12,fontWeight:500}}>
                    <span style={{color:T.text}}>{m}</span>
                    <span style={{color:T.textDim,fontWeight:600}}>{Math.round(v).toLocaleString('fr-FR')} kg</span>
                  </div>
                  <div style={{height:6,background:'rgba(255,255,255,0.05)',borderRadius:3,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${(v/maxM)*100}%`,background:HOLO.irisHorizon,backgroundSize:'200% 100%',animation:'holoText 8s linear infinite',borderRadius:3}}/>
                  </div>
                </div>
              ))}
            </div>
          </GlassCard>
        </>
      )}

      <ExerciseProgressChart history={history}/>
      <WeightChartSection/>
      <CalendarView history={history}/>
    </div>
  );
}

        const h=v===0?4:Math.max(8,(v/max)*100);

}

function VolumeAreaChart({data}){
  const max=Math.max(1,...data);
  const w=320,h=80,step=w/Math.max(1,data.length-1);
  const pts=data.map((v,i)=>[i*step, h-(v/max)*h*0.85-6]);
  const d='M '+pts.map(p=>p.join(' ')).join(' L ');
  return(
    <div style={{marginTop:12}}>
      <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
        <defs>
          <linearGradient id="vgArea" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#BFA060" stopOpacity="0.55"/>
            <stop offset="100%" stopColor="#BFA060" stopOpacity="0"/>
          </linearGradient>
          <linearGradient id="vgLine" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stopColor="#BFA060"/>
            <stop offset="50%" stopColor="#B85070"/>
            <stop offset="100%" stopColor="#5A8AE0"/>
          </linearGradient>
        </defs>
        <path d={`${d} L ${w} ${h} L 0 ${h} Z`} fill="url(#vgArea)"/>
        <path d={d} fill="none" stroke="url(#vgLine)" strokeWidth="2.4" strokeLinejoin="round" strokeLinecap="round" style={{filter:'drop-shadow(0 0 4px rgba(191,160,96,0.5))'}}/>
      </svg>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:6,fontSize:10,color:T.textFaint,fontWeight:600}}>
        <span>il y a 30j</span><span>aujourd'hui</span>
      </div>
    </div>
  );
}

function BackupRestoreCard(){
  const[msg,setMsg]=React.useState(null);
  const[busy,setBusy]=React.useState(false);
  const fileRef=React.useRef(null);

  const download=async()=>{
    setBusy(true);setMsg(null);
    try{
      const token=localStorage.getItem('pa_token');
      const r=await fetch(API_BASE+'/api/admin/backup',{headers:{Authorization:'Bearer '+token}});
      if(!r.ok)throw new Error('HTTP '+r.status);
      const blob=await r.blob();
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download=`prime-athl-backup-${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);a.click();a.remove();
      URL.revokeObjectURL(url);
      setMsg({type:'good',text:'✓ Sauvegarde téléchargée'});
    }catch(e){setMsg({type:'err',text:'✗ Erreur : '+e.message});}
    setBusy(false);setTimeout(()=>setMsg(null),4000);
  };

  const handleRestore=e=>{
    const file=e.target.files[0];
    if(!file)return;
    e.target.value='';
    if(!confirm('Restaurer cette sauvegarde va REMPLACER toutes les données actuelles. Continuer ?'))return;
    setBusy(true);setMsg(null);
    const reader=new FileReader();
    reader.onload=async ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        const r=await apiCall('/api/admin/restore',{method:'POST',body:data});

function PushNotifToggle(){
  const[status,setStatus]=React.useState('loading'); // loading|unsupported|denied|off|on|subscribing
  const[error,setError]=React.useState(null);

  React.useEffect(()=>{
    if(!('serviceWorker' in navigator)||!('PushManager' in window)){setStatus('unsupported');return;}
    const perm=Notification.permission;
    if(perm==='denied'){setStatus('denied');return;}
    // Check browser subscription + sync with server if needed
    navigator.serviceWorker.ready.then(async reg=>{
      const sub=await reg.pushManager.getSubscription();
      if(!sub){setStatus('off');return;}
      // Browser has a subscription — verify server knows about it
      try{
        const s=await apiCall('/api/push/status');
        if(!s.subscribed){
          // Re-register silently
          await apiCall('/api/push/subscribe',{method:'POST',body:{subscription:sub.toJSON()}});
        }
      }catch(e){}
      setStatus('on');
    }).catch(()=>setStatus('off'));
  },[]);

  const enable=async()=>{
    setStatus('subscribing');setError(null);
    try{
      const perm=await Notification.requestPermission();
      if(perm!=='granted'){setStatus('denied');return;}
      const reg=await navigator.serviceWorker.ready;
      // Get VAPID public key
      const{key}=await apiCall('/api/push/vapid-public-key');
      if(!key){setError('Notifications non configurées sur le serveur.');setStatus('off');return;}
      // Convert base64 VAPID key to Uint8Array
      const raw=atob(key.replace(/-/g,'+').replace(/_/g,'/'));
      const vapidKey=new Uint8Array(raw.split('').map(c=>c.charCodeAt(0)));
      const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:vapidKey});
      await apiCall('/api/push/subscribe',{method:'POST',body:{subscription:sub.toJSON()}});
      setStatus('on');
    }catch(e){setError(e.message||'Erreur');setStatus('off');}
  };

  const disable=async()=>{
    try{
      const reg=await navigator.serviceWorker.ready;
      const sub=await reg.pushManager.getSubscription();
      if(sub)await sub.unsubscribe();
      await apiCall('/api/push/subscribe',{method:'DELETE'});
      setStatus('off');
    }catch(e){setError(e.message||'Erreur');}
  };

  if(status==='loading')return null;
  if(status==='unsupported')return(
    <div style={{padding:'10px 12px',borderRadius:11,background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.07)',marginBottom:10,fontSize:11,color:T.textFaint}}>
      🔔 Notifications push non supportées sur ce navigateur
    </div>
  );

  const isOn=status==='on';
  const isLoading=status==='subscribing';
  return(
    <div style={{padding:'12px 14px',borderRadius:12,background:isOn?'rgba(44,196,160,0.06)':'rgba(255,255,255,0.03)',border:`1px solid ${isOn?'rgba(44,196,160,0.2)':'rgba(255,255,255,0.08)'}`,marginBottom:10,display:'flex',alignItems:'center',gap:12}}>
      <div style={{fontSize:22,flexShrink:0}}>{isOn?'🔔':'🔕'}</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:12,fontWeight:700,color:T.text}}>Notifications push</div>
        <div style={{fontSize:10,color:T.textFaint,marginTop:2}}>
          {status==='denied'?'Bloquées dans les paramètres du navigateur':
           isOn?'Activées — tu recevras les alertes même app fermée':
           'Reçois les alertes (nouveau programme, message…)'}
        </div>
        {error&&<div style={{fontSize:10,color:T.danger,marginTop:2}}>{error}</div>}
      </div>
      {status!=='denied'&&(
        <button onClick={isOn?disable:enable} disabled={isLoading} style={{flexShrink:0,height:32,padding:'0 14px',borderRadius:9,border:'none',background:isOn?'rgba(184,80,112,0.15)':'linear-gradient(135deg,rgba(191,160,96,0.3),rgba(44,196,160,0.2))',color:isOn?T.danger:T.good,fontSize:11,fontWeight:700,cursor:isLoading?'default':'pointer',opacity:isLoading?0.6:1}}>
          {isLoading?'…':isOn?'Désactiver':'Activer'}
        </button>
      )}
    </div>
  );
}

function exportSessionPDF(session){
  const {jsPDF}=window.jspdf||{};
  if(!jsPDF){alert('PDF non disponible, réessaie dans un instant.');return;}
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const W=210,margin=16,col=W-margin*2;
  let y=20;
  const line=(txt,size=11,bold=false,color=[255,255,255])=>{
    doc.setFontSize(size);doc.setFont('helvetica',bold?'bold':'normal');
    doc.setTextColor(...color);doc.text(txt,margin,y);y+=size*0.45+2;
  };
  const rule=(alpha=30)=>{doc.setDrawColor(alpha,alpha,alpha);doc.line(margin,y,W-margin,y);y+=4;};

  // Fond noir
  doc.setFillColor(14,14,20);doc.rect(0,0,W,297,'F');

  // Titre
  doc.setFontSize(20);doc.setFont('helvetica','bold');
  doc.setTextColor(191,160,96);doc.text(session.name||'Séance',margin,y);y+=10;

  // Date
  const d=new Date(session.date);
  const dateStr=d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  line(dateStr,10,false,[140,140,160]);y+=2;rule();

  // Stats
  const stats=[];
  if(session.totalVolume)stats.push(`Volume : ${Math.round(session.totalVolume).toLocaleString('fr-FR')} kg`);
  if(session.duration)stats.push(`Durée : ${session.duration} min`);
  if(session.rpe)stats.push(`RPE : ${session.rpe}/10`);
  if(stats.length){doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(180,180,200);doc.text(stats.join('   ·   '),margin,y);y+=8;}

  rule();

  // Exercices
  (session.exercises||[]).forEach((ex,ei)=>{
    if(y>265){doc.addPage();doc.setFillColor(14,14,20);doc.rect(0,0,W,297,'F');y=20;}
    // Nom exo
    doc.setFontSize(12);doc.setFont('helvetica','bold');doc.setTextColor(191,160,96);
    doc.text(`${ei+1}. ${ex.name}`,margin,y);
    if(ex.muscle){doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(120,120,140);doc.text(ex.muscle,W-margin,y,{align:'right'});}
    y+=7;
    // En-tête tableau
    const cols=[margin,margin+12,margin+38,margin+64,margin+95];
    doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(100,100,120);
    ['#','Poids','Reps','Volume'].forEach((h,i)=>doc.text(h,cols[i],y));y+=5;
    doc.setDrawColor(40,40,55);doc.line(margin,y-1,W-margin,y-1);
    // Séries
    (ex.sets||[]).forEach((s,si)=>{
      if(y>270){doc.addPage();doc.setFillColor(14,14,20);doc.rect(0,0,W,297,'F');y=20;}
      const vol=(s.weight||0)*(s.reps||0);
      doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(220,220,230);
      doc.text(String(si+1),cols[0],y);
      doc.text(`${s.weight||0} kg`,cols[1],y);
      doc.text(`${s.reps||0} reps`,cols[2],y);
      doc.text(`${vol} kg`,cols[3],y);
      y+=5.5;
    });
    y+=4;
  });

  // Notes / feedback
  if(session.notes){y+=2;line('Mon ressenti',9,true,[160,130,80]);line(session.notes,9,false,[200,200,220]);y+=2;}
  if(session.coachFeedback){y+=2;line('Feedback coach',9,true,[90,138,224]);line(session.coachFeedback,9,false,[200,200,220]);}

  // Footer
  doc.setFontSize(8);doc.setTextColor(60,60,80);doc.text('Prime Athl',W/2,290,{align:'center'});

  const fname=`seance-${(session.name||'session').replace(/\s+/g,'-').toLowerCase()}-${d.toISOString().slice(0,10)}.pdf`;
  doc.save(fname);
}

                name:histSession.name||selectedDay.dayName,

              <div style={{background:'linear-gradient(160deg,rgba(28,28,40,0.9),rgba(14,14,20,0.9))',border:'1px solid rgba(255,255,255,0.08)',borderRadius:18,padding:16,marginBottom:16}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                  <div>
                    <div style={{fontSize:11,color:T.textDim,fontWeight:600,textTransform:'capitalize'}}>{dateLabel}</div>

                        const subMap={CLASSIQUE:'',SUPERSET:'· enchaîner sans repos',TRISET:'· enchaîner sans repos',ABDOS:'',CARDIO:''};
                        for(const group of groups){
                          if(shown>=6)break;

                                <span style={{fontSize:9,color:group.color,fontWeight:800,letterSpacing:0.5}}>{labelMap[group.style]||group.style}</span>
                                {subMap[group.style]&&<span style={{fontSize:8,color:T.textFaint,fontWeight:600}}>{subMap[group.style]}</span>}
                              </div>
                              {group.items.map(({ex,idx:i},bi)=>(
                                <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 10px',borderTop:bi>0?`1px dashed ${group.color}22`:'none'}}>

                                  <div style={{flex:1,minWidth:0}}>
                                    <div style={{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ex.name}</div>

                                  </div>
                                  {group.style!=='CLASSIQUE'&&<span style={{fontSize:10,color:T.textFaint,flexShrink:0}}>{ex.sets.length}×{ex.sets[0]?.targetStr||ex.sets[0]?.target||'?'}</span>}

                                </div>

                            </div>
                          );shown+=group.items.length;
                        }
                        const rem=displayExercises.length-shown;
                        if(rem>0)els.push(<div key="more" style={{fontSize:11,color:T.textFaint,paddingLeft:4}}>+{rem} exercices</div>);
                        return els;
                      })()}
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:6}}>
                      <div style={{display:'flex',gap:8}}>
                        {isDone&&histSession&&(
                          <button onClick={()=>setViewHistSession(histSession)} style={{height:46,padding:'0 14px',borderRadius:13,border:'1px solid rgba(44,196,160,0.4)',background:'rgba(44,196,160,0.08)',color:T.good,fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:6,flexShrink:0}}>

                          <Icon name="play" size={16} stroke="#fff"/>
                          {isDone?'Refaire la séance':'Démarrer la séance'}
                        </button>
                      </div>
                      {isDone&&histSession&&onDeleteSession&&(
                        <button onClick={()=>{if(confirm('Supprimer cette séance de l\'historique ?'))onDeleteSession(histSession.id,selectedDay.dateStr);}} style={{width:'100%',height:34,borderRadius:10,border:'1px solid rgba(184,80,112,0.25)',background:'transparent',color:T.danger,fontSize:11,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:5,letterSpacing:0.2}}>
                          <Icon name="trash" size={12} stroke={T.danger}/> Supprimer la séance

          })()}
        </>

      {/* Mes archives */}
      {archives.length>0&&(
        <div style={{marginTop:24}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>

// ── Nutrition (athlete view) ──────────────────────────────
function mealStatus(meal, nowHM){
  const [sh,sm]=(meal.timeStart||'00:00').split(':').map(n=>Number(n)||0);
  const [eh,em]=(meal.timeEnd||'23:59').split(':').map(n=>Number(n)||0);
  const start=sh*60+sm, end=eh*60+em;
  if(nowHM>=start&&nowHM<=end)return'now';
  if(nowHM<start)return'later';
  return'past';
}

function CircleGauge({value,max,size=120,color='#BFA060',label,suffix=''}){
  const over=max>0&&value>max;
  const pct=Math.max(0,Math.min(1,max>0?value/max:0));
  const r=size/2-8;
  const c=2*Math.PI*r;
  const strokeColor=over?'#e05050':color;
  return(
    <div style={{position:'relative',width:size,height:size,display:'inline-block'}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="8"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={strokeColor} strokeWidth="8" strokeLinecap="round"
          strokeDasharray={c} strokeDashoffset={over?0:c*(1-pct)}
          style={{transition:'stroke-dashoffset 0.6s cubic-bezier(.34,1.56,.64,1)',filter:`drop-shadow(0 0 ${over?6:4}px ${strokeColor}aa)`}}/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
        <div style={{fontSize:size>80?22:14,fontWeight:700,letterSpacing:-0.5,color:strokeColor}}>{Math.round(value)}</div>
        <div style={{fontSize:9,color:T.textDim,fontWeight:600,letterSpacing:0.3,marginTop:size>80?-2:0}}>/{Math.round(max)}{suffix}</div>
        {label&&<div style={{fontSize:8,color:over?'#e05050':T.textFaint,fontWeight:700,letterSpacing:0.5,textTransform:'uppercase',marginTop:2}}>{over?'EXCÈS':label}</div>}
      </div>
    </div>
  );
}

function mealMacros(items){
  return(items||[]).reduce((s,it)=>({
    kcal:s.kcal+(+it.kcal||0),
    p:s.p+(+it.p||0),
    c:s.c+(+it.c||0),
    f:s.f+(+it.f||0),
  }),{kcal:0,p:0,c:0,f:0});
}

function NutritionScreen({authToken,profile,onRefresh:globalRefresh,refreshing:globalRefreshing}){
  const[plan,setPlan]=React.useState(null);
  const[todayLog,setTodayLog]=React.useState({validated:{},validatedAt:{}});
  const[history,setHistory]=React.useState({});
  const[loading,setLoading]=React.useState(true);
  const[expandedMeal,setExpandedMeal]=React.useState(null);
  const[viewDay,setViewDay]=React.useState(()=>todayDayName());
  const[activeWeek,setActiveWeek]=React.useState(0);
  const[importMsg,setImportMsg]=React.useState(null);
  const fileRef=React.useRef(null);
  const isCoach=profile&&profile.role==='coach';

  const load=React.useCallback(async()=>{
    try{
      const r=await apiCall('/api/nutrition');
      setPlan(r.plan);
      setTodayLog(r.today||{validated:{},validatedAt:{}});
      setHistory(r.history||{});
    }catch(e){console.error(e);}
    setLoading(false);
  },[]);
  React.useEffect(()=>{load();},[load]);

  // ── Aliment libre (logging ad hoc hors plan) ─────────────────────────────
  // Form fields :
  //   - searchQuery / searchResults : barre de recherche (custom foods + Open Food Facts)
  //   - selectedFood : aliment choisi dans les résultats (avec macros /100g)
  //   - qty : quantité en g (default 100). Si selectedFood, macros calculées; sinon valeur manuelle.
  //   - name/kcal/p/c/f : valeurs finales envoyées au backend
  const[freeFoodModal,setFreeFoodModal]=React.useState(null);
  const[freeFoodForm,setFreeFoodForm]=React.useState({name:'',kcal:'',p:'',c:'',f:'',qty:'100'});
  const[freeFoodSaving,setFreeFoodSaving]=React.useState(false);
  const[searchQuery,setSearchQuery]=React.useState('');
  const[searchResults,setSearchResults]=React.useState([]);
  const[searching,setSearching]=React.useState(false);
  const[selectedFood,setSelectedFood]=React.useState(null); // {kcal,p,c,f} par 100g
  const searchTimer=React.useRef(null);

  // Debounce recherche : 300ms après dernière frappe
  React.useEffect(()=>{
    clearTimeout(searchTimer.current);
    if(searchQuery.trim().length<2){setSearchResults([]);return;}
    setSearching(true);
    searchTimer.current=setTimeout(async()=>{
      try{
        const r=await apiCall('/api/foods/search?q='+encodeURIComponent(searchQuery));
        setSearchResults(r.results||[]);
      }catch(e){setSearchResults([]);}
      setSearching(false);
    },300);
    return()=>clearTimeout(searchTimer.current);
  },[searchQuery]);

  // Sélection d'un aliment → préremplit le formulaire (100g par défaut)
  const pickFood=food=>{
    setSelectedFood(food);
    setFreeFoodForm({
      name:food.name,
      kcal:String(food.kcal||0),
      p:String(food.p||0),c:String(food.c||0),f:String(food.f||0),
      qty:'100',
    });
    setSearchQuery('');setSearchResults([]);
  };

  // Recalcul macros quand qty change ET un aliment a été sélectionné
  const updateQty=v=>{
    setFreeFoodForm(prev=>{
      const next={...prev,qty:v};
      if(selectedFood){
        const ratio=(parseFloat(v)||0)/100;
        next.kcal=String(Math.round((selectedFood.kcal||0)*ratio));
        next.p=   String(Math.round((selectedFood.p||0)*ratio*10)/10);
        next.c=   String(Math.round((selectedFood.c||0)*ratio*10)/10);
        next.f=   String(Math.round((selectedFood.f||0)*ratio*10)/10);
      }
      return next;
    });
  };

  const openFreeFood=(mealId,mealLabel)=>{
    setFreeFoodForm({name:'',kcal:'',p:'',c:'',f:'',qty:'100'});
    setSearchQuery('');setSearchResults([]);setSelectedFood(null);
    setFreeFoodModal({mealId,mealLabel});
  };

  const submitFreeFood=async e=>{
    e.preventDefault();
    if(!freeFoodModal||!freeFoodForm.name.trim())return;
    setFreeFoodSaving(true);
    try{
      const qtyG=parseFloat(freeFoodForm.qty)||0;
      const displayName=selectedFood&&qtyG&&qtyG!==100?`${freeFoodForm.name.trim()} (${qtyG}g)`:freeFoodForm.name.trim();
      const r=await apiCall('/api/nutrition/free-food',{method:'POST',body:{
        mealId:freeFoodModal.mealId,
        name:displayName,
        kcal:freeFoodForm.kcal,p:freeFoodForm.p,c:freeFoodForm.c,f:freeFoodForm.f,
      }});
      // Mise à jour locale immédiate
      setTodayLog(prev=>{
        const ff={...(prev.freeFoods||{})};
        ff[freeFoodModal.mealId]=[...(ff[freeFoodModal.mealId]||[]),r.entry];
        return{...prev,freeFoods:ff};
      });
      setFreeFoodModal(null);
    }catch(err){alert('Erreur : '+err.message);}
    setFreeFoodSaving(false);
  };
  const removeFreeFood=async(mealId,entryId)=>{
    try{
      await apiCall('/api/nutrition/free-food/'+entryId,{method:'DELETE'});
      setTodayLog(prev=>{
        const ff={...(prev.freeFoods||{})};
        ff[mealId]=(ff[mealId]||[]).filter(e=>e.id!==entryId);
        return{...prev,freeFoods:ff};
      });
    }catch(err){alert('Erreur : '+err.message);}
  };

  // ── Long-press drag (coach) ──
  const[nutriDragSrc,setNutriDragSrc]=React.useState(null);  // {dateStr, dayName}
  const[nutriDragOver,setNutriDragOver]=React.useState(null);
  const[nutriDragPos,setNutriDragPos]=React.useState({x:0,y:0});
  const nutriLongPressTimer=React.useRef(null);
  const nutriDragActive=React.useRef(false);

  const startNutriLongPress=(e,dateStr,dayName,hasPlan,isDone)=>{
    if(!isCoach||(!hasPlan&&!isDone))return;
    const touch=e.touches[0];
    setNutriDragPos({x:touch.clientX,y:touch.clientY});
    nutriLongPressTimer.current=setTimeout(()=>{
      nutriDragActive.current=true;
      setNutriDragSrc({dateStr,dayName});
      if(navigator.vibrate)navigator.vibrate(40);
    },500);
  };

  const onNutriDragMove=React.useCallback(e=>{
    if(!nutriDragActive.current)return;
    e.preventDefault();
    const touch=e.touches[0];
    setNutriDragPos({x:touch.clientX,y:touch.clientY});
    const el=document.elementFromPoint(touch.clientX,touch.clientY);
    const cell=el&&el.closest('[data-nutri-date]');
    setNutriDragOver(cell?cell.getAttribute('data-nutri-date'):null);
  },[]);

  const onNutriDragEnd=React.useCallback(async()=>{
    clearTimeout(nutriLongPressTimer.current);
    if(!nutriDragActive.current){nutriDragActive.current=false;setNutriDragSrc(null);setNutriDragOver(null);return;}
    nutriDragActive.current=false;
    const target=nutriDragOver;
    const src=nutriDragSrc;
    setNutriDragSrc(null);setNutriDragOver(null);
    if(!target||!src||target===src.dateStr)return;
    const srcLog=history[src.dateStr]||{};
    try{
      await apiCall('/api/nutrition/copy-day',{method:'POST',body:{fromDate:src.dateStr,toDate:target,validatedEntries:srcLog.validated||{}}});
      await load();
      setImportMsg(`✓ Journée copiée au ${new Date(target+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}`);
      setTimeout(()=>setImportMsg(null),3000);
    }catch(e){setImportMsg('✗ Erreur lors de la copie');setTimeout(()=>setImportMsg(null),3000);}
  },[nutriDragOver,nutriDragSrc,history,load]);

  React.useEffect(()=>{
    if(!nutriDragSrc)return;
    window.addEventListener('touchmove',onNutriDragMove,{passive:false});
    window.addEventListener('touchend',onNutriDragEnd);
    return()=>{
      window.removeEventListener('touchmove',onNutriDragMove);
      window.removeEventListener('touchend',onNutriDragEnd);
    };
  },[nutriDragSrc,onNutriDragMove,onNutriDragEnd]);

  // ── Note /5 (athlète) ──
  const rateDay=async(date,rating)=>{
    try{
      await apiCall('/api/nutrition/rate',{method:'POST',body:{date,rating}});
      setHistory(h=>({...h,[date]:{...(h[date]||{validated:{},validatedAt:{}}),rating}}));
    }catch(e){console.error(e);}
  };
  const nowN=new Date();
  const[calYear,setCalYear]=React.useState(nowN.getFullYear());
  const[calMonth,setCalMonth]=React.useState(nowN.getMonth());
  const[selectedDate,setSelectedDate]=React.useState(null);
  const JS_TO_DAY_N=['DIMANCHE','LUNDI','MARDI','MERCREDI','JEUDI','VENDREDI','SAMEDI'];
  const todayStrN=`${nowN.getFullYear()}-${String(nowN.getMonth()+1).padStart(2,'0')}-${String(nowN.getDate()).padStart(2,'0')}`;
  const calDaysN=React.useMemo(()=>{
    const firstDow=(new Date(calYear,calMonth,1).getDay()+6)%7;
    const dim=new Date(calYear,calMonth+1,0).getDate();
    const cells=[];
    for(let i=0;i<firstDow;i++)cells.push(null);
    for(let d=1;d<=dim;d++)cells.push(d);
    return cells;
  },[calYear,calMonth]);
  const prevMonthN=()=>{if(calMonth===0){setCalYear(y=>y-1);setCalMonth(11);}else setCalMonth(m=>m-1);};
  const nextMonthN=()=>{if(calMonth===11){setCalYear(y=>y+1);setCalMonth(0);}else setCalMonth(m=>m+1);};

  const handleSelfImport=e=>{
    const file=e.target.files[0];
    if(!file)return;
    e.target.value='';
    setImportMsg('⏳ Import en cours...');
    parseNutritionExcel(file,async planParsed=>{
      try{
        if(!planParsed._itemsImported){
          setImportMsg('✗ 0 aliment détecté');
          setTimeout(()=>setImportMsg(null),5000);return;
        }
        const norm=normalizePlan(planParsed);
        await apiCall('/api/my-nutrition',{method:'PUT',body:{plan:norm}});
        setImportMsg(`✓ ${planParsed._itemsImported} aliments importés`);
        await load();
        setTimeout(()=>setImportMsg(null),3000);
      }catch(ex){setImportMsg('✗ '+(ex.message||ex));setTimeout(()=>setImportMsg(null),5000);}
    },err=>{setImportMsg('✗ '+err);setTimeout(()=>setImportMsg(null),5000);});
  };

  useSocket(authToken,{
    'nutrition-updated':({plan})=>{setPlan(p=>p?{...p,data:plan}:{data:plan});},
  });

  const toggleMeal=async(mealId)=>{
    // optimistic
    const wasValidated=todayLog.validated[mealId];
    setTodayLog(t=>({...t,validated:{...t.validated,[mealId]:!wasValidated},validatedAt:{...t.validatedAt,[mealId]:!wasValidated?Date.now():null}}));
    try{await apiCall('/api/nutrition/validate/'+mealId,{method:'POST'});}
    catch(e){load();}
  };

  if(loading){
    return<div style={{padding:'18px 18px 100px',color:T.text}}><div style={{padding:30,textAlign:'center',color:T.textFaint,fontSize:13}}>Chargement…</div></div>;
  }

  if(!plan||!plan.data){
    return(
      <div style={{padding:'18px 18px 100px',color:T.text}}>
        <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel,text/csv,application/octet-stream,*/*" style={{display:'none'}} onChange={handleSelfImport}/>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,color:T.textDim,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase'}}>Nutrition</div>
          <div style={{fontSize:26,fontWeight:700,letterSpacing:-0.5,marginTop:2}}><HoloText>Mon plan</HoloText></div>
        </div>
        {importMsg&&<div style={{marginBottom:12,padding:'10px 14px',borderRadius:11,background:'rgba(44,196,160,0.12)',border:'1px solid rgba(44,196,160,0.3)',color:T.good,fontSize:13,fontWeight:600,textAlign:'center'}}>{importMsg}</div>}
        <div style={{padding:'40px 24px',borderRadius:22,background:'linear-gradient(160deg,rgba(28,28,40,0.8),rgba(14,14,20,0.8))',border:`1px solid ${T.border}`,textAlign:'center'}}>
          <div style={{fontSize:48,marginBottom:14}}>🍎</div>
          <div style={{fontSize:18,fontWeight:700,marginBottom:6}}>Pas encore de plan</div>
          <div style={{fontSize:13,color:T.textDim,lineHeight:1.5,maxWidth:280,margin:'0 auto 18px'}}>{isCoach?'Importe ton propre plan nutrition au format Excel.':'Demande à ton coach de te préparer un plan nutritionnel personnalisé.'}</div>
          {isCoach&&(
            <button onClick={()=>fileRef.current.click()} style={{padding:'12px 22px',borderRadius:12,border:'1px solid transparent',background:'linear-gradient(135deg,#BFA060,#B85070)',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer'}}>Importer plan nutrition</button>
          )}
        </div>
      </div>
    );
  }

  const data=normalizePlan(plan.data);
  const isToday=viewDay===todayDayName();
  const meals=getDayMeals(data,viewDay,activeWeek);

  // Objectifs = somme des aliments du jour vu (toujours synchronisé avec les items)
  const dayTargets=meals.reduce((acc,m)=>{
    const mm=mealMacros(m.items);
    return{kcal:acc.kcal+mm.kcal,p:acc.p+mm.p,c:acc.c+mm.c,f:acc.f+mm.f};
  },{kcal:0,p:0,c:0,f:0});

  // Aliments libres (logged ad hoc, hors plan) — comptent toujours dès qu'ils sont ajoutés
  const freeFoodsToday=(isToday?todayLog.freeFoods:{})||{};
  const allFreeFoodsToday=Object.values(freeFoodsToday).flat();

  // TODAY : somme des items validés (progression réelle) + aliments libres
  // AUTRES JOURS : somme totale des items (aperçu du plan complet)
  const totals=meals.reduce((acc,m)=>{
    const include=isToday?todayLog.validated[m.id]:true;
    if(include){
      const mm=mealMacros(m.items);
      acc.kcal+=mm.kcal;acc.p+=mm.p;acc.c+=mm.c;acc.f+=mm.f;
    }
    return acc;
  },{kcal:0,p:0,c:0,f:0});
  if(isToday){
    for(const e of allFreeFoodsToday){
      totals.kcal+=(+e.kcal||0);totals.p+=(+e.p||0);totals.c+=(+e.c||0);totals.f+=(+e.f||0);
    }
  }

  const nowHM=(()=>{const d=new Date();return d.getHours()*60+d.getMinutes();})();
  const validatedCount=isToday?meals.filter(m=>todayLog.validated[m.id]).length:0;
  const totalMeals=meals.length;

  // Streak (consecutive days with at least 1 meal validated)
  const streak=(()=>{
    let s=0;
    const today=new Date();
    for(let i=0;i<14;i++){
      const d=new Date(today.getTime()-i*86400000);
      const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const log=history[k];
      if(log&&Object.values(log.validated||{}).filter(Boolean).length>0)s++;
      else if(i>0)break;
    }
    return s;
  })();

  // Score: % of daily target (capped)
  const kcalRatio=dayTargets.kcal>0?Math.min(1,totals.kcal/dayTargets.kcal):0;
  const pRatio=dayTargets.p>0?Math.min(1,totals.p/dayTargets.p):0;
  const cRatio=dayTargets.c>0?Math.min(1,totals.c/dayTargets.c):0;
  const fRatio=dayTargets.f>0?Math.min(1,totals.f/dayTargets.f):0;
  const score=Math.round((kcalRatio+pRatio+cRatio+fRatio)/4*100);

  return(
    <div style={{padding:'18px 18px 100px',color:T.text}}>
      <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel,text/csv,application/octet-stream,*/*" style={{display:'none'}} onChange={handleSelfImport}/>
      {importMsg&&<div style={{marginBottom:12,padding:'10px 14px',borderRadius:11,background:'rgba(44,196,160,0.12)',border:'1px solid rgba(44,196,160,0.3)',color:T.good,fontSize:13,fontWeight:600,textAlign:'center'}}>{importMsg}</div>}
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:14}}>
        <div>
          <div style={{fontSize:11,color:T.textDim,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase'}}>Nutrition · Aujourd'hui</div>
          <div style={{fontSize:26,fontWeight:700,letterSpacing:-0.5,marginTop:2}}><HoloText>{profile&&profile.firstName?profile.firstName:'Mon plan'}</HoloText></div>
          {isCoach&&(
            <div style={{display:'flex',gap:6,marginTop:8}}>
              <button onClick={()=>fileRef.current.click()} style={{padding:'6px 12px',borderRadius:9,border:'1px solid rgba(191,160,96,0.35)',background:'rgba(191,160,96,0.08)',color:T.accent,fontSize:11,fontWeight:700,cursor:'pointer',letterSpacing:0.3}}>↻ Réimporter</button>
              <button onClick={async()=>{
                if(!confirm('Supprimer ton plan nutrition importé ?'))return;
                try{await apiCall('/api/my-nutrition',{method:'DELETE'});setImportMsg('✓ Supprimé');await load();setTimeout(()=>setImportMsg(null),2500);}
                catch(e){setImportMsg('✗ '+(e.message||e));setTimeout(()=>setImportMsg(null),5000);}
              }} style={{padding:'6px 12px',borderRadius:9,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.03)',color:T.textDim,fontSize:11,fontWeight:700,cursor:'pointer',letterSpacing:0.3}}>✕ Supprimer</button>
            </div>
          )}
          {streak>0&&(
            <div style={{display:'inline-flex',alignItems:'center',gap:5,marginTop:6,padding:'4px 10px',borderRadius:999,background:'rgba(191,160,96,0.12)',border:'1px solid rgba(191,160,96,0.3)'}}>
              <span style={{fontSize:13}}>🔥</span>
              <span style={{fontSize:11,color:T.accent,fontWeight:700,letterSpacing:0.3}}>{streak} JOUR{streak>1?'S':''} D'AFFILÉE</span>
            </div>
          )}
        </div>
        <div style={{textAlign:'right',flexShrink:0}}>
          <div style={{fontSize:10,color:T.textFaint,fontWeight:500,letterSpacing:0.4,textTransform:'uppercase'}}>Score</div>
          <div style={{fontSize:28,fontWeight:600,letterSpacing:-0.6,color:score>=80?T.good:score>=50?T.warn:T.danger,lineHeight:1}}>{score}<span style={{fontSize:13,color:T.textDim,fontWeight:400}}>%</span></div>
        </div>
      </div>

      {/* ── Synthèse macros journalière ── */}
      {isToday&&dayTargets.kcal>0&&(()=>{
        // Couleur selon ratio : <50% rouge, 50-90% orange, 90-110% vert, >110% orange
        const barColor=ratio=>{
          if(ratio<0.5)return{c:'#B85070',bg:'rgba(184,80,112,0.15)'};
          if(ratio<0.9)return{c:'#C89040',bg:'rgba(200,144,64,0.15)'};
          if(ratio<=1.1)return{c:'#2CC4A0',bg:'rgba(44,196,160,0.15)'};
          return{c:'#C89040',bg:'rgba(200,144,64,0.15)'};
        };
        const Bar=({label,cur,target,unit,ratio})=>{
          const{c,bg}=barColor(ratio);
          const pct=Math.round(ratio*100);
          const widthPct=Math.min(100,ratio*100);
          return(
            <div style={{marginBottom:9}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:3}}>
                <span style={{fontSize:11,fontWeight:700,color:T.textDim,letterSpacing:0.3,textTransform:'uppercase'}}>{label}</span>
                <span style={{fontSize:11,color:T.textFaint,fontVariantNumeric:'tabular-nums'}}>
                  <span style={{color:c,fontWeight:700}}>{Math.round(cur)}</span>
                  <span> / {Math.round(target)} {unit}</span>
                  <span style={{marginLeft:6,fontWeight:700,color:c}}>{pct}%</span>
                </span>
              </div>
              <div style={{height:8,borderRadius:4,background:bg,overflow:'hidden',position:'relative'}}>
                <div style={{height:'100%',width:widthPct+'%',background:c,borderRadius:4,transition:'width 0.4s cubic-bezier(.16,1,.3,1)'}}/>
              </div>
            </div>
          );
        };
        return(
          <GlassCard padding={14} style={{marginBottom:14}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div style={{fontSize:11,color:T.textDim,fontWeight:700,letterSpacing:0.4,textTransform:'uppercase'}}>Aujourd'hui</div>
              <div style={{fontSize:10,color:T.textFaint}}>{validatedCount}/{totalMeals} repas validés</div>
            </div>
            <Bar label="Calories"  cur={totals.kcal} target={dayTargets.kcal} unit="kcal" ratio={kcalRatio}/>
            <Bar label="Protéines" cur={totals.p}    target={dayTargets.p}    unit="g"    ratio={pRatio}/>
            <Bar label="Glucides"  cur={totals.c}    target={dayTargets.c}    unit="g"    ratio={cRatio}/>
            <Bar label="Lipides"   cur={totals.f}    target={dayTargets.f}    unit="g"    ratio={fRatio} />
          </GlassCard>
        );
      })()}

      {/* Calendar selector */}
      <div style={{marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <button onClick={prevMonthN} style={{minWidth:44,minHeight:44,borderRadius:11,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.textDim,cursor:'pointer',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>‹</button>
          <div style={{fontSize:13,fontWeight:700,textTransform:'capitalize'}}>{new Date(calYear,calMonth).toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}</div>
          <button onClick={nextMonthN} style={{minWidth:44,minHeight:44,borderRadius:11,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.textDim,cursor:'pointer',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>›</button>
        </div>

const DAYS_OF_WEEK=['LUNDI','MARDI','MERCREDI','JEUDI','VENDREDI','SAMEDI','DIMANCHE'];
const todayDayName=()=>DAYS_OF_WEEK[(new Date().getDay()+6)%7];
const ymdKey=(d=new Date())=>{const x=new Date(d);return`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;};

const emptyDay=()=>({meals:NUTRI_MEAL_TEMPLATES.map(t=>({...t,items:[],note:''}))});
const emptyWeek=()=>{const d={};for(const day of DAYS_OF_WEEK)d[day]=emptyDay();return d;};

// Backward-compat: get meals for a specific day (weekIdx optional, defaults to 0)
function getDayMeals(plan,dayName,weekIdx){
  if(plan&&plan.weeks&&plan.weeks.length>0){
    const w=plan.weeks[weekIdx||0]||plan.weeks[0];
    if(w&&w.days&&w.days[dayName])return w.days[dayName].meals||[];
  }
  if(plan&&plan.days&&plan.days[dayName])return plan.days[dayName].meals||[];
  if(plan&&plan.meals)return plan.meals; // legacy single-day plan
  return emptyDay().meals;
}
function getDayNote(plan,dayName){
  if(plan&&plan.days&&plan.days[dayName])return plan.days[dayName].note||'';
  return '';
}

// Parse "5H - 8H" / "14H-17H" / "5h-8h" → ["05:00","08:00"]
function parseExcelTime(s){
  if(!s)return null;
  const m=String(s).match(/(\d+)\s*[hH:]\s*(\d*)?\s*[-–]\s*(\d+)\s*[hH:]\s*(\d*)?/);
  if(!m)return null;
  const fmt=(h,mn)=>`${String(parseInt(h)).padStart(2,'0')}:${String(parseInt(mn||0)||0).padStart(2,'0')}`;
  return[fmt(m[1],m[2]),fmt(m[3],m[4])];
}

// Normalise une unité vers la casse standard (G, U, BOITE)
function normalizeUnit(u){
  const s=String(u||'').toUpperCase().trim();
  if(!s||s==='G'||s==='GR'||s==='GRAMME')return'G';
  if(s==='U'||s==='UNITE'||s==='UNITÉ'||s==='UNITES'||s==='UNITÉS'||s==='PIECE'||s==='PIÈCE'||s==='PORTION')return'U';
  if(s==='BOITE'||s==='BOÎTE'||s==='BOITES'||s==='BOÎTES')return'BOITE';
  if(s==='ML')return'ML';
  return s||'G';
}

// Export: toutes les semaines, une feuille par jour (LUNDI, LUNDI 2, LUNDI 3, LUNDI 4)
function exportNutritionExcel(plan,athleteName){
  const wb=XLSX.utils.book_new();
  const HEADER=['JOUR','REPAS','HEURE','PRODUITS','QUANTITE','UNITE','CALORIE','PROTEINE','GLUCIDE','LIPIDE','VALIDATION'];
  const COLS=[{wch:12},{wch:14},{wch:14},{wch:24},{wch:11},{wch:8},{wch:10},{wch:11},{wch:11},{wch:10},{wch:12}];

  const weeks=plan.weeks&&plan.weeks.length>0?plan.weeks:[{label:'S1',days:plan.days}];

  for(let wi=0;wi<weeks.length;wi++){
    const w=weeks[wi];
    const suffix=wi===0?'':` ${wi+1}`;
    for(const dayName of DAYS_OF_WEEK){
      const sheetName=dayName+suffix;
      const meals=(w.days&&w.days[dayName]&&w.days[dayName].meals)||[];
      const aoa=[];
      aoa.push(HEADER);
      let firstMealOfDay=true;
      for(const m of meals){
        const horaire=`${m.timeStart.replace(':','H').replace(/H00$/,'H')} - ${m.timeEnd.replace(':','H').replace(/H00$/,'H')}`;
        if(!m.items||m.items.length===0){
          aoa.push([firstMealOfDay?dayName:'',m.label,horaire,'','','','','','','','']);
          firstMealOfDay=false;
          for(let i=0;i<10;i++)aoa.push(['','','','','','','','','','','']);
        }else{
          m.items.forEach((it,i)=>{
            aoa.push([
              firstMealOfDay&&i===0?dayName:'',
              i===0?m.label:'',
              i===0?horaire:'',
              it.name||'',
              it.qty||0,
              normalizeUnit(it.unit),
              it.kcal||0,
              it.p||0,
              it.c||0,
              it.f||0,
              'OK',
            ]);
          });
          firstMealOfDay=false;
          for(let i=0;i<10-m.items.length;i++)aoa.push(['','','','','','','','','','','']);
        }
      }
      const ws=XLSX.utils.aoa_to_sheet(aoa);
      ws['!cols']=COLS;
      XLSX.utils.book_append_sheet(wb,ws,sheetName);
    }
  }
  const slug=(athleteName||'plan').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');
  XLSX.writeFile(wb,`nutrition_${slug}_${new Date().toISOString().slice(0,10)}.xlsx`);
}

];
const _normShop=s=>String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').trim();
function categorizeProduct(name){
  const n=_normShop(name);
  for(const cat of SHOP_CATEGORIES){
    for(const kw of cat.kw){ if(n.includes(kw)) return cat; }
  }
  return SHOP_CATEGORIES[SHOP_CATEGORIES.length-1];
}
function buildShoppingList(plan){
  // { "NOM": { grams, units } } — agrège toutes les semaines
  const agg={};
  const allWeeksDays=plan.weeks&&plan.weeks.length>0
    ?plan.weeks.flatMap(w=>DAYS_OF_WEEK.map(d=>w.days&&w.days[d]))
    :DAYS_OF_WEEK.map(d=>plan.days&&plan.days[d]);
  for(const dayObj of allWeeksDays){
    if(!dayObj)continue;
    for(const m of dayObj.meals||[]){
      for(const it of (m.items||[])){
        const name=String(it.name||'').trim();
        const qty=parseFloat(it.qty)||0;
        const unit=String(it.unit||'').toUpperCase().trim();
        if(!name||qty<=0)continue;
        if(!agg[name])agg[name]={grams:0,units:0,boites:0};
        if(unit==='G'||unit==='GR'||unit==='GRAMME'||unit==='ML')agg[name].grams+=qty;
        else if(unit==='BOITE'||unit==='BOÎTE'||unit==='BOITES'||unit==='BOÎTES')agg[name].boites+=qty;
        else if(unit===''||unit==='U'||unit==='UNITE'||unit==='UNITES'||unit==='UNITÉ'||unit==='UNITÉS'||unit==='PIECE'||unit==='PIÈCE'||unit==='PORTION')agg[name].units+=qty;
        else agg[name].grams+=qty;
      }
    }
  }
  const byCat={};
  for(const[name,t] of Object.entries(agg)){
    const cat=categorizeProduct(name);
    if(!byCat[cat.name])byCat[cat.name]={cat,items:[]};
    byCat[cat.name].items.push({name,grams:t.grams,units:t.units,boites:t.boites||0});
  }
  for(const c of Object.values(byCat))c.items.sort((a,b)=>a.name.localeCompare(b.name));
  return{byCat,total:Object.keys(agg).length};
}
function formatShopQty(item){
  const parts=[];
  if(item.grams>0){
    if(item.grams>=1000)parts.push(`${(item.grams/1000).toFixed(2)} kg`);
    else parts.push(`${Math.round(item.grams)} g`);
  }
  if((item.boites||0)>0){const b=Math.ceil(item.boites);parts.push(`${b} ${b>1?'boîtes':'boîte'}`);}
  if(item.units>0){const u=Math.ceil(item.units);parts.push(`${u} ${u>1?'unités':'unité'}`);}
  return parts.join(' + ');
}
