<style>
  html,body,#root{height:100%;margin:0}
  body{font-family:'Inter',-apple-system,system-ui,sans-serif;background:#0a0a0e;color:#f0f0f2;-webkit-font-smoothing:antialiased;letter-spacing:-0.011em;font-feature-settings:'ss01','cv11'}
  ::-webkit-scrollbar{width:0;height:0}
  @keyframes holoShift{0%{background-position:0% 50%}100%{background-position:200% 50%}}
  @keyframes holoText{0%{background-position:0% 50%}100%{background-position:200% 50%}}
  @keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
  @keyframes celebrationPop{0%{transform:scale(0.85);opacity:0}60%{transform:scale(1.02);opacity:1}100%{transform:scale(1);opacity:1}}
  @keyframes imgFade{0%{opacity:0;transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
  @keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
  @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,184,108,0.5)}70%{box-shadow:0 0 0 10px rgba(255,184,108,0)}100%{box-shadow:0 0 0 0 rgba(255,184,108,0)}}
  @keyframes countPop{0%{transform:scale(1)}40%{transform:scale(1.15)}100%{transform:scale(1)}}
  @keyframes tabFadeIn{0%{opacity:0;transform:translateY(4px)}100%{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
  .tab-content{animation:tabFadeIn 0.35s cubic-bezier(.16,1,.3,1)}
  button,a{transition:transform 0.18s cubic-bezier(.16,1,.3,1),box-shadow 0.18s ease,background 0.2s ease,opacity 0.18s ease,border-color 0.2s ease}
  button:active{transform:scale(0.98)}
  button:hover:not(:disabled){opacity:0.92}
  :root{--shimmer-state:running}
  input[type=number]{-moz-appearance:textfield}
  input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
</style>
</head>

<div id="root"></div>

<script type="text/babel">

// ── shared ──────────────────────────────────────────────
// Refined warm palette — luxury, less neon
const HOLO={
  // Subtle warm radial (was rainbow conic) — gives soft amber glow
  iris:'radial-gradient(circle at 30% 30%,#ff9a4a 0%,#d97757 35%,#3a2418 70%,#0a0a0e 100%)',
  // Single warm horizontal sweep (was rainbow)
  irisHorizon:'linear-gradient(90deg,#d97757 0%,#ff9a4a 50%,#d97757 100%)',
};
const T={
  bg:'#0a0a0e',
  bgRaise:'#13131a',
  border:'rgba(255,255,255,0.06)',
  text:'#f0f0f2',
  textDim:'rgba(240,240,242,0.58)',
  textFaint:'rgba(240,240,242,0.32)',
  accent:'#d97757',                        // warm cognac (was bright #d97757)
  accentSoft:'rgba(217,119,87,0.12)',
  accentBright:'#ff9a4a',                  // brighter only for hover/active states
  good:'#7cc4a1',                          // muted sage (was neon mint)
  warn:'#e6c269',                          // muted gold (was bright yellow)
  danger:'#c97586',                        // muted rose (was hot pink)
  // Macro colors — muted versions
  macroP:'#c97586',                        // bordeaux rose (was #c97586)
  macroC:'#7ca8c4',                        // steel blue (was #7ca8c4)
  macroL:'#c2a042',                        // gold (was #c2a042)

  ['squat','Barbell_Squat'],
  ['leg extension','Leg_Extensions'],['extension jambe','Leg_Extensions'],
  ['leg curl','Seated_Leg_Curl'],['ischio','Seated_Leg_Curl'],
  ['leg press','Leg_Press'],['presse','Leg_Press'],
  ['fente','Dumbbell_Lunges'],['lunge','Dumbbell_Lunges'],
  ['mollet','Standing_Calf_Raises'],['calf','Standing_Calf_Raises'],
  ['hip thrust','Hip_Thrust'],['fessier','Hip_Thrust'],
  // Pecs
  ['developpe incline','Barbell_Incline_Bench_Press_-_Medium-Grip'],['incline','Barbell_Incline_Bench_Press_-_Medium-Grip'],
  ['developpe decline','Decline_Barbell_Bench_Press'],['decline','Decline_Barbell_Bench_Press'],
  ['developpe couche','Barbell_Bench_Press_-_Medium_Grip'],['bench press','Barbell_Bench_Press_-_Medium_Grip'],['bench','Barbell_Bench_Press_-_Medium_Grip'],
  ['ecarte poulie','Cable_Crossover'],['cable cross','Cable_Crossover'],['ecarte','Cable_Crossover'],['fly','Cable_Crossover'],['butterfly','Cable_Crossover'],
  ['pompes','Pushups'],['push-up','Pushups'],['push up','Pushups'],
  // Dos
  ['souleve de terre','Barbell_Deadlift'],['deadlift','Barbell_Deadlift'],['sdt','Barbell_Deadlift'],
  ['traction lestee','Pullups'],['traction','Pullups'],['pull-up','Pullups'],['pullup','Pullups'],
  ['rowing barre','Bent_Over_Barbell_Row'],['rowing haltere','Bent_Over_Two-Dumbbell_Row'],['rowing','Seated_Cable_Rows'],
  ['tirage horizontal','Seated_Cable_Rows'],['tirage vertical','Wide-Grip_Lat_Pulldown'],['tirage poulie','Wide-Grip_Lat_Pulldown'],['tirage','Wide-Grip_Lat_Pulldown'],['lat pulldown','Wide-Grip_Lat_Pulldown'],
  ['shrug','Barbell_Shrug'],['trapeze','Barbell_Shrug'],
  // Epaules
  ['developpe militaire','Standing_Military_Press'],['military press','Standing_Military_Press'],['ohp','Standing_Military_Press'],
  ['press epaule','Seated_Dumbbell_Press'],['shoulder press','Seated_Dumbbell_Press'],['developpe nuque','Seated_Dumbbell_Press'],
  ['elevation laterale','Side_Lateral_Raise'],['lateral raise','Side_Lateral_Raise'],
  ['elevation frontale','Front_Dumbbell_Raise'],['front raise','Front_Dumbbell_Raise'],
  ['oiseau','Reverse_Flyes'],['rear delt','Reverse_Flyes'],['posterieur','Reverse_Flyes'],
  // Bras
  ['curl marteau','Hammer_Curls'],['hammer','Hammer_Curls'],
  ['curl','Barbell_Curl'],['biceps','Barbell_Curl'],
  ['extension triceps','Triceps_Pushdown'],['triceps poulie','Triceps_Pushdown'],['pushdown','Triceps_Pushdown'],['triceps','Triceps_Pushdown'],
  ['dips','Dips_-_Triceps_Version'],['dip','Dips_-_Triceps_Version'],
  ['skullcrusher','Lying_Triceps_Press'],['barre au front','Lying_Triceps_Press'],
  // Abdos
  ['plank','Plank'],['gainage','Plank'],['planche','Plank'],
  ['crunch','Crunches'],['abdo','Crunches'],
  ['relevee jambe','Hanging_Leg_Raise'],['leg raise','Hanging_Leg_Raise'],

function exerciseImageURL(name){
  if(!name)return null;
  const norm=String(name).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
  for(const[kw,slug]of EXERCISE_IMG_MAP){
    if(norm.includes(kw))return`${EXERCISE_IMG_BASE}/${slug}/0.jpg`;
  }
  return null;
}

    flame:<path d="M12 2c1 4 5 5 5 10a5 5 0 1 1-10 0c0-2 1-3 2-4-1 3 1 4 2 4 0-3-2-4 1-10z"/>,

    minus:<path d="M5 12h14"/>,
    check:<path d="M5 12l5 5 9-11"/>,
    chevronRight:<path d="M9 6l6 6-6 6"/>,
    chevronLeft:<path d="M15 6l-6 6 6 6"/>,
    x:<><path d="M6 6l12 12"/><path d="M18 6l-12 12"/></>,
    timer:<><circle cx="12" cy="13" r="8"/><path d="M12 9v4l3 2"/><path d="M9 2h6"/><path d="M12 2v3"/></>,
    settings:<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 0 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></>,
    bolt:<path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z" fill={stroke} stroke="none"/>,
    target:<><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5" fill={stroke} stroke="none"/></>,
    trending:<><path d="M3 17l6-6 4 4 8-9"/><path d="M14 6h7v7"/></>,

    grid:<><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></>,
    edit:<><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 1 1 3 3L7 19l-4 1 1-4z"/></>,
    trash:<><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></>,
    more:<><circle cx="12" cy="6" r="1.4" fill={stroke} stroke="none"/><circle cx="12" cy="12" r="1.4" fill={stroke} stroke="none"/><circle cx="12" cy="18" r="1.4" fill={stroke} stroke="none"/></>,

    download:<><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M5 21h14"/></>,
    upload:<><path d="M12 3v12"/><path d="M7 8l5-5 5 5"/><path d="M5 21h14"/></>,

function HoloCard({children,intense=false,style={},onClick,padding=18}){
  return(
    <div onClick={onClick} style={{position:'relative',borderRadius:22,padding:1,background:HOLO.iris,backgroundSize:'200% 200%',animation:'holoShift 12s linear infinite',cursor:onClick?'pointer':'default',...style}}>
      <div style={{position:'relative',borderRadius:21,background:intense?'linear-gradient(160deg,rgba(217,119,87,0.12),rgba(20,20,28,0.92) 60%)':'linear-gradient(160deg,rgba(28,28,40,0.95),rgba(12,12,18,0.95))',padding,overflow:'hidden'}}>
        <div style={{position:'absolute',inset:0,pointerEvents:'none',background:'radial-gradient(120% 80% at 0% 0%,rgba(217,119,87,0.10),transparent 40%),radial-gradient(120% 80% at 100% 100%,rgba(124,168,196,0.06),transparent 50%)'}}/>
        <div style={{position:'relative'}}>{children}</div>
      </div>
    </div>
  );
}

function GlassCard({children,style={},onClick,padding=16,accent=false}){
  return(
    <div onClick={onClick} style={{position:'relative',borderRadius:20,padding,background:accent?'linear-gradient(160deg,rgba(217,119,87,0.18),rgba(201,117,134,0.06) 60%,rgba(20,20,28,0.6))':'linear-gradient(160deg,rgba(28,28,40,0.8),rgba(14,14,20,0.8))',border:`1px solid ${accent?'rgba(217,119,87,0.35)':T.border}`,boxShadow:'0 1px 0 rgba(255,255,255,0.04) inset,0 20px 40px rgba(0,0,0,0.35)',cursor:onClick?'pointer':'default',...style}}>{children}</div>
  );
}

function HoloText({children,style={}}){
  return <span style={{backgroundImage:HOLO.irisHorizon,backgroundSize:'200% 100%',WebkitBackgroundClip:'text',backgroundClip:'text',color:'transparent',animation:'holoText 8s linear infinite',...style}}>{children}</span>;
}

function Pill({children,color=T.accent,style={}}){
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'4px 9px',borderRadius:999,background:`${color}22`,color,fontSize:11,fontWeight:600,letterSpacing:0.3,textTransform:'uppercase',border:`1px solid ${color}44`,...style}}>{children}</span>;
}

function SectionHeader({title,right}){
  return(
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,paddingLeft:2}}>
      <div style={{fontSize:13,fontWeight:600,letterSpacing:0.3,color:T.text,textTransform:'uppercase'}}>{title}</div>
      {right}
    </div>
  );
}

// ── iOS frame ────────────────────────────────────────────

}

function IOSDevice({children,width=402,height=874,dark=false}){
  return(
    <div style={{width,height,borderRadius:48,overflow:'hidden',position:'relative',background:dark?'#000':'#F2F2F7',boxShadow:'0 40px 80px rgba(0,0,0,0.18),0 0 0 1px rgba(0,0,0,0.12)',fontFamily:'-apple-system,system-ui,sans-serif'}}>

// ── Tweaks panel ─────────────────────────────────────────
const TWK_CSS=`
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:9999;width:272px;max-height:calc(100vh - 32px);display:flex;flex-direction:column;background:rgba(250,249,247,.82);color:#29261b;backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);border:.5px solid rgba(255,255,255,.6);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.18);font:11.5px/1.4 ui-sans-serif,system-ui,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px}
  .twk-x:hover{background:rgba(0,0,0,.06)}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;min-height:0}
  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(41,38,27,.45);padding:8px 0 0}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;background:rgba(0,0,0,.06);user-select:none}
  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);transition:left .15s,width .15s}
  .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;border-radius:6px;cursor:default;padding:4px 6px}
  .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;background:rgba(0,0,0,.15);transition:background .15s;cursor:default;padding:0}
  .twk-toggle[data-on="1"]{background:#34c759}
  .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
  .twk-toggle[data-on="1"] i{transform:translateX(14px)}
  .twk-chips{display:flex;gap:6px}
  .twk-chip{position:relative;appearance:none;flex:1;min-width:0;height:40px;padding:0;border:0;border-radius:6px;overflow:hidden;cursor:default;box-shadow:0 0 0 .5px rgba(0,0,0,.12)}
  .twk-chip[data-on="1"]{box-shadow:0 0 0 2px rgba(0,0,0,.85)}
  .twk-chip svg{position:absolute;top:5px;left:5px;width:13px;height:13px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}
`;

  const[v,setV]=React.useState(def);

// ── Cloud / Backend ─────────────────────────────────────
const API_BASE=(()=>{
  if(typeof window==='undefined')return '';
  const l=window.location;
  if(l.protocol==='file:')return 'http://localhost:3001';
  if(l.port==='3001'||!l.port)return ''; // same origin
  return `${l.protocol}//${l.hostname}:3001`;
})();

function apiCall(path,opts={}){
  const token=localStorage.getItem('pa_token');
  const isJson=opts.body&&typeof opts.body==='object'&&!(opts.body instanceof FormData);
  return fetch(API_BASE+path,{
    method:opts.method||'GET',
    headers:{
      ...(isJson?{'Content-Type':'application/json'}:{}),
      ...(token?{'Authorization':'Bearer '+token}:{}),
    },
    body:isJson?JSON.stringify(opts.body):opts.body,
  }).then(async r=>{
    const ct=r.headers.get('content-type')||'';
    const data=ct.includes('application/json')?await r.json():await r.text();
    if(!r.ok)throw Object.assign(new Error((data&&data.error)||('http_'+r.status)),{status:r.status,data});
    return data;
  });
}

function useAuth(){
  const[state,setState]=React.useState(()=>({
    token:localStorage.getItem('pa_token'),
    user:null,
    loading:!!localStorage.getItem('pa_token'),
    error:null,
  }));

  React.useEffect(()=>{
    if(!state.token){setState(s=>({...s,loading:false}));return;}
    apiCall('/api/me')
      .then(user=>setState({token:state.token,user,loading:false,error:null}))
      .catch(()=>{
        localStorage.removeItem('pa_token');
        setState({token:null,user:null,loading:false,error:null});
      });
    // eslint-disable-next-line
  },[]);

  const login=async(email,password)=>{
    const{token,user}=await apiCall('/api/auth/login',{method:'POST',body:{email,password}});
    localStorage.setItem('pa_token',token);
    setState({token,user,loading:false,error:null});
  };

  const signup=async(email,password,role,inviteCode)=>{
    const body={email,password,role};
    if(inviteCode)body.inviteCode=inviteCode;
    const res=await apiCall('/api/auth/signup',{method:'POST',body});
    if(res.pending){
      const err=new Error('pending_approval');
      err.pending=true;
      err.detail=res.message;
      throw err;
    }
    localStorage.setItem('pa_token',res.token);
    setState({token:res.token,user:res.user,loading:false,error:null});
  };

  const logout=()=>{
    localStorage.removeItem('pa_token');
    setState({token:null,user:null,loading:false,error:null});
  };

  const setUser=u=>setState(s=>({...s,user:typeof u==='function'?u(s.user):u}));

  return{...state,login,signup,logout,setUser};
}

function useSocket(token,handlers){
  const handlersRef=React.useRef(handlers);
  handlersRef.current=handlers;
  React.useEffect(()=>{
    if(!token||typeof io==='undefined')return;
    const s=io(API_BASE||undefined,{auth:{token},transports:['websocket','polling']});
    const wrap={};
    Object.keys(handlersRef.current||{}).forEach(ev=>{
      wrap[ev]=(...a)=>handlersRef.current[ev]&&handlersRef.current[ev](...a);
      s.on(ev,wrap[ev]);
    });
    return()=>{s.disconnect();};
  },[token]);
}

function useLocalState(key,defaultValue,onSave){
  const[state,setState]=React.useState(()=>{
    try{const s=localStorage.getItem(key);return s?JSON.parse(s):defaultValue;}
    catch(e){return defaultValue;}
  });
  const isInitial=React.useRef(true);
  React.useEffect(()=>{
    try{localStorage.setItem(key,JSON.stringify(state));}catch(e){}
    if(isInitial.current){isInitial.current=false;return;}
    if(onSave)onSave();
  },[key,state]);
  return[state,setState];
}

function TweaksPanel({title='Tweaks',children}){
  const[open,setOpen]=React.useState(false);
  const ref=React.useRef(null);
  const off=React.useRef({x:16,y:16});
  const clamp=React.useCallback(()=>{
    const p=ref.current;if(!p)return;
    const w=p.offsetWidth,h=p.offsetHeight;
    off.current={x:Math.min(Math.max(16,off.current.x),Math.max(16,window.innerWidth-w-16)),y:Math.min(Math.max(16,off.current.y),Math.max(16,window.innerHeight-h-16))};
    p.style.right=off.current.x+'px';p.style.bottom=off.current.y+'px';
  },[]);
  React.useEffect(()=>{if(open){clamp();window.addEventListener('resize',clamp);return()=>window.removeEventListener('resize',clamp);}}, [open,clamp]);
  const drag=e=>{
    const p=ref.current;if(!p)return;
    const r=p.getBoundingClientRect(),sx=e.clientX,sy=e.clientY;
    const sr=window.innerWidth-r.right,sb=window.innerHeight-r.bottom;
    const mv=ev=>{off.current={x:sr-(ev.clientX-sx),y:sb-(ev.clientY-sy)};clamp();};
    const up=()=>{window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);};
    window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);
  };
  return(
    <>
      <button onClick={()=>setOpen(o=>!o)} style={{position:'fixed',right:16,bottom:16,zIndex:10000,width:40,height:40,borderRadius:20,border:'1px solid rgba(255,255,255,0.2)',background:'rgba(20,20,30,0.9)',color:'#fff',fontSize:17,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(12px)'}}>⚙</button>
      {open&&(<><style>{TWK_CSS}</style>
        <div ref={ref} className="twk-panel" style={{right:off.current.x,bottom:off.current.y}}>
          <div className="twk-hd" onMouseDown={drag}><b>{title}</b><button className="twk-x" onClick={()=>setOpen(false)}>✕</button></div>
          <div className="twk-body">{children}</div>
        </div></>)}
    </>
  );
}

// ── Excel import (format Yannis - programme de sport.xlsx) ──
function parseYannisExcel(file, onSuccess, onError) {
  const reader = new FileReader();
  reader.onerror = () => onError('Lecture du fichier impossible');
  reader.onload = ev => {
    try {
      if (typeof XLSX === 'undefined') { onError('Librairie Excel non chargée (SheetJS). Recharge la page.'); return; }
      const data = new Uint8Array(ev.target.result);
      const wb = XLSX.read(data, {type:'array', raw:true, cellDates:false});
      if (!wb || !wb.SheetNames || wb.SheetNames.length === 0) { onError('Fichier Excel vide ou illisible'); return; }
      const programs = {};
      const DAYS = ['LUNDI','MARDI','MERCREDI','JEUDI','VENDREDI','SAMEDI','DIMANCHE'];
      const uid = () => Math.random().toString(36).slice(2);

      const norm = s => String(s||'').trim().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');

      const parseRest = str => {
        const s = String(str||'').trim();
        const m = s.match(/^(\d+)'(\d*)/);
        if (!m) return 90;
        return parseInt(m[1])*60 + (m[2] ? parseInt(m[2]) : 0);
      };

      const parseReps = val => {
        if (val === '' || val === null || val === undefined) return null;
        const s = String(val).trim().toUpperCase();
        if (!s || s === '_') return null;
        if (s === 'MAX' || s === 'ECHEC' || s === 'FAILURE') return 'MAX';
        const n = Number(s.replace(',','.'));
        if (!isNaN(n) && isFinite(n)) return n > 200 ? 10 : Math.round(n);
        return s;
      };

      const parseWeight = val => {
        const s = String(val||'').trim();
        if (!s || s === '_') return 0;
        const u = s.toUpperCase();
        if (u === 'PDC' || u === 'PC' || u === 'BW') return 0;
        const m = s.match(/[\d.]+/);
        return m ? parseFloat(m[0]) : 0;
      };

      const isHeaderRow = row => row.some(cell => {
        const s = norm(cell);
        return s === 'jour' || s.startsWith('exerci') || s.startsWith('repeti');
      });

      const isCategoryRow = (row, colJour) => {
        const a = String(row[0]||'').trim();
        if (!a || a === '_') return false;
        const rest = row.slice(1).every(c => !String(c||'').trim() || String(c||'').trim() === '_');
        if (!rest) return false;
        return !DAYS.some(d => a.toUpperCase() === d || a.toUpperCase().startsWith(d+' '));
      };

      wb.SheetNames.forEach(sheetName => {
        const ws = wb.Sheets[sheetName];
        if (!ws || !ws['!ref']) return;
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:'', raw:true});
        if (!rows.length) return;

        let colJour=0, colStyle=1, colExercice=2, colCharge=3;
        let colSeries=6, colReps=7, colRest=8;

        const detectCols = row => {
          row.forEach((cell, i) => {
            const s = norm(cell);
            if (s === 'jour') colJour=i;
            else if (s === 'style') colStyle=i;
            else if (s.startsWith('exerci')) colExercice=i;
            else if (s.includes('charge') || s === 'kg') colCharge=i;
            else if (s.startsWith('serie')) colSeries=i;
            else if (s.startsWith('repeti') || s === 'reps') colReps=i;
            else if (s.includes('repos')) colRest=i;
          });
        };

        const sheetData = {};
        let currentDay = null;
        let currentCategory = '';
        let lastSeriesCount = 3;

        rows.forEach(row => {
          if (!row || row.every(c => !String(c||'').trim())) return;
          if (isHeaderRow(row)) { detectCols(row); return; }
          if (isCategoryRow(row, colJour)) { currentCategory = String(row[0]).trim(); return; }

          const exName = String(row[colExercice]||'').trim();
          if (!exName || exName === '_') return;

          const dayRaw = String(row[colJour]||'').trim().toUpperCase();
          if (DAYS.includes(dayRaw)) { currentDay = dayRaw; lastSeriesCount = 3; }
          if (!currentDay) return;

          if (!sheetData[currentDay]) sheetData[currentDay] = {category:currentCategory, exercises:[]};

          const styleVal = String(row[colStyle]||'').trim().toUpperCase() || 'CLASSIQUE';
          const seriesNum = parseFloat(String(row[colSeries]||'').replace(',','.'));
          const numSets = (!isNaN(seriesNum) && seriesNum > 0) ? Math.round(seriesNum) : lastSeriesCount;
          if (!isNaN(seriesNum) && seriesNum > 0) lastSeriesCount = numSets;

          const weight = parseWeight(row[colCharge]);
          const weightStr = String(row[colCharge]||'').trim();
          const repsVal = parseReps(row[colReps]);
          const repsStr = repsVal === null ? '' : String(repsVal);
          const repsTarget = (repsVal === null || repsVal === 'MAX') ? 10 : repsVal;
          const restStr = String(row[colRest]||'').trim();
          const restSecs = parseRest(restStr);

          sheetData[currentDay].exercises.push({
            id: uid(), name: exName, muscle: currentCategory, style: styleVal,
            rest: restStr, restSeconds: restSecs, weightStr, repsStr,
            sets: Array.from({length:numSets}, () => ({weight, reps:0, done:false, target:repsTarget})),
          });
        });

        if (Object.keys(sheetData).length > 0) programs[sheetName] = sheetData;
      });

      if (!Object.keys(programs).length) { onError('Aucun programme détecté. Vérifie que les feuilles contiennent les colonnes JOUR / EXERCICE / SERIES / REPETITIONS / REPOS et au moins une ligne avec un jour (LUNDI…DIMANCHE).'); return; }
      onSuccess(programs);
    } catch(e) { onError('Excel invalide : ' + (e.message || e)); }
  };
  reader.readAsArrayBuffer(file);
}

function excelExport(workout) {
  const rows = [];
  workout.exercises.forEach(ex => {
    ex.sets.forEach((s, i) => rows.push({
      'Exercice'       : ex.name,
      'Muscle'         : ex.muscle,
      'Série'          : i + 1,
      'Poids (kg)'     : s.weight,
      'Répétitions'    : s.target || s.reps,
      'Reps réalisées' : s.reps,
      'Validé'         : s.done ? 'Oui' : 'Non',
    }));
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  // column widths
  ws['!cols'] = [22,18,8,12,14,15,8].map(w=>({wch:w}));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, workout.name.slice(0,31) || 'Séance');
  XLSX.writeFile(wb, `${workout.name || 'Seance'}.xlsx`);
}

                <button onClick={()=>delEx(ei)} style={{width:34,height:34,borderRadius:10,border:'1px solid rgba(201,117,134,0.3)',background:'rgba(201,117,134,0.08)',color:T.danger,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:2}}>
                  <Icon name="trash" size={15} stroke={T.danger}/>
                </button>
              </div>

              {/* sets header */}
              <div style={{display:'grid',gridTemplateColumns:'28px 1fr 1fr 1fr 32px',gap:6,marginBottom:6,paddingLeft:2}}>
                {['#','Poids (kg)','Reps cible','Reps réelles',''].map((h,i)=>(
                  <div key={i} style={{fontSize:9,color:T.textFaint,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase',textAlign:i>0&&i<4?'center':'left'}}>{h}</div>
                ))}
              </div>

              {/* sets */}
              {ex.sets.map((s,si)=>(
                <div key={si} style={{display:'grid',gridTemplateColumns:'28px 1fr 1fr 1fr 32px',gap:6,alignItems:'center',marginBottom:6,padding:'8px 0',borderTop:'1px solid rgba(255,255,255,0.05)'}}>
                  <div style={{width:24,height:24,borderRadius:7,background:s.done?T.accent:'rgba(255,255,255,0.06)',color:s.done?'#000':T.textDim,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700}}>
                    {s.done?<Icon name="check" size={13} stroke="#000" strokeWidth={2.6}/>:si+1}
                  </div>
                  <input type="number" style={numStyle} value={s.weight} min="0" step="0.5"
                    onChange={e=>updSet(ei,si,{weight:parseFloat(e.target.value)||0})}/>
                  <input type="number" style={numStyle} value={s.target||s.reps} min="0" step="1"
                    onChange={e=>updSet(ei,si,{target:parseInt(e.target.value)||0})}/>
                  <input type="number" style={{...numStyle,color:s.done?T.accent:T.textDim}} value={s.reps} min="0" step="1"
                    onChange={e=>updSet(ei,si,{reps:parseInt(e.target.value)||0})}/>
                  <button onClick={()=>delSet(ei,si)} style={{width:28,height:28,borderRadius:8,border:'none',background:'rgba(255,255,255,0.04)',color:T.textFaint,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <Icon name="x" size={13} stroke={T.textFaint}/>
                  </button>
                </div>
              ))}

              {/* add set */}
              <button onClick={()=>addSet(ei)} style={{width:'100%',marginTop:6,height:34,border:'1px dashed rgba(255,255,255,0.15)',borderRadius:10,background:'transparent',color:T.textDim,fontSize:12,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                <Icon name="plus" size={13} stroke={T.textDim}/>
                Ajouter une série
              </button>
            </GlassCard>
          </div>
        ))}

        {/* add exercise */}
        <button onClick={addEx} style={{width:'100%',height:52,borderRadius:16,border:'1px dashed rgba(217,119,87,0.4)',background:'rgba(217,119,87,0.04)',color:T.accent,fontSize:14,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          <Icon name="plus" size={18} stroke={T.accent}/>
          Ajouter un exercice
        </button>
      </div>
    </div>
  );
}

// ── Session Screen ────────────────────────────────────────

function SessionScreen({workout,onUpdateWorkout,onClose,onImportPrograms,onSaveSession,history,firstName}){
  const[showCelebration,setShowCelebration]=React.useState(false);
  const congratsMsg=React.useMemo(()=>CONGRATS_MESSAGES[Math.floor(Math.random()*CONGRATS_MESSAGES.length)],[]);

  const finishAndClose=()=>{
    if(onSaveSession){
      const totalVolume=exercises.reduce((s,e)=>s+e.sets.filter(x=>x.done).reduce((a,x)=>a+(x.weight||0)*(x.reps||0),0),0);
      if(totalVolume>0){
        onSaveSession({
          date:new Date().toISOString(),
          name:workout.name,
          totalVolume,
          exercises:exercises.map(e=>({
            name:e.name,muscle:e.muscle,
            sets:e.sets.filter(s=>s.done).map(s=>({weight:s.weight,reps:s.reps})),
          })).filter(e=>e.sets.length>0),
        });
      }
    }
    onClose();
  };
  const handleClose=()=>{
    const doneCount=exercises.reduce((s,e)=>s+e.sets.filter(x=>x.done).length,0);
    if(doneCount>0){setShowCelebration(true);} else {onClose();}
  };
  const[exercises,setExercises]=React.useState(()=>workout.exercises.map(e=>({...e,sets:e.sets.map(s=>({...s}))})));
  const[currentEx,setCurrentEx]=React.useState(0);
  const[restSeconds,setRestSeconds]=React.useState(0);
  const[restTotal,setRestTotal]=React.useState(0);
  const[sessionTime,setSessionTime]=React.useState(0);
  const[editMode,setEditMode]=React.useState(false);

  React.useEffect(()=>{const t=setInterval(()=>setSessionTime(s=>s+1),1000);return()=>clearInterval(t);},[]);
  React.useEffect(()=>{if(restSeconds<=0)return;const t=setTimeout(()=>setRestSeconds(s=>s-1),1000);return()=>clearTimeout(t);},[restSeconds]);

  const ex=exercises[currentEx]||exercises[0];
  const totalSets=exercises.reduce((s,e)=>s+e.sets.length,0);
  const doneSets=exercises.reduce((s,e)=>s+e.sets.filter(x=>x.done).length,0);
  const sessionVolume=exercises.reduce((s,e)=>s+e.sets.filter(x=>x.done).reduce((a,x)=>a+x.weight*(x.reps||0),0),0);
  const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;

  const updSet=(ei,si,patch)=>setExercises(prev=>prev.map((e,i)=>i!==ei?e:{...e,sets:e.sets.map((s,j)=>j!==si?s:{...s,...patch})}));

  const validateSet=si=>{
    const rest=ex.restSeconds||90;
    const set=ex.sets[si];
    updSet(currentEx,si,{done:true});
    setRestSeconds(rest);setRestTotal(rest);
  };


  // inline edit helpers
  const numIn=(val,onChange,w=56)=>(
    <input type="number" value={val} min="0" step="0.5" onChange={e=>onChange(parseFloat(e.target.value)||0)}
      style={{width:w,background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.18)',borderRadius:8,color:T.text,fontSize:17,fontWeight:700,padding:'4px 6px',fontFamily:'inherit',textAlign:'center',outline:'none',boxSizing:'border-box'}}/>
  );
  // Stepper compact (−/+ pour ajuster poids ou reps rapidement, plus fluide qu'un clavier numérique)
  const Stepper=({value,onChange,step=1,suffix,target,minus=true,plus=true,disabled})=>(
    <div style={{display:'inline-flex',alignItems:'center',gap:2,background:disabled?'rgba(255,255,255,0.02)':'rgba(255,255,255,0.05)',border:`1px solid ${disabled?'rgba(255,255,255,0.05)':'rgba(255,255,255,0.1)'}`,borderRadius:9,padding:'2px 3px',height:30,opacity:disabled?0.6:1}}>
      {minus&&(
        <button onClick={e=>{e.stopPropagation();onChange(Math.max(0,(parseFloat(value)||0)-step));}} disabled={disabled} style={{width:22,height:22,borderRadius:6,border:'none',background:'transparent',color:T.textDim,cursor:disabled?'default':'pointer',fontSize:15,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',padding:0,lineHeight:1}}>−</button>
      )}
      <input type="number" value={value} min="0" step={step} disabled={disabled} onChange={e=>onChange(parseFloat(e.target.value)||0)}
        style={{width:34,background:'transparent',border:'none',color:T.text,fontSize:14,fontWeight:700,padding:0,fontFamily:'inherit',textAlign:'center',outline:'none',fontVariantNumeric:'tabular-nums'}}/>
      {target&&<span style={{fontSize:10,color:T.textFaint,fontWeight:600,marginLeft:-2,marginRight:1}}>/{target}</span>}
      {suffix&&<span style={{fontSize:9,color:T.textFaint,fontWeight:600,marginRight:1}}>{suffix}</span>}
      {plus&&(
        <button onClick={e=>{e.stopPropagation();onChange((parseFloat(value)||0)+step);}} disabled={disabled} style={{width:22,height:22,borderRadius:6,border:'none',background:'transparent',color:T.textDim,cursor:disabled?'default':'pointer',fontSize:15,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',padding:0,lineHeight:1}}>+</button>
      )}
    </div>
  );

  if(editMode){
    const localW={...workout,exercises};
    return(
      <WorkoutEditorScreen
        workout={localW}
        onChange={w=>{setExercises(w.exercises);onUpdateWorkout(w);}}
        onClose={()=>setEditMode(false)}
        onImportPrograms={onImportPrograms}
      />
    );
  }

  if(showCelebration){
    const totalVolume=exercises.reduce((s,e)=>s+e.sets.filter(x=>x.done).reduce((a,x)=>a+(x.weight||0)*(x.reps||0),0),0);
    const confettiColors=['#d97757','#c97586','#8e6cb6','#7ca8c4','#7cc4a1','#c2a042'];
    return(
      <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,position:'relative',overflow:'hidden',color:T.text}}>
        {/* confetti */}
        <div style={{position:'absolute',inset:0,pointerEvents:'none',overflow:'hidden'}}>
          {Array.from({length:24}).map((_,i)=>{
            const c=confettiColors[i%confettiColors.length];
            const left=(i*4.3)%100;
            const delay=(i*0.15)%2.5;
            const dur=2.4+(i%5)*0.3;
            return <div key={i} style={{position:'absolute',top:-10,left:`${left}%`,width:8,height:14,background:c,borderRadius:2,animation:`confettiFall ${dur}s linear ${delay}s infinite`,boxShadow:`0 0 8px ${c}`}}/>;
          })}
        </div>
        <div style={{animation:'celebrationPop 0.6s cubic-bezier(.34,1.56,.64,1)',textAlign:'center',position:'relative',zIndex:1}}>
          <div style={{fontSize:72,marginBottom:8}}>🏆</div>
          <div style={{fontSize:11,color:T.good,fontWeight:700,letterSpacing:0.6,textTransform:'uppercase',marginBottom:6}}>Séance terminée</div>
          <div style={{fontSize:34,fontWeight:700,letterSpacing:-1,lineHeight:1.1,marginBottom:10}}>
            <HoloText>BRAVO !</HoloText>
          </div>
          <div style={{fontSize:14,color:T.textDim,maxWidth:300,margin:'0 auto 24px',lineHeight:1.5}}>{congratsMsg}</div>
          <div style={{display:'flex',gap:14,justifyContent:'center',marginBottom:28}}>
            <div>
              <div style={{fontSize:10,color:T.textFaint,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase'}}>Durée</div>
              <div style={{fontSize:22,fontWeight:700,fontVariantNumeric:'tabular-nums'}}>{fmt(sessionTime)}</div>
            </div>
            <div style={{width:1,background:'rgba(255,255,255,0.1)'}}/>
            <div>
              <div style={{fontSize:10,color:T.textFaint,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase'}}>Séries</div>
              <div style={{fontSize:22,fontWeight:700,fontVariantNumeric:'tabular-nums'}}>{doneSets}<span style={{fontSize:13,color:T.textDim,fontWeight:500}}>/{totalSets}</span></div>
            </div>
            <div style={{width:1,background:'rgba(255,255,255,0.1)'}}/>
            <div>
              <div style={{fontSize:10,color:T.textFaint,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase'}}>Volume</div>
              <div style={{fontSize:22,fontWeight:700,fontVariantNumeric:'tabular-nums'}}>{Math.round(totalVolume).toLocaleString('fr-FR')}<span style={{fontSize:11,color:T.textDim,fontWeight:500,marginLeft:2}}>kg</span></div>
            </div>
          </div>
          <div style={{display:'flex',gap:10,justifyContent:'center'}}>
            <button onClick={()=>setShowCelebration(false)} style={{height:46,padding:'0 18px',borderRadius:14,border:'1px solid rgba(255,255,255,0.12)',background:'rgba(255,255,255,0.04)',color:T.text,fontSize:13,fontWeight:600,cursor:'pointer'}}>Continuer</button>
            <button onClick={finishAndClose} style={{height:46,padding:'0 26px',borderRadius:14,border:'none',background:'linear-gradient(135deg,#d97757,#c97586)',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',boxShadow:'0 8px 24px rgba(217,119,87,0.4)',display:'flex',alignItems:'center',gap:6}}>
              <Icon name="check" size={16} stroke="#fff" strokeWidth={2.4}/> Terminer
            </button>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div style={{color:T.text,height:'100%',display:'flex',flexDirection:'column',position:'relative',overflow:'hidden'}}>
      {/* Image illustrative — bandeau borné en haut (s'adapte à la taille du téléphone, plus jamais trop gros) */}
      {(()=>{const u=exerciseImageURL(ex.name);return u?(
        <div key={ex.id||ex.name} style={{position:'absolute',top:0,left:0,right:0,height:'clamp(140px, 22vh, 200px)',zIndex:0,overflow:'hidden',pointerEvents:'none'}}>
          <img src={u} alt="" style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:'center 28%',filter:'saturate(1.05) contrast(1.05) brightness(0.92)',animation:'imgFade 0.45s ease'}} onError={e=>{e.currentTarget.style.display='none';}}/>
          {/* Fondu doux vers la couleur de fond, plus marqué en bas pour la transition vers la carte */}
          <div style={{position:'absolute',inset:0,background:`linear-gradient(180deg,rgba(6,6,10,0.18) 0%,rgba(6,6,10,0.10) 40%,rgba(6,6,10,0.60) 80%,${T.bg} 100%)`}}/>
        </div>
      ):null;})()}
      {/* header */}
      <div style={{padding:'6px 18px 12px',background:`linear-gradient(180deg,${T.bg} 60%,transparent)`,position:'relative',zIndex:5}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:6}}>
          <button onClick={handleClose} style={{width:38,height:38,borderRadius:19,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.text,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Icon name="chevronLeft" size={18}/>
          </button>
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:11,color:T.textDim,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase'}}>{workout.name}</div>
            <div style={{fontSize:15,fontWeight:700,fontVariantNumeric:'tabular-nums',letterSpacing:-0.2,marginTop:1}}>{fmt(sessionTime)}</div>
          </div>
          <button onClick={()=>setEditMode(true)} style={{width:38,height:38,borderRadius:19,border:'1px solid rgba(217,119,87,0.35)',background:T.accentSoft,color:T.accent,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Icon name="edit" size={16} stroke={T.accent}/>
          </button>
        </div>
        {/* progress dots */}
        <div style={{display:'flex',gap:4,marginTop:14}}>
          {exercises.map((e,i)=>{
            const done=e.sets.every(s=>s.done);const active=i===currentEx;const partial=e.sets.some(s=>s.done)&&!done;
            return <div key={i} style={{flex:1,height:3,borderRadius:2,background:done?T.accent:active?'transparent':partial?'rgba(217,119,87,0.4)':'rgba(255,255,255,0.08)',backgroundImage:active?HOLO.irisHorizon:'none',backgroundSize:'200% 100%',animation:active?'holoText 4s linear infinite':'none'}}/>;
          })}
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:8,fontSize:11,color:T.textDim,fontWeight:600}}>
          <span>Exercice {currentEx+1}/{exercises.length}</span>
          <span>{doneSets}/{totalSets} séries · {Math.round(sessionVolume).toLocaleString('fr-FR')} kg</span>
        </div>
      </div>

      {/* content — l'image apparaît au-dessus (espace réservé), puis la carte sets glisse par-dessus avec un fond plus dense */}
      <div style={{flex:1,overflow:'auto',padding:'0 14px 110px',position:'relative',zIndex:1}}>
        {/* Espace pour que l'image de l'exercice reste visible en haut */}
        {(()=>{const u=exerciseImageURL(ex.name);return u?(
          <div style={{height:'clamp(115px, 18vh, 170px)',display:'flex',alignItems:'flex-start',justifyContent:'flex-start',padding:'6px 2px'}}>
            <div style={{display:'inline-flex',alignItems:'center',gap:6,padding:'5px 11px',borderRadius:999,background:'rgba(0,0,0,0.55)',backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)',border:'1px solid rgba(255,255,255,0.12)'}}>
              <span style={{width:6,height:6,borderRadius:3,background:T.accent,boxShadow:`0 0 8px ${T.accent}`}}/>
              <span style={{fontSize:10,color:'#fff',fontWeight:700,letterSpacing:0.4,textTransform:'uppercase'}}>{ex.muscle}</span>
            </div>
          </div>
        ):null;})()}
        <div style={{position:'relative',borderRadius:18,marginBottom:10,background:'linear-gradient(180deg,rgba(14,14,20,0.78),rgba(14,14,20,0.92))',backdropFilter:'blur(18px)',WebkitBackdropFilter:'blur(18px)',border:'1px solid rgba(255,255,255,0.08)',boxShadow:'0 -8px 28px rgba(0,0,0,0.4),0 12px 30px rgba(0,0,0,0.4)',overflow:'hidden'}}>
          <div style={{padding:'12px 14px 14px',position:'relative'}}>
            <div style={{position:'relative'}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}>
                <div style={{fontSize:20,fontWeight:700,letterSpacing:-0.4,lineHeight:1.1,flex:1,minWidth:0}}>{ex.name}</div>
                {restSeconds>0&&(
                  <button onClick={()=>setRestSeconds(0)} title="Passer le repos" style={{display:'flex',alignItems:'center',gap:7,padding:'5px 11px 5px 7px',borderRadius:999,border:'1px solid rgba(217,119,87,0.4)',background:'linear-gradient(135deg,rgba(217,119,87,0.22),rgba(201,117,134,0.12))',color:T.accent,cursor:'pointer',flexShrink:0,boxShadow:'0 4px 14px rgba(217,119,87,0.25)',animation:'celebrationPop 0.35s ease'}}>
                    <svg width="22" height="22" viewBox="0 0 24 24" style={{transform:'rotate(-90deg)',flexShrink:0}}>
                      <circle cx="12" cy="12" r="10" fill="none" stroke="rgba(255,255,255,0.14)" strokeWidth="2.6"/>
                      <circle cx="12" cy="12" r="10" fill="none" stroke="#d97757" strokeWidth="2.6" strokeLinecap="round"
                        strokeDasharray={2*Math.PI*10} strokeDashoffset={2*Math.PI*10*(1-(restTotal-restSeconds)/restTotal)}
                        style={{transition:'stroke-dashoffset 1s linear',filter:'drop-shadow(0 0 4px rgba(217,119,87,0.7))'}}/>
                    </svg>
                    <div style={{display:'flex',flexDirection:'column',alignItems:'flex-start',lineHeight:1}}>
                      <span style={{fontSize:8,color:T.textDim,fontWeight:700,letterSpacing:0.5,textTransform:'uppercase'}}>Repos</span>
                      <span style={{fontSize:15,fontWeight:700,fontVariantNumeric:'tabular-nums',letterSpacing:0.3,marginTop:1}}>{fmt(restSeconds)}</span>
                    </div>
                  </button>
                )}
              </div>


              {/* set rows — compact horizontal avec steppers tactiles */}
              <div style={{display:'flex',flexDirection:'column',gap:5}}>
                {ex.sets.map((s,i)=>{
                  const isNext=!s.done&&ex.sets.findIndex(x=>!x.done)===i;
                  const repsDisplay=s.reps||(isNext?'':s.target||'');
                  return(
                    <div key={i}>
                      <div style={{display:'flex',alignItems:'center',gap:6,padding:'4px 5px 4px 8px',borderRadius:12,background:s.done?'rgba(217,119,87,0.07)':isNext?'rgba(217,119,87,0.04)':'rgba(255,255,255,0.025)',border:`1px solid ${s.done?'rgba(217,119,87,0.18)':isNext?'rgba(217,119,87,0.32)':'rgba(255,255,255,0.06)'}`,transition:'all 0.25s ease'}}>
                        {/* Numéro de set */}
                        <div style={{width:24,height:24,borderRadius:7,background:s.done?T.accent:isNext?'rgba(217,119,87,0.18)':'rgba(255,255,255,0.05)',color:s.done?'#fff':isNext?T.accent:T.textFaint,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,flexShrink:0,fontVariantNumeric:'tabular-nums'}}>
                          {s.done?<Icon name="check" size={12} stroke="#fff" strokeWidth={2.8}/>:i+1}
                        </div>
                        {/* Poids */}
                        <Stepper value={s.weight} onChange={v=>updSet(currentEx,i,{weight:v})} step={2.5} suffix="kg" disabled={s.done}/>
                        <span style={{color:T.textFaint,fontWeight:600,fontSize:11}}>×</span>
                        {/* Reps */}
                        <Stepper value={repsDisplay} onChange={v=>updSet(currentEx,i,{reps:v})} step={1} target={s.target} disabled={s.done}/>
                        <div style={{flex:1}}/>
                        {/* Action droite : check / volume */}
                        {!s.done?(
                          <button onClick={()=>validateSet(i)} style={{width:38,height:34,borderRadius:10,border:'none',cursor:'pointer',background:isNext?'linear-gradient(135deg,#d97757,#c97586)':'rgba(255,255,255,0.06)',color:isNext?'#fff':T.textFaint,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,boxShadow:isNext?'0 4px 14px rgba(217,119,87,0.4)':'none',transition:'transform 0.15s ease'}} onMouseDown={e=>e.currentTarget.style.transform='scale(0.92)'} onMouseUp={e=>e.currentTarget.style.transform='scale(1)'} onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}>
                            <Icon name="check" size={16} stroke={isNext?'#fff':T.textFaint} strokeWidth={isNext?2.8:2}/>
                          </button>
                        ):(
                          <button onClick={()=>updSet(currentEx,i,{done:false})} title="Annuler" style={{minWidth:42,height:32,padding:'0 6px',textAlign:'center',background:'transparent',border:'1px solid rgba(217,119,87,0.18)',borderRadius:9,color:T.accent,fontWeight:700,fontSize:10,cursor:'pointer',flexShrink:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',lineHeight:1}}>
                            <span style={{fontSize:11,fontVariantNumeric:'tabular-nums'}}>{Math.round(s.weight*(s.reps||0))}</span>
                            <span style={{fontSize:7,opacity:0.65,fontWeight:600,marginTop:1}}>kg</span>
                          </button>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>


              {/* add set */}
              <button onClick={()=>{
                const last=ex.sets[ex.sets.length-1];
                updSet(currentEx,ex.sets.length,undefined);
                setExercises(prev=>prev.map((e,i)=>i!==currentEx?e:{...e,sets:[...e.sets,{weight:last?.weight||20,reps:0,done:false,target:last?.target||10}]}));

function StatBox({label,value,suffix}){
  return(<div><div style={{fontSize:10,color:T.textDim,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase'}}>{label}</div><div style={{fontSize:18,fontWeight:700,letterSpacing:-0.3,marginTop:2}}>{value}{suffix&&<span style={{fontSize:11,color:T.textDim,marginLeft:2,fontWeight:500}}>{suffix}</span>}</div></div>);
}

function DayCell({day,state,active}){
  const isDone=state===1,isToday=state===2||active,isMissed=state===0;
  return(<div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6,flex:1}}>
    <div style={{fontSize:10,color:T.textFaint,fontWeight:600,letterSpacing:0.4}}>{day}</div>

      {isDone&&<Icon name="check" size={16} stroke={T.accent} strokeWidth={2.4}/>}

      {isMissed&&<Icon name="x" size={14} stroke={T.textFaint} strokeWidth={2}/>}
    </div>
  </div>);
}

function MiniBarChart({data,todayIdx}){
  const max=Math.max(...data,1);
  const today=todayIdx!=null?todayIdx:(new Date().getDay()+6)%7;
  return(<div style={{display:'flex',alignItems:'flex-end',gap:6,height:60,marginTop:12}}>
    {data.map((v,i)=>{
      const isFuture=i>today;
      const isToday=i===today;
      const bg=v===0?'rgba(255,255,255,0.06)':isToday?HOLO.irisHorizon:'linear-gradient(180deg,rgba(217,119,87,0.7),rgba(217,119,87,0.25))';
      return(
        <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4,height:'100%',opacity:isFuture?0.3:1}}>
          <div style={{flex:1,width:'100%',display:'flex',alignItems:'flex-end'}}>
            <div style={{width:'100%',height:`${Math.max(4,(v/max)*100)}%`,background:bg,borderRadius:5}}/>
          </div>
          <div style={{fontSize:9,color:isToday?T.accent:T.textFaint,fontWeight:isToday?700:600}}>{['L','M','M','J','V','S','D'][i]}</div>
        </div>
      );
    })}
  </div>);
}

    parseYannisExcel(file,
      programs=>{
        if(onImportPrograms)onImportPrograms(programs);
        const nS=Object.keys(programs).length;
        const nD=Object.values(programs).reduce((s,d)=>s+Object.keys(d).length,0);

// ── Weight Chart ──────────────────────────────────────────
function WeightChartSection({userId}){
  const[logs,setLogs]=React.useState([]);
  const[newW,setNewW]=React.useState('');
  const[loading,setLoading]=React.useState(true);

  const load=React.useCallback(async()=>{
    try{const r=await apiCall('/api/weight');setLogs(r.logs||[]);}catch{}finally{setLoading(false);}
  },[]);

  React.useEffect(()=>{load();},[load]);

  const add=async()=>{
    const w=parseFloat(newW);
    if(!w||w<20||w>300)return;
    await apiCall('/api/weight',{method:'POST',body:{weight:w,date:Date.now()}});
    setNewW('');
    load();
  };

  const del=async(id)=>{
    await apiCall('/api/weight/'+id,{method:'DELETE'});
    load();
  };

  if(loading)return null;

  const sorted=[...logs].sort((a,b)=>a.date-b.date);
  const last=sorted[sorted.length-1];
  const first=sorted[0];
  const diff=last&&first&&last!==first?+(last.weight-first.weight).toFixed(1):null;

  // SVG line chart
  const W=300,H=90,pad=8;
  let chart=null;
  if(sorted.length>1){
    const weights=sorted.map(l=>l.weight);
    const minW=Math.min(...weights),maxW=Math.max(...weights);
    const range=maxW-minW||1;
    const pts=sorted.map((l,i)=>{
      const x=pad+(i/(sorted.length-1))*(W-2*pad);
      const y=H-pad-(l.weight-minW)/range*(H-2*pad);
      return `${x},${y}`;
    });
    const path=`M ${pts.join(' L ')}`;
    chart=(
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:H,display:'block',marginBottom:8}}>
        <defs>
          <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#d97757" stopOpacity="0.3"/>
            <stop offset="100%" stopColor="#d97757" stopOpacity="0"/>
          </linearGradient>
        </defs>
        <path d={`${path} L ${W-pad},${H} L ${pad},${H} Z`} fill="url(#wg)"/>
        <path d={path} fill="none" stroke="#d97757" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        {sorted.map((l,i)=>{
          const x=pad+(i/(sorted.length-1))*(W-2*pad);
          const y=H-pad-(l.weight-minW)/range*(H-2*pad);
          return <circle key={l.id} cx={x} cy={y} r="3" fill="#d97757"/>;
        })}
      </svg>
    );
  }

  return(
    <div style={{marginBottom:18}}>
      <div style={{fontSize:9,color:T.textFaint,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase',marginBottom:8,paddingLeft:2}}>Suivi du poids</div>
      <GlassCard padding={14}>
        {/* Current + diff */}
        <div style={{display:'flex',alignItems:'baseline',gap:8,marginBottom:10}}>
          <span style={{fontSize:28,fontWeight:700,letterSpacing:-1}}>{last?last.weight:'-'}</span>
          <span style={{fontSize:13,color:T.textDim}}>kg</span>
          {diff!==null&&<span style={{fontSize:12,fontWeight:600,color:diff<0?T.good:diff>0?T.accent:T.textDim,marginLeft:4}}>{diff>0?'+':''}{diff} kg</span>}
        </div>
        {/* Chart */}
        {chart}
        {sorted.length===0&&<div style={{fontSize:12,color:T.textFaint,textAlign:'center',padding:'12px 0',fontStyle:'italic'}}>Aucune donnée — ajoute ton poids ci-dessous</div>}
        {/* Add entry */}
        <div style={{display:'flex',gap:8,marginTop:8}}>
          <div style={{position:'relative',flex:1}}>
            <input type="number" inputMode="decimal" value={newW} onChange={e=>setNewW(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()} placeholder="Ex : 84.5" style={{width:'100%',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.12)',borderRadius:9,color:T.text,fontSize:14,fontWeight:600,padding:'7px 30px 7px 10px',fontFamily:'inherit',outline:'none',boxSizing:'border-box'}}/>
            <span style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',fontSize:10,color:T.textFaint}}>kg</span>
          </div>
          <button onClick={add} style={{height:36,padding:'0 14px',borderRadius:9,border:'none',background:T.accentSoft,color:T.accent,fontSize:12,fontWeight:700,cursor:'pointer'}}>Ajouter</button>
        </div>
        {/* History list (last 5) */}
        {sorted.length>0&&(
          <div style={{marginTop:10,display:'flex',flexDirection:'column',gap:4}}>
            {[...sorted].reverse().slice(0,5).map(l=>(
              <div key={l.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'4px 6px',borderRadius:7,background:'rgba(255,255,255,0.025)'}}>
                <span style={{fontSize:11,color:T.textDim}}>{new Date(l.date).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</span>
                <span style={{fontSize:13,fontWeight:600}}>{l.weight} kg</span>
                <button onClick={()=>del(l.id)} style={{border:'none',background:'transparent',color:T.textFaint,cursor:'pointer',fontSize:14,padding:'0 2px',lineHeight:1}}>×</button>
              </div>
            ))}
          </div>
        )}
      </GlassCard>
    </div>
  );
}

// ── Calendar View ─────────────────────────────────────────
function CalendarView({history}){
  const now=new Date();
  const[year,setYear]=React.useState(now.getFullYear());
  const[month,setMonth]=React.useState(now.getMonth());

  const sessionByDay=React.useMemo(()=>{
    const m={};
    history.forEach(h=>{
      const d=new Date(h.date);
      if(d.getFullYear()===year&&d.getMonth()===month){
        const key=d.getDate();
        if(!m[key])m[key]=[];
        m[key].push(h);
      }
    });
    return m;
  },[history,year,month]);

  const firstDay=new Date(year,month,1).getDay();
  const offset=(firstDay+6)%7; // Mon=0
  const daysInMonth=new Date(year,month+1,0).getDate();
  const cells=Array(offset).fill(null).concat(Array.from({length:daysInMonth},(_,i)=>i+1));
  while(cells.length%7!==0)cells.push(null);

  const MOIS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const JOURS=['L','M','M','J','V','S','D'];

  const prev=()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);};
  const next=()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);};

  const todayDay=now.getFullYear()===year&&now.getMonth()===month?now.getDate():null;

  return(
    <div style={{marginBottom:18}}>
      <div style={{fontSize:9,color:T.textFaint,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase',marginBottom:8,paddingLeft:2}}>Calendrier</div>
      <GlassCard padding={12}>
        {/* Nav */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <button onClick={prev} style={{width:28,height:28,borderRadius:7,border:'1px solid '+T.border,background:'rgba(255,255,255,0.03)',color:T.textDim,cursor:'pointer',fontSize:14}}>‹</button>
          <span style={{fontSize:13,fontWeight:700}}>{MOIS[month]} {year}</span>
          <button onClick={next} style={{width:28,height:28,borderRadius:7,border:'1px solid '+T.border,background:'rgba(255,255,255,0.03)',color:T.textDim,cursor:'pointer',fontSize:14}}>›</button>
        </div>
        {/* Day headers */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3,marginBottom:4}}>
          {JOURS.map((j,i)=><div key={i} style={{textAlign:'center',fontSize:9,color:T.textFaint,fontWeight:600}}>{j}</div>)}
        </div>
        {/* Days grid */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}}>
          {cells.map((d,i)=>{
            if(!d)return<div key={i}/>;
            const sessions=sessionByDay[d]||[];
            const hasSession=sessions.length>0;
            const isToday=d===todayDay;
            return(
              <div key={i} title={hasSession?sessions.map(s=>s.name||'Séance').join(', '):''}
                style={{aspectRatio:'1',borderRadius:7,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:hasSession?'rgba(217,119,87,0.18)':isToday?'rgba(255,255,255,0.06)':'rgba(255,255,255,0.025)',border:isToday?`1px solid ${T.accent}`:'1px solid transparent',cursor:hasSession?'default':'default'}}>
                <span style={{fontSize:11,fontWeight:hasSession||isToday?700:400,color:hasSession?T.accent:isToday?T.text:T.textDim}}>{d}</span>
                {hasSession&&<div style={{width:4,height:4,borderRadius:2,background:T.accent,marginTop:1}}/>}
              </div>
            );
          })}
        </div>
        {/* Legend */}
        <div style={{display:'flex',alignItems:'center',gap:6,marginTop:10,paddingTop:8,borderTop:'1px solid rgba(255,255,255,0.05)'}}>
          <div style={{width:10,height:10,borderRadius:3,background:'rgba(217,119,87,0.18)',border:'1px solid transparent'}}/>
          <span style={{fontSize:10,color:T.textFaint}}>Séance effectuée</span>
        </div>
      </GlassCard>
    </div>
  );
}

// ── Photo Gallery ─────────────────────────────────────────
function PhotoGallery({readOnly,userId}){
  const[photos,setPhotos]=React.useState([]);
  const[loading,setLoading]=React.useState(true);
  const[selected,setSelected]=React.useState(null);
  const[pending,setPending]=React.useState(null); // {dataUrl, note}
  const fileRef=React.useRef(null);

  const url=readOnly&&userId?'/api/coach/athletes/'+userId+'/photos':'/api/photos';

  const load=React.useCallback(async()=>{
    try{const r=await apiCall(url);setPhotos(r.photos||[]);}catch{}finally{setLoading(false);}
  },[url]);

  React.useEffect(()=>{load();},[load]);

  const[uploading,setUploading]=React.useState(false);

  const handleFile=async(e)=>{
    const file=e.target.files[0];
    e.target.value='';
    if(!file)return;
    // Compress via canvas before upload
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const maxDim=1200;
        const scale=Math.min(1,maxDim/Math.max(img.width,img.height));
        canvas.width=img.width*scale;canvas.height=img.height*scale;
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        canvas.toBlob(blob=>{
          // Store compressed file as dataUrl preview for the note modal
          const fr=new FileReader();
          fr.onload=ev2=>setPending({file:blob,preview:ev2.target.result,note:''});
          fr.readAsDataURL(blob);
        },'image/jpeg',0.82);
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  const confirmUpload=async()=>{
    if(!pending||uploading)return;
    setUploading(true);
    try{
      // 1. Upload fichier → Cloudinary (ou base64 fallback)
      const fd=new FormData();
      fd.append('file',pending.file,'photo.jpg');
      const token=localStorage.getItem('pa_token');
      const upRes=await fetch((typeof API_BASE!=='undefined'&&API_BASE?API_BASE:'')+'/api/upload',{method:'POST',headers:token?{Authorization:'Bearer '+token}:{},credentials:'include',body:fd});
      const upJson=await upRes.json();
      if(!upRes.ok)throw new Error(upJson.error||'upload_failed');
      // 2. Enregistre la photo (URL Cloudinary ou base64)
      await apiCall('/api/photos',{method:'POST',body:{url:upJson.url,note:pending.note,date:Date.now()}});
      load();setPending(null);
    }catch(err){
      if(err.message==='photo_limit_reached')alert('Album plein (50 photos max). Supprime des photos pour en ajouter.');
      else alert('Erreur upload: '+(err.message||err));
    }finally{setUploading(false);}
  };

  const del=async(id)=>{
    if(!confirm('Supprimer cette photo ?'))return;
    await apiCall('/api/photos/'+id,{method:'DELETE'});
    setSelected(null);
    load();
  };

  if(loading)return null;

  return(
    <div style={{marginBottom:18}}>
      {/* Modale confirmation upload avec note */}
      {pending&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:1100,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
          <div style={{width:'100%',maxWidth:360,background:'rgba(24,24,32,0.98)',borderRadius:20,border:'1px solid rgba(255,255,255,0.1)',padding:20,display:'flex',flexDirection:'column',gap:14}}>
            <div style={{fontSize:15,fontWeight:700,color:T.text}}>Ajouter une note</div>
            <img src={pending.preview} alt="" style={{width:'100%',borderRadius:12,objectFit:'cover',maxHeight:200}}/>
            <input value={pending.note} onChange={e=>setPending(p=>({...p,note:e.target.value}))} placeholder="Note optionnelle (ex: Semaine 4)" style={{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.12)',borderRadius:10,color:T.text,fontSize:13,padding:'9px 12px',fontFamily:'inherit',outline:'none'}}/>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setPending(null)} style={{flex:1,height:40,borderRadius:11,border:'1px solid rgba(255,255,255,0.1)',background:'transparent',color:T.textDim,fontSize:13,fontWeight:600,cursor:'pointer'}}>Annuler</button>
              <button onClick={confirmUpload} disabled={uploading} style={{flex:2,height:40,borderRadius:11,border:'none',background:'linear-gradient(135deg,#d97757,#c97586)',color:'#fff',fontSize:13,fontWeight:700,cursor:uploading?'default':'pointer',opacity:uploading?0.7:1}}>{uploading?'Upload…':'Publier'}</button>
            </div>
          </div>
        </div>
      )}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8,paddingLeft:2}}>
        <div style={{fontSize:9,color:T.textFaint,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase'}}>Photos de progression</div>
        {!readOnly&&<button onClick={()=>fileRef.current.click()} style={{height:26,padding:'0 10px',borderRadius:7,border:'1px solid rgba(217,119,87,0.3)',background:'rgba(217,119,87,0.06)',color:T.accent,fontSize:10,fontWeight:700,cursor:'pointer'}}>+ Photo</button>}
      </div>
      {!readOnly&&<input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleFile}/>}
      {photos.length===0&&<div style={{fontSize:12,color:T.textFaint,textAlign:'center',padding:'16px',fontStyle:'italic',background:'rgba(255,255,255,0.02)',borderRadius:12,border:'1px solid rgba(255,255,255,0.05)'}}>{readOnly?'Aucune photo partagée':'Ajoute ta première photo de progression'}</div>}
      {photos.length>0&&(
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6}}>
          {photos.map(p=>(
            <div key={p.id} onClick={()=>setSelected(p)} style={{aspectRatio:'1',borderRadius:10,overflow:'hidden',cursor:'pointer',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)'}}>
              <img src={p.url||p.dataUrl} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
            </div>
          ))}
        </div>
      )}
      {/* Lightbox */}
      {selected&&(
        <div onClick={()=>setSelected(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.88)',zIndex:1000,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:20}}>
          <img src={selected.url||selected.dataUrl} alt="" onClick={e=>e.stopPropagation()} style={{maxWidth:'100%',maxHeight:'70vh',borderRadius:14,objectFit:'contain'}}/>
          <div style={{marginTop:10,fontSize:12,color:'rgba(255,255,255,0.5)',textAlign:'center'}}>
            {new Date(selected.date).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})}
          </div>
          {selected.note&&<div style={{fontSize:13,color:'rgba(255,255,255,0.75)',textAlign:'center',marginTop:4,fontStyle:'italic'}}>"{selected.note}"</div>}
          {!readOnly&&<button onClick={e=>{e.stopPropagation();del(selected.id);}} style={{marginTop:12,height:34,padding:'0 16px',borderRadius:9,border:'1px solid rgba(201,117,134,0.3)',background:'rgba(201,117,134,0.08)',color:T.danger,fontSize:12,fontWeight:600,cursor:'pointer'}}>Supprimer</button>}
        </div>
      )}
    </div>
  );
}

// ── Messages Screen ───────────────────────────────────────
function MessagesScreen({authUser}){
  const[partners,setPartners]=React.useState([]);
  const[selected,setSelected]=React.useState(null);
  const[messages,setMessages]=React.useState([]);
  const[text,setText]=React.useState('');
  const[unread,setUnread]=React.useState({});
  const bottomRef=React.useRef(null);
  const selectedRef=React.useRef(null);
  selectedRef.current=selected;

  // Own socket connection for real-time messages
  React.useEffect(()=>{
    if(typeof io==='undefined')return;
    const token=localStorage.getItem('pa_token');
    if(!token)return;
    const s=io(API_BASE||undefined,{auth:{token},transports:['websocket','polling']});
    s.on('new-message',({from,msg})=>{
      const sel=selectedRef.current;
      if(sel&&(from===sel.id||msg.senderId===authUser.id)){
        setMessages(m=>[...m.filter(x=>x.id!==msg.id),msg].sort((a,b)=>a.createdAt-b.createdAt));
      }else{
        setUnread(u=>({...u,[from]:(u[from]||0)+1}));
      }
    });
    return()=>s.disconnect();
  },[authUser.id]);

  // Build partner list
  React.useEffect(()=>{
    const load=async()=>{
      try{
        if(authUser.role==='athlete'){
          const coach=await apiCall('/api/my-coach').catch(()=>null);
          if(coach)setPartners([coach]);
        }else if(authUser.role==='coach'){
          const r=await apiCall('/api/coach/athletes');
          setPartners((Array.isArray(r)?r:(r.athletes||[])).filter(a=>a.status==='active'));
        }
      }catch{}
    };
    load();
  },[authUser]);

  // Load + poll messages when partner selected
  React.useEffect(()=>{
    if(!selected)return;
    const load=()=>apiCall('/api/messages/'+selected.id).then(r=>setMessages(r.messages||[])).catch(()=>{});
    load();
    setUnread(u=>({...u,[selected.id]:0}));
    const interval=setInterval(load,3000);
    return()=>clearInterval(interval);
  },[selected?.id]);

  // Scroll to bottom
  React.useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'});},[messages]);

  const send=async()=>{
    if(!text.trim()||!selected)return;
    const t=text.trim();
    setText('');
    try{
      const r=await apiCall('/api/messages/'+selected.id,{method:'POST',body:{text:t}});
      // Optimistic update in case socket is slow
      if(r.msg)setMessages(m=>[...m.filter(x=>x.id!==r.msg.id),r.msg].sort((a,b)=>a.createdAt-b.createdAt));
    }catch(e){setText(t);alert(e.message);}
  };

  const fmtTime=ts=>new Date(ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  const fmtDate=ts=>new Date(ts).toLocaleDateString('fr-FR',{day:'numeric',month:'short'});

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',color:T.text}}>
      {selected?(
        <>
          {/* Header */}
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 16px',borderBottom:'1px solid rgba(255,255,255,0.07)',flexShrink:0}}>
            <button onClick={()=>setSelected(null)} style={{width:32,height:32,borderRadius:10,border:'1px solid '+T.border,background:'rgba(255,255,255,0.04)',color:T.textDim,cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>‹</button>
            <div style={{width:32,height:32,borderRadius:16,background:'linear-gradient(135deg,#d97757,#c97586)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'#fff',flexShrink:0}}>{(selected.firstName?.[0]||selected.email?.[0]||'?').toUpperCase()}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600}}>{selected.firstName||selected.email.split('@')[0]}</div>
              <div style={{fontSize:10,color:T.textFaint}}>{selected.role==='coach'?'Coach':'Athlète'}</div>
            </div>
          </div>
          {/* Messages */}
          <div style={{flex:1,overflow:'auto',padding:'12px 14px',display:'flex',flexDirection:'column',gap:8}}>
            {messages.length===0&&<div style={{textAlign:'center',fontSize:12,color:T.textFaint,marginTop:40,fontStyle:'italic'}}>Aucun message — dis bonjour 👋</div>}
            {messages.map((m,i)=>{
              const isMe=m.senderId===authUser.id;
              const showDate=i===0||fmtDate(messages[i-1].createdAt)!==fmtDate(m.createdAt);
              return(
                <React.Fragment key={m.id}>
                  {showDate&&<div style={{textAlign:'center',fontSize:10,color:T.textFaint,margin:'4px 0'}}>{fmtDate(m.createdAt)}</div>}
                  <div style={{display:'flex',flexDirection:'column',alignItems:isMe?'flex-end':'flex-start'}}>

function StatsScreen({history,profile}){
  const now=Date.now();
  const dayMs=24*60*60*1000;

  // Last 7 days volume (Mon-Sun)
  const todayDow=(new Date().getDay()+6)%7;
  const weekData=[0,0,0,0,0,0,0];
  history.forEach(h=>{
    const d=new Date(h.date);
    const diff=Math.floor((now-d.getTime())/dayMs);
    if(diff>=0&&diff<7){
      const idx=(todayDow-diff+7)%7;
      weekData[idx]+=h.totalVolume||0;
    }
  });
  const dayLabels=['L','M','M','J','V','S','D'];

  // Last 30 days totals
  const last30=history.filter(h=>now-new Date(h.date).getTime()<30*dayMs);
  const totalVol30=last30.reduce((s,h)=>s+(h.totalVolume||0),0);

  // Volume curve (last 30 days, daily)
  const dailyVol=Array.from({length:30},()=>0);
  history.forEach(h=>{
    const diff=Math.floor((now-new Date(h.date).getTime())/dayMs);
    if(diff>=0&&diff<30) dailyVol[29-diff]+=h.totalVolume||0;
  });

  // Muscle distribution
  const muscleVol={};
  history.forEach(h=>(h.exercises||[]).forEach(ex=>{
    const m=ex.muscle||'Autre';
    const vol=(ex.sets||[]).reduce((s,x)=>s+(x.weight||0)*(x.reps||0),0);
    if(vol>0) muscleVol[m]=(muscleVol[m]||0)+vol;
  }));
  const muscleArr=Object.entries(muscleVol).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxM=Math.max(1,...muscleArr.map(([_,v])=>v));

  if(history.length===0){
    return(
      <div style={{padding:'18px 18px 100px',color:T.text}}>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,color:T.textDim,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase'}}>Progression</div>

        </div>
        <div style={{padding:'40px 24px',borderRadius:22,background:'linear-gradient(160deg,rgba(28,28,40,0.8),rgba(14,14,20,0.8))',border:`1px solid ${T.border}`,textAlign:'center',marginTop:10}}>
          <div style={{width:60,height:60,margin:'0 auto 16px',borderRadius:18,background:HOLO.iris,backgroundSize:'200% 200%',animation:'holoShift 8s linear infinite',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Icon name="chart" size={26} stroke="#fff" strokeWidth={1.8}/>
          </div>
          <div style={{fontSize:16,fontWeight:700,marginBottom:6}}>Pas encore de données</div>
          <div style={{fontSize:13,color:T.textDim,lineHeight:1.5,maxWidth:280,margin:'0 auto'}}>Termine ta 1re séance ou renseigne tes PR dans <b>Profil</b> pour voir tes courbes.</div>
        </div>
      </div>
    );
  }

  return(
    <div style={{padding:'18px 18px 100px',color:T.text}}>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:11,color:T.textDim,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase'}}>Progression</div>
        <div style={{fontSize:26,fontWeight:700,letterSpacing:-0.5,marginTop:2}}>Statistiques</div>
      </div>

      {history.length>0&&(
        <HoloCard padding={0} style={{marginBottom:16}}>
          <div style={{padding:18}}>
            <div style={{fontSize:11,color:T.textDim,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase'}}>Volume · 30 derniers jours</div>
            <div style={{display:'flex',alignItems:'baseline',gap:6,marginTop:4}}>
              <span style={{fontSize:32,fontWeight:700,letterSpacing:-0.6,lineHeight:1}}><HoloText>{Math.round(totalVol30).toLocaleString('fr-FR')}</HoloText></span>
              <span style={{fontSize:14,color:T.textDim,fontWeight:500}}>kg</span>
              <span style={{marginLeft:'auto',fontSize:12,color:T.textDim,fontWeight:600}}>{last30.length} séance{last30.length>1?'s':''}</span>
            </div>
            <VolumeAreaChart data={dailyVol}/>

      )}

      {history.length>0&&(
        <>
          <SectionHeader title="Volume · 7 derniers jours"/>
          <GlassCard padding={16} style={{marginBottom:18}}>
            <WeeklyBars data={weekData} labels={dayLabels}/>

      {muscleArr.length>0&&(

function BackupRestoreCard(){
  const[msg,setMsg]=React.useState(null);
  const[busy,setBusy]=React.useState(false);
  const fileRef=React.useRef(null);

  const download=async()=>{
    setBusy(true);setMsg(null);
    try{
      const token=localStorage.getItem('pa_token');
      const r=await fetch(API_BASE+'/api/admin/backup',{headers:{Authorization:'Bearer '+token}});
      if(!r.ok)throw new Error('HTTP '+r.status);
      const blob=await r.blob();
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download=`prime-athl-backup-${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);a.click();a.remove();
      URL.revokeObjectURL(url);
      setMsg({type:'good',text:'✓ Sauvegarde téléchargée'});
    }catch(e){setMsg({type:'err',text:'✗ Erreur : '+e.message});}
    setBusy(false);setTimeout(()=>setMsg(null),4000);
  };

  const handleRestore=e=>{
    const file=e.target.files[0];
    if(!file)return;
    e.target.value='';
    if(!confirm('Restaurer cette sauvegarde va REMPLACER toutes les données actuelles. Continuer ?'))return;
    setBusy(true);setMsg(null);
    const reader=new FileReader();
    reader.onload=async ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        const r=await apiCall('/api/admin/restore',{method:'POST',body:data});
        setMsg({type:'good',text:`✓ Restauré : ${r.counts.users} users, ${r.counts.programs} progs, ${r.counts.sessions} séances`});
      }catch(ex){setMsg({type:'err',text:'✗ Erreur : '+ex.message});}
      setBusy(false);setTimeout(()=>setMsg(null),6000);
    };
    reader.readAsText(file);
  };

  return(
    <div style={{marginBottom:10}}>
      <SectionHeader title="Sauvegarde des données" right={<span style={{fontSize:9,color:T.textFaint,fontWeight:600,letterSpacing:0.3}}>COACH PRINCIPAL</span>}/>
      <div style={{padding:12,borderRadius:12,background:'rgba(124,168,196,0.06)',border:'1px solid rgba(124,168,196,0.2)'}}>
        <div style={{fontSize:11,color:T.textDim,marginBottom:10,lineHeight:1.5}}>
          💡 Render Free efface les données à chaque redéploiement. Télécharge une sauvegarde avant chaque mise à jour, restaure-la ensuite.
        </div>
        <input ref={fileRef} type="file" accept=".json,application/json" style={{display:'none'}} onChange={handleRestore}/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
          <button onClick={download} disabled={busy} style={{height:38,borderRadius:10,border:'1px solid rgba(124,196,161,0.35)',background:'rgba(124,196,161,0.08)',color:T.good,fontSize:11,fontWeight:700,cursor:busy?'wait':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:5,opacity:busy?0.5:1}}>
            📥 Sauvegarder
          </button>
          <button onClick={()=>fileRef.current.click()} disabled={busy} style={{height:38,borderRadius:10,border:'1px solid rgba(124,168,196,0.35)',background:'rgba(124,168,196,0.08)',color:'#7ca8c4',fontSize:11,fontWeight:700,cursor:busy?'wait':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:5,opacity:busy?0.5:1}}>
            📤 Restaurer
          </button>
        </div>
        {msg&&(
          <div style={{marginTop:8,padding:'8px 11px',borderRadius:9,background:msg.type==='good'?'rgba(124,196,161,0.12)':'rgba(201,117,134,0.1)',border:`1px solid ${msg.type==='good'?'rgba(124,196,161,0.3)':'rgba(201,117,134,0.3)'}`,color:msg.type==='good'?T.good:T.danger,fontSize:11,fontWeight:600,textAlign:'center'}}>{msg.text}</div>
        )}
      </div>
    </div>
  );
}

    const onBefore=e=>{e.preventDefault();setDeferred(e);};
    window.addEventListener('beforeinstallprompt',onBefore);
    return()=>window.removeEventListener('beforeinstallprompt',onBefore);
  },[]);

  const install=async()=>{

        </div>
