                  <div style={{fontSize:13,fontWeight:600}}>{dayName}</div>
                  <div style={{fontSize:10,color:T.textFaint,marginTop:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.category}</div>
                </div>
                <div style={{fontSize:10,color:T.textFaint,fontWeight:600,flexShrink:0,marginRight:6}}>{exCount} exo</div>
                {/* Bouton import séance */}
                <button onClick={()=>setImportDay({dayName,dayData:d})}
                  style={{height:28,padding:'0 10px',borderRadius:8,border:'1px solid rgba(191,160,96,0.4)',background:'rgba(191,160,96,0.1)',color:T.accent,fontSize:11,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:5,flexShrink:0,whiteSpace:'nowrap'}}>
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                  Importer
                </button>
              </div>
              <div style={{padding:'0 12px 10px',display:'flex',flexDirection:'column',gap:3}}>
                {(d.exercises||[]).slice(0,4).map((ex,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:7,fontSize:11,color:T.textDim}}>
                    <div style={{width:16,height:16,borderRadius:4,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,fontWeight:700,background:`${(STYLE_COLORS[ex.style]||T.accent)}18`,color:STYLE_COLORS[ex.style]||T.accent}}>{i+1}</div>
                    <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ex.name}</span>
                    <span style={{fontSize:10,color:T.textFaint,flexShrink:0}}>{ex.sets.length}×{ex.repsStr||ex.sets[0]&&ex.sets[0].target||'?'}</span>
                  </div>
                ))}
                {exCount>4&&<div style={{fontSize:10,color:T.textFaint,paddingLeft:23}}>+{exCount-4} exo</div>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function CoachNutritionMirror({athleteId,athleteName,authToken,onPlanApplied}){
  const[data,setData]=React.useState(null);
  const[viewDay,setViewDay]=React.useState(()=>todayDayName());
  const[activeWeek,setActiveWeek]=React.useState(0);
  const[expandedMeal,setExpandedMeal]=React.useState(null);
  const[loading,setLoading]=React.useState(true);
  const[justUpdated,setJustUpdated]=React.useState(false);

  const load=React.useCallback(async()=>{
    try{const d=await apiCall('/api/coach/athletes/'+athleteId+'/nutrition');setData(d);}catch(e){console.error(e);}
    setLoading(false);
  },[athleteId]);
  React.useEffect(()=>{load();},[load]);

  // Realtime: athlete validates → instantly reflect
  useSocket(authToken,{
    'nutrition-meal-validated':({athleteId:aid})=>{
      if(aid===athleteId){
        load();
        setJustUpdated(true);
        setTimeout(()=>setJustUpdated(false),2000);
      }
    },
  });

  const[applying,setApplying]=React.useState(false);
  const[applyMsg,setApplyMsg]=React.useState(null);

  const applyTemplate=async()=>{
    setApplying(true);
    try{
      const tpl=await apiCall('/api/nutrition/template');
      const plan=tpl.template||tpl;
      await apiCall('/api/coach/nutrition/'+athleteId,{method:'PUT',body:{plan}});
      await apiCall('/api/coach/nutrition/'+athleteId+'/notify',{method:'POST'});
      setApplyMsg('✓ Plan assigné et notifié !');
      setTimeout(()=>setApplyMsg(null),3000);
      load();
      if(onPlanApplied)onPlanApplied();
    }catch(e){setApplyMsg('✗ Erreur : '+e.message);}
    setApplying(false);
  };

  if(loading)return<div style={{padding:20,textAlign:'center',color:T.textFaint,fontSize:12}}>Chargement…</div>;
  if(!data||!data.plan||!data.plan.data){
    return(
      <div style={{padding:20,textAlign:'center'}}>
        <div style={{fontSize:36,marginBottom:10}}>🍎</div>
        <div style={{fontSize:14,fontWeight:700,color:T.text,marginBottom:6}}>Aucun plan assigné</div>
        <div style={{fontSize:12,color:T.textDim,marginBottom:16,lineHeight:1.5}}>Assigne le plan nutrition standard à {athleteName}</div>
        {applyMsg&&<div style={{marginBottom:12,fontSize:12,fontWeight:700,color:applyMsg.startsWith('✓')?T.good:T.danger}}>{applyMsg}</div>}
        <button onClick={applyTemplate} disabled={applying} style={{padding:'12px 22px',borderRadius:12,border:'none',background:'linear-gradient(135deg,#BFA060,#B85070)',color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',opacity:applying?0.6:1}}>
          {applying?'Envoi…':'🍽️ Appliquer le plan standard'}
        </button>
      </div>
    );
  }

  const plan=normalizePlan(data.plan.data);
  const isToday=viewDay===todayDayName();
  const todayKey=ymdKey(new Date());
  const log=isToday?((data.history&&data.history[todayKey])||{validated:{},validatedAt:{}}):{validated:{},validatedAt:{}};
  const meals=getDayMeals(plan,viewDay,activeWeek);

  // dayTargets = somme des aliments du jour vu (toujours synchronisé)
  const dayTargets=meals.reduce((acc,m)=>{
    const mm=mealMacros(m.items);
    return{kcal:acc.kcal+mm.kcal,p:acc.p+mm.p,c:acc.c+mm.c,f:acc.f+mm.f};
  },{kcal:0,p:0,c:0,f:0});

  // TODAY : somme items validés (suivi réel) — AUTRES JOURS : somme totale (aperçu plan)
  const totals=meals.reduce((acc,m)=>{
    const include=isToday?log.validated[m.id]:true;
    if(include){
      const mm=mealMacros(m.items);
      acc.kcal+=mm.kcal;acc.p+=mm.p;acc.c+=mm.c;acc.f+=mm.f;
    }
    return acc;
  },{kcal:0,p:0,c:0,f:0});

  const nowHM=(()=>{const d=new Date();return d.getHours()*60+d.getMinutes();})();
  const validatedCount=isToday?meals.filter(m=>log.validated[m.id]).length:0;
  const totalMeals=meals.length;

  // streak
  const streak=(()=>{
    let s=0;const today=new Date();
    for(let i=0;i<14;i++){
      const k=ymdKey(new Date(today.getTime()-i*86400000));
      const l=data.history&&data.history[k];
      if(l&&Object.values(l.validated||{}).filter(Boolean).length>0)s++;
      else if(i>0)break;
    }
    return s;
  })();

  const score=Math.round((
    (dayTargets.kcal>0?Math.min(1,totals.kcal/dayTargets.kcal):0)+
    (dayTargets.p>0?Math.min(1,totals.p/dayTargets.p):0)+
    (dayTargets.c>0?Math.min(1,totals.c/dayTargets.c):0)+
    (dayTargets.f>0?Math.min(1,totals.f/dayTargets.f):0)
  )/4*100);

  return(
    <div>
      {/* live sync badge */}
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,padding:'7px 11px',borderRadius:10,background:'rgba(44,196,160,0.06)',border:'1px solid rgba(44,196,160,0.25)'}}>
        <span style={{width:7,height:7,borderRadius:4,background:T.good,boxShadow:`0 0 8px ${T.good}`,animation:justUpdated?'pulse 1.4s ease':'none'}}/>
        <span style={{fontSize:10,color:T.good,fontWeight:700,letterSpacing:0.3,textTransform:'uppercase'}}>MIROIR LIVE · vue {athleteName}</span>
        {justUpdated&&<span style={{fontSize:10,color:T.good,fontWeight:700,marginLeft:'auto'}}>↻ mis à jour</span>}
      </div>

      {/* Header streak + score */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,padding:'8px 12px',borderRadius:11,background:'rgba(255,255,255,0.03)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          {streak>0&&(
            <div style={{display:'inline-flex',alignItems:'center',gap:5,padding:'4px 9px',borderRadius:999,background:'rgba(191,160,96,0.12)',border:'1px solid rgba(191,160,96,0.3)'}}>
              <span style={{fontSize:11}}>🔥</span>
              <span style={{fontSize:10,color:T.accent,fontWeight:700,letterSpacing:0.3}}>{streak}j</span>
            </div>
          )}
          <span style={{fontSize:11,color:T.textDim,fontWeight:600}}>{validatedCount}/{totalMeals} repas validés aujourd'hui</span>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:8,color:T.textFaint,fontWeight:700,letterSpacing:0.4,textTransform:'uppercase'}}>Score</div>
          <div style={{fontSize:20,fontWeight:700,letterSpacing:-0.4,color:score>=80?T.good:score>=50?T.warn:T.danger,lineHeight:1}}>{score}<span style={{fontSize:11,color:T.textDim,fontWeight:500}}>%</span></div>
        </div>
      </div>

      {/* Sélecteur semaine */}
      {plan.weeks&&plan.weeks.length>1&&(
        <div style={{display:'flex',gap:4,marginBottom:8}}>
          {plan.weeks.map((w,i)=>(
            <button key={w.label} onClick={()=>{setActiveWeek(i);setExpandedMeal(null);}} style={{flex:1,height:30,borderRadius:9,border:i===activeWeek?'1px solid rgba(191,160,96,0.6)':'1px solid rgba(255,255,255,0.1)',background:i===activeWeek?T.accentSoft:'rgba(255,255,255,0.03)',color:i===activeWeek?T.accent:T.textDim,fontSize:11,fontWeight:700,cursor:'pointer'}}>
              {w.label}
            </button>
          ))}
        </div>
      )}

      {/* Day selector */}
      <div style={{display:'flex',gap:4,marginBottom:10,overflowX:'auto',paddingBottom:4}}>
        {DAYS_OF_WEEK.map(d=>{
          const dayMeals=getDayMeals(plan,d,activeWeek);
          const hasContent=dayMeals.some(m=>(m.items||[]).length>0);
          const isCurDay=d===todayDayName();
          const active=d===viewDay;
          return(
            <button key={d} onClick={()=>setViewDay(d)} style={{flexShrink:0,height:38,padding:'0 10px',borderRadius:11,border:active?'1px solid transparent':'1px solid rgba(255,255,255,0.1)',background:active?(isCurDay?'linear-gradient(135deg,rgba(191,160,96,0.18),rgba(184,80,112,0.12))':T.accentSoft):'rgba(255,255,255,0.03)',color:active?T.accent:T.textDim,fontSize:10,fontWeight:700,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:1,minWidth:42}}>
              <span>{d.slice(0,3)}</span>
              <span style={{fontSize:7,color:isCurDay?T.accent:T.textFaint,fontWeight:600}}>{isCurDay?'AUJ.':hasContent?'•':''}</span>
            </button>
          );
        })}
      </div>

      {/* Big gauge */}
      <HoloCard padding={0} style={{marginBottom:10}}>
        <div style={{padding:14,display:'flex',alignItems:'center',gap:12}}>
          <CircleGauge value={totals.kcal} max={dayTargets.kcal} size={110} color="#BFA060" label="KCAL"/>
          <div style={{flex:1}}>
            <div style={{fontSize:9,color:T.textFaint,fontWeight:700,letterSpacing:0.4,textTransform:'uppercase'}}>{isToday?'Aujourd\'hui':'Plan '+viewDay}</div>
            <div style={{fontSize:20,fontWeight:700,marginTop:2}}>{Math.round(totals.kcal)}<span style={{fontSize:12,color:T.textDim,fontWeight:500}}>/{Math.round(dayTargets.kcal)} kcal</span></div>
            <div style={{fontSize:10,color:T.textDim,marginTop:4}}>{isToday?`${Math.max(0,Math.round(dayTargets.kcal-totals.kcal))} kcal restantes`:`P ${Math.round(dayTargets.p)} · C ${Math.round(dayTargets.c)} · L ${Math.round(dayTargets.f)}`}</div>
          </div>
        </div>
      </HoloCard>

      {/* Macros */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,marginBottom:12}}>
        {[
          {l:'P',val:totals.p,max:dayTargets.p,c:'#B85070'},
          {l:'C',val:totals.c,max:dayTargets.c,c:'#5A8AE0'},
          {l:'L',val:totals.f,max:dayTargets.f,c:'#C89040'},
        ].map(m=>(
          <GlassCard key={m.l} padding={8}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
              <CircleGauge value={m.val} max={m.max} size={72} color={m.c} suffix="g"/>
              <div style={{fontSize:9,color:T.textFaint,fontWeight:700,letterSpacing:0.4,textTransform:'uppercase',marginTop:3}}>{m.l}</div>
            </div>
          </GlassCard>
        ))}
      </div>

      {/* Meals list (read-only with athlete validation state) */}
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {meals.map(m=>{
          const mm=mealMacros(m.items);
          const validated=isToday&&!!log.validated[m.id];
          const status=isToday?mealStatus(m,nowHM):'later';
          const isOpen=expandedMeal===m.id;
          return(
            <div key={m.id} style={{borderRadius:12,overflow:'hidden',border:`1px solid ${validated?'rgba(44,196,160,0.4)':status==='now'?'rgba(191,160,96,0.3)':T.border}`,background:validated?'rgba(44,196,160,0.06)':'rgba(255,255,255,0.025)'}}>
              <div onClick={()=>setExpandedMeal(isOpen?null:m.id)} style={{padding:10,cursor:'pointer',display:'flex',alignItems:'center',gap:10}}>
                <div style={{fontSize:22,opacity:validated?0.5:1}}>{m.emoji}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:700,textDecoration:validated?'line-through':'none',textDecorationColor:'rgba(44,196,160,0.5)'}}>{m.label}</div>
                  <div style={{fontSize:10,color:T.textFaint,marginTop:1}}>
                    {m.timeStart}-{m.timeEnd}
                    {validated&&log.validatedAt[m.id]&&<span style={{color:T.good,marginLeft:6}}>✓ {new Date(log.validatedAt[m.id]).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</span>}
                  </div>
                  {m.items&&m.items.length>0&&(
                    <div style={{display:'flex',gap:4,marginTop:5,flexWrap:'wrap'}}>
                      <span style={{fontSize:9,fontWeight:700,padding:'1px 6px',borderRadius:5,background:'rgba(191,160,96,0.14)',color:'#BFA060'}}>{Math.round(mm.kcal)}kcal</span>
                      <span style={{fontSize:9,fontWeight:700,padding:'1px 6px',borderRadius:5,background:'rgba(184,80,112,0.12)',color:'#B85070'}}>P{Math.round(mm.p)}</span>
                      <span style={{fontSize:9,fontWeight:700,padding:'1px 6px',borderRadius:5,background:'rgba(90,138,224,0.12)',color:'#5A8AE0'}}>C{Math.round(mm.c)}</span>
                      <span style={{fontSize:9,fontWeight:700,padding:'1px 6px',borderRadius:5,background:'rgba(200,144,64,0.12)',color:'#C89040'}}>L{Math.round(mm.f)}</span>
                    </div>
                  )}
                </div>
                <div style={{width:34,height:34,borderRadius:10,background:validated?'rgba(44,196,160,0.18)':'rgba(255,255,255,0.03)',color:validated?T.good:T.textFaint,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  {validated?<Icon name="check" size={14} stroke={T.good} strokeWidth={2.6}/>:<span style={{fontSize:8,fontWeight:700,letterSpacing:0.3}}>—</span>}
                </div>
              </div>
              {isOpen&&m.items&&m.items.length>0&&(
                <div style={{padding:'0 10px 10px',borderTop:'1px solid rgba(255,255,255,0.05)'}}>
                  {m.items.map((it,i)=>(
                    <div key={i} style={{display:'flex',gap:6,fontSize:11,padding:'4px 0',color:T.textDim}}>
                      <span style={{flex:1}}>{it.name} <span style={{color:T.textFaint}}>{it.qty}{it.unit}</span></span>
                      <span style={{color:T.accent}}>{it.kcal}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Coach Screen ──────────────────────────────────────────
function timeAgo(ts){
  if(!ts)return null;
  const d=Date.now()-ts;
  if(d<60000)return"à l'instant";
  if(d<3600000)return"il y a "+Math.floor(d/60000)+"min";
  if(d<86400000)return"il y a "+Math.floor(d/3600000)+"h";
  if(d<604800000)return"il y a "+Math.floor(d/86400000)+"j";
  return new Date(ts).toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
}

// ── Coach Global Calendar ────────────────────────────────────────────────────
function CoachCalendarView({authToken,athletes,onBack,onOpenAthlete}){
  const now=new Date();
  const[year,setYear]=React.useState(now.getFullYear());
  const[month,setMonth]=React.useState(now.getMonth()+1);
  const[calData,setCalData]=React.useState(null);
  const[loading,setLoading]=React.useState(false);
  const[selectedDay,setSelectedDay]=React.useState(null);
  const[sessionModal,setSessionModal]=React.useState(null); // {athleteId, athleteName, color, session}
  const[modalLoading,setModalLoading]=React.useState(false);
  const[moveDate,setMoveDate]=React.useState('');
  const[confirmDelete,setConfirmDelete]=React.useState(false);
  const[deleteMode,setDeleteMode]=React.useState(false);
  const deleteModeRef=React.useRef(false);
  const pressTimer=React.useRef(null);
  const setDeleteModeSync=(v)=>{deleteModeRef.current=v;setDeleteMode(v);};

  const reload=()=>{
    setLoading(true);
    setCalData(null);
    apiCall(`/api/coach/calendar?year=${year}&month=${month}`)
      .then(d=>setCalData(d.athletes||d))
      .catch(console.error)
      .finally(()=>setLoading(false));
  };

  const openSession=async(ath,dateStr)=>{
    setModalLoading(true);
    setSessionModal({athleteId:ath.id,athleteName:ath.name,color:ath.color,session:null,dateStr});
    setMoveDate(dateStr);
    setConfirmDelete(false);
    try{
      const d=await apiCall('/api/coach/athletes/'+ath.id);
      const sessions=d.sessions||[];
      const s=sessions.find(x=>x.date&&x.date.slice(0,10)===dateStr);
      setSessionModal(m=>({...m,session:s||null}));
    }catch(e){console.error(e);}
    setModalLoading(false);
  };

  const moveSession=async()=>{
    if(!sessionModal?.session||!moveDate)return;
    try{
      await apiCall('/api/coach/sessions/'+sessionModal.session.id,{method:'PATCH',body:{date:moveDate+'T12:00:00.000Z'}});
      setSessionModal(null);
      reload();
    }catch(e){alert('Erreur: '+e.message);}
  };

  const deleteSession=async()=>{
    if(!sessionModal?.session)return;
    try{
      await apiCall('/api/coach/sessions/'+sessionModal.session.id,{method:'DELETE'});
      setSessionModal(null);
      reload();
    }catch(e){alert('Erreur: '+e.message);}
  };

  React.useEffect(()=>{reload();},[year,month]);

  const prevMonth=()=>{if(month===1){setYear(y=>y-1);setMonth(12);}else setMonth(m=>m-1);setSelectedDay(null);};
  const nextMonth=()=>{if(month===12){setYear(y=>y+1);setMonth(1);}else setMonth(m=>m+1);setSelectedDay(null);};

  const MONTH_NAMES=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const DAY_LABELS=['Lu','Ma','Me','Je','Ve','Sa','Di'];

  // Build grid: weeks × 7
  const firstDay=new Date(year,month-1,1).getDay(); // 0=Sun
  const startOffset=(firstDay+6)%7; // Mon=0
  const daysInMonth=new Date(year,month,0).getDate();
  const cells=[];
  for(let i=0;i<startOffset;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);

  const isToday=(d)=>d&&year===now.getFullYear()&&month===now.getMonth()+1&&d===now.getDate();

  const dotsForDay=(d)=>{
    if(!calData||!d)return[];
    const dots=[];
    for(const ath of calData){
      const dayStr=String(d).padStart(2,'0');
      const hasSession=ath.sessionDates.some(s=>s.endsWith(`-${dayStr}`));
      const hasNutri=ath.nutriDates.some(s=>s.endsWith(`-${dayStr}`));
      const hasProg=ath.programDays.some(pd=>{
        // programDays are day-of-week labels; we check if this calendar day matches
        const jsDay=new Date(year,month-1,d).getDay();
        const DAYS=['DIMANCHE','LUNDI','MARDI','MERCREDI','JEUDI','VENDREDI','SAMEDI'];
        return pd===DAYS[jsDay];
      });
      if(hasSession||hasNutri||hasProg)dots.push({color:ath.color,hasSession,hasNutri,hasProg,name:ath.name,id:ath.id});
    }
    return dots;
  };

  const selectedDots=selectedDay?dotsForDay(selectedDay):[];
  const selectedAths=selectedDay&&calData?calData.filter(ath=>{
    const dayStr=String(selectedDay).padStart(2,'0');
    const hasSession=ath.sessionDates.some(s=>s.endsWith(`-${dayStr}`));
    const hasNutri=ath.nutriDates.some(s=>s.endsWith(`-${dayStr}`));
    const jsDay=new Date(year,month-1,selectedDay).getDay();
    const DAYS=['DIMANCHE','LUNDI','MARDI','MERCREDI','JEUDI','VENDREDI','SAMEDI'];
    const hasProg=ath.programDays.some(pd=>pd===DAYS[jsDay]);
    return hasSession||hasNutri||hasProg;
  }):[];

  return(
    <div style={{padding:'18px 18px 100px',color:T.text}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <button onClick={onBack} style={{width:40,height:40,borderRadius:13,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.textDim,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <Icon name="chevronLeft" size={18} stroke={T.textDim}/>
        </button>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:T.textDim,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase'}}>Coaching</div>
          <div style={{fontSize:22,fontWeight:700,letterSpacing:-0.5}}><HoloText>Calendrier global</HoloText></div>
        </div>
      </div>

      {/* Month nav */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
        <button onClick={prevMonth} style={{width:36,height:36,borderRadius:11,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.text,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <Icon name="chevronLeft" size={16} stroke={T.text}/>
        </button>
        <div style={{fontSize:16,fontWeight:700}}>{MONTH_NAMES[month-1]} {year}</div>
        <button onClick={nextMonth} style={{width:36,height:36,borderRadius:11,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.text,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <Icon name="chevronRight" size={16} stroke={T.text}/>
        </button>
      </div>

      {/* Legend */}
      {calData&&calData.length>0&&(
        <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:14}}>
          {calData.map(a=>(
            <div key={a.id} style={{display:'flex',alignItems:'center',gap:5,padding:'3px 9px',borderRadius:999,background:'rgba(255,255,255,0.04)',border:`1px solid ${a.color}44`,fontSize:11,fontWeight:600,cursor:'pointer'}} onClick={()=>onOpenAthlete(athletes.find(x=>x.id===a.id)||{id:a.id,email:a.name})}>
              <div style={{width:8,height:8,borderRadius:4,background:a.color,flexShrink:0}}/>
              {a.name}
            </div>
          ))}
        </div>
      )}

      {/* Grid */}
      {loading?(
        <div style={{padding:40,textAlign:'center',color:T.textFaint,fontSize:13}}>Chargement…</div>
      ):(
        <>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}}>
            {DAY_LABELS.map(l=>(
              <div key={l} style={{textAlign:'center',fontSize:10,fontWeight:700,color:T.textFaint,padding:'4px 0',letterSpacing:0.3}}>{l}</div>
            ))}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}}>
            {cells.map((d,i)=>{
              if(!d)return <div key={`e${i}`}/>;
              const dots=dotsForDay(d);
              const today=isToday(d);
              const selected=selectedDay===d;
              const startPress=()=>{
                pressTimer.current=setTimeout(()=>{
                  if(dots.some(dot=>dot.hasSession)){
                    if(navigator.vibrate)navigator.vibrate(40);
                    setSelectedDay(d);
                    setDeleteModeSync(true);
                  }
                },500);
              };
              const cancelPress=()=>clearTimeout(pressTimer.current);
              return(
                <button key={d}
                  onClick={()=>{
                    if(deleteModeRef.current){return;}
                    setSelectedDay(selected?null:d);setDeleteModeSync(false);
                  }}
                  onTouchStart={startPress} onTouchEnd={cancelPress} onTouchMove={cancelPress}
                  onMouseDown={startPress} onMouseUp={cancelPress} onMouseLeave={cancelPress}
                  style={{
                  aspectRatio:'1',borderRadius:10,border:selected&&deleteMode?`2px solid rgba(184,80,112,0.8)`:selected?`2px solid #5A8AE0`:`1px solid ${today?'rgba(191,160,96,0.5)':T.border}`,
                  background:selected&&deleteMode?'rgba(184,80,112,0.12)':selected?'rgba(90,138,224,0.15)':today?'rgba(191,160,96,0.08)':'rgba(255,255,255,0.02)',
                  cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2,padding:'4px 2px',position:'relative'
                }}>
                  <span style={{fontSize:12,fontWeight:today?800:500,color:today?T.accent:T.text}}>{d}</span>
                  {dots.length>0&&(
                    <div style={{display:'flex',gap:2,flexWrap:'wrap',justifyContent:'center',maxWidth:'100%'}}>
                      {dots.slice(0,4).map((dot,di)=>(
                        <div key={di} style={{width:5,height:5,borderRadius:3,background:dot.color,flexShrink:0}}/>
                      ))}
                      {dots.length>4&&<div style={{width:5,height:5,borderRadius:3,background:T.textFaint}}/>}
                    </div>
                  )}
                </button>
              );
            })}
          </div>

          {/* Day detail panel */}
          {selectedDay&&(
            <div style={{marginTop:16,padding:14,borderRadius:16,background:deleteMode?'rgba(184,80,112,0.06)':'rgba(255,255,255,0.04)',border:`1px solid ${deleteMode?'rgba(184,80,112,0.3)':T.border}`,transition:'all 0.2s'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                <div style={{fontSize:13,fontWeight:700,color:deleteMode?'#B85070':T.textDim}}>
                  {deleteMode?'🗑️ Mode suppression — ':''}{new Date(year,month-1,selectedDay).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}
                </div>
                {deleteMode&&<button onClick={()=>setDeleteModeSync(false)} style={{fontSize:11,fontWeight:700,padding:'3px 9px',borderRadius:7,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.05)',color:T.textDim,cursor:'pointer'}}>Annuler</button>}
              </div>
              {selectedAths.length===0?(
                <div style={{fontSize:12,color:T.textFaint,textAlign:'center',padding:'10px 0'}}>Aucune activité ce jour</div>
              ):(
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {selectedAths.map(ath=>{
                    const dayStr=String(selectedDay).padStart(2,'0');
                    const dateStr=`${year}-${String(month).padStart(2,'0')}-${dayStr}`;
                    const hasSession=ath.sessionDates.some(s=>s.endsWith(`-${dayStr}`));
                    const hasNutri=ath.nutriDates.some(s=>s.endsWith(`-${dayStr}`));
                    const jsDay=new Date(year,month-1,selectedDay).getDay();
                    const DAYS=['DIMANCHE','LUNDI','MARDI','MERCREDI','JEUDI','VENDREDI','SAMEDI'];
                    const hasProg=ath.programDays.some(pd=>pd===DAYS[jsDay]);
                    return(
                      <div key={ath.id} style={{borderRadius:11,background:'rgba(255,255,255,0.03)',border:`1px solid ${deleteMode&&hasSession?'rgba(184,80,112,0.4)':ath.color+'33'}`,overflow:'hidden'}}>
                        <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 10px',cursor:'pointer'}}
                          onClick={()=>{if(deleteMode&&hasSession){openSession(ath,dateStr);setConfirmDelete(true);}else if(hasSession)openSession(ath,dateStr);else onOpenAthlete(athletes.find(x=>x.id===ath.id)||{id:ath.id,email:ath.name});}}>
                          <div style={{width:8,height:32,borderRadius:4,background:ath.color,flexShrink:0}}/>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:12,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ath.name}</div>
                            <div style={{display:'flex',gap:6,marginTop:3,flexWrap:'wrap'}}>
                              {hasSession&&<span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:999,background:'rgba(44,196,160,0.15)',color:'#2CC4A0',border:'1px solid rgba(44,196,160,0.3)'}}>💪 Séance</span>}
                              {hasNutri&&<span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:999,background:'rgba(90,138,224,0.15)',color:'#5A8AE0',border:'1px solid rgba(90,138,224,0.3)'}}>🥗 Nutrition</span>}
                              {hasProg&&<span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:999,background:'rgba(191,160,96,0.12)',color:T.accent,border:'1px solid rgba(191,160,96,0.3)'}}>📋 Programme</span>}
                            </div>
                          </div>
                          {deleteMode&&hasSession
                            ?<span style={{fontSize:16,animation:'pulse 1s infinite'}}>🗑️</span>
                            :<Icon name={hasSession?'dumbbell':'chevronRight'} size={14} stroke={hasSession?'#2CC4A0':T.textFaint}/>
                          }
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}
        </>
      )}

      {/* ── Modal séance complète ── */}
      {sessionModal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',zIndex:1000,display:'flex',alignItems:'flex-end'}} onClick={e=>{if(e.target===e.currentTarget){setSessionModal(null);setConfirmDelete(false);}}}>
          <div style={{width:'100%',maxHeight:'85vh',overflow:'auto',background:T.bgRaise,borderRadius:'20px 20px 0 0',padding:20,boxSizing:'border-box'}}>
            {/* Header */}
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
              <div style={{width:10,height:10,borderRadius:5,background:sessionModal.color,flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:11,color:T.textDim,fontWeight:600,textTransform:'uppercase',letterSpacing:0.4}}>{sessionModal.athleteName}</div>
                <div style={{fontSize:17,fontWeight:700}}>{sessionModal.session?.name||'Séance'}</div>
              </div>
              <button onClick={()=>onOpenAthlete(athletes.find(x=>x.id===sessionModal.athleteId)||{id:sessionModal.athleteId,email:sessionModal.athleteName})} style={{fontSize:11,fontWeight:700,padding:'5px 10px',borderRadius:8,border:`1px solid ${sessionModal.color}55`,background:`${sessionModal.color}11`,color:sessionModal.color,cursor:'pointer'}}>Profil</button>
              <button onClick={()=>{setSessionModal(null);setConfirmDelete(false);}} style={{width:30,height:30,borderRadius:8,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.textDim,fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
            </div>

            {modalLoading?(
              <div style={{padding:30,textAlign:'center',color:T.textFaint,fontSize:13}}>Chargement…</div>
            ):!sessionModal.session?(
              <div style={{padding:20,textAlign:'center',color:T.textDim,fontSize:13}}>Séance introuvable</div>
            ):(
              <>
                {/* Exercices */}
                <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:16}}>
                  {(sessionModal.session.exercises||[]).map((ex,i)=>(
                    <div key={i} style={{padding:'8px 12px',borderRadius:10,background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.06)'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        <div style={{fontSize:12,fontWeight:600}}>{ex.name}</div>
                        <div style={{fontSize:10,color:T.textFaint}}>{ex.sets?.length||0} séries</div>
                      </div>
                      <div style={{display:'flex',gap:6,marginTop:4,flexWrap:'wrap'}}>
                        {(ex.sets||[]).filter(s=>s.done).map((s,si)=>(
                          <span key={si} style={{fontSize:10,padding:'2px 7px',borderRadius:999,background:'rgba(44,196,160,0.1)',color:'#2CC4A0',border:'1px solid rgba(44,196,160,0.2)'}}>{s.weight}kg×{s.reps}</span>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>

                {/* Déplacer */}
                <div style={{marginBottom:12,padding:12,borderRadius:12,background:'rgba(90,138,224,0.06)',border:'1px solid rgba(90,138,224,0.2)'}}>
                  <div style={{fontSize:11,color:'#5A8AE0',fontWeight:700,marginBottom:8,textTransform:'uppercase',letterSpacing:0.4}}>📅 Déplacer la séance</div>
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <input type="date" value={moveDate} onChange={e=>setMoveDate(e.target.value)} style={{flex:1,height:36,borderRadius:9,border:'1px solid rgba(90,138,224,0.3)',background:'rgba(255,255,255,0.04)',color:T.text,fontSize:12,padding:'0 10px',outline:'none'}}/>
                    <button onClick={moveSession} disabled={moveDate===sessionModal.dateStr} style={{height:36,padding:'0 14px',borderRadius:9,border:'none',background:'linear-gradient(135deg,#5A8AE0,#6090b0)',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer',opacity:moveDate===sessionModal.dateStr?0.4:1}}>Déplacer</button>
                  </div>
                </div>

                {/* Supprimer */}
                {!confirmDelete?(
                  <button onClick={()=>setConfirmDelete(true)} style={{width:'100%',height:40,borderRadius:11,border:'1px solid rgba(184,80,112,0.3)',background:'rgba(184,80,112,0.06)',color:T.danger,fontSize:13,fontWeight:700,cursor:'pointer'}}>🗑️ Supprimer la séance</button>
                ):(
                  <ConfirmBanner msg="Supprimer cette séance ?" onConfirm={deleteSession} onCancel={()=>setConfirmDelete(false)}/>
                )}
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function CoachSessionModal({s,athleteId,onClose,onFeedbackSaved}){
  const[feedbackText,setFeedbackText]=React.useState(s.coachFeedback||'');
  const[saving,setSaving]=React.useState(false);
  const[saved,setSaved]=React.useState(false);

  const submitFeedback=async()=>{
    if(!feedbackText.trim())return;
    setSaving(true);
    try{
      await apiCall(`/api/coach/sessions/${s.id}/feedback`,{method:'POST',body:{feedback:feedbackText.trim()}});
      setSaved(true);
      setTimeout(()=>setSaved(false),2000);
      if(onFeedbackSaved)onFeedbackSaved();
    }catch{}
    setSaving(false);
  };

  const totalVol=(s.exercises||[]).reduce((sum,e)=>(e.sets||[]).reduce((a,st)=>a+(st.weight||0)*(st.reps||0),sum),0);

  return(
    <div style={{position:'fixed',inset:0,zIndex:3000,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.72)'}}/>
      <div style={{position:'relative',background:T.bgRaise,borderRadius:'24px 24px 0 0',maxHeight:'92vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* Drag handle */}
        <div style={{display:'flex',justifyContent:'center',padding:'12px 0 4px'}}>
          <div style={{width:40,height:4,borderRadius:2,background:'rgba(255,255,255,0.15)'}}/>
        </div>
        {/* Header */}
        <div style={{padding:'12px 20px 16px',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:17,fontWeight:700,marginBottom:4}}>{s.name||'Séance'}</div>
              <div style={{fontSize:12,color:T.textDim}}>{new Date(s.date).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
            </div>
            <button onClick={onClose} style={{width:32,height:32,borderRadius:10,border:'1px solid rgba(255,255,255,0.12)',background:'rgba(255,255,255,0.06)',color:T.textFaint,fontSize:18,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}>×</button>
          </div>
          {/* Stats row */}
          <div style={{display:'flex',gap:10,marginTop:12,flexWrap:'wrap'}}>
            <div style={{flex:1,minWidth:80,padding:'8px 12px',borderRadius:12,background:'rgba(191,160,96,0.08)',border:'1px solid rgba(191,160,96,0.2)',textAlign:'center'}}>
              <div style={{fontSize:15,fontWeight:700,color:T.accent}}>{Math.round(totalVol).toLocaleString('fr-FR')}</div>
              <div style={{fontSize:9,color:T.textFaint,marginTop:1,textTransform:'uppercase',letterSpacing:0.4}}>Volume kg</div>
            </div>
            {s.duration&&<div style={{flex:1,minWidth:80,padding:'8px 12px',borderRadius:12,background:'rgba(44,196,160,0.08)',border:'1px solid rgba(44,196,160,0.2)',textAlign:'center'}}>
              <div style={{fontSize:15,fontWeight:700,color:T.good}}>{s.duration}</div>
              <div style={{fontSize:9,color:T.textFaint,marginTop:1,textTransform:'uppercase',letterSpacing:0.4}}>Minutes</div>
            </div>}
            {s.rpe&&<div style={{flex:1,minWidth:80,padding:'8px 12px',borderRadius:12,background:'rgba(200,144,64,0.08)',border:'1px solid rgba(200,144,64,0.2)',textAlign:'center'}}>
              <div style={{fontSize:15,fontWeight:700,color:T.warn}}>{s.rpe}/10</div>
              <div style={{fontSize:9,color:T.textFaint,marginTop:1,textTransform:'uppercase',letterSpacing:0.4}}>RPE</div>
            </div>}
            <div style={{flex:1,minWidth:80,padding:'8px 12px',borderRadius:12,background:'rgba(90,138,224,0.08)',border:'1px solid rgba(90,138,224,0.2)',textAlign:'center'}}>
              <div style={{fontSize:15,fontWeight:700,color:'#5A8AE0'}}>{(s.exercises||[]).length}</div>
              <div style={{fontSize:9,color:T.textFaint,marginTop:1,textTransform:'uppercase',letterSpacing:0.4}}>Exercices</div>
            </div>
          </div>
        </div>

        {/* Scrollable content */}
        <div style={{flex:1,overflowY:'auto',padding:'16px 20px 24px'}}>
          {/* Athlete notes */}
          {s.notes&&(
            <div style={{marginBottom:16,padding:'10px 14px',borderRadius:12,background:'rgba(200,144,64,0.07)',border:'1px solid rgba(200,144,64,0.22)',fontSize:12,color:T.warn,lineHeight:1.5}}>
              <span style={{fontWeight:700,display:'block',marginBottom:2,fontSize:10,textTransform:'uppercase',letterSpacing:0.4}}>Ressenti athlète</span>
              {s.notes}
            </div>
          )}

          {/* Exercises */}
          {(s.exercises||[]).length>0&&(
            <div style={{marginBottom:20}}>
              <div style={{fontSize:10,color:T.textFaint,fontWeight:700,letterSpacing:0.5,textTransform:'uppercase',marginBottom:10}}>Exercices</div>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {(s.exercises||[]).map((e,ei)=>{
                  const exVol=(e.sets||[]).reduce((a,st)=>a+(st.weight||0)*(st.reps||0),0);
                  return(
                    <div key={ei} style={{borderRadius:14,border:'1px solid rgba(255,255,255,0.08)',background:'rgba(255,255,255,0.03)',overflow:'hidden'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',borderBottom:(e.sets||[]).length>0?'1px solid rgba(255,255,255,0.06)':'none'}}>
                        <div>
                          <div style={{fontSize:13,fontWeight:700}}>{e.name}</div>
                          {e.muscle&&<div style={{fontSize:10,color:T.textFaint,marginTop:1}}>{e.muscle}</div>}
                        </div>
                        {exVol>0&&<div style={{fontSize:12,fontWeight:700,color:T.accent}}>{Math.round(exVol).toLocaleString('fr-FR')} <span style={{fontSize:9,fontWeight:400,color:T.textFaint}}>kg</span></div>}
                      </div>
                      {(e.sets||[]).length>0&&(
                        <div style={{padding:'8px 14px'}}>
                          <div style={{display:'grid',gridTemplateColumns:'40px 1fr 1fr 1fr',gap:4,marginBottom:4}}>
                            {['Série','Poids','Reps','Volume'].map(h=>(
                              <div key={h} style={{fontSize:9,color:T.textFaint,fontWeight:700,textTransform:'uppercase',letterSpacing:0.3}}>{h}</div>
                            ))}
                          </div>
                          {(e.sets||[]).map((st,si)=>(
                            <div key={si} style={{display:'grid',gridTemplateColumns:'40px 1fr 1fr 1fr',gap:4,padding:'5px 0',borderTop:si>0?'1px solid rgba(255,255,255,0.04)':'none'}}>
                              <div style={{fontSize:12,color:T.textFaint}}>#{si+1}</div>
                              <div style={{fontSize:13,fontWeight:600,fontVariantNumeric:'tabular-nums'}}>{st.weight}<span style={{fontSize:10,color:T.textFaint,fontWeight:400}}> kg</span></div>
                              <div style={{fontSize:13,fontWeight:600,fontVariantNumeric:'tabular-nums'}}>{st.reps}<span style={{fontSize:10,color:T.textFaint,fontWeight:400}}> ×</span></div>
                              <div style={{fontSize:12,color:T.textDim,fontVariantNumeric:'tabular-nums'}}>{Math.round((st.weight||0)*(st.reps||0))}</div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Coach feedback */}
          <div>
            <div style={{fontSize:10,color:T.textFaint,fontWeight:700,letterSpacing:0.5,textTransform:'uppercase',marginBottom:8}}>Feedback coach</div>
            {s.coachFeedback&&(
              <div style={{padding:'10px 14px',borderRadius:12,background:'rgba(90,138,224,0.07)',border:'1px solid rgba(90,138,224,0.2)',fontSize:12,color:'#5A8AE0',lineHeight:1.5,marginBottom:10}}>
                {s.coachFeedback}
              </div>
            )}
            <textarea value={feedbackText} onChange={e=>setFeedbackText(e.target.value)} placeholder="Ex : Excellent travail ! Essaie +2.5 kg la prochaine fois sur le développé couché..." maxLength={500}
              style={{width:'100%',minHeight:80,padding:'10px 14px',borderRadius:12,border:'1px solid rgba(90,138,224,0.25)',background:'rgba(90,138,224,0.05)',color:T.text,fontSize:13,resize:'vertical',outline:'none',boxSizing:'border-box',fontFamily:'inherit',lineHeight:1.5}}/>
            <button onClick={submitFeedback} disabled={saving||!feedbackText.trim()} style={{marginTop:8,width:'100%',height:44,borderRadius:12,border:'none',background:saved?'rgba(44,196,160,0.2)':feedbackText.trim()?'linear-gradient(135deg,#5A8AE0,#2CC4A0)':'rgba(255,255,255,0.06)',color:saved?T.good:feedbackText.trim()?'#000':T.textFaint,fontSize:14,fontWeight:700,cursor:saving||!feedbackText.trim()?'not-allowed':'pointer',transition:'all 0.2s'}}>
              {saved?'✓ Feedback envoyé':saving?'Envoi...':'Envoyer le feedback'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {(s.exercises||[]).map((e,ei)=>(
                  <div key={ei} style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',padding:'6px 10px',borderRadius:10,background:'rgba(255,255,255,0.03)'}}>
                    <div>
                      <div style={{fontSize:12,fontWeight:600}}>{e.name}</div>
                      <div style={{fontSize:10,color:T.textFaint,marginTop:1}}>{e.muscle}</div>
                    </div>
                    <div style={{textAlign:'right',flexShrink:0}}>
                      {(e.sets||[]).map((st,si)=>(
                        <div key={si} style={{fontSize:10,color:T.textDim,fontVariantNumeric:'tabular-nums'}}>{st.weight}kg×{st.reps}</div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Coach notes shown if present */}
          {s.notes&&(
            <div style={{marginBottom:10,padding:'8px 10px',borderRadius:10,background:'rgba(200,144,64,0.06)',border:'1px solid rgba(200,144,64,0.2)',fontSize:11,color:T.warn,lineHeight:1.4}}>
              💬 Ressenti athlète : {s.notes}
            </div>
          )}

          {/* Coach feedback */}
          <div style={{marginTop:4}}>
            <div style={{fontSize:9,color:T.textFaint,fontWeight:700,letterSpacing:0.4,textTransform:'uppercase',marginBottom:6}}>Feedback coach</div>
            {s.coachFeedback&&!feedbackText&&(
              <div style={{padding:'8px 10px',borderRadius:10,background:'rgba(90,138,224,0.06)',border:'1px solid rgba(90,138,224,0.2)',fontSize:12,color:'#5A8AE0',lineHeight:1.4,marginBottom:8}}>
                {s.coachFeedback}
              </div>
            )}
            <textarea value={feedbackText} onChange={e=>setFeedbackText(e.target.value)} placeholder="Ex : Beau travail sur les squats ! Essaie +2.5kg la prochaine fois..." maxLength={500}
              style={{width:'100%',minHeight:72,padding:'8px 10px',borderRadius:10,border:'1px solid rgba(90,138,224,0.25)',background:'rgba(90,138,224,0.04)',color:T.text,fontSize:12,resize:'vertical',outline:'none',boxSizing:'border-box',fontFamily:'inherit',lineHeight:1.4}}/>
            <button onClick={submitFeedback} disabled={saving||!feedbackText.trim()} style={{marginTop:6,width:'100%',height:36,borderRadius:10,border:'none',background:saved?'rgba(44,196,160,0.2)':feedbackText.trim()?'linear-gradient(135deg,#5A8AE0,#2CC4A0)':'rgba(255,255,255,0.06)',color:saved?T.good:feedbackText.trim()?'#000':T.textFaint,fontSize:12,fontWeight:700,cursor:saving||!feedbackText.trim()?'not-allowed':'pointer',transition:'all 0.2s'}}>
              {saved?'✓ Envoyé':saving?'Envoi...':'Envoyer le feedback'}
            </button>
          </div>
        </div>
      )}

      {isDeleting&&(
        <div style={{display:'flex',gap:8,padding:'0 12px 10px'}}>
          <button onClick={onDelete} style={{flex:1,height:34,borderRadius:9,border:'none',background:'linear-gradient(135deg,#B85070,#a05060)',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer'}}>🗑️ Supprimer</button>
          <button onClick={onCancelDelete} style={{height:34,padding:'0 14px',borderRadius:9,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.textDim,fontSize:12,cursor:'pointer'}}>Annuler</button>
        </div>
      )}
      {showModal&&ReactDOM.createPortal(
        <CoachSessionModal s={s} athleteId={athleteId} onClose={()=>setShowModal(false)} onFeedbackSaved={()=>{setShowModal(false);if(onFeedbackSaved)onFeedbackSaved();}}/>,
        document.body
      )}
    </div>
  );
}

function CoachLiveSessionScreen({athleteId,athleteName,detail,onSaved,onClose}){
  const uid=()=>Math.random().toString(36).slice(2);

  const catalog=React.useMemo(()=>{
    const map=new Map();
    EQUIP.forEach(e=>map.set(e.n.toLowerCase(),{name:e.n,muscle:e.m,brand:e.b}));
    const addPersonal=(name,muscle)=>{
      const k=(name||'').trim().toLowerCase();
      if(k&&!map.has(k))map.set(k,{name:name.trim(),muscle:muscle||'',brand:'Personnel'});
    };
    Object.values(detail?.program?.data||{}).forEach(sheet=>
      Object.values(sheet).forEach(day=>(day.exercises||[]).forEach(e=>addPersonal(e.name,e.muscle)))
    );
    (detail?.sessionLibrary?.sessions||[]).forEach(s=>(s.exercises||[]).forEach(e=>addPersonal(e.name,e.muscle)));
    [...(detail?.sessions||[])].forEach(s=>(s.exercises||[]).forEach(e=>addPersonal(e.name,e.muscle)));
    return[...map.values()];
  },[detail]);

  const[exercises,setExercises]=React.useState([]); // [{id,name,muscle,brand,sets:[{weight,reps,rest,done}],groupId,groupType}]
  const[elapsed,setElapsed]=React.useState(0);
  const[mode,setMode]=React.useState('session');
  const[brandFilter,setBrandFilter]=React.useState('Tous');
  const[query,setQuery]=React.useState('');
  const[pendingEx,setPendingEx]=React.useState({name:'',muscle:'',brand:''});
  const[addingTo,setAddingTo]=React.useState(null); // null=new exercise, {exIdx} for adding set
  const[pendingGroupType,setPendingGroupType]=React.useState('classic');
  const[pendingGroupId,setPendingGroupId]=React.useState(null);
  const[setW,setSetW]=React.useState(0);
  const[setR,setSetR]=React.useState(10);
  const[setRest,setSetRest]=React.useState(90);
  const[saving,setSaving]=React.useState(false);
  const[saveError,setSaveError]=React.useState(null);
  const[confirmingClose,setConfirmingClose]=React.useState(false);
  const queryInputRef=React.useRef(null);

  React.useEffect(()=>{const t=setInterval(()=>setElapsed(e=>e+1),1000);return()=>clearInterval(t);},[]);
  React.useEffect(()=>{if(mode==='pick-exercise')setTimeout(()=>queryInputRef.current?.focus(),120);},[mode]);

  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const norm=s=>(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
  const fmtRest=s=>s>=60?`${Math.floor(s/60)}min${s%60?` ${s%60}s`:''}`:`${s}s`;

  const filteredCatalog=React.useMemo(()=>{
    let list=brandFilter==='Tous'?catalog:catalog.filter(e=>e.brand===brandFilter);
    if(query.trim())list=list.filter(e=>norm(e.name).includes(norm(query))||norm(e.muscle||'').includes(norm(query)));
    return list;
  },[catalog,brandFilter,query]);

  const openPickExercise=(groupId=null,groupType=null)=>{
    setQuery('');setBrandFilter('Tous');setPendingGroupId(groupId);
    if(groupType)setPendingGroupType(groupType);
    setMode('pick-exercise');
  };

  const selectExercise=(name,muscle,brand)=>{
    let lastW=0,lastRest=90;
    for(const s of(detail?.sessions||[])){
      const ex=(s.exercises||[]).find(e=>norm(e.name)===norm(name));
      if(ex?.sets?.length){lastW=ex.sets[ex.sets.length-1]?.weight||0;lastRest=ex.sets[ex.sets.length-1]?.rest||90;break;}
    }
    setPendingEx({name,muscle:muscle||'',brand:brand||''});
    setAddingTo(null);setSetW(lastW);setSetR(10);setSetRest(lastRest);setMode('add-set');
  };

  const openAddSet=exIdx=>{
    const ex=exercises[exIdx];
    const last=ex?.sets[ex.sets.length-1];
    setSetW(last?.weight??0);setSetR(last?.reps??10);setSetRest(last?.rest??90);
    setAddingTo({exIdx});setMode('add-set');
  };

  const confirmSet=()=>{
    if(setR<=0)return;
    if(addingTo===null){
      const gid=pendingGroupId||uid();
      setExercises(prev=>[...prev,{id:uid(),name:pendingEx.name,muscle:pendingEx.muscle,brand:pendingEx.brand,sets:[{weight:setW,reps:setR,rest:setRest,done:true}],groupId:gid,groupType:pendingGroupType}]);
      setPendingGroupId(null);
    }else{
      setExercises(prev=>prev.map((e,i)=>i!==addingTo.exIdx?e:{...e,sets:[...e.sets,{weight:setW,reps:setR,rest:setRest,done:true}]}));
    }
    setMode('session');
  };

  const removeExercise=idx=>setExercises(prev=>prev.filter((_,i)=>i!==idx));

  const handleSave=async()=>{
    const valid=exercises.filter(e=>e.sets.length>0);
    if(!valid.length)return;
    setSaving(true);
    try{
      const totalVolume=valid.reduce((s,e)=>s+e.sets.reduce((a,x)=>a+(x.weight||0)*(x.reps||0),0),0);
      await apiCall('/api/coach/athletes/'+athleteId+'/sessions',{
        method:'POST',
        body:{name:'Séance Live',date:new Date().toISOString(),exercises:valid.map(e=>({name:e.name,muscle:e.muscle,brand:e.brand,groupId:e.groupId,groupType:e.groupType,sets:e.sets})),totalVolume,duration:Math.round(elapsed/60)},
      });
      onSaved();
    }catch(e){setSaving(false);setSaveError(e.message||'Erreur réseau');}
  };

  const confirmClose=()=>{if(exercises.length>0){setConfirmingClose(true);return;}onClose();};
  const adj=(setter,delta,min=0)=>setter(v=>Math.max(min,+(v+delta).toFixed(1)));

  const groups=React.useMemo(()=>{
    const map=new Map();
    exercises.forEach((ex,idx)=>{
      if(!map.has(ex.groupId))map.set(ex.groupId,{type:ex.groupType,items:[]});
      map.get(ex.groupId).items.push({...ex,idx});
    });
    return[...map.values()];
  },[exercises]);

  const TYPE_STYLE={classic:{label:'Classique',color:'#2CC4A0'},superset:{label:'Superset',color:'#5A8AE0'},triset:{label:'Triset',color:'#BFA060'}};
  const REST_PRESETS=[30,45,60,90,120,180];

  // ── Mode : choisir exercice ──────────────────────────────────────────────────
  if(mode==='pick-exercise'){
    const exactMatch=filteredCatalog.some(e=>norm(e.name)===norm(query.trim()));
    return(
      <div style={{position:'fixed',inset:0,zIndex:300,background:T.bg,display:'flex',flexDirection:'column'}}>
        <div style={{padding:`calc(16px + env(safe-area-inset-top)) 16px 12px`,flexShrink:0,borderBottom:`1px solid ${T.border}`,display:'flex',alignItems:'center',gap:10}}>
          <button onClick={()=>setMode('session')} style={{width:36,height:36,borderRadius:18,border:`1px solid ${T.border}`,background:'rgba(255,255,255,0.04)',color:T.text,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <Icon name="chevronLeft" size={18}/>
          </button>
          <input ref={queryInputRef} value={query} onChange={e=>setQuery(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&query.trim()&&!exactMatch)selectExercise(query.trim(),'','Personnel');}}
            placeholder="Rechercher un exercice..."
            style={{flex:1,height:44,borderRadius:13,border:`1px solid ${T.border}`,background:'rgba(255,255,255,0.06)',color:T.text,fontSize:15,fontWeight:500,padding:'0 14px',outline:'none',boxSizing:'border-box',fontFamily:'inherit'}}
          />
        </div>
        <div style={{flex:1,overflow:'auto',padding:'10px 16px 40px'}}>
          {query.trim()&&!exactMatch&&(
            <button onClick={()=>selectExercise(query.trim(),'','Personnel')} style={{width:'100%',padding:'11px 14px',borderRadius:14,border:'1px dashed rgba(191,160,96,0.45)',background:'rgba(191,160,96,0.06)',color:T.accent,fontSize:14,fontWeight:700,cursor:'pointer',textAlign:'left',marginBottom:8,display:'flex',alignItems:'center',gap:10}}>
              <Icon name="plus" size={18} stroke={T.accent}/><span>Créer <strong>"{query.trim()}"</strong></span>
            </button>
          )}
          {filteredCatalog.map((ex,i)=>(
            <button key={i} onClick={()=>selectExercise(ex.name,ex.muscle,ex.brand)} style={{width:'100%',padding:'11px 14px',borderRadius:14,border:`1px solid ${T.border}`,background:'rgba(255,255,255,0.03)',color:T.text,cursor:'pointer',textAlign:'left',display:'flex',alignItems:'center',gap:10,marginBottom:5}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ex.name}</div>
                <div style={{fontSize:11,color:T.textFaint,marginTop:2,display:'flex',gap:8}}>
                  {ex.brand&&ex.brand!=='Personnel'&&<span style={{color:'rgba(191,160,96,0.65)',fontWeight:600}}>{ex.brand}</span>}
                  {ex.muscle&&<span>{ex.muscle}</span>}
                </div>
              </div>
            </button>
          ))}
        </div>
      </div>
    );
  }

  // ── Mode : ajouter une série ─────────────────────────────────────────────────
  if(mode==='add-set'){
    const isNew=addingTo===null;
    const exName=isNew?pendingEx.name:exercises[addingTo.exIdx]?.name;
    const setNum=isNew?1:(exercises[addingTo.exIdx]?.sets?.length||0)+1;
    return(
      <div style={{position:'fixed',inset:0,zIndex:310,background:'rgba(0,0,0,0.65)',display:'flex',alignItems:'flex-end'}} onClick={()=>setMode(isNew?'pick-exercise':'session')}>
        <div onClick={e=>e.stopPropagation()} style={{width:'100%',background:'#13131a',borderRadius:'22px 22px 0 0',padding:`20px 24px calc(28px + env(safe-area-inset-bottom)) 24px`,boxShadow:'0 -20px 60px rgba(0,0,0,0.6)',maxHeight:'92vh',overflowY:'auto'}}>
          <div style={{width:36,height:4,borderRadius:2,background:'rgba(255,255,255,0.12)',margin:'0 auto 18px'}}/>
          <div style={{fontSize:10,color:T.textFaint,fontWeight:700,textTransform:'uppercase',letterSpacing:0.5,marginBottom:4}}>Série {setNum}</div>
          <div style={{fontSize:18,fontWeight:800,marginBottom:20,letterSpacing:-0.3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{exName}</div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
            {[{label:'Charge',unit:'kg',val:setW,set:setSetW,step:2.5,min:0},{label:'Répétitions',unit:'reps',val:setR,set:setSetR,step:1,min:1}].map(({label,unit,val,set,step,min})=>(
              <div key={label}>
                <div style={{fontSize:10,color:T.textFaint,fontWeight:700,letterSpacing:0.4,textTransform:'uppercase',marginBottom:6}}>{label}</div>
                <div style={{display:'flex',alignItems:'center',height:52,borderRadius:14,border:`1px solid ${T.border}`,overflow:'hidden',background:'rgba(255,255,255,0.04)'}}>
                  <button onClick={()=>adj(set,-step,min)} style={{width:44,height:'100%',border:'none',background:'transparent',color:T.textDim,fontSize:22,fontWeight:300,cursor:'pointer',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
                  <input type="number" value={val} onChange={e=>set(parseFloat(e.target.value)||0)} style={{flex:1,height:'100%',border:'none',background:'transparent',color:T.text,fontSize:20,fontWeight:700,textAlign:'center',outline:'none',fontFamily:'inherit',minWidth:0,padding:0}}/>
                  <button onClick={()=>adj(set,step,min)} style={{width:44,height:'100%',border:'none',background:'transparent',color:T.textDim,fontSize:22,fontWeight:300,cursor:'pointer',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
                </div>
                <div style={{fontSize:10,color:T.textFaint,textAlign:'center',marginTop:4}}>{unit}</div>
              </div>
            ))}
          </div>

          <div style={{marginBottom:isNew&&!pendingGroupId?16:20}}>
            <div style={{fontSize:10,color:T.textFaint,fontWeight:700,letterSpacing:0.4,textTransform:'uppercase',marginBottom:8}}>Repos</div>
            <div style={{display:'flex',gap:5,marginBottom:8}}>
              {REST_PRESETS.map(v=>(
                <button key={v} onClick={()=>setSetRest(v)} style={{flex:1,height:30,borderRadius:9,border:`1px solid ${setRest===v?'rgba(90,138,224,0.5)':T.border}`,background:setRest===v?'rgba(90,138,224,0.15)':'rgba(255,255,255,0.04)',color:setRest===v?'#5A8AE0':T.textDim,fontSize:10,fontWeight:setRest===v?700:500,cursor:'pointer'}}>
                  {fmtRest(v)}
                </button>
              ))}
            </div>
            <div style={{display:'flex',alignItems:'center',height:44,borderRadius:14,border:`1px solid ${T.border}`,overflow:'hidden',background:'rgba(255,255,255,0.04)'}}>
              <button onClick={()=>adj(setSetRest,-15,0)} style={{width:44,height:'100%',border:'none',background:'transparent',color:T.textDim,fontSize:22,fontWeight:300,cursor:'pointer',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
              <div style={{flex:1,textAlign:'center',fontSize:16,fontWeight:700,color:T.text}}>{fmtRest(setRest)}</div>
              <button onClick={()=>adj(setSetRest,15,0)} style={{width:44,height:'100%',border:'none',background:'transparent',color:T.textDim,fontSize:22,fontWeight:300,cursor:'pointer',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
            </div>
          </div>

          {isNew&&!pendingGroupId&&(
            <div style={{marginBottom:20}}>
              <div style={{fontSize:10,color:T.textFaint,fontWeight:700,letterSpacing:0.4,textTransform:'uppercase',marginBottom:8}}>Type de série</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
                {Object.entries(TYPE_STYLE).map(([v,{label,color}])=>(
                  <button key={v} onClick={()=>setPendingGroupType(v)} style={{height:40,borderRadius:12,border:`1px solid ${pendingGroupType===v?color+'80':'rgba(255,255,255,0.08)'}`,background:pendingGroupType===v?color+'18':'rgba(255,255,255,0.03)',color:pendingGroupType===v?color:T.textDim,fontSize:12,fontWeight:pendingGroupType===v?700:500,cursor:'pointer'}}>
                    {label}
                  </button>
                ))}
              </div>
            </div>
          )}

          <button onClick={confirmSet} disabled={setR<=0} style={{width:'100%',height:52,borderRadius:16,border:'none',background:setR>0?'linear-gradient(135deg,#2CC4A0,#5A8AE0)':'rgba(255,255,255,0.05)',color:setR>0?'#fff':T.textFaint,fontSize:15,fontWeight:800,cursor:setR>0?'pointer':'default',display:'flex',alignItems:'center',justifyContent:'center',gap:10}}>
            <Icon name="check" size={18} stroke={setR>0?'#fff':T.textFaint}/>{isNew?'Créer l\'exercice':'Valider la série'}
          </button>
        </div>
      </div>
    );
  }

  const totalSets=exercises.reduce((s,e)=>s+e.sets.length,0);
  const totalVol=exercises.reduce((s,e)=>s+e.sets.reduce((a,x)=>a+(x.weight||0)*(x.reps||0),0),0);

  if(confirmingClose){
    return(
      <div style={{position:'fixed',inset:0,zIndex:300,background:T.bg,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32}}>
        <div style={{fontSize:40,marginBottom:16}}>⚠️</div>
        <div style={{fontSize:18,fontWeight:800,marginBottom:8,textAlign:'center'}}>Abandonner la séance ?</div>
        <div style={{fontSize:13,color:T.textFaint,marginBottom:28,textAlign:'center',lineHeight:1.6}}>
          {exercises.length} exercice{exercises.length>1?'s':''} · {totalSets} série{totalSets>1?'s':''} non enregistrés
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10,width:'100%',maxWidth:300}}>
          <button onClick={onClose} style={{height:50,borderRadius:14,border:'none',background:'rgba(184,80,112,0.15)',color:'#B85070',fontSize:14,fontWeight:700,cursor:'pointer'}}>Abandonner</button>
          <button onClick={()=>setConfirmingClose(false)} style={{height:50,borderRadius:14,border:`1px solid ${T.border}`,background:'rgba(255,255,255,0.04)',color:T.text,fontSize:14,fontWeight:600,cursor:'pointer'}}>Continuer la séance</button>
        </div>
      </div>
    );
  }

  // ── Mode : vue séance ────────────────────────────────────────────────────────
  return(
    <div style={{position:'fixed',inset:0,zIndex:300,background:T.bg,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{padding:`calc(16px + env(safe-area-inset-top)) 16px 12px`,display:'flex',alignItems:'center',gap:10,flexShrink:0,borderBottom:`1px solid ${T.border}`,background:'rgba(12,12,20,0.98)'}}>
        <button onClick={confirmClose} style={{width:36,height:36,borderRadius:18,border:'1px solid rgba(184,80,112,0.3)',background:'rgba(184,80,112,0.06)',color:'#B85070',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <Icon name="x" size={16} stroke="#B85070"/>
        </button>
        <div style={{flex:1,textAlign:'center',minWidth:0}}>
          <div style={{fontSize:10,color:'#e84040',fontWeight:800,letterSpacing:1.4,textTransform:'uppercase',display:'flex',alignItems:'center',justifyContent:'center',gap:5,marginBottom:1}}>
            <span style={{width:6,height:6,borderRadius:3,background:'#e84040',display:'inline-block',animation:'fadeIn 1s ease infinite alternate',willChange:'opacity'}}/>
            Live · {athleteName}
          </div>
          <div style={{fontSize:24,fontWeight:800,letterSpacing:3,color:T.text,fontFamily:'JetBrains Mono,monospace',lineHeight:1}}>{fmt(elapsed)}</div>
        </div>
        <button onClick={handleSave} disabled={saving||totalSets===0} style={{height:36,padding:'0 14px',borderRadius:18,border:'none',background:totalSets>0&&!saving?'linear-gradient(135deg,#2CC4A0,#5A8AE0)':'rgba(255,255,255,0.06)',color:totalSets>0&&!saving?'#fff':T.textFaint,cursor:totalSets>0&&!saving?'pointer':'default',fontSize:12,fontWeight:700,display:'flex',alignItems:'center',gap:5,flexShrink:0}}>
          {saving?'…':<><Icon name="check" size={14} stroke={totalSets>0?'#fff':T.textFaint}/>Fin</>}
        </button>
      </div>

      {saveError&&<div onClick={()=>setSaveError(null)} style={{padding:'9px 16px',background:'rgba(184,80,112,0.15)',borderBottom:'1px solid rgba(184,80,112,0.3)',color:'#e07090',fontSize:12,fontWeight:600,flexShrink:0,cursor:'pointer',textAlign:'center'}}>✗ {saveError} — touche pour fermer</div>}

      {exercises.length>0&&(
        <div style={{padding:'7px 16px',display:'flex',gap:18,flexShrink:0,background:'rgba(255,255,255,0.02)',borderBottom:`1px solid ${T.border}`}}>
          <div style={{fontSize:11,color:T.textDim}}><span style={{fontWeight:700,color:T.text}}>{exercises.length}</span> ex.</div>
          <div style={{fontSize:11,color:T.textDim}}><span style={{fontWeight:700,color:T.text}}>{totalSets}</span> série{totalSets>1?'s':''}</div>
          {totalVol>0&&<div style={{fontSize:11,color:T.textDim}}><span style={{fontWeight:700,color:T.accent}}>{Math.round(totalVol).toLocaleString('fr-FR')} kg</span></div>}
        </div>
      )}

      <div style={{flex:1,overflow:'auto',padding:'12px 16px 100px'}}>
        {exercises.length===0&&(
          <div style={{padding:'50px 0',textAlign:'center',color:T.textFaint}}>
            <div style={{fontSize:46,marginBottom:14}}>🏋️</div>
            <div style={{fontSize:15,fontWeight:700,color:T.textDim,marginBottom:6}}>Prêt à démarrer</div>
            <div style={{fontSize:12,lineHeight:1.7}}>Ajoute le premier exercice pour commencer</div>
          </div>
        )}

        {groups.map((g,gi)=>{
          const ts=TYPE_STYLE[g.type]||TYPE_STYLE.classic;
          const isComplex=g.type!=='classic';
          const maxInGroup=g.type==='triset'?3:2;
          const canAddToGroup=isComplex&&g.items.length<maxInGroup;
          return(
            <div key={gi} style={{marginBottom:10,borderRadius:16,border:`1px solid ${isComplex?ts.color+'45':T.border}`,background:isComplex?ts.color+'07':'rgba(255,255,255,0.025)',overflow:'hidden'}}>
              {isComplex&&(
                <div style={{padding:'6px 14px',background:ts.color+'12',borderBottom:`1px solid ${ts.color+'30'}`,display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:0.8,color:ts.color}}>{ts.label}</span>
                  <span style={{fontSize:10,color:T.textFaint}}>{g.items.length} exercice{g.items.length>1?'s':''}</span>
                </div>
              )}
              {g.items.map((ex,itemIdx)=>(
                <div key={ex.id} style={{borderTop:itemIdx>0?`1px solid ${T.border}`:'none'}}>
                  <div style={{padding:'10px 14px 6px',display:'flex',alignItems:'center',gap:8}}>
                    {isComplex&&<span style={{width:18,height:18,borderRadius:5,background:ts.color+'20',color:ts.color,fontSize:9,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{String.fromCharCode(65+itemIdx)}</span>}
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ex.name}</div>
                      <div style={{fontSize:10,color:T.textFaint,marginTop:1,display:'flex',gap:6}}>
                        {ex.brand&&ex.brand!=='Personnel'&&<span style={{color:'rgba(191,160,96,0.6)',fontWeight:600}}>{ex.brand}</span>}
                        {ex.muscle&&<span>{ex.muscle}</span>}
                      </div>
                    </div>
                    <button onClick={()=>removeExercise(ex.idx)} style={{width:26,height:26,borderRadius:8,border:'none',background:'rgba(184,80,112,0.08)',color:'#B85070',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      <Icon name="trash" size={12} stroke="#B85070"/>
                    </button>
                  </div>
                  {ex.sets.length>0&&(
                    <div style={{padding:'0 14px 4px',display:'flex',flexDirection:'column',gap:3}}>
                      {ex.sets.map((s,si)=>(
                        <div key={si} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 10px',borderRadius:10,background:'rgba(255,255,255,0.04)'}}>
                          <div style={{width:20,height:20,borderRadius:5,background:'rgba(44,196,160,0.15)',border:'1px solid rgba(44,196,160,0.25)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,fontWeight:800,color:T.good,flexShrink:0}}>S{si+1}</div>
                          <div style={{flex:1,fontSize:12,fontWeight:600}}>
                            {s.weight>0?<><span>{s.weight}</span><span style={{fontSize:9,color:T.textFaint,marginLeft:2}}>kg</span></>:<span style={{color:T.textFaint,fontSize:10}}>PDC</span>}
                            <span style={{color:T.textFaint,margin:'0 5px'}}>×</span>
                            <span>{s.reps}</span><span style={{fontSize:9,color:T.textFaint,marginLeft:2}}>reps</span>
                            {s.rest>0&&<span style={{fontSize:9,color:T.textFaint,marginLeft:8}}>⏱ {fmtRest(s.rest)}</span>}
                          </div>
                          <span style={{fontSize:11,color:T.good}}>✓</span>
                        </div>
                      ))}
                    </div>
                  )}
                  <div style={{padding:'4px 14px 10px'}}>
                    <button onClick={()=>openAddSet(ex.idx)} style={{width:'100%',height:32,borderRadius:10,border:'1px dashed rgba(90,138,224,0.4)',background:'rgba(90,138,224,0.04)',color:'#5A8AE0',fontSize:11,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>
                      <Icon name="plus" size={13} stroke="#5A8AE0"/>+ Série
                    </button>
                  </div>
                </div>
              ))}
              {canAddToGroup&&(
                <div style={{padding:'0 14px 12px',borderTop:`1px solid ${ts.color+'25'}`}}>
                  <button onClick={()=>openPickExercise(g.items[0].groupId,g.type)} style={{width:'100%',height:32,borderRadius:10,border:`1px dashed ${ts.color}60`,background:ts.color+'06',color:ts.color,fontSize:11,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>
                    <Icon name="plus" size={13} stroke={ts.color}/>Ex. {String.fromCharCode(65+g.items.length)} — {ts.label}
                  </button>
                </div>
              )}
            </div>
          );
        })}

        <button onClick={()=>openPickExercise()} style={{width:'100%',height:52,borderRadius:16,border:'1px solid rgba(191,160,96,0.3)',background:'rgba(191,160,96,0.06)',color:T.accent,fontSize:14,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginTop:exercises.length>0?6:0}}>
          <Icon name="plus" size={18} stroke={T.accent}/>Ajouter un exercice
        </button>
      </div>
    </div>
  );
}

function CoachScreen({authToken,authUser}){
  const[athletes,setAthletes]=React.useState([]);
  const[invites,setInvites]=React.useState([]);
  const[selected,setSelected]=React.useState(null);
  const[detail,setDetail]=React.useState(null);
  const[loading,setLoading]=React.useState(true);
  const[msg,setMsg]=React.useState(null);
  const[highlighted,setHighlighted]=React.useState(new Set());
  const prevCountsRef=React.useRef({});
  const highlightTimerRef=React.useRef(null);
  const fileRef=React.useRef(null);
  const libFileRef=React.useRef(null);
  const[showLiveSession,setShowLiveSession]=React.useState(false);
  const[confirmAction,setConfirmAction]=React.useState(null); // {msg,onConfirm}

  // Detect session count increases → highlight + pulse
  React.useEffect(()=>{
    const newH=new Set();
    for(const a of athletes){
      const prev=prevCountsRef.current[a.id];
      if(prev!==undefined&&a.sessionCount>prev)newH.add(a.id);
      prevCountsRef.current[a.id]=a.sessionCount;
    }
    if(newH.size>0){
      setHighlighted(newH);
      if(highlightTimerRef.current)clearTimeout(highlightTimerRef.current);
      highlightTimerRef.current=setTimeout(()=>setHighlighted(new Set()),4000);
    }
  },[athletes]);

  const[available,setAvailable]=React.useState([]);
  const[showAvailable,setShowAvailable]=React.useState(false);
  const[pending,setPending]=React.useState([]);
  const[coachView,setCoachView]=React.useState('athletes'); // 'athletes'|'calendar'
  const isMain=authUser&&authUser.isMainCoach;

  const load=React.useCallback(async()=>{
    try{
      setLoading(true);
      const baseReqs=[
        apiCall('/api/coach/athletes'),
        apiCall('/api/coach/invites'),
        apiCall('/api/coach/available-athletes'),
      ];
      if(isMain)baseReqs.push(apiCall('/api/admin/pending'));
      const results=await Promise.all(baseReqs);
      setAthletes(Array.isArray(results[0])?results[0]:(results[0].athletes||[]));setInvites(results[1]);setAvailable(Array.isArray(results[2])?results[2]:(results[2].athletes||[]));
      if(isMain)setPending(results[3]);
    }catch(e){console.error(e);}
    setLoading(false);
  },[isMain]);
  React.useEffect(()=>{load();},[load]);

  const approveUser=(p,role='athlete')=>{
    if(role==='coach'){
      setConfirmAction({msg:`Promouvoir ${p.email} en COACH ? Il pourra gérer ses propres athlètes.`,onConfirm:async()=>{
        try{await apiCall('/api/admin/approve/'+p.id,{method:'POST',body:{role}});flash(`✓ ${p.email} promu coach`);load();}
        catch(e){flash('✗ '+(e.message||e));}
      }});
      return;
    }
    apiCall('/api/admin/approve/'+p.id,{method:'POST',body:{role}})
      .then(()=>{flash(`✓ ${p.email} ajouté comme athlète`);load();})
      .catch(e=>flash('✗ '+(e.message||e)));
  };
  const rejectUser=(p)=>{
    setConfirmAction({msg:`Rejeter ${p.email} ? Le compte sera supprimé.`,onConfirm:async()=>{
      try{await apiCall('/api/admin/reject/'+p.id,{method:'POST'});flash(`Demande de ${p.email} rejetée`);load();}
      catch(e){flash('✗ '+(e.message||e));}
    }});
  };

  const claimAthlete=async a=>{
    try{
      await apiCall('/api/coach/claim/'+a.id,{method:'POST'});
      flash(`✓ ${a.firstName||a.email.split('@')[0]} récupéré`);
      load();
    }catch(e){
      if(e.message==='already_coached')flash('Cet athlète a déjà un coach');
      else flash('Erreur: '+e.message);
    }
  };

  // Realtime: refresh athletes when sessions/profile/nutrition come in
  useSocket(authToken,{
    'session-added':()=>{load();if(selected)reloadDetail(selected.id);},
    'athlete-profile-updated':()=>{load();},
    'pending-request':()=>{load();},
    'nutrition-meal-validated':({athleteId:aid})=>{if(selected&&aid===selected.id)reloadDetail(selected.id);},
  });

  const[nutriDetail,setNutriDetail]=React.useState(null);
  const[nutriMode,setNutriMode]=React.useState('mirror'); // 'mirror' | 'edit'
  const[showDangerZone,setShowDangerZone]=React.useState(false);
  const[detailTab,setDetailTab]=React.useState('profil'); // 'profil'|'sport'|'nutrition'|'historique'|'album'
  const[deletingSessionId,setDeletingSessionId]=React.useState(null); // long-press suppression
  const sessionPressTimer=React.useRef(null);

  const deleteSession=async(sid,athleteId)=>{
    try{
      await apiCall('/api/coach/sessions/'+sid,{method:'DELETE'});
      reloadDetail(athleteId);
    }catch(e){alert('Erreur: '+e.message);}
    setDeletingSessionId(null);
  };
  const reloadDetail=async id=>{
    try{
      const[d,n,lib]=await Promise.all([
        apiCall('/api/coach/athletes/'+id),
        apiCall('/api/coach/athletes/'+id+'/nutrition').catch(()=>({plan:null})),
        apiCall('/api/coach/session-library-for/'+id).catch(()=>({sessions:[],assignedAt:null})),
      ]);
      setDetail({...d,sessionLibrary:lib});
      setNutriDetail(n);
    }catch(e){}
  };

  const flash=t=>{setMsg(t);setTimeout(()=>setMsg(null),2500);};

  const generateInvite=async()=>{
    const{code}=await apiCall('/api/coach/invites',{method:'POST'});
    if(navigator.clipboard)navigator.clipboard.writeText(code).catch(()=>{});
    flash(`✓ Code copié : ${code}`);
    load();
  };

  const[showCreateAthlete,setShowCreateAthlete]=React.useState(false);
  const[createForm,setCreateForm]=React.useState({email:'',password:'',firstName:'',lastName:''});
  const[creating,setCreating]=React.useState(false);
  const[longPressMenu,setLongPressMenu]=React.useState(null); // athlète ciblé par l'appui long
  const longPressTimer=React.useRef(null);
  const startLongPress=(a,e)=>{
    e.preventDefault();
    longPressTimer.current=setTimeout(()=>setLongPressMenu(a),500);
  };
  const cancelLongPress=()=>{clearTimeout(longPressTimer.current);};


  const submitCreateAthlete=async e=>{
    e.preventDefault();
    setCreating(true);
    try{
      const u=await apiCall('/api/coach/create-athlete',{method:'POST',body:createForm});
      flash(`✓ ${u.user.email} créé et rattaché`);
      setShowCreateAthlete(false);
      setCreateForm({email:'',password:'',firstName:'',lastName:''});
      load();
    }catch(err){
      const msgs={email_already_used:'Email déjà utilisé',password_too_short:'Mot de passe trop court (6 car. min)',email_and_password_required:'Email et mot de passe requis'};
      alert(msgs[err.message]||'Erreur: '+err.message);
    }
    setCreating(false);
  };

  const removeAthlete=a=>{
    setConfirmAction({msg:`Supprimer définitivement ${a.firstName||a.email} ? Irréversible.`,onConfirm:async()=>{
      await apiCall('/api/coach/athletes/'+a.id,{method:'DELETE'});
      if(selected?.id===a.id){setSelected(null);setDetail(null);}
      flash('✓ Athlète supprimé');
      load();
    }});
  };

  const[showEditAthlete,setShowEditAthlete]=React.useState(false);
  const[editForm,setEditForm]=React.useState({email:'',password:'',firstName:'',lastName:''});
  const[editing,setEditing]=React.useState(false);

  const openEditAthlete=a=>{
    setEditForm({email:a.email||'',password:'',firstName:a.firstName||'',lastName:a.lastName||''});
    setShowEditAthlete(true);
  };

  const submitEditAthlete=async e=>{
    e.preventDefault();
    if(!selected)return;
    setEditing(true);
    try{
      const body={firstName:editForm.firstName,lastName:editForm.lastName};
      if(editForm.email&&editForm.email!==selected.email)body.email=editForm.email;
      if(editForm.password)body.password=editForm.password;
      await apiCall('/api/coach/athletes/'+selected.id,{method:'PATCH',body});
      flash('✓ Athlète modifié');
      setShowEditAthlete(false);
      reloadDetail(selected.id);
      load();
    }catch(err){
      const msgs={email_already_used:'Email déjà utilisé',password_too_short:'Mot de passe trop court (6 car. min)'};
      alert(msgs[err.message]||'Erreur: '+err.message);
    }
    setEditing(false);
  };

  const openDetail=a=>{setSelected(a);reloadDetail(a.id);};
