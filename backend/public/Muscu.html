function timeAgo(ts){
  if(!ts)return null;
  const d=Date.now()-ts;
  if(d<60000)return"à l'instant";
  if(d<3600000)return"il y a "+Math.floor(d/60000)+"min";
  if(d<86400000)return"il y a "+Math.floor(d/3600000)+"h";
  if(d<604800000)return"il y a "+Math.floor(d/86400000)+"j";
  return new Date(ts).toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
}

// ── Coach Global Calendar ────────────────────────────────────────────────────
function CoachCalendarView({authToken,athletes,onBack,onOpenAthlete}){
  const now=new Date();
  const[year,setYear]=React.useState(now.getFullYear());
  const[month,setMonth]=React.useState(now.getMonth()+1);
  const[calData,setCalData]=React.useState(null);
  const[loading,setLoading]=React.useState(false);
  const[selectedDay,setSelectedDay]=React.useState(null);

  React.useEffect(()=>{
    setLoading(true);
    setCalData(null);
    apiCall(`/api/coach/calendar?year=${year}&month=${month}`)
      .then(d=>setCalData(d))
      .catch(console.error)
      .finally(()=>setLoading(false));
  },[year,month]);

  const prevMonth=()=>{if(month===1){setYear(y=>y-1);setMonth(12);}else setMonth(m=>m-1);setSelectedDay(null);};
  const nextMonth=()=>{if(month===12){setYear(y=>y+1);setMonth(1);}else setMonth(m=>m+1);setSelectedDay(null);};

  const MONTH_NAMES=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const DAY_LABELS=['Lu','Ma','Me','Je','Ve','Sa','Di'];

  // Build grid: weeks × 7
  const firstDay=new Date(year,month-1,1).getDay(); // 0=Sun
  const startOffset=(firstDay+6)%7; // Mon=0
  const daysInMonth=new Date(year,month,0).getDate();
  const cells=[];
  for(let i=0;i<startOffset;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);

  const isToday=(d)=>d&&year===now.getFullYear()&&month===now.getMonth()+1&&d===now.getDate();

  const dotsForDay=(d)=>{
    if(!calData||!d)return[];
    const dots=[];
    for(const ath of calData){
      const dayStr=String(d).padStart(2,'0');
      const hasSession=ath.sessionDates.some(s=>s.endsWith(`-${dayStr}`));
      const hasNutri=ath.nutriDates.some(s=>s.endsWith(`-${dayStr}`));
      const hasProg=ath.programDays.some(pd=>{
        // programDays are day-of-week labels; we check if this calendar day matches
        const jsDay=new Date(year,month-1,d).getDay();
        const DAYS=['DIMANCHE','LUNDI','MARDI','MERCREDI','JEUDI','VENDREDI','SAMEDI'];
        return pd===DAYS[jsDay];
      });
      if(hasSession||hasNutri||hasProg)dots.push({color:ath.color,hasSession,hasNutri,hasProg,name:ath.name,id:ath.id});
    }
    return dots;
  };

  const selectedDots=selectedDay?dotsForDay(selectedDay):[];
  const selectedAths=selectedDay&&calData?calData.filter(ath=>{
    const dayStr=String(selectedDay).padStart(2,'0');
    const hasSession=ath.sessionDates.some(s=>s.endsWith(`-${dayStr}`));
    const hasNutri=ath.nutriDates.some(s=>s.endsWith(`-${dayStr}`));
    const jsDay=new Date(year,month-1,selectedDay).getDay();
    const DAYS=['DIMANCHE','LUNDI','MARDI','MERCREDI','JEUDI','VENDREDI','SAMEDI'];
    const hasProg=ath.programDays.some(pd=>pd===DAYS[jsDay]);
    return hasSession||hasNutri||hasProg;
  }):[];

  return(
    <div style={{padding:'18px 18px 100px',color:T.text}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <button onClick={onBack} style={{width:40,height:40,borderRadius:13,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.textDim,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <Icon name="chevronLeft" size={18} stroke={T.textDim}/>
        </button>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:T.textDim,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase'}}>Coaching</div>
          <div style={{fontSize:22,fontWeight:700,letterSpacing:-0.5}}><HoloText>Calendrier global</HoloText></div>
        </div>
      </div>

      {/* Month nav */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
        <button onClick={prevMonth} style={{width:36,height:36,borderRadius:11,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.text,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <Icon name="chevronLeft" size={16} stroke={T.text}/>
        </button>
        <div style={{fontSize:16,fontWeight:700}}>{MONTH_NAMES[month-1]} {year}</div>
        <button onClick={nextMonth} style={{width:36,height:36,borderRadius:11,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.text,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <Icon name="chevronRight" size={16} stroke={T.text}/>
        </button>
      </div>

      {/* Legend */}
      {calData&&calData.length>0&&(
        <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:14}}>
          {calData.map(a=>(
            <div key={a.id} style={{display:'flex',alignItems:'center',gap:5,padding:'3px 9px',borderRadius:999,background:'rgba(255,255,255,0.04)',border:`1px solid ${a.color}44`,fontSize:11,fontWeight:600,cursor:'pointer'}} onClick={()=>onOpenAthlete(athletes.find(x=>x.id===a.id)||{id:a.id,email:a.name})}>
              <div style={{width:8,height:8,borderRadius:4,background:a.color,flexShrink:0}}/>
              {a.name}
            </div>
          ))}
        </div>
      )}

      {/* Grid */}
      {loading?(
        <div style={{padding:40,textAlign:'center',color:T.textFaint,fontSize:13}}>Chargement…</div>
      ):(
        <>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}}>
            {DAY_LABELS.map(l=>(
              <div key={l} style={{textAlign:'center',fontSize:10,fontWeight:700,color:T.textFaint,padding:'4px 0',letterSpacing:0.3}}>{l}</div>
            ))}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}}>
            {cells.map((d,i)=>{
              if(!d)return <div key={`e${i}`}/>;
              const dots=dotsForDay(d);
              const today=isToday(d);
              const selected=selectedDay===d;
              return(
                <button key={d} onClick={()=>setSelectedDay(selected?null:d)} style={{
                  aspectRatio:'1',borderRadius:10,border:selected?`2px solid #7ca8c4`:`1px solid ${today?'rgba(217,119,87,0.5)':T.border}`,
                  background:selected?'rgba(124,168,196,0.15)':today?'rgba(217,119,87,0.08)':'rgba(255,255,255,0.02)',
                  cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2,padding:'4px 2px',position:'relative'
                }}>
                  <span style={{fontSize:12,fontWeight:today?800:500,color:today?T.accent:T.text}}>{d}</span>
                  {dots.length>0&&(
                    <div style={{display:'flex',gap:2,flexWrap:'wrap',justifyContent:'center',maxWidth:'100%'}}>
                      {dots.slice(0,4).map((dot,di)=>(
                        <div key={di} style={{width:5,height:5,borderRadius:3,background:dot.color,flexShrink:0}}/>
                      ))}
                      {dots.length>4&&<div style={{width:5,height:5,borderRadius:3,background:T.textFaint}}/>}
                    </div>
                  )}
                </button>
              );
            })}
          </div>

          {/* Day detail panel */}
          {selectedDay&&(
            <div style={{marginTop:16,padding:14,borderRadius:16,background:'rgba(255,255,255,0.04)',border:`1px solid ${T.border}`}}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:10,color:T.textDim}}>
                {new Date(year,month-1,selectedDay).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}
              </div>
              {selectedAths.length===0?(
                <div style={{fontSize:12,color:T.textFaint,textAlign:'center',padding:'10px 0'}}>Aucune activité ce jour</div>
              ):(
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {selectedAths.map(ath=>{
                    const dayStr=String(selectedDay).padStart(2,'0');
                    const hasSession=ath.sessionDates.some(s=>s.endsWith(`-${dayStr}`));
                    const hasNutri=ath.nutriDates.some(s=>s.endsWith(`-${dayStr}`));
                    const jsDay=new Date(year,month-1,selectedDay).getDay();
                    const DAYS=['DIMANCHE','LUNDI','MARDI','MERCREDI','JEUDI','VENDREDI','SAMEDI'];
                    const hasProg=ath.programDays.some(pd=>pd===DAYS[jsDay]);
                    return(
                      <div key={ath.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 10px',borderRadius:11,background:'rgba(255,255,255,0.03)',border:`1px solid ${ath.color}33`,cursor:'pointer'}} onClick={()=>onOpenAthlete(athletes.find(x=>x.id===ath.id)||{id:ath.id,email:ath.name})}>
                        <div style={{width:8,height:32,borderRadius:4,background:ath.color,flexShrink:0}}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:12,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ath.name}</div>
                          <div style={{display:'flex',gap:6,marginTop:3,flexWrap:'wrap'}}>
                            {hasSession&&<span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:999,background:'rgba(124,196,161,0.15)',color:'#7cc4a1',border:'1px solid rgba(124,196,161,0.3)'}}>💪 Séance</span>}
                            {hasNutri&&<span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:999,background:'rgba(124,168,196,0.15)',color:'#7ca8c4',border:'1px solid rgba(124,168,196,0.3)'}}>🥗 Nutrition</span>}
                            {hasProg&&<span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:999,background:'rgba(217,119,87,0.12)',color:T.accent,border:'1px solid rgba(217,119,87,0.3)'}}>📋 Programme</span>}
                          </div>
                        </div>
                        <Icon name="chevronRight" size={14} stroke={T.textFaint}/>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}
        </>
      )}
    </div>
  );
}

function CoachScreen({authToken,authUser}){
  const[athletes,setAthletes]=React.useState([]);
  const[invites,setInvites]=React.useState([]);
  const[selected,setSelected]=React.useState(null);
  const[detail,setDetail]=React.useState(null);
  const[loading,setLoading]=React.useState(true);
  const[msg,setMsg]=React.useState(null);
  const[highlighted,setHighlighted]=React.useState(new Set());
  const prevCountsRef=React.useRef({});
  const highlightTimerRef=React.useRef(null);
  const fileRef=React.useRef(null);

  // Detect session count increases → highlight + pulse
  React.useEffect(()=>{
    const newH=new Set();
    for(const a of athletes){
      const prev=prevCountsRef.current[a.id];
      if(prev!==undefined&&a.sessionCount>prev)newH.add(a.id);
      prevCountsRef.current[a.id]=a.sessionCount;
    }
    if(newH.size>0){
      setHighlighted(newH);
      if(highlightTimerRef.current)clearTimeout(highlightTimerRef.current);
      highlightTimerRef.current=setTimeout(()=>setHighlighted(new Set()),4000);
    }
  },[athletes]);

  const[available,setAvailable]=React.useState([]);
  const[showAvailable,setShowAvailable]=React.useState(false);
  const[pending,setPending]=React.useState([]);
  const[coachView,setCoachView]=React.useState('athletes'); // 'athletes'|'calendar'
  const isMain=authUser&&authUser.isMainCoach;

  const load=React.useCallback(async()=>{
    try{
      setLoading(true);
      const baseReqs=[
        apiCall('/api/coach/athletes'),
        apiCall('/api/coach/invites'),
        apiCall('/api/coach/available-athletes'),
      ];
      if(isMain)baseReqs.push(apiCall('/api/admin/pending'));
      const results=await Promise.all(baseReqs);
      setAthletes(results[0]);setInvites(results[1]);setAvailable(results[2]);
      if(isMain)setPending(results[3]);
    }catch(e){console.error(e);}
    setLoading(false);
  },[isMain]);
  React.useEffect(()=>{load();},[load]);

  const approveUser=async(p,role='athlete')=>{
    if(role==='coach'&&!confirm(`Promouvoir ${p.email} en COACH ?\n\nIl pourra créer ses propres athlètes et gérer leurs programmes.`))return;
    try{
      await apiCall('/api/admin/approve/'+p.id,{method:'POST',body:{role}});
      flash(role==='coach'?`✓ ${p.email} promu coach`:`✓ ${p.email} ajouté comme athlète`);
      load();
    }catch(e){alert('Erreur: '+e.message);}
  };
  const rejectUser=async(p)=>{
    if(!confirm(`Rejeter ${p.email} ? Le compte sera supprimé définitivement.`))return;
    try{
      await apiCall('/api/admin/reject/'+p.id,{method:'POST'});
      flash(`Demande de ${p.email} rejetée`);
      load();
    }catch(e){alert('Erreur: '+e.message);}
  };

  const claimAthlete=async a=>{
    try{
      await apiCall('/api/coach/claim/'+a.id,{method:'POST'});
      flash(`✓ ${a.firstName||a.email.split('@')[0]} récupéré`);
      load();
    }catch(e){
      if(e.message==='already_coached')flash('Cet athlète a déjà un coach');
      else flash('Erreur: '+e.message);
    }
  };

  // Realtime: refresh athletes when sessions/profile/nutrition come in
  useSocket(authToken,{
    'session-added':()=>{load();if(selected)reloadDetail(selected.id);},
    'athlete-profile-updated':()=>{load();},
    'pending-request':()=>{load();},
    'nutrition-meal-validated':({athleteId:aid})=>{if(selected&&aid===selected.id)reloadDetail(selected.id);},
  });

  const[nutriDetail,setNutriDetail]=React.useState(null);
  const[nutriMode,setNutriMode]=React.useState('mirror'); // 'mirror' | 'edit'
  const[showDangerZone,setShowDangerZone]=React.useState(false);
  const[detailTab,setDetailTab]=React.useState('profil'); // 'profil'|'sport'|'nutrition'|'historique'|'album'
  const reloadDetail=async id=>{
    try{
      const[d,n]=await Promise.all([
        apiCall('/api/coach/athletes/'+id),
        apiCall('/api/coach/athletes/'+id+'/nutrition').catch(()=>({plan:null})),
      ]);
      setDetail(d);
      setNutriDetail(n);
    }catch(e){}
  };

  const flash=t=>{setMsg(t);setTimeout(()=>setMsg(null),2500);};

  const generateInvite=async()=>{
    const{code}=await apiCall('/api/coach/invites',{method:'POST'});
    if(navigator.clipboard)navigator.clipboard.writeText(code).catch(()=>{});
    flash(`✓ Code copié : ${code}`);
    load();
  };

  const removeAthlete=async a=>{
    if(!confirm(`Retirer ${a.firstName||a.email} de tes athlètes ?`))return;
    await apiCall('/api/coach/athletes/'+a.id,{method:'DELETE'});
    if(selected?.id===a.id){setSelected(null);setDetail(null);}
    flash('Athlète retiré');
    load();
  };

  const openDetail=a=>{setSelected(a);reloadDetail(a.id);};
  const closeDetail=()=>{setSelected(null);setDetail(null);setNutriDetail(null);setNutriMode('mirror');setShowDangerZone(false);};

  const handleExcel=e=>{
    const file=e.target.files[0];
    if(!file||!selected)return;
    e.target.value='';
    flash('⏳ Import en cours...');
    parseYannisExcel(file,async data=>{
      try{
        const nD=Object.values(data).reduce((s,d)=>s+Object.keys(d).length,0);
        if(nD===0){flash('✗ Aucun jour détecté');return;}
        await apiCall('/api/coach/program/'+selected.id,{method:'PUT',body:{data}});
        flash(`✓ Programme assigné · ${nD} jour${nD>1?'s':''}`);
        reloadDetail(selected.id);
        load();
      }catch(ex){flash('✗ '+(ex.message||ex));console.error('handleExcel:',ex);}
    },err=>flash('✗ '+err));
  };

  // Optimistic patch of athlete profile
  const patchTimerRef=React.useRef({});
  const patchAthlete=React.useCallback(patch=>{
    if(!selected)return;
    setDetail(d=>d?{...d,...patch}:d);
    // Debounce per-field
    const key=Object.keys(patch)[0];
    if(patchTimerRef.current[key])clearTimeout(patchTimerRef.current[key]);
    patchTimerRef.current[key]=setTimeout(async()=>{
      try{
        await apiCall('/api/coach/athletes/'+selected.id,{method:'PATCH',body:patch});
        load();
      }catch(e){flash('Erreur sync: '+e.message);}
    },400);
  },[selected,load]);

  const resetAthlete=async(opts,label)=>{
    if(!selected)return;
    if(!confirm(`Réinitialiser ${label} de ${detail?.firstName||selected.email} ? Cette action est irréversible.`))return;
    try{
      await apiCall('/api/coach/athletes/'+selected.id+'/reset',{method:'POST',body:opts});
      flash(`✓ ${label} réinitialisé`);
      reloadDetail(selected.id);
      load();
    }catch(e){alert('Erreur: '+e.message);}
  };

  // ── Detail view ─────────────────────────────────
  if(selected){
    const a=detail||selected;
    const sessions=detail?.sessions||[];
    const totalVol=sessions.reduce((s,x)=>s+(x.totalVolume||0),0);
    const programDays=Object.values(a.program?.data||{}).reduce((s,d)=>s+Object.keys(d).length,0);
    const programMonths=Object.keys(a.program?.data||{}).length;

    const TABS=[
      {id:'profil',label:'Profil',icon:'user'},
      {id:'sport',label:'Séances',icon:'dumbbell'},
      {id:'nutrition',label:'Nutrition',icon:'apple'},
      {id:'historique',label:'Historique',icon:'clock'},
      {id:'album',label:'Album',icon:'image'},
    ];

    return(
      <div style={{padding:'18px 0 100px',color:T.text}}>
        <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel,text/csv,application/octet-stream" style={{display:'none'}} onChange={handleExcel}/>

        {/* Header */}
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12,padding:'0 18px'}}>
          <button onClick={closeDetail} style={{width:36,height:36,borderRadius:18,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.text,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Icon name="chevronLeft" size={18}/>
          </button>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:11,color:T.textDim,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase'}}>Athlète</div>
            <div style={{fontSize:22,fontWeight:700,letterSpacing:-0.4,marginTop:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.firstName||a.email.split('@')[0]} {a.lastName}</div>
          </div>
          <button onClick={()=>reloadDetail(a.id)} style={{width:36,height:36,borderRadius:11,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.textDim,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}} title="Rafraîchir">
            <Icon name="refresh" size={15} stroke={T.textDim}/>
          </button>
        </div>

        {msg&&<div style={{margin:'0 18px 12px',padding:'10px 14px',borderRadius:11,background:'rgba(124,196,161,0.12)',border:'1px solid rgba(124,196,161,0.3)',color:T.good,fontSize:13,fontWeight:600,textAlign:'center'}}>{msg}</div>}

        {/* Tab bar */}
        <div style={{display:'flex',gap:0,marginBottom:16,padding:'0 18px',overflowX:'auto',scrollbarWidth:'none'}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setDetailTab(t.id)} style={{flex:'0 0 auto',padding:'7px 13px',borderRadius:10,border:'none',background:detailTab===t.id?T.accentSoft:'transparent',color:detailTab===t.id?T.accent:T.textDim,fontSize:12,fontWeight:detailTab===t.id?700:500,cursor:'pointer',whiteSpace:'nowrap',transition:'all 0.15s'}}>
              {t.label}
            </button>
          ))}
        </div>

        {/* ── Tab 1 : Profil ── */}
        {detailTab==='profil'&&(()=>{
          const F=({label,value,onCommit,suffix,type='text'})=>{
            const[v,setV]=React.useState(value||'');
            React.useEffect(()=>setV(value||''),[value]);
            return(
              <div style={{display:'flex',flexDirection:'column',gap:2}}>
                <div style={{fontSize:9,color:T.textFaint,fontWeight:600,letterSpacing:0.3,textTransform:'uppercase'}}>{label}</div>
                <div style={{display:'flex',alignItems:'center',gap:3,height:30,padding:'0 8px',borderRadius:8,background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)'}}>
                  <input type={type} inputMode={type==='number'?'decimal':undefined} value={v}
                    onChange={e=>setV(e.target.value)}
                    onBlur={e=>onCommit(e.target.value)}
                    style={{flex:1,minWidth:0,width:'100%',background:'transparent',border:'none',color:T.text,fontSize:12,fontWeight:600,outline:'none',fontFamily:'inherit',padding:0}}
                    placeholder="—"/>
                  {suffix&&<span style={{fontSize:10,color:T.textDim,fontWeight:600,flexShrink:0}}>{suffix}</span>}
                </div>
              </div>
            );
          };
          return(
            <div style={{padding:'0 18px'}}>
              <GlassCard padding={10} style={{marginBottom:12}}>
                <div style={{fontSize:10,color:T.textFaint,marginBottom:8,display:'flex',alignItems:'center',gap:5}}>
                  <Icon name="user" size={11} stroke={T.textFaint}/>
                  <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,minWidth:0}}>{a.email}</span>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:6}}>
                  <F label="Prénom" value={a.firstName} onCommit={v=>patchAthlete({firstName:v})}/>
                  <F label="Nom" value={a.lastName} onCommit={v=>patchAthlete({lastName:v})}/>
                  <F label="Taille" value={a.height} onCommit={v=>patchAthlete({height:v})} suffix="cm" type="number"/>
                  <F label="Poids" value={a.weight} onCommit={v=>patchAthlete({weight:v})} suffix="kg" type="number"/>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:4}}>
                  {['Hypertrophie','Force','Perte','Endurance'].map((o,i)=>{
                    const full=['Hypertrophie','Force','Perte de poids','Endurance'][i];
                    return(
                      <button key={o} onClick={()=>patchAthlete({objective:full})} style={{height:26,padding:'0 4px',borderRadius:7,border:a.objective===full?'1px solid transparent':'1px solid rgba(255,255,255,0.1)',background:a.objective===full?T.accentSoft:'rgba(255,255,255,0.03)',color:a.objective===full?T.accent:T.textDim,fontSize:10,fontWeight:600,cursor:'pointer',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{o}</button>
                    );
                  })}
                </div>
              </GlassCard>

              {/* Stats rapides */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
                {[
                  {label:'Séances',value:sessions.length,unit:''},
                  {label:'Volume total',value:Math.round(totalVol/1000),unit:'t'},
                  {label:'Programme',value:programDays>0?`${programMonths}M`:'-',unit:''},
                ].map(stat=>(
                  <GlassCard key={stat.label} padding={10} style={{textAlign:'center'}}>
                    <div style={{fontSize:20,fontWeight:700,letterSpacing:-0.5}}>{stat.value}<span style={{fontSize:11,fontWeight:500,color:T.textDim,marginLeft:1}}>{stat.unit}</span></div>
                    <div style={{fontSize:10,color:T.textFaint,marginTop:2}}>{stat.label}</div>
                  </GlassCard>
                ))}
              </div>

              {/* Danger zone */}
              <button onClick={()=>setShowDangerZone(s=>!s)} style={{width:'100%',marginTop:8,height:38,borderRadius:11,border:'1px solid rgba(255,255,255,0.08)',background:'rgba(255,255,255,0.03)',color:T.textFaint,fontSize:11,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:5,letterSpacing:0.3}}>
                {showDangerZone?'▴ Masquer':'⋯ Plus d\'options'}
              </button>
              {showDangerZone&&(
                <div style={{marginTop:8,padding:12,borderRadius:12,background:'rgba(194,160,66,0.04)',border:'1px solid rgba(194,160,66,0.2)',display:'flex',flexDirection:'column',gap:6}}>
                  <div style={{fontSize:10,color:T.warn,fontWeight:700,letterSpacing:0.4,textTransform:'uppercase',marginBottom:4}}>⚠ Actions irréversibles</div>
                  <button onClick={()=>resetAthlete({profile:true},'le profil')} style={{height:34,borderRadius:9,border:'1px solid rgba(194,160,66,0.25)',background:'transparent',color:T.warn,fontSize:11,fontWeight:600,cursor:'pointer',textAlign:'left',padding:'0 12px'}}>Réinitialiser le profil</button>
                  <button onClick={()=>resetAthlete({program:true},'le programme')} style={{height:34,borderRadius:9,border:'1px solid rgba(194,160,66,0.25)',background:'transparent',color:T.warn,fontSize:11,fontWeight:600,cursor:'pointer',textAlign:'left',padding:'0 12px'}}>Effacer le programme</button>
                  <button onClick={()=>resetAthlete({history:true},"l'historique")} style={{height:34,borderRadius:9,border:'1px solid rgba(194,160,66,0.25)',background:'transparent',color:T.warn,fontSize:11,fontWeight:600,cursor:'pointer',textAlign:'left',padding:'0 12px'}}>Effacer l'historique ({sessions.length})</button>
                  <button onClick={()=>resetAthlete({profile:true,program:true,history:true},'TOUTES les données')} style={{height:36,borderRadius:9,border:'1px solid rgba(201,117,134,0.4)',background:'rgba(201,117,134,0.06)',color:T.danger,fontSize:11,fontWeight:700,cursor:'pointer',textAlign:'left',padding:'0 12px'}}>🔥 Tout réinitialiser</button>
                  <div style={{height:1,background:'rgba(255,255,255,0.06)',margin:'4px 0'}}/>
                  <button onClick={()=>removeAthlete(a)} style={{height:36,borderRadius:9,border:'1px solid rgba(201,117,134,0.25)',background:'transparent',color:T.danger,fontSize:11,fontWeight:600,cursor:'pointer',textAlign:'left',padding:'0 12px'}}>Détacher l'athlète (compte préservé)</button>
                </div>
              )}
            </div>
          );
        })()}

        {/* ── Tab 2 : Séances / Programme ── */}
        {detailTab==='sport'&&(
          <div style={{padding:'0 18px'}}>
            {/* Import programme */}
            <div style={{display:'flex',gap:6,marginBottom:12}}>
              <button onClick={()=>fileRef.current.click()} style={{flex:1,padding:12,borderRadius:12,border:`1px solid ${programDays>0?T.border:'rgba(217,119,87,0.35)'}`,background:programDays>0?'rgba(255,255,255,0.025)':'linear-gradient(135deg,rgba(217,119,87,0.12),rgba(201,117,134,0.06))',color:T.text,cursor:'pointer',display:'flex',alignItems:'center',gap:10,textAlign:'left'}}>
                <div style={{width:36,height:36,borderRadius:10,background:programDays>0?'rgba(217,119,87,0.12)':'linear-gradient(135deg,#d97757,#c97586)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:16}}>
                  {programDays>0?'📋':'📥'}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,letterSpacing:0.1}}>{programDays>0?`${programMonths} mois · ${programDays} jours`:'Importer programme'}</div>
                  <div style={{fontSize:10,color:T.textFaint,marginTop:1}}>{programDays>0?a.program?.assignedAt?`maj ${new Date(a.program.assignedAt).toLocaleDateString('fr-FR')}`:'Programme actif':'Excel du programme musculation'}</div>
                </div>
              </button>
              {programDays>0&&(
                <button onClick={async()=>{
                  if(!confirm(`Supprimer le programme importé pour ${a.firstName||a.email.split('@')[0]} ?`))return;
                  try{await apiCall('/api/coach/program/'+a.id,{method:'DELETE'});flash('✓ Programme supprimé');reloadDetail(a.id);load();}
                  catch(e){flash('✗ '+(e.message||e));}
                }} title="Supprimer le programme" style={{width:48,padding:0,borderRadius:12,border:'1px solid rgba(217,119,87,0.25)',background:'rgba(217,119,87,0.06)',color:T.accent,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <Icon name="trash" size={16} stroke={T.accent}/>
                </button>
              )}
            </div>

            {/* Calendrier sport */}
            <SectionHeader title="Calendrier"/>
            <AthleteCalendarSummary
              sessions={sessions}
              program={a.program}
              nutriHistory={nutriDetail?.history}
              nutriPlan={nutriDetail?.plan}
              mode="sport"
            />

            {/* Programme journalier */}
            {programDays>0&&<CoachProgramMirror athleteData={a}/>}

            {/* Courbe de volume */}
            {sessions.length>1&&(()=>{
              const sorted=[...sessions].sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(-20);
              const vols=sorted.map(s=>s.totalVolume||0);
              const maxV=Math.max(1,...vols);
              const W=300,H=70,pad=6;
              const pts=vols.map((v,i)=>`${pad+i/(vols.length-1)*(W-2*pad)},${H-pad-v/maxV*(H-2*pad)}`);
              const path=`M ${pts.join(' L ')}`;
              return(
                <div style={{marginBottom:16,marginTop:4}}>
                  <div style={{fontSize:9,color:T.textFaint,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase',marginBottom:6,paddingLeft:2}}>Volume · {sorted.length} dernières séances</div>
                  <GlassCard padding={12}>
                    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:H,display:'block'}}>
                      <defs><linearGradient id="vg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#d97757" stopOpacity="0.25"/><stop offset="100%" stopColor="#d97757" stopOpacity="0"/></linearGradient></defs>
                      <path d={`${path} L ${W-pad},${H} L ${pad},${H} Z`} fill="url(#vg)"/>
                      <path d={path} fill="none" stroke="#d97757" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                      {vols.map((v,i)=>{const x=pad+i/(vols.length-1)*(W-2*pad);const y=H-pad-v/maxV*(H-2*pad);return<circle key={i} cx={x} cy={y} r="3" fill="#d97757"/>;})}
                    </svg>
                    <div style={{display:'flex',justifyContent:'space-between',marginTop:4}}>
                      <span style={{fontSize:10,color:T.textFaint}}>{new Date(sorted[0].date).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</span>
                      <span style={{fontSize:11,fontWeight:700}}>{Math.round(totalVol).toLocaleString('fr-FR')} kg total</span>
                      <span style={{fontSize:10,color:T.textFaint}}>{new Date(sorted[sorted.length-1].date).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</span>
                    </div>
                  </GlassCard>
                </div>
              );
            })()}
          </div>
        )}

        {/* ── Tab 3 : Nutrition ── */}
        {detailTab==='nutrition'&&(
          <div style={{padding:'0 18px'}}>
            <SectionHeader title="Calendrier nutrition"/>
            <AthleteCalendarSummary
              sessions={sessions}
              program={a.program}
              nutriHistory={nutriDetail?.history}
              nutriPlan={nutriDetail?.plan}
              mode="nutrition"
            />

            <SectionHeader title="Plan nutrition" right={nutriDetail&&nutriDetail.plan?(
              <button onClick={()=>setNutriMode(nutriMode==='edit'?'mirror':'edit')} style={{fontSize:11,color:T.accent,fontWeight:700,background:'none',border:'none',cursor:'pointer',padding:0,display:'flex',alignItems:'center',gap:4}}>
                <Icon name={nutriMode==='edit'?'apple':'edit'} size={12} stroke={T.accent}/>
                {nutriMode==='edit'?'Voir progression':'Modifier'}
              </button>
            ):null}/>
            <div style={{marginBottom:18}}>
              {nutriDetail&&nutriDetail.plan&&nutriMode==='mirror'?(
                <CoachNutritionMirror key={(nutriDetail.plan.assignedAt)||0} athleteId={a.id} athleteName={a.firstName||a.email.split('@')[0]} authToken={authToken}/>
              ):(
                <NutritionEditor
                  athleteId={a.id}
                  athleteName={(a.firstName||a.email.split('@')[0])+(a.lastName?' '+a.lastName:'')}
                  initialPlan={nutriDetail&&nutriDetail.plan?nutriDetail.plan.data:null}
                  onSaved={()=>reloadDetail(a.id)}
                  onImported={()=>reloadDetail(a.id)}
                />
              )}
            </div>
          </div>
        )}

        {/* ── Tab 4 : Historique ── */}
        {detailTab==='historique'&&(
          <div style={{padding:'0 18px'}}>
            <SectionHeader title="Historique" right={<span style={{fontSize:10,color:T.textFaint}}>{sessions.length} séance{sessions.length>1?'s':''} · {Math.round(totalVol).toLocaleString('fr-FR')} kg</span>}/>
            {sessions.length===0?(
              <GlassCard padding={14}><div style={{fontSize:13,color:T.textDim,textAlign:'center'}}>Pas encore de séance terminée.</div></GlassCard>
            ):(
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {sessions.slice(0,50).map(s=>(
                  <GlassCard key={s.id} padding={12}>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <div style={{width:32,height:32,borderRadius:9,background:'rgba(217,119,87,0.12)',border:'1px solid rgba(217,119,87,0.25)',display:'flex',alignItems:'center',justifyContent:'center',color:T.accent,flexShrink:0}}>
                        <Icon name="check" size={14} stroke={T.accent} strokeWidth={2.4}/>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.name||'Séance'}</div>
                        <div style={{fontSize:11,color:T.textFaint,marginTop:1}}>{new Date(s.date).toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})}</div>
                      </div>
                      <div style={{textAlign:'right',flexShrink:0}}>
                        <div style={{fontSize:14,fontWeight:700}}>{Math.round(s.totalVolume||0).toLocaleString('fr-FR')}<span style={{fontSize:10,color:T.textDim,fontWeight:500,marginLeft:2}}>kg</span></div>
                      </div>
                    </div>
                  </GlassCard>
                ))}
              </div>
            )}
          </div>
        )}

        {/* ── Tab 5 : Album ── */}
        {detailTab==='album'&&(
          <div style={{padding:'0 18px'}}>
            <SectionHeader title="Album photos"/>
            <PhotoGallery readOnly userId={a.id}/>
          </div>
        )}
      </div>
    );
  }

  // ── List view ───────────────────────────────────
  const unusedInvites=invites.filter(i=>!i.used);

  if(coachView==='calendar'){
    return <CoachCalendarView authToken={authToken} athletes={athletes} onBack={()=>setCoachView('athletes')} onOpenAthlete={a=>{setCoachView('athletes');openDetail(a);}}/>;
  }

  return(
    <div style={{padding:'18px 18px 100px',color:T.text}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:16}}>
        <div>
          <div style={{fontSize:11,color:T.textDim,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase'}}>Coaching</div>
          <div style={{fontSize:26,fontWeight:700,letterSpacing:-0.5,marginTop:2}}><HoloText>Mes athlètes</HoloText></div>
        </div>
        <div style={{display:'flex',gap:6,flexShrink:0}}>
          <button onClick={load} disabled={loading} style={{width:40,height:40,borderRadius:13,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.textDim,cursor:loading?'wait':'pointer',display:'flex',alignItems:'center',justifyContent:'center',opacity:loading?0.5:1}} title="Rafraîchir">
            <Icon name="refresh" size={15} stroke={T.textDim} style={{animation:loading?'holoShift 1s linear infinite':'none'}}/>
          </button>
          <button onClick={()=>setCoachView('calendar')} style={{height:40,padding:'0 14px',borderRadius:13,border:'1px solid rgba(124,168,196,0.3)',background:'rgba(124,168,196,0.06)',color:'#7ca8c4',fontSize:12,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
            📅 Calendrier
          </button>
          <button onClick={generateInvite} style={{height:40,padding:'0 14px',borderRadius:13,border:'none',background:'linear-gradient(135deg,#d97757,#c97586)',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:6,boxShadow:'0 6px 18px rgba(217,119,87,0.4)'}}>
            <Icon name="plus" size={14} stroke="#fff" strokeWidth={2.4}/> Code invitation
          </button>
        </div>
      </div>

      {msg&&<div style={{marginBottom:14,padding:'10px 14px',borderRadius:12,background:'rgba(124,196,161,0.12)',border:'1px solid rgba(124,196,161,0.3)',color:T.good,fontSize:13,fontWeight:600,textAlign:'center'}}>{msg}</div>}

      {/* Pending approval requests (main coach only) */}
      {isMain&&pending.length>0&&(
        <div style={{marginBottom:18}}>
          <SectionHeader title="Demandes en attente" right={<span style={{fontSize:11,color:T.warn,fontWeight:700,padding:'3px 9px',borderRadius:999,background:'rgba(194,160,66,0.12)',border:'1px solid rgba(194,160,66,0.35)'}}>{pending.length}</span>}/>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {pending.map(p=>(
              <div key={p.id} style={{padding:12,borderRadius:14,background:'rgba(194,160,66,0.06)',border:'1px solid rgba(194,160,66,0.3)'}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                  <div style={{width:38,height:38,borderRadius:19,background:'linear-gradient(135deg,#c2a042,#d97757)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:'#fff',flexShrink:0}}>
                    {(p.email[0]||'').toUpperCase()}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.email}</div>
                    <div style={{fontSize:11,color:T.textFaint,marginTop:1,display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                      <span>Demandé : {p.requestedRole==='coach'?'🎯 Coach':'💪 Athlète'}</span>
                      <span>·</span>
                      <span>{timeAgo(p.createdAt)}</span>
                    </div>
                  </div>
                </div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  <button onClick={()=>approveUser(p,'athlete')} style={{flex:'1 1 auto',height:36,borderRadius:10,border:'none',background:'linear-gradient(135deg,#7cc4a1,#7ca8c4)',color:'#000',fontSize:12,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6,minWidth:120}}>
                    <Icon name="check" size={14} stroke="#000" strokeWidth={2.6}/> Accepter athlète
                  </button>
                  {p.requestedRole==='coach'&&(
                    <button onClick={()=>approveUser(p,'coach')} title="Promouvoir en coach (il pourra créer des athlètes)" style={{flex:'1 1 auto',height:36,borderRadius:10,border:'1px solid rgba(217,119,87,0.4)',background:'rgba(217,119,87,0.08)',color:T.accent,fontSize:12,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6,minWidth:120}}>
                      🎯 Promouvoir coach
                    </button>
                  )}
                  <button onClick={()=>rejectUser(p)} style={{flex:'0 0 auto',height:36,padding:'0 12px',borderRadius:10,border:'1px solid rgba(201,117,134,0.3)',background:'rgba(201,117,134,0.06)',color:T.danger,fontSize:11,fontWeight:700,cursor:'pointer'}}>
                    Rejeter
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Available athletes (no coach) — recoverable */}
      {available.length>0&&(
        <div style={{marginBottom:18}}>
          <button onClick={()=>setShowAvailable(s=>!s)} style={{width:'100%',padding:'10px 14px',borderRadius:12,border:'1px solid rgba(124,168,196,0.3)',background:'rgba(124,168,196,0.06)',color:'#7ca8c4',fontSize:12,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:8,letterSpacing:0.3}}>
            <Icon name="users" size={14} stroke="#7ca8c4"/>
            <span style={{flex:1,textAlign:'left'}}>{available.length} athlète{available.length>1?'s':''} disponible{available.length>1?'s':''} à récupérer</span>
            <Icon name={showAvailable?'chevronLeft':'chevronRight'} size={14} stroke="#7ca8c4" style={{transform:showAvailable?'rotate(90deg)':'rotate(0deg)',transition:'transform 0.2s'}}/>
          </button>
          {showAvailable&&(
            <div style={{marginTop:10,display:'flex',flexDirection:'column',gap:8}}>
              {available.map(a=>{
                const days=a.lastSessionAt?timeAgo(a.lastSessionAt):null;
                return(
                  <GlassCard key={a.id} padding={12}>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <div style={{width:36,height:36,borderRadius:18,background:'linear-gradient(135deg,#7ca8c4,#8e6cb6)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'#fff',flexShrink:0}}>
                        {((a.firstName?.[0]||a.email[0])+(a.lastName?.[0]||'')).toUpperCase()}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.firstName||a.email.split('@')[0]} {a.lastName}</div>
                        <div style={{fontSize:10,color:T.textFaint,marginTop:2,display:'flex',gap:6,flexWrap:'wrap'}}>
                          <span style={{overflow:'hidden',textOverflow:'ellipsis',maxWidth:140}}>{a.email}</span>
                          {a.sessionCount>0&&<><span>·</span><span>{a.sessionCount} séance{a.sessionCount>1?'s':''}</span></>}
                          {days&&<><span>·</span><span>{days}</span></>}
                          {a.hasProgram&&<><span>·</span><span style={{color:T.accent}}>a un prog</span></>}
                        </div>
                      </div>
                      <button onClick={()=>claimAthlete(a)} style={{height:34,padding:'0 12px',borderRadius:10,border:'none',background:'linear-gradient(135deg,#7ca8c4,#8e6cb6)',color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer',flexShrink:0,boxShadow:'0 4px 12px rgba(124,168,196,0.35)'}}>
                        + Récupérer
                      </button>
                    </div>
                  </GlassCard>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* Active invites */}
      {unusedInvites.length>0&&(
        <div style={{marginBottom:18}}>
          <SectionHeader title="Codes en attente" right={<span style={{fontSize:10,color:T.textFaint}}>{unusedInvites.length}</span>}/>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {unusedInvites.slice(0,8).map(i=>(
              <button key={i.code} onClick={()=>{if(navigator.clipboard)navigator.clipboard.writeText(i.code).catch(()=>{});flash('✓ Code copié');}} style={{height:32,padding:'0 11px',borderRadius:9,border:'1px solid rgba(124,168,196,0.3)',background:'rgba(124,168,196,0.06)',color:'#7ca8c4',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'JetBrains Mono,ui-monospace,monospace',letterSpacing:0.5}}>
                {i.code}
              </button>
            ))}
          </div>
          <div style={{fontSize:10,color:T.textFaint,marginTop:6}}>Tape pour copier. Donne ce code à ton athlète qui s'inscrit.</div>
        </div>
      )}

      {/* Athletes list */}
      {loading?(
        <div style={{padding:30,textAlign:'center',color:T.textFaint,fontSize:13}}>Chargement…</div>
      ):athletes.length===0?(
        <div style={{padding:'40px 24px',borderRadius:22,background:'linear-gradient(160deg,rgba(28,28,40,0.8),rgba(14,14,20,0.8))',border:`1px solid ${T.border}`,textAlign:'center'}}>
          <div style={{width:60,height:60,margin:'0 auto 16px',borderRadius:18,background:HOLO.iris,backgroundSize:'200% 200%',animation:'holoShift 8s linear infinite',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Icon name="users" size={28} stroke="#fff" strokeWidth={1.8}/>
          </div>
          <div style={{fontSize:16,fontWeight:700,marginBottom:6}}>Aucun athlète</div>
          <div style={{fontSize:13,color:T.textDim,lineHeight:1.5,maxWidth:300,margin:'0 auto 18px'}}>Génère un code d'invitation et envoie-le à ton athlète. Quand il s'inscrit avec ce code, il apparaît ici automatiquement.</div>
          <button onClick={generateInvite} style={{height:46,padding:'0 22px',borderRadius:14,border:'none',background:'linear-gradient(135deg,#d97757,#c97586)',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',boxShadow:'0 8px 24px rgba(217,119,87,0.4)'}}>
            + Générer un code
          </button>
        </div>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {athletes.map(a=>{
            const days=Object.values(a.program?.data||{}).reduce((s,d)=>s+Object.keys(d).length,0);
            const isNew=highlighted.has(a.id);
            return(
              <GlassCard key={a.id} padding={14} onClick={()=>openDetail(a)} style={{cursor:'pointer',transition:'transform 0.2s',transform:isNew?'scale(1.01)':'scale(1)'}}>
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <div style={{width:42,height:42,borderRadius:21,padding:1.5,background:HOLO.iris,backgroundSize:'200% 200%',animation:'holoShift 8s linear infinite',flexShrink:0,position:'relative'}}>
                    <div style={{width:'100%',height:'100%',borderRadius:19.5,background:'linear-gradient(135deg,#d97757,#c97586)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700,color:'#fff'}}>
                      {((a.firstName?.[0]||a.email[0])+(a.lastName?.[0]||'')).toUpperCase()}
                    </div>
                    {isNew&&<div style={{position:'absolute',top:-2,right:-2,width:12,height:12,borderRadius:6,background:T.good,boxShadow:'0 0 8px '+T.good,border:'2px solid #06060a',animation:'pulse 1.4s ease infinite'}}/>}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.firstName||a.email.split('@')[0]} {a.lastName}</div>
                    <div style={{fontSize:11,color:T.textFaint,marginTop:3,display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
                      <span>{days?days+' jours':'pas de prog'}</span>
                      {a.lastSessionAt&&<><span style={{color:T.textFaint}}>·</span><span style={{color:isNew?T.good:T.textFaint,fontWeight:isNew?700:500}}>{timeAgo(a.lastSessionAt)}</span></>}
                    </div>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,marginRight:4,flexShrink:0}}>
                    <div style={{
                      minWidth:34,height:34,padding:'0 8px',borderRadius:10,
                      background:isNew?'rgba(124,196,161,0.18)':a.sessionCount>0?'rgba(217,119,87,0.12)':'rgba(255,255,255,0.04)',
                      border:'1px solid '+(isNew?'rgba(124,196,161,0.5)':a.sessionCount>0?'rgba(217,119,87,0.3)':'rgba(255,255,255,0.08)'),
                      color:isNew?T.good:a.sessionCount>0?T.accent:T.textFaint,
                      fontSize:15,fontWeight:700,fontVariantNumeric:'tabular-nums',
                      display:'flex',alignItems:'center',justifyContent:'center',
                      animation:isNew?'countPop 0.6s ease, pulse 1.4s ease infinite':'none',
                      transition:'all 0.3s'
                    }}>{a.sessionCount}</div>
                    <div style={{fontSize:8,color:T.textFaint,fontWeight:700,letterSpacing:0.4,textTransform:'uppercase'}}>séances</div>
                  </div>
                  <Icon name="chevronRight" size={18} stroke={T.textFaint}/>
                </div>
              </GlassCard>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Auth Screen ───────────────────────────────────────────
const AUTH_ERR_FR={
  invalid_credentials:'Email ou mot de passe incorrect',
  email_already_used:'Cet email est déjà utilisé',
  password_too_short:'Mot de passe trop court (8 caractères minimum)',
  invite_invalid:'Code coach invalide ou déjà utilisé',
  email_password_required:'Email et mot de passe requis',
  no_token:'Session expirée, reconnecte-toi',
  pending_approval:'⏳ Compte en attente d\'approbation du coach principal',
  main_coach_only:'Réservé au coach principal',
  invalid_email:'Email invalide',
  invalid_or_expired_token:'Lien expiré ou déjà utilisé. Refais une demande.',
  token_password_required:'Champs manquants',
  email_required:'Entre ton email',
  account_locked:'Trop de tentatives. Compte verrouillé temporairement.',
  too_many_auth_attempts:'Trop de tentatives. Réessaie dans 15 minutes.',
  too_many_requests:'Trop de requêtes. Patiente un peu.',
};

function AuthScreen({onLogin,onSignup}){
  // Si l'URL contient ?reset=TOKEN → on bascule directement sur l'écran de réinitialisation
  const resetTokenFromUrl=(()=>{try{return new URLSearchParams(window.location.search).get('reset');}catch{return null;}})();
  const[mode,setMode]=React.useState(resetTokenFromUrl?'reset':'login');
  const[email,setEmail]=React.useState('');
  const[password,setPassword]=React.useState('');
  const[role,setRole]=React.useState('athlete');
  const[code,setCode]=React.useState('');
  const[err,setErr]=React.useState(null);
  const[loading,setLoading]=React.useState(false);
  const[pendingMsg,setPendingMsg]=React.useState(null);
  const[infoMsg,setInfoMsg]=React.useState(null);

  // Demande de réinitialisation : envoie un email avec le lien (ou log côté serveur)
  const submitForgot=async e=>{
    if(e&&e.preventDefault)e.preventDefault();
    setErr(null);setInfoMsg(null);setLoading(true);
    try{
      const r=await apiCall('/api/auth/forgot-password',{method:'POST',body:{email:email.trim().toLowerCase()},noAuth:true});
      setInfoMsg(r.message||'Si un compte existe avec cet email, un lien de réinitialisation a été envoyé.');
    }catch(ex){setErr(AUTH_ERR_FR[ex.message]||ex.message||'Erreur');}
    setLoading(false);
  };

  // Applique le nouveau mot de passe avec le token reçu
  const submitReset=async e=>{
    if(e&&e.preventDefault)e.preventDefault();
    setErr(null);setLoading(true);
    try{
      if(password.length<8){setErr('Mot de passe trop court (8 minimum)');setLoading(false);return;}
      const r=await apiCall('/api/auth/reset-password',{method:'POST',body:{token:resetTokenFromUrl,password},noAuth:true});
      // Token valide → on est reconnecté
      localStorage.setItem('pa_token',r.token);
      window.history.replaceState({},'',window.location.pathname);
      window.location.reload();
    }catch(ex){setErr(AUTH_ERR_FR[ex.message]||ex.message||'Lien invalide ou expiré');}
    setLoading(false);
  };

  const submit=async e=>{
    if(e&&e.preventDefault)e.preventDefault();
    setErr(null);setPendingMsg(null);setLoading(true);
    try{
      if(mode==='login')await onLogin(email.trim(),password);
      else await onSignup(email.trim(),password,role,code.trim().toUpperCase()||undefined);
    }catch(ex){
      if(ex.pending){setPendingMsg(ex.detail||'Demande envoyée. En attente d\'approbation.');}
      else setErr(AUTH_ERR_FR[ex.message]||ex.message||'Erreur');
    }
    setLoading(false);
  };

  if(pendingMsg){
    return(
      <div style={{minHeight:'100vh',background:'radial-gradient(ellipse at 30% 0%,#1d1410 0%,#0a0a0e 55%)',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px 20px',color:T.text}}>
        <div style={{maxWidth:380,width:'100%',textAlign:'center'}}>
          <div style={{width:72,height:72,margin:'0 auto 16px',borderRadius:20,padding:2,background:HOLO.iris,backgroundSize:'200% 200%',animation:'holoShift 8s linear infinite'}}>
            <div style={{width:'100%',height:'100%',borderRadius:18,background:'linear-gradient(135deg,#c2a042,#d97757)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:36}}>⏳</div>
          </div>
          <div style={{fontSize:11,color:T.textDim,fontWeight:700,letterSpacing:0.6,textTransform:'uppercase',marginBottom:6}}>Demande envoyée</div>
          <div style={{fontSize:24,fontWeight:700,letterSpacing:-0.5,marginBottom:12}}><HoloText>En attente d'approbation</HoloText></div>
          <div style={{fontSize:13,color:T.textDim,lineHeight:1.6,marginBottom:24,maxWidth:320,margin:'0 auto 24px'}}>
            Le coach principal doit valider ta demande. Tu recevras l'accès dès qu'il approuve ton compte.
          </div>
          <button onClick={()=>{setPendingMsg(null);setMode('login');setPassword('');}} style={{height:46,padding:'0 26px',borderRadius:14,border:'1px solid rgba(255,255,255,0.12)',background:'rgba(255,255,255,0.04)',color:T.text,fontSize:13,fontWeight:600,cursor:'pointer'}}>
            ← Retour
          </button>
        </div>
      </div>
    );
  }

  const inputStyle={width:'100%',background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.12)',borderRadius:12,color:T.text,fontSize:15,fontWeight:500,padding:'13px 14px',fontFamily:'inherit',outline:'none',boxSizing:'border-box'};

  const titleByMode={login:'Connexion',signup:'Créer un compte',forgot:'Mot de passe oublié',reset:'Nouveau mot de passe'};

  return(
    <div style={{minHeight:'100vh',background:'radial-gradient(ellipse at 30% 0%,#1d1410 0%,#0a0a0e 55%)',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px 20px',color:T.text}}>
      <div style={{width:'100%',maxWidth:380}}>
        {/* Logo */}
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{width:72,height:72,margin:'0 auto 14px',borderRadius:20,padding:2,background:HOLO.iris,backgroundSize:'200% 200%',animation:'holoShift 8s linear infinite'}}>
            <div style={{width:'100%',height:'100%',borderRadius:18,background:'linear-gradient(135deg,#d97757,#c97586)',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <Icon name="dumbbell" size={32} stroke="#fff" strokeWidth={2}/>
            </div>
          </div>
          <div style={{fontSize:11,color:T.textDim,fontWeight:700,letterSpacing:0.6,textTransform:'uppercase'}}>Prime Athl</div>
          <div style={{fontSize:30,fontWeight:700,letterSpacing:-0.6,marginTop:4}}><HoloText>{titleByMode[mode]}</HoloText></div>
        </div>

        {/* ── Forgot password ── */}
        {mode==='forgot'&&(
          <form onSubmit={submitForgot} style={{display:'flex',flexDirection:'column',gap:11}}>
            <div style={{fontSize:13,color:T.textDim,lineHeight:1.5,marginBottom:2,textAlign:'center'}}>Entre ton email, on t'envoie un lien pour choisir un nouveau mot de passe.</div>
            <input style={inputStyle} type="email" autoComplete="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} required/>
            {err&&<div style={{padding:'11px 14px',borderRadius:11,background:'rgba(201,117,134,0.1)',border:'1px solid rgba(201,117,134,0.35)',color:'#ff7eb6',fontSize:13,fontWeight:600,textAlign:'center'}}>{err}</div>}
            {infoMsg&&<div style={{padding:'11px 14px',borderRadius:11,background:'rgba(124,196,161,0.10)',border:'1px solid rgba(124,196,161,0.30)',color:T.good,fontSize:13,fontWeight:600,textAlign:'center'}}>{infoMsg}</div>}
            <button type="submit" disabled={loading} style={{height:50,marginTop:6,border:'none',borderRadius:14,cursor:loading?'wait':'pointer',background:'linear-gradient(135deg,#d97757,#c97586)',color:'#fff',fontSize:15,fontWeight:700,boxShadow:'0 8px 24px rgba(217,119,87,0.4)',opacity:loading?0.7:1}}>{loading?'…':'Envoyer le lien'}</button>
            <button type="button" onClick={()=>{setMode('login');setErr(null);setInfoMsg(null);}} style={{height:38,marginTop:4,border:'none',background:'transparent',color:T.textDim,fontSize:12,fontWeight:600,cursor:'pointer'}}>← Retour à la connexion</button>
          </form>
        )}

        {/* ── Reset (via lien email) ── */}
        {mode==='reset'&&(
          <form onSubmit={submitReset} style={{display:'flex',flexDirection:'column',gap:11}}>
            <div style={{fontSize:13,color:T.textDim,lineHeight:1.5,marginBottom:2,textAlign:'center'}}>Choisis ton nouveau mot de passe (8 caractères minimum).</div>
            <input style={inputStyle} type="password" autoComplete="new-password" placeholder="Nouveau mot de passe" value={password} onChange={e=>setPassword(e.target.value)} required minLength={8}/>
            {err&&<div style={{padding:'11px 14px',borderRadius:11,background:'rgba(201,117,134,0.1)',border:'1px solid rgba(201,117,134,0.35)',color:'#ff7eb6',fontSize:13,fontWeight:600,textAlign:'center'}}>{err}</div>}
            <button type="submit" disabled={loading||!resetTokenFromUrl} style={{height:50,marginTop:6,border:'none',borderRadius:14,cursor:loading?'wait':'pointer',background:'linear-gradient(135deg,#d97757,#c97586)',color:'#fff',fontSize:15,fontWeight:700,boxShadow:'0 8px 24px rgba(217,119,87,0.4)',opacity:loading?0.7:1}}>{loading?'…':'Valider'}</button>
            {!resetTokenFromUrl&&<div style={{fontSize:11,color:T.textFaint,textAlign:'center',marginTop:4}}>Aucun token. Ouvre le lien reçu par email.</div>}
          </form>
        )}

        {(mode==='login'||mode==='signup')&&(<>
        {/* Tab toggle */}
        <div style={{display:'flex',padding:3,background:'rgba(255,255,255,0.04)',borderRadius:12,border:'1px solid rgba(255,255,255,0.06)',marginBottom:18}}>
          {['login','signup'].map(m=>(
            <button key={m} type="button" onClick={()=>{setMode(m);setErr(null);}} style={{flex:1,height:38,border:'none',borderRadius:10,background:mode===m?'rgba(217,119,87,0.16)':'transparent',color:mode===m?T.accent:T.textDim,fontSize:13,fontWeight:700,cursor:'pointer'}}>{m==='login'?'Se connecter':'S\'inscrire'}</button>
          ))}
        </div>

        <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:11}}>
          <input style={inputStyle} type="email" autoComplete="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} required/>
          <input style={inputStyle} type="password" autoComplete={mode==='login'?'current-password':'new-password'} placeholder={mode==='login'?'Mot de passe':'Mot de passe (8 min)'} value={password} onChange={e=>setPassword(e.target.value)} required minLength={mode==='signup'?8:undefined}/>

          {mode==='signup'&&(
            <>
              <div>
                <div style={{fontSize:10,color:T.textFaint,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase',marginBottom:7,marginTop:4}}>Tu es</div>
                <div style={{display:'flex',gap:8}}>
                  {[{v:'athlete',l:'Athlète'},{v:'coach',l:'Coach'}].map(o=>(
                    <button key={o.v} type="button" onClick={()=>{setRole(o.v);if(o.v==='coach')setCode('');}} style={{flex:1,height:42,border:role===o.v?'1px solid transparent':'1px solid rgba(255,255,255,0.12)',borderRadius:11,background:role===o.v?T.accentSoft:'rgba(255,255,255,0.03)',color:role===o.v?T.accent:T.textDim,fontSize:13,fontWeight:700,cursor:'pointer'}}>{o.l}</button>
                  ))}
                </div>
              </div>
              {role==='athlete'&&(
                <div>
                  <div style={{fontSize:10,color:T.textFaint,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase',marginBottom:7}}>Code coach (facultatif)</div>
                  <input style={{...inputStyle,letterSpacing:1.5,textTransform:'uppercase',fontFamily:'JetBrains Mono,ui-monospace,monospace'}} placeholder="PA-XXXXXX" value={code} onChange={e=>setCode(e.target.value.toUpperCase())} maxLength={10}/>
                  <div style={{fontSize:11,color:T.textFaint,marginTop:6}}>Donné par ton coach. Laisse vide pour t'inscrire seul.</div>
                </div>
              )}
            </>
          )}

          {err&&(
            <div style={{padding:'11px 14px',borderRadius:11,background:'rgba(201,117,134,0.1)',border:'1px solid rgba(201,117,134,0.35)',color:'#ff7eb6',fontSize:13,fontWeight:600,textAlign:'center'}}>{err}</div>
          )}

          <button type="submit" disabled={loading} style={{height:50,marginTop:6,border:'none',borderRadius:14,cursor:loading?'wait':'pointer',background:'linear-gradient(135deg,#d97757,#c97586)',color:'#fff',fontSize:15,fontWeight:700,boxShadow:'0 8px 24px rgba(217,119,87,0.4)',opacity:loading?0.7:1,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            {loading?'…':(mode==='login'?'Se connecter':'Créer mon compte')}
          </button>
          {mode==='login'&&(
            <button type="button" onClick={()=>{setMode('forgot');setErr(null);setInfoMsg(null);}} style={{height:32,marginTop:2,border:'none',background:'transparent',color:T.textDim,fontSize:12,fontWeight:600,cursor:'pointer',textAlign:'center'}}>Mot de passe oublié ?</button>
          )}
        </form>
        </>)}

        <div style={{fontSize:10,color:T.textFaint,textAlign:'center',marginTop:24,letterSpacing:0.3}}>
          ● BACKEND : {API_BASE||'same origin'}
        </div>
      </div>
    </div>
  );
}

    <div style={{minHeight:'100vh',background:'radial-gradient(ellipse at 30% 0%,#1d1410 0%,#0a0a0e 55%)',display:'flex',alignItems:'center',justifyContent:'center',color:T.text}}>
      <div style={{textAlign:'center'}}>

          <Icon name="dumbbell" size={28} stroke="#fff" strokeWidth={2}/>

// ── App ───────────────────────────────────────────────────
const DEFAULT_PROFILE={firstName:'',lastName:'',height:'',weight:'',objective:'Hypertrophie'};

function App(){
  const auth=useAuth();
  if(auth.loading)return<Splash/>;
  if(!auth.user)return<AuthScreen onLogin={auth.login} onSignup={auth.signup}/>;
  return<MainApp key={auth.user.id} authUser={auth.user} onLogout={auth.logout} setUser={auth.setUser} authToken={auth.token}/>;
}

// Onboarding modal pour la 1re connexion (apparait si user n'a pas encore d'onboardedAt)
function OnboardingModal({user,onClose}){
  const[step,setStep]=React.useState(0);
  const isCoach=user.role==='coach';
  const steps=isCoach?[
    {emoji:'👋',title:'Bienvenue Coach',body:"Tu peux gérer tes athlètes, leur envoyer un programme Excel et un plan nutrition. Tout est synchronisé en temps réel."},
    {emoji:'📥',title:'Importe leurs programmes',body:"Onglet Coach → choisis un athlète → importe un Excel pour la séance ou la nutrition. L'athlète le reçoit instantanément."},
    {emoji:'📲',title:"Code d'invitation",body:"Génère un code dans l'onglet Coach pour rattacher un nouvel athlète à toi. Sinon, tu peux aussi récupérer un athlète orphelin déjà inscrit."},
  ]:[
    {emoji:'👋',title:'Bienvenue',body:"Prime Athl te suit à la salle : programme du jour, séries, nutrition, historique. Tout reste sur ton compte."},
    {emoji:'💪',title:'Ta séance',body:"Onglet Programme : tape ✓ après chaque série, le chrono de repos démarre tout seul. Tu peux ajuster poids et reps avec les boutons − / +."},
    {emoji:'🥗',title:'Ta nutrition',body:"Onglet Nutrition : valide chaque repas dans la journée pour suivre tes macros en temps réel. Ton coach voit ta progression."},
  ];
  const cur=steps[step];
  const finish=async()=>{try{await apiCall('/api/me/onboarded',{method:'POST'});}catch(e){}onClose();};
  return(
    <div style={{position:'fixed',inset:0,zIndex:1000,background:'rgba(6,6,10,0.85)',backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)',display:'flex',alignItems:'center',justifyContent:'center',padding:20,animation:'fadeIn 0.3s ease'}}>
      <div style={{maxWidth:380,width:'100%',padding:1,borderRadius:24,background:HOLO.iris,backgroundSize:'200% 200%',animation:'holoShift 12s linear infinite',boxShadow:'0 30px 80px rgba(0,0,0,0.6)'}}>
        <div style={{borderRadius:23,padding:'28px 24px 20px',background:'linear-gradient(160deg,rgba(28,28,40,0.98),rgba(12,12,18,0.98))',textAlign:'center',color:T.text}}>
          <div style={{fontSize:54,marginBottom:10,animation:'celebrationPop 0.45s ease'}}>{cur.emoji}</div>
          <div style={{fontSize:11,color:T.textDim,fontWeight:700,letterSpacing:0.6,textTransform:'uppercase',marginBottom:6}}>Étape {step+1} / {steps.length}</div>
          <div style={{fontSize:22,fontWeight:700,letterSpacing:-0.4,marginBottom:10}}><HoloText>{cur.title}</HoloText></div>
          <div style={{fontSize:14,color:T.textDim,lineHeight:1.55,marginBottom:24}}>{cur.body}</div>
          {/* Dots */}
          <div style={{display:'flex',justifyContent:'center',gap:6,marginBottom:18}}>
            {steps.map((_,i)=>(
              <div key={i} style={{width:i===step?22:6,height:6,borderRadius:3,background:i===step?T.accent:'rgba(255,255,255,0.15)',transition:'all 0.3s ease'}}/>
            ))}
          </div>
          <div style={{display:'flex',gap:8}}>
            {step>0&&<button onClick={()=>setStep(s=>s-1)} style={{flex:1,height:44,borderRadius:12,border:'1px solid rgba(255,255,255,0.12)',background:'rgba(255,255,255,0.04)',color:T.text,fontSize:13,fontWeight:600,cursor:'pointer'}}>← Retour</button>}
            <button onClick={step<steps.length-1?()=>setStep(s=>s+1):finish} style={{flex:1,height:44,borderRadius:12,border:'none',background:'linear-gradient(135deg,#d97757,#c97586)',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',boxShadow:'0 6px 18px rgba(217,119,87,0.4)'}}>
              {step<steps.length-1?'Suivant →':"C'est parti"}
            </button>
          </div>
          <button onClick={finish} style={{marginTop:10,height:30,border:'none',background:'transparent',color:T.textFaint,fontSize:11,fontWeight:600,cursor:'pointer'}}>Passer</button>
        </div>
      </div>
    </div>
  );
}

function MainApp({authUser,onLogout,setUser,authToken}){
  const[showOnboarding,setShowOnboarding]=React.useState(!authUser.onboardedAt);
  // Deep-link via ?action=...
  const initialTab=(()=>{
    if(typeof window==='undefined')return authUser.role==='coach'?'coach':'programme';
    const p=new URLSearchParams(window.location.search);
    const a=p.get('action');
    if(a==='stats')return'stats';
    if(a==='profile')return'profile';
    if(a==='coach'&&authUser.role==='coach')return'coach';
    return authUser.role==='coach'?'coach':'programme';
  })();
  const[tab,setTab]=React.useState(initialTab);
  const[screen,setScreen]=React.useState(()=>{
    if(typeof window==='undefined')return null;
    const a=new URLSearchParams(window.location.search).get('action');
    return a==='session'?'session':null;
  });
  const[editingDayKey,setEditingDayKey]=React.useState(null);
  const[saveFlash,setSaveFlash]=React.useState(false);
  const flashTimer=React.useRef(null);
  const triggerSave=React.useCallback(()=>{
    setSaveFlash(true);
    if(flashTimer.current)clearTimeout(flashTimer.current);
    flashTimer.current=setTimeout(()=>setSaveFlash(false),1400);
  },[]);

  // Local-only: workout in progress
  const[workout,setWorkout]=useLocalState('pa_workout_'+authUser.id,DEFAULT_WORKOUT,triggerSave);

  // Cloud-synced state
  const[importedPrograms,setImportedPrograms]=React.useState({});
  const[programMeta,setProgramMeta]=React.useState({assignedAt:null,assignedBy:null});
  const profile=authUser; // profile is the auth user
  const setProfileCloud=React.useCallback(async patch=>{
    const updated={...profile,...patch};
    setUser(updated);
    triggerSave();
    try{await apiCall('/api/me',{method:'PATCH',body:patch});}catch(e){console.error('profile sync',e);}
  },[profile,setUser,triggerSave]);

  const[history,setHistory]=React.useState([]);
  const[isMobile,setIsMobile]=React.useState(typeof window!=='undefined'&&window.innerWidth<768);
  const[nutriRefreshKey,setNutriRefreshKey]=React.useState(0);

  const[refreshing,setRefreshing]=React.useState(false);
  const refreshAll=React.useCallback(async()=>{
    setRefreshing(true);
    try{
      const[me,prog,sess]=await Promise.all([
        apiCall('/api/me'),
        apiCall('/api/program'),
        apiCall('/api/sessions'),
      ]);
      if(me)setUser(prev=>({...prev,...me}));
      setImportedPrograms(prog.data||{});
      setProgramMeta({assignedAt:prog.assignedAt,assignedBy:prog.assignedBy});
      setHistory(sess);
      setNutriRefreshKey(k=>k+1); // force NutritionScreen reload
      triggerSave();
    }catch(e){console.error('refresh',e);}
    setRefreshing(false);
  },[setUser,triggerSave]);

  // Initial load
  React.useEffect(()=>{
    apiCall('/api/program').then(p=>{
      setImportedPrograms(p.data||{});
      setProgramMeta({assignedAt:p.assignedAt,assignedBy:p.assignedBy});
    }).catch(()=>{});
    apiCall('/api/sessions').then(setHistory).catch(()=>{});
  },[]);

  React.useEffect(()=>{
    const onResize=()=>setIsMobile(window.innerWidth<768);
    window.addEventListener('resize',onResize);
    return()=>window.removeEventListener('resize',onResize);
  },[]);

  const[unreadMessages,setUnreadMessages]=React.useState(0);

  // Realtime: program / profile / nutrition mis à jour par coach
  useSocket(authToken,{
    'program-updated':({data,assignedAt})=>{
      setImportedPrograms(data||{});
      setProgramMeta(m=>({...m,assignedAt}));
      triggerSave();
    },
    'my-profile-updated':({profile:p})=>{
      setUser(prev=>({...prev,...p}));
      triggerSave();
    },
    'nutrition-updated':()=>{
      setNutriRefreshKey(k=>k+1);
      triggerSave();
    },
    'new-message':()=>{
      setTab(t=>{ if(t!=='messages')setUnreadMessages(u=>u+1); return t; });
    },
  });


  // Wrap setImportedPrograms: local + push to backend (athlete) or coach UI handles its own
  const updateOwnProgram=React.useCallback(async data=>{
    setImportedPrograms(data);
    triggerSave();
    if(authUser.role==='athlete'){
      try{await apiCall('/api/my-program',{method:'PUT',body:{data}});}catch(e){console.error('program sync',e);}
    }
  },[authUser.role,triggerSave]);

  const startWorkout=w=>{setWorkout(w);setScreen('session');};

  const saveSession=async snapshot=>{
    if(!snapshot||!snapshot.totalVolume)return;
    setHistory(h=>[snapshot,...h].slice(0,500));
    triggerSave();
    try{await apiCall('/api/sessions',{method:'POST',body:snapshot});}catch(e){console.error('session sync',e);}
  };

  const editDay=(sheet,day)=>{setEditingDayKey({sheet,day});setScreen('programDay');};
  const closeDayEdit=()=>{setScreen(null);setEditingDayKey(null);};
  const dayWorkout=(()=>{
    if(!editingDayKey)return null;
    const d=importedPrograms[editingDayKey.sheet]&&importedPrograms[editingDayKey.sheet][editingDayKey.day];
    if(!d)return null;
    return{name:editingDayKey.day,muscles:d.category||'',exercises:d.exercises||[]};
  })();
  const saveDayChanges=w=>{
    if(!editingDayKey)return;
    const next={...importedPrograms};
    const sheet=next[editingDayKey.sheet]||{};
    const cur=sheet[editingDayKey.day]||{};
    next[editingDayKey.sheet]={...sheet,[editingDayKey.day]:{...cur,category:w.muscles,exercises:w.exercises}};
    updateOwnProgram(next);
  };

  const inner=(
    <div style={{height:'100%',width:'100%',display:'flex',flexDirection:'column',position:'relative',paddingTop:isMobile?'env(safe-area-inset-top)':54}}>
      {showOnboarding&&<OnboardingModal user={authUser} onClose={()=>{setShowOnboarding(false);setUser(prev=>({...prev,onboardedAt:Date.now()}));}}/>}
      {saveFlash&&(
        <div style={{position:'absolute',top:isMobile?'calc(env(safe-area-inset-top) + 10px)':10,right:14,zIndex:99,padding:'6px 11px',borderRadius:999,background:'rgba(124,196,161,0.18)',border:'1px solid rgba(124,196,161,0.4)',color:T.good,fontSize:11,fontWeight:700,letterSpacing:0.3,backdropFilter:'blur(10px)',WebkitBackdropFilter:'blur(10px)',boxShadow:'0 4px 14px rgba(124,196,161,0.2)',animation:'holoText 1s ease',pointerEvents:'none'}}>
          ✓ Sync cloud
        </div>
      )}

      <div style={{flex:1,overflow:'hidden',position:'relative'}}>
        {screen==='session'&&(
          <div style={{height:'100%',overflow:'auto'}}>
            <SessionScreen workout={workout} onUpdateWorkout={setWorkout} onClose={()=>setScreen(null)} onImportPrograms={updateOwnProgram} onSaveSession={saveSession} history={history} firstName={profile.firstName}/>
          </div>
        )}
        {screen==='editor'&&(
          <div style={{height:'100%',overflow:'auto'}}>
            <WorkoutEditorScreen workout={workout} onChange={setWorkout} onClose={()=>setScreen(null)} onImportPrograms={updateOwnProgram}/>
          </div>
        )}
        {screen==='programDay'&&dayWorkout&&(
          <div style={{height:'100%',overflow:'auto'}}>
            <WorkoutEditorScreen workout={dayWorkout} onChange={saveDayChanges} onClose={closeDayEdit} onImportPrograms={updateOwnProgram}/>
          </div>
        )}
        {!screen&&(
          <div className="tab-content" style={{height:'100%',overflow:'auto'}} key={tab}>
            {tab==='programme'&&<HomeScreen workout={workout} importedPrograms={importedPrograms} onImportPrograms={updateOwnProgram} onStartWorkout={startWorkout} onEdit={()=>setScreen('editor')} onResume={()=>setScreen('session')} onEditDay={editDay} profile={profile} programMeta={programMeta} onRefresh={refreshAll} refreshing={refreshing} history={history}/>}
            {tab==='nutrition'&&<NutritionScreen key={nutriRefreshKey} authToken={authToken} profile={profile} onRefresh={refreshAll} refreshing={refreshing}/>}
            {tab==='stats'&&<StatsScreen history={history} profile={profile}/>}
            {tab==='profile'&&<ProfileScreen profile={profile} onChange={setProfileCloud} onLogout={onLogout}/>}
            {tab==='coach'&&authUser.role==='coach'&&<CoachScreen authToken={authToken} authUser={authUser}/>}
            {tab==='messages'&&<MessagesScreen authUser={authUser}/>}
          </div>
        )}
      </div>
      {!screen&&<BottomTabBar tab={tab} onTab={t=>{setTab(t);if(t==='messages')setUnreadMessages(0);}} role={authUser.role} unreadMessages={unreadMessages}/>}
    </div>
  );

  if(isMobile){
    return <div style={{minHeight:'100vh',background:'radial-gradient(ellipse at 30% 0%,#1d1410 0%,#0a0a0e 55%)',color:T.text}}>{inner}</div>;
  }

  return(
    <div style={{minHeight:'100vh',background:'radial-gradient(ellipse at 30% 0%,#1d1410 0%,#0a0a0e 55%)',display:'flex',alignItems:'center',justifyContent:'center',padding:24,boxSizing:'border-box'}}>
      <div style={{position:'fixed',top:'20%',left:'50%',transform:'translate(-50%,-50%)',width:600,height:600,pointerEvents:'none',background:'radial-gradient(circle,rgba(217,119,87,0.18),rgba(201,117,134,0.10) 30%,rgba(124,168,196,0.06) 60%,transparent 75%)',filter:'blur(60px)',zIndex:0}}/>
      <div style={{position:'relative',zIndex:1}}>
        <IOSDevice dark width={402} height={874}>{inner}</IOSDevice>
      </div>
    </div>
  );
}

function BottomTabBar({tab,onTab,role,unreadMessages}){
  const items=role==='coach'?[
    {id:'coach',icon:'users',label:'Coach'},
    {id:'programme',icon:'grid',label:'Prog'},
    {id:'nutrition',icon:'apple',label:'Nutri'},
    {id:'messages',icon:'message',label:'Chat'},
    {id:'profile',icon:'user',label:'Profil'},
  ]:[
    {id:'programme',icon:'grid',label:'Programme'},
    {id:'nutrition',icon:'apple',label:'Nutrition'},
    {id:'messages',icon:'message',label:'Chat'},
    {id:'stats',icon:'chart',label:'Stats'},
    {id:'profile',icon:'user',label:'Profil'},
  ];
  return(
    <div style={{padding:'8px 12px max(8px, env(safe-area-inset-bottom)) 12px',background:'linear-gradient(180deg,transparent,rgba(6,6,10,0.92) 40%)'}}>
      <div style={{borderRadius:24,padding:1,background:'linear-gradient(160deg,rgba(255,255,255,0.18),rgba(255,255,255,0.04) 50%,rgba(217,119,87,0.15))',boxShadow:'0 -10px 30px rgba(0,0,0,0.4)'}}>
        <div style={{borderRadius:23,background:'linear-gradient(180deg,rgba(20,20,28,0.92),rgba(10,10,16,0.96))',backdropFilter:'blur(24px) saturate(180%)',WebkitBackdropFilter:'blur(24px) saturate(180%)',height:60,display:'flex',alignItems:'center'}}>
          {items.map(it=>{
            const active=tab===it.id;
            const badge=it.id==='messages'&&unreadMessages>0;
            return(
              <button key={it.id} onClick={()=>onTab(it.id)} style={{flex:1,height:60,border:'none',background:'transparent',cursor:'pointer',color:active?T.accent:T.textFaint,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,position:'relative'}}>
                <div style={{position:'relative'}}>
                  <Icon name={it.icon} size={20} stroke={active?T.accent:T.textFaint} strokeWidth={active?2.2:1.6}/>
                  {badge&&<div style={{position:'absolute',top:-4,right:-4,width:8,height:8,borderRadius:4,background:T.accent}}/>}
                </div>
                <span style={{fontSize:10,fontWeight:700,letterSpacing:0.4,textTransform:'uppercase'}}>{it.label}</span>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

// Register Service Worker for push notifications
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(e=>console.warn('[SW] registration failed:',e));
}
</script>
</body>
</html>
