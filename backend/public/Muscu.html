  const closeDetail=()=>{setSelected(null);setDetail(null);setNutriDetail(null);setNutriMode('mirror');setShowDangerZone(false);setShowLiveSession(false);};

  const handleExcel=e=>{
    const file=e.target.files[0];
    if(!file||!selected)return;
    e.target.value='';
    flash('⏳ Import en cours...');
    parseYannisExcel(file,async data=>{
      try{
        const nD=Object.values(data).reduce((s,d)=>s+Object.keys(d).length,0);
        if(nD===0){flash('✗ Aucun jour détecté');return;}
        await apiCall('/api/coach/program/'+selected.id,{method:'PUT',body:{data}});
        flash(`✓ Programme assigné · ${nD} jour${nD>1?'s':''}`);
        reloadDetail(selected.id);
        load();
      }catch(ex){flash('✗ '+(ex.message||ex));console.error('handleExcel:',ex);}
    },err=>flash('✗ '+err));
  };

  const handleLibExcel=e=>{
    const file=e.target.files[0];
    if(!file||!selected)return;
    e.target.value='';
    flash('⏳ Import bibliothèque...');
    parseYannisExcel(file,async data=>{
      try{
        const uid=()=>Math.random().toString(36).slice(2);
        const sessions=[];
        Object.entries(data).forEach(([sheetName,days])=>{
          Object.entries(days).forEach(([dayName,dayData])=>{
            sessions.push({id:uid(),name:dayName,sheetName,category:dayData.category||'',exercises:dayData.exercises||[]});
          });
        });
        if(sessions.length===0){flash('✗ Aucune séance détectée');return;}
        await apiCall('/api/coach/session-library/'+selected.id,{method:'PUT',body:{sessions}});
        flash(`✓ Bibliothèque assignée · ${sessions.length} séance${sessions.length>1?'s':''}`);
        reloadDetail(selected.id);
      }catch(ex){flash('✗ '+(ex.message||ex));console.error('handleLibExcel:',ex);}
    },err=>flash('✗ '+err));
  };

  // Optimistic patch of athlete profile
  const patchTimerRef=React.useRef({});
  const patchAthlete=React.useCallback(patch=>{
    if(!selected)return;
    setDetail(d=>d?{...d,...patch}:d);
    // Debounce per-field
    const key=Object.keys(patch)[0];
    if(patchTimerRef.current[key])clearTimeout(patchTimerRef.current[key]);
    patchTimerRef.current[key]=setTimeout(async()=>{
      try{
        await apiCall('/api/coach/athletes/'+selected.id,{method:'PATCH',body:patch});
        load();
      }catch(e){flash('Erreur sync: '+e.message);}
    },400);
  },[selected,load]);

  const resetAthlete=(opts,label)=>{
    if(!selected)return;
    setConfirmAction({msg:`Réinitialiser ${label} de ${detail?.firstName||selected.email} ? Irréversible.`,onConfirm:async()=>{
      try{
        await apiCall('/api/coach/athletes/'+selected.id+'/reset',{method:'POST',body:opts});
        flash(`✓ ${label} réinitialisé`);
        reloadDetail(selected.id);
        load();
      }catch(e){flash('✗ '+(e.message||e));}
    }});
  };

  // ── Live session overlay — rendu via portal pour échapper au willChange:transform du gestureRef
  const liveSessionEl=showLiveSession&&selected?ReactDOM.createPortal(
    <CoachLiveSessionScreen
      athleteId={selected.id}
      athleteName={(detail||selected).firstName||selected.email.split('@')[0]}
      detail={detail||{}}
      onSaved={()=>{setShowLiveSession(false);reloadDetail(selected.id);flash('✓ Séance enregistrée');}}
      onClose={()=>setShowLiveSession(false)}
    />,
    document.body
  ):null;

  // ── Calendar view (must come before detail check) ───────────────────────────
  if(coachView==='calendar'){
    return <>{liveSessionEl}<CoachCalendarView authToken={authToken} athletes={athletes} onBack={()=>setCoachView('athletes')} onOpenAthlete={a=>{setCoachView('athletes');openDetail(a);}}/></>;
  }

  // ── Detail view ─────────────────────────────────
  if(selected){
    const a=detail||selected;
    const sessions=detail?.sessions||[];
    const totalVol=sessions.reduce((s,x)=>s+(x.totalVolume||0),0);
    const programDays=Object.values(a.program?.data||{}).reduce((s,d)=>s+Object.keys(d).length,0);
    const programMonths=Object.keys(a.program?.data||{}).length;
    const libData=detail?.sessionLibrary;
    const libCount=libData?.sessions?.length||0;

    const TABS=[
      {id:'profil',label:'Profil',icon:'user'},
      {id:'sport',label:'Séances',icon:'dumbbell'},
      {id:'nutrition',label:'Nutrition',icon:'apple'},
      {id:'historique',label:'Historique',icon:'clock'},
      {id:'album',label:'Album',icon:'image'},
    ];

    return(
      <div style={{padding:'18px 0 100px',color:T.text}}>
        {liveSessionEl}
        {confirmAction&&(
          <div style={{position:'fixed',inset:0,zIndex:400,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',padding:24}} onClick={()=>setConfirmAction(null)}>
            <div onClick={e=>e.stopPropagation()} style={{background:'#13131a',borderRadius:18,padding:'24px 22px',width:'100%',maxWidth:320,boxShadow:'0 20px 60px rgba(0,0,0,0.6)'}}>
              <div style={{fontSize:15,fontWeight:700,marginBottom:18,textAlign:'center',lineHeight:1.5}}>{confirmAction.msg}</div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>setConfirmAction(null)} style={{flex:1,height:46,borderRadius:12,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.text,fontSize:13,fontWeight:600,cursor:'pointer'}}>Annuler</button>
                <button onClick={()=>{const fn=confirmAction.onConfirm;setConfirmAction(null);fn();}} style={{flex:1,height:46,borderRadius:12,border:'none',background:'rgba(184,80,112,0.18)',color:'#e07090',fontSize:13,fontWeight:700,cursor:'pointer'}}>Confirmer</button>
              </div>
            </div>
          </div>
        )}
        <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel,text/csv,application/octet-stream,*/*" style={{display:'none'}} onChange={handleExcel}/>
        <input ref={libFileRef} type="file" accept=".xlsx,.xls,.csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel,text/csv,application/octet-stream,*/*" style={{display:'none'}} onChange={handleLibExcel}/>

        {/* Header */}
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12,padding:'0 18px'}}>
          <button onClick={closeDetail} style={{width:36,height:36,borderRadius:18,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.text,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Icon name="chevronLeft" size={18}/>
          </button>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:11,color:T.textDim,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase'}}>Athlète</div>
            <div style={{fontSize:22,fontWeight:700,letterSpacing:-0.4,marginTop:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.firstName||a.email.split('@')[0]} {a.lastName}</div>
          </div>
          <button onClick={()=>openEditAthlete(a)} style={{height:36,padding:'0 12px',borderRadius:11,border:'1px solid rgba(44,196,160,0.3)',background:'rgba(44,196,160,0.06)',color:'#2CC4A0',fontSize:12,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:5}} title="Modifier">
            <Icon name="edit" size={13} stroke="#2CC4A0"/> Modifier
          </button>
          <button onClick={()=>reloadDetail(a.id)} style={{width:36,height:36,borderRadius:11,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.textDim,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}} title="Rafraîchir">
            <Icon name="refresh" size={15} stroke={T.textDim}/>
          </button>
        </div>

        {msg&&<div style={{margin:'0 18px 12px',padding:'10px 14px',borderRadius:11,background:'rgba(44,196,160,0.12)',border:'1px solid rgba(44,196,160,0.3)',color:T.good,fontSize:13,fontWeight:600,textAlign:'center'}}>{msg}</div>}

        {/* Tab bar */}
        <div style={{display:'flex',gap:0,marginBottom:16,padding:'0 18px',overflowX:'auto',scrollbarWidth:'none'}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setDetailTab(t.id)} style={{flex:'0 0 auto',padding:'7px 13px',borderRadius:10,border:'none',background:detailTab===t.id?T.accentSoft:'transparent',color:detailTab===t.id?T.accent:T.textDim,fontSize:12,fontWeight:detailTab===t.id?700:500,cursor:'pointer',whiteSpace:'nowrap',transition:'background 0.15s,color 0.15s'}}>
              {t.label}
            </button>
          ))}
        </div>

        {/* ── Tab 1 : Profil ── */}
        {detailTab==='profil'&&(()=>{
          const F=({label,value,onCommit,suffix,type='text'})=>{
            const[v,setV]=React.useState(value||'');
            React.useEffect(()=>setV(value||''),[value]);
            return(
              <div style={{display:'flex',flexDirection:'column',gap:2}}>
                <div style={{fontSize:9,color:T.textFaint,fontWeight:600,letterSpacing:0.3,textTransform:'uppercase'}}>{label}</div>
                <div style={{display:'flex',alignItems:'center',gap:3,height:30,padding:'0 8px',borderRadius:8,background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)'}}>
                  <input type={type} inputMode={type==='number'?'decimal':undefined} value={v}
                    onChange={e=>setV(e.target.value)}
                    onBlur={e=>onCommit(e.target.value)}
                    style={{flex:1,minWidth:0,width:'100%',background:'transparent',border:'none',color:T.text,fontSize:12,fontWeight:600,outline:'none',fontFamily:'inherit',padding:0}}
                    placeholder="—"/>
                  {suffix&&<span style={{fontSize:10,color:T.textDim,fontWeight:600,flexShrink:0}}>{suffix}</span>}
                </div>
              </div>
            );
          };
          return(
            <div style={{padding:'0 18px'}}>
              <GlassCard padding={10} style={{marginBottom:12}}>
                <div style={{fontSize:10,color:T.textFaint,marginBottom:8,display:'flex',alignItems:'center',gap:5}}>
                  <Icon name="user" size={11} stroke={T.textFaint}/>
                  <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,minWidth:0}}>{a.email}</span>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:6}}>
                  <F label="Prénom" value={a.firstName} onCommit={v=>patchAthlete({firstName:v})}/>
                  <F label="Nom" value={a.lastName} onCommit={v=>patchAthlete({lastName:v})}/>
                  <F label="Taille" value={a.height} onCommit={v=>patchAthlete({height:v})} suffix="cm" type="number"/>
                  <F label="Poids" value={a.weight} onCommit={v=>patchAthlete({weight:v})} suffix="kg" type="number"/>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:4}}>
                  {['Hypertrophie','Force','Perte','Endurance'].map((o,i)=>{
                    const full=['Hypertrophie','Force','Perte de poids','Endurance'][i];
                    return(
                      <button key={o} onClick={()=>patchAthlete({objective:full})} style={{height:26,padding:'0 4px',borderRadius:7,border:a.objective===full?'1px solid transparent':'1px solid rgba(255,255,255,0.1)',background:a.objective===full?T.accentSoft:'rgba(255,255,255,0.03)',color:a.objective===full?T.accent:T.textDim,fontSize:10,fontWeight:600,cursor:'pointer',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{o}</button>
                    );
                  })}
                </div>
              </GlassCard>

              {/* Stats rapides */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
                {[
                  {label:'Séances',value:sessions.length,unit:''},
                  {label:'Volume total',value:Math.round(totalVol/1000),unit:'t'},
                  {label:'Programme',value:programDays>0?`${programMonths}M`:'-',unit:''},
                ].map(stat=>(
                  <GlassCard key={stat.label} padding={10} style={{textAlign:'center'}}>
                    <div style={{fontSize:20,fontWeight:700,letterSpacing:-0.5}}>{stat.value}<span style={{fontSize:11,fontWeight:500,color:T.textDim,marginLeft:1}}>{stat.unit}</span></div>
                    <div style={{fontSize:10,color:T.textFaint,marginTop:2}}>{stat.label}</div>
                  </GlassCard>
                ))}
              </div>

              {/* Accès Premium */}
              <div style={{marginTop:10,padding:'10px 14px',borderRadius:12,background:'rgba(144,144,196,0.06)',border:'1px solid rgba(144,144,196,0.2)',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:'#9090c4'}}>🔑 Accès Explorer Premium</div>
                  <div style={{fontSize:10,color:T.textFaint,marginTop:2}}>{a.premium?'Actif — accès aux séances prêtes':'Inactif — accès verrouillé'}</div>
                </div>
                <button onClick={async()=>{
                  try{
                    await apiCall('/api/premium/grant/'+a.id,{method:'POST',body:{enabled:!a.premium}});
                    load();reloadDetail(a.id);
                    flash(a.premium?'✓ Premium désactivé':'✓ Premium activé');
                  }catch(e){flash('✗ '+(e.message||e));}
                }} style={{height:30,padding:'0 14px',borderRadius:9,border:'none',background:a.premium?'rgba(184,80,112,0.15)':'linear-gradient(135deg,#9090c4,#5A8AE0)',color:a.premium?'#B85070':'#fff',fontSize:11,fontWeight:700,cursor:'pointer',flexShrink:0}}>
                  {a.premium?'Révoquer':'Activer'}
                </button>
              </div>

              {/* Danger zone */}
              <button onClick={()=>setShowDangerZone(s=>!s)} style={{width:'100%',marginTop:8,height:38,borderRadius:11,border:'1px solid rgba(255,255,255,0.08)',background:'rgba(255,255,255,0.03)',color:T.textFaint,fontSize:11,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:5,letterSpacing:0.3}}>
                {showDangerZone?'▴ Masquer':'⋯ Plus d\'options'}
              </button>
              {showDangerZone&&(
                <div style={{marginTop:8,padding:12,borderRadius:12,background:'rgba(200,144,64,0.04)',border:'1px solid rgba(200,144,64,0.2)',display:'flex',flexDirection:'column',gap:6}}>
                  <div style={{fontSize:10,color:T.warn,fontWeight:700,letterSpacing:0.4,textTransform:'uppercase',marginBottom:4}}>⚠ Actions irréversibles</div>
                  <button onClick={()=>resetAthlete({profile:true},'le profil')} style={{height:34,borderRadius:9,border:'1px solid rgba(200,144,64,0.25)',background:'transparent',color:T.warn,fontSize:11,fontWeight:600,cursor:'pointer',textAlign:'left',padding:'0 12px'}}>Réinitialiser le profil</button>
                  <button onClick={()=>resetAthlete({program:true},'le programme')} style={{height:34,borderRadius:9,border:'1px solid rgba(200,144,64,0.25)',background:'transparent',color:T.warn,fontSize:11,fontWeight:600,cursor:'pointer',textAlign:'left',padding:'0 12px'}}>Effacer le programme</button>
                  <button onClick={()=>resetAthlete({history:true},"l'historique")} style={{height:34,borderRadius:9,border:'1px solid rgba(200,144,64,0.25)',background:'transparent',color:T.warn,fontSize:11,fontWeight:600,cursor:'pointer',textAlign:'left',padding:'0 12px'}}>Effacer l'historique ({sessions.length})</button>
                  <button onClick={()=>resetAthlete({profile:true,program:true,history:true},'TOUTES les données')} style={{height:36,borderRadius:9,border:'1px solid rgba(184,80,112,0.4)',background:'rgba(184,80,112,0.06)',color:T.danger,fontSize:11,fontWeight:700,cursor:'pointer',textAlign:'left',padding:'0 12px'}}>🔥 Tout réinitialiser</button>
                  <div style={{height:1,background:'rgba(255,255,255,0.06)',margin:'4px 0'}}/>
                  <button onClick={()=>removeAthlete(a)} style={{height:36,borderRadius:9,border:'1px solid rgba(184,80,112,0.5)',background:'rgba(184,80,112,0.08)',color:T.danger,fontSize:11,fontWeight:700,cursor:'pointer',textAlign:'left',padding:'0 12px'}}>🗑 Supprimer le compte définitivement</button>
                </div>
              )}
            </div>
          );
        })()}

        {/* ── Tab 2 : Séances / Programme ── */}
        {detailTab==='sport'&&(
          <div style={{padding:'0 18px'}}>
            {/* Séance Live */}
            <button onClick={()=>setShowLiveSession(true)} style={{width:'100%',padding:'13px 16px',borderRadius:16,border:'1px solid rgba(232,64,64,0.35)',background:'linear-gradient(135deg,rgba(232,64,64,0.08),rgba(184,80,112,0.04))',color:T.text,cursor:'pointer',display:'flex',alignItems:'center',gap:12,textAlign:'left',marginBottom:10}}>
              <div style={{width:44,height:44,borderRadius:13,background:'linear-gradient(135deg,rgba(232,64,64,0.3),rgba(184,80,112,0.2))',border:'1px solid rgba(232,64,64,0.25)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,position:'relative'}}>
                <span style={{fontSize:20}}>🔴</span>
                <span style={{position:'absolute',top:4,right:4,width:7,height:7,borderRadius:4,background:'#e84040',animation:'fadeIn 1s ease infinite alternate',willChange:'opacity'}}/>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:700,letterSpacing:0.1}}>Séance Live</div>
                <div style={{fontSize:11,color:T.textFaint,marginTop:1}}>Construire en temps réel à la salle</div>
              </div>
              <Icon name="chevronRight" size={16} stroke="rgba(232,64,64,0.6)"/>
            </button>
            {/* Import programme */}
            <div style={{display:'flex',gap:6,marginBottom:12}}>
              <button onClick={()=>fileRef.current.click()} style={{flex:1,padding:12,borderRadius:12,border:`1px solid ${programDays>0?T.border:'rgba(191,160,96,0.35)'}`,background:programDays>0?'rgba(255,255,255,0.025)':'linear-gradient(135deg,rgba(191,160,96,0.12),rgba(184,80,112,0.06))',color:T.text,cursor:'pointer',display:'flex',alignItems:'center',gap:10,textAlign:'left'}}>
                <div style={{width:36,height:36,borderRadius:10,background:programDays>0?'rgba(191,160,96,0.12)':'linear-gradient(135deg,#BFA060,#B85070)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:16}}>
                  {programDays>0?'📋':'📥'}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,letterSpacing:0.1}}>{programDays>0?`${programMonths} mois · ${programDays} jours`:'Importer programme'}</div>
                  <div style={{fontSize:10,color:T.textFaint,marginTop:1}}>{programDays>0?a.program?.assignedAt?`maj ${new Date(a.program.assignedAt).toLocaleDateString('fr-FR')}`:'Programme actif':'Excel du programme musculation'}</div>
                </div>
              </button>
              {programDays>0&&(
                <button onClick={()=>setConfirmAction({msg:`Supprimer le programme de ${a.firstName||a.email.split('@')[0]} ?`,onConfirm:async()=>{try{await apiCall('/api/coach/program/'+a.id,{method:'DELETE'});flash('✓ Programme supprimé');reloadDetail(a.id);load();}catch(e){flash('✗ '+(e.message||e));}}})} title="Supprimer le programme" style={{width:48,padding:0,borderRadius:12,border:'1px solid rgba(191,160,96,0.25)',background:'rgba(191,160,96,0.06)',color:T.accent,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <Icon name="trash" size={16} stroke={T.accent}/>
                </button>
              )}
            </div>

            {/* Import bibliothèque de séances */}
            <div style={{display:'flex',gap:6,marginBottom:12}}>
              <button onClick={()=>libFileRef.current.click()} style={{flex:1,padding:12,borderRadius:12,border:`1px solid ${libCount>0?'rgba(90,138,224,0.35)':'rgba(90,138,224,0.25)'}`,background:libCount>0?'rgba(90,138,224,0.06)':'rgba(90,138,224,0.04)',color:T.text,cursor:'pointer',display:'flex',alignItems:'center',gap:10,textAlign:'left'}}>
                <div style={{width:36,height:36,borderRadius:10,background:libCount>0?'rgba(90,138,224,0.18)':'linear-gradient(135deg,#5A8AE0,#9090c4)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:16}}>
                  {libCount>0?'📚':'📂'}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,letterSpacing:0.1}}>{libCount>0?`${libCount} séance${libCount>1?'s':''} en bibliothèque`:'Importer bibliothèque'}</div>
                  <div style={{fontSize:10,color:T.textFaint,marginTop:1}}>{libCount>0?libData?.assignedAt?`maj ${new Date(libData.assignedAt).toLocaleDateString('fr-FR')}`:'Bibliothèque active':'Séances à la carte (sans calendrier)'}</div>
                </div>
              </button>
              {libCount>0&&(
                <button onClick={()=>setConfirmAction({msg:`Vider la bibliothèque de ${a.firstName||a.email.split('@')[0]} ?`,onConfirm:async()=>{try{await apiCall('/api/coach/session-library/'+a.id,{method:'DELETE'});flash('✓ Bibliothèque vidée');reloadDetail(a.id);}catch(e){flash('✗ '+(e.message||e));}}})} title="Vider la bibliothèque" style={{width:48,padding:0,borderRadius:12,border:'1px solid rgba(90,138,224,0.25)',background:'rgba(90,138,224,0.06)',color:'#5A8AE0',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <Icon name="trash" size={16} stroke="#5A8AE0"/>
                </button>
              )}
            </div>

            {/* Calendrier sport */}
            <SectionHeader title="Calendrier"/>
            <AthleteCalendarSummary
              sessions={sessions}
              program={a.program}
              nutriHistory={nutriDetail?.history}
              nutriPlan={nutriDetail?.plan}
              mode="sport"
            />

            {/* Programme journalier */}
            {programDays>0&&<CoachProgramMirror athleteData={a} athleteId={selected.id} athleteName={a.firstName||a.email.split('@')[0]} onSessionSent={()=>{reloadDetail(selected.id);flash('✓ Séance importée');}}/>}

            {/* Courbe de volume */}
            {sessions.length>1&&(()=>{
              const sorted=[...sessions].sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(-20);
              const vols=sorted.map(s=>s.totalVolume||0);
              const maxV=Math.max(1,...vols);
              const W=300,H=70,pad=6;
              const pts=vols.map((v,i)=>`${pad+i/(vols.length-1)*(W-2*pad)},${H-pad-v/maxV*(H-2*pad)}`);
              const path=`M ${pts.join(' L ')}`;
              return(
                <div style={{marginBottom:16,marginTop:4}}>
                  <div style={{fontSize:9,color:T.textFaint,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase',marginBottom:6,paddingLeft:2}}>Volume · {sorted.length} dernières séances</div>
                  <GlassCard padding={12}>
                    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:H,display:'block'}}>
                      <defs><linearGradient id="vg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#BFA060" stopOpacity="0.25"/><stop offset="100%" stopColor="#BFA060" stopOpacity="0"/></linearGradient></defs>
                      <path d={`${path} L ${W-pad},${H} L ${pad},${H} Z`} fill="url(#vg)"/>
                      <path d={path} fill="none" stroke="#BFA060" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                      {vols.map((v,i)=>{const x=pad+i/(vols.length-1)*(W-2*pad);const y=H-pad-v/maxV*(H-2*pad);return<circle key={i} cx={x} cy={y} r="3" fill="#BFA060"/>;})}
                    </svg>
                    <div style={{display:'flex',justifyContent:'space-between',marginTop:4}}>
                      <span style={{fontSize:10,color:T.textFaint}}>{new Date(sorted[0].date).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</span>
                      <span style={{fontSize:11,fontWeight:700}}>{Math.round(totalVol).toLocaleString('fr-FR')} kg total</span>
                      <span style={{fontSize:10,color:T.textFaint}}>{new Date(sorted[sorted.length-1].date).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</span>
                    </div>
                  </GlassCard>
                </div>
              );
            })()}
          </div>
        )}

        {/* ── Tab 3 : Nutrition ── */}
        {detailTab==='nutrition'&&(
          <div style={{padding:'0 18px'}}>
            <SectionHeader title="Calendrier nutrition"/>
            <AthleteCalendarSummary
              sessions={sessions}
              program={a.program}
              nutriHistory={nutriDetail?.history}
              nutriPlan={nutriDetail?.plan}
              mode="nutrition"
            />

            <SectionHeader title="Plan nutrition" right={nutriDetail&&nutriDetail.plan?(
              <button onClick={()=>setNutriMode(nutriMode==='edit'?'mirror':'edit')} style={{fontSize:11,color:T.accent,fontWeight:700,background:'none',border:'none',cursor:'pointer',padding:0,display:'flex',alignItems:'center',gap:4}}>
                <Icon name={nutriMode==='edit'?'apple':'edit'} size={12} stroke={T.accent}/>
                {nutriMode==='edit'?'Voir progression':'Modifier'}
              </button>
            ):null}/>
            <div style={{marginBottom:18}}>
              {nutriMode==='mirror'?(
                <CoachNutritionMirror key={(nutriDetail&&nutriDetail.plan&&nutriDetail.plan.assignedAt)||0} athleteId={a.id} athleteName={a.firstName||a.email.split('@')[0]} authToken={authToken} onPlanApplied={()=>reloadDetail(a.id)}/>
              ):(
                <NutritionEditor
                  athleteId={a.id}
                  athleteName={(a.firstName||a.email.split('@')[0])+(a.lastName?' '+a.lastName:'')}
                  initialPlan={nutriDetail&&nutriDetail.plan?nutriDetail.plan.data:null}
                  onSaved={()=>reloadDetail(a.id)}
                  onImported={()=>reloadDetail(a.id)}
                />
              )}
            </div>
          </div>
        )}

        {/* ── Tab 4 : Historique ── */}
        {detailTab==='historique'&&(
          <div style={{padding:'0 18px'}}>
            <SectionHeader title="Historique" right={<span style={{fontSize:10,color:T.textFaint}}>{sessions.length} séance{sessions.length>1?'s':''} · {Math.round(totalVol).toLocaleString('fr-FR')} kg</span>}/>
            {sessions.length===0?(
              <GlassCard padding={14}><div style={{fontSize:13,color:T.textDim,textAlign:'center'}}>Pas encore de séance terminée.</div></GlassCard>
            ):(
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {sessions.slice(0,50).map(s=>(
                  <CoachSessionCard key={s.id} s={s} athleteId={a.id}
                    isDeleting={deletingSessionId===s.id}
                    onStartDelete={()=>{sessionPressTimer.current=setTimeout(()=>setDeletingSessionId(s.id),500);}}
                    onCancelTouchDelete={()=>clearTimeout(sessionPressTimer.current)}
                    onDelete={()=>deleteSession(s.id,a.id)}
                    onCancelDelete={()=>setDeletingSessionId(null)}
                    onFeedbackSaved={()=>reloadDetail(a.id)}
                  />
                ))}
              </div>
            )}
          </div>
        )}

        {/* ── Tab 5 : Album ── */}
        {detailTab==='album'&&(
          <div style={{padding:'0 18px'}}>
            <SectionHeader title="Album photos"/>
            <PhotoGallery readOnly userId={a.id}/>
          </div>
        )}
      </div>
    );
  }

  // ── List view ───────────────────────────────────
  const unusedInvites=invites.filter(i=>!i.used);

  return(
    <div style={{padding:'18px 18px 100px',color:T.text}}>
      {liveSessionEl}
      {confirmAction&&(
        <div style={{position:'fixed',inset:0,zIndex:400,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',padding:24}} onClick={()=>setConfirmAction(null)}>
          <div onClick={e=>e.stopPropagation()} style={{background:'#13131a',borderRadius:18,padding:'24px 22px',width:'100%',maxWidth:320,boxShadow:'0 20px 60px rgba(0,0,0,0.6)'}}>
            <div style={{fontSize:15,fontWeight:700,marginBottom:18,textAlign:'center',lineHeight:1.5}}>{confirmAction.msg}</div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setConfirmAction(null)} style={{flex:1,height:46,borderRadius:12,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.text,fontSize:13,fontWeight:600,cursor:'pointer'}}>Annuler</button>
              <button onClick={()=>{const fn=confirmAction.onConfirm;setConfirmAction(null);fn();}} style={{flex:1,height:46,borderRadius:12,border:'none',background:'rgba(184,80,112,0.18)',color:'#e07090',fontSize:13,fontWeight:700,cursor:'pointer'}}>Confirmer</button>
            </div>
          </div>
        </div>
      )}
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:16}}>
        <div>
          <div style={{fontSize:11,color:T.textDim,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase'}}>Coaching</div>
          <div style={{fontSize:26,fontWeight:700,letterSpacing:-0.5,marginTop:2}}><HoloText>Mes athlètes</HoloText></div>
        </div>
        <div style={{display:'flex',gap:6,flexShrink:0}}>
          <button onClick={load} disabled={loading} style={{width:40,height:40,borderRadius:13,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.textDim,cursor:loading?'wait':'pointer',display:'flex',alignItems:'center',justifyContent:'center',opacity:loading?0.5:1}} title="Rafraîchir">
            <Icon name="refresh" size={15} stroke={T.textDim} style={{animation:loading?'holoShift 1s linear infinite':'none'}}/>
          </button>
          <button onClick={()=>setCoachView('calendar')} style={{width:40,height:40,borderRadius:13,border:'1px solid rgba(90,138,224,0.3)',background:'rgba(90,138,224,0.06)',color:'#5A8AE0',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}} title="Calendrier">
            📅
          </button>
          <button onClick={()=>setShowCreateAthlete(true)} style={{width:40,height:40,borderRadius:13,border:'none',background:'linear-gradient(135deg,#2CC4A0,#5A8AE0)',color:'#000',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 14px rgba(44,196,160,0.4)'}} title="Créer un athlète">
            <Icon name="plus" size={18} stroke="#000" strokeWidth={2.6}/>
          </button>
          <button onClick={generateInvite} style={{width:40,height:40,borderRadius:13,border:'none',background:'linear-gradient(135deg,#BFA060,#B85070)',color:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 14px rgba(191,160,96,0.4)'}} title="Code invitation">
            <span style={{fontSize:17}}>🔗</span>
          </button>
        </div>
      </div>

      {msg&&<div style={{marginBottom:14,padding:'10px 14px',borderRadius:12,background:'rgba(44,196,160,0.12)',border:'1px solid rgba(44,196,160,0.3)',color:T.good,fontSize:13,fontWeight:600,textAlign:'center'}}>{msg}</div>}

      {/* Pending approval requests (main coach only) */}
      {isMain&&pending.length>0&&(
        <div style={{marginBottom:18}}>
          <SectionHeader title="Demandes en attente" right={<span style={{fontSize:11,color:T.warn,fontWeight:700,padding:'3px 9px',borderRadius:999,background:'rgba(200,144,64,0.12)',border:'1px solid rgba(200,144,64,0.35)'}}>{pending.length}</span>}/>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {pending.map(p=>(
              <div key={p.id} style={{padding:12,borderRadius:14,background:'rgba(200,144,64,0.06)',border:'1px solid rgba(200,144,64,0.3)'}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                  <div style={{width:38,height:38,borderRadius:19,background:'linear-gradient(135deg,#C89040,#BFA060)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:'#fff',flexShrink:0}}>
                    {(p.email[0]||'').toUpperCase()}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.email}</div>
                    <div style={{fontSize:11,color:T.textFaint,marginTop:1,display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                      <span>Demandé : {p.requestedRole==='coach'?'🎯 Coach':'💪 Athlète'}</span>
                      <span>·</span>
                      <span>{timeAgo(p.createdAt)}</span>
                    </div>
                  </div>
                </div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  <button onClick={()=>approveUser(p,'athlete')} style={{flex:'1 1 auto',height:36,borderRadius:10,border:'none',background:'linear-gradient(135deg,#2CC4A0,#5A8AE0)',color:'#000',fontSize:12,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6,minWidth:120}}>
                    <Icon name="check" size={14} stroke="#000" strokeWidth={2.6}/> Accepter athlète
                  </button>
                  {p.requestedRole==='coach'&&(
                    <button onClick={()=>approveUser(p,'coach')} title="Promouvoir en coach (il pourra créer des athlètes)" style={{flex:'1 1 auto',height:36,borderRadius:10,border:'1px solid rgba(191,160,96,0.4)',background:'rgba(191,160,96,0.08)',color:T.accent,fontSize:12,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6,minWidth:120}}>
                      🎯 Promouvoir coach
                    </button>
                  )}
                  <button onClick={()=>rejectUser(p)} style={{flex:'0 0 auto',height:36,padding:'0 12px',borderRadius:10,border:'1px solid rgba(184,80,112,0.3)',background:'rgba(184,80,112,0.06)',color:T.danger,fontSize:11,fontWeight:700,cursor:'pointer'}}>
                    Rejeter
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Available athletes (no coach) — recoverable */}
      {available.length>0&&(
        <div style={{marginBottom:18}}>
          <button onClick={()=>setShowAvailable(s=>!s)} style={{width:'100%',padding:'10px 14px',borderRadius:12,border:'1px solid rgba(90,138,224,0.3)',background:'rgba(90,138,224,0.06)',color:'#5A8AE0',fontSize:12,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:8,letterSpacing:0.3}}>
            <Icon name="users" size={14} stroke="#5A8AE0"/>
            <span style={{flex:1,textAlign:'left'}}>{available.length} athlète{available.length>1?'s':''} disponible{available.length>1?'s':''} à récupérer</span>
            <Icon name={showAvailable?'chevronLeft':'chevronRight'} size={14} stroke="#5A8AE0" style={{transform:showAvailable?'rotate(90deg)':'rotate(0deg)',transition:'transform 0.2s'}}/>
          </button>
          {showAvailable&&(
            <div style={{marginTop:10,display:'flex',flexDirection:'column',gap:8}}>
              {available.map(a=>{
                const days=a.lastSessionAt?timeAgo(a.lastSessionAt):null;
                return(
                  <GlassCard key={a.id} padding={12}>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <div style={{width:36,height:36,borderRadius:18,background:'linear-gradient(135deg,#5A8AE0,#8e6cb6)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'#fff',flexShrink:0}}>
                        {((a.firstName?.[0]||a.email[0])+(a.lastName?.[0]||'')).toUpperCase()}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.firstName||a.email.split('@')[0]} {a.lastName}</div>
                        <div style={{fontSize:10,color:T.textFaint,marginTop:2,display:'flex',gap:6,flexWrap:'wrap'}}>
                          <span style={{overflow:'hidden',textOverflow:'ellipsis',maxWidth:140}}>{a.email}</span>
                          {a.sessionCount>0&&<><span>·</span><span>{a.sessionCount} séance{a.sessionCount>1?'s':''}</span></>}
                          {days&&<><span>·</span><span>{days}</span></>}
                          {a.hasProgram&&<><span>·</span><span style={{color:T.accent}}>a un prog</span></>}
                        </div>
                      </div>
                      <button onClick={()=>claimAthlete(a)} style={{height:34,padding:'0 12px',borderRadius:10,border:'none',background:'linear-gradient(135deg,#5A8AE0,#8e6cb6)',color:'#fff',fontSize:11,fontWeight:700,cursor:'pointer',flexShrink:0,boxShadow:'0 4px 12px rgba(90,138,224,0.35)'}}>
                        + Récupérer
                      </button>
                    </div>
                  </GlassCard>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* Active invites */}
      {unusedInvites.length>0&&(
        <div style={{marginBottom:18}}>
          <SectionHeader title="Codes en attente" right={<span style={{fontSize:10,color:T.textFaint}}>{unusedInvites.length}</span>}/>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {unusedInvites.slice(0,8).map(i=>(
              <div key={i.code} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',borderRadius:11,border:'1px solid rgba(90,138,224,0.25)',background:'rgba(90,138,224,0.05)'}}>
                <button onClick={()=>{if(navigator.clipboard)navigator.clipboard.writeText(i.code).catch(()=>{});flash('✓ Code copié');}} style={{flex:1,textAlign:'left',background:'transparent',border:'none',color:'#5A8AE0',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'JetBrains Mono,ui-monospace,monospace',letterSpacing:1,padding:0}}>
                  {i.code}
                </button>
                <span style={{fontSize:10,color:T.textFaint,flexShrink:0}}>
                  {new Date(i.createdAt).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}
                </span>
                <button onClick={()=>setConfirmAction({msg:`Annuler le code ${i.code} ?`,onConfirm:async()=>{try{await apiCall('/api/coach/invites/'+i.code,{method:'DELETE'});flash('Code annulé');load();}catch(e){flash('Erreur: '+e.message);}}})} style={{width:28,height:28,borderRadius:8,border:'1px solid rgba(184,80,112,0.3)',background:'rgba(184,80,112,0.06)',color:'#B85070',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:14}} title="Annuler ce code">
                  ✕
                </button>
              </div>
            ))}
          </div>
          <div style={{fontSize:10,color:T.textFaint,marginTop:6}}>Tape le code pour le copier · ✕ pour l'annuler.</div>
        </div>
      )}

      {/* Athletes list */}
      {loading?(
        <div style={{padding:30,textAlign:'center',color:T.textFaint,fontSize:13}}>Chargement…</div>
      ):athletes.length===0?(
        <div style={{padding:'40px 24px',borderRadius:22,background:'linear-gradient(160deg,rgba(28,28,40,0.8),rgba(14,14,20,0.8))',border:`1px solid ${T.border}`,textAlign:'center'}}>
          <div style={{width:60,height:60,margin:'0 auto 16px',borderRadius:18,background:HOLO.iris,backgroundSize:'200% 200%',animation:'holoShift 8s linear infinite',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Icon name="users" size={28} stroke="#fff" strokeWidth={1.8}/>
          </div>
          <div style={{fontSize:16,fontWeight:700,marginBottom:6}}>Aucun athlète</div>
          <div style={{fontSize:13,color:T.textDim,lineHeight:1.5,maxWidth:300,margin:'0 auto 18px'}}>Génère un code d'invitation et envoie-le à ton athlète. Quand il s'inscrit avec ce code, il apparaît ici automatiquement.</div>
          <button onClick={generateInvite} style={{height:46,padding:'0 22px',borderRadius:14,border:'none',background:'linear-gradient(135deg,#BFA060,#B85070)',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',boxShadow:'0 8px 24px rgba(191,160,96,0.4)'}}>
            + Générer un code
          </button>
        </div>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {athletes.map(a=>{
            const days=Object.values(a.program?.data||{}).reduce((s,d)=>s+Object.keys(d).length,0);
            const isNew=highlighted.has(a.id);
            return(
              <GlassCard key={a.id} padding={14}
                onClick={()=>openDetail(a)}
                onMouseDown={e=>startLongPress(a,e)}
                onMouseUp={cancelLongPress}
                onMouseLeave={cancelLongPress}
                onTouchStart={e=>startLongPress(a,e)}
                onTouchEnd={cancelLongPress}
                onTouchMove={cancelLongPress}
                onContextMenu={e=>{e.preventDefault();setLongPressMenu(a);}}
                style={{cursor:'pointer',transition:'transform 0.2s',transform:isNew?'scale(1.01)':'scale(1)'}}>
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <div style={{width:42,height:42,borderRadius:21,padding:1.5,background:HOLO.iris,backgroundSize:'200% 200%',animation:'holoShift 8s linear infinite',flexShrink:0,position:'relative'}}>
                    <div style={{width:'100%',height:'100%',borderRadius:19.5,background:'linear-gradient(135deg,#BFA060,#B85070)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700,color:'#fff'}}>
                      {((a.firstName?.[0]||a.email[0])+(a.lastName?.[0]||'')).toUpperCase()}
                    </div>
                    {isNew&&<div style={{position:'absolute',top:-2,right:-2,width:12,height:12,borderRadius:6,background:T.good,boxShadow:'0 0 8px '+T.good,border:'2px solid #06060a',animation:'pulse 1.4s ease infinite'}}/>}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.firstName||a.email.split('@')[0]} {a.lastName}</div>
                    <div style={{fontSize:11,color:T.textFaint,marginTop:3,display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
                      <span>{days?days+' jours':'pas de prog'}</span>
                      {a.lastSessionAt&&<><span style={{color:T.textFaint}}>·</span><span style={{color:isNew?T.good:T.textFaint,fontWeight:isNew?700:500}}>{timeAgo(a.lastSessionAt)}</span></>}
                    </div>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,marginRight:4,flexShrink:0}}>
                    <div style={{
                      minWidth:34,height:34,padding:'0 8px',borderRadius:10,
                      background:isNew?'rgba(44,196,160,0.18)':a.sessionCount>0?'rgba(191,160,96,0.12)':'rgba(255,255,255,0.04)',
                      border:'1px solid '+(isNew?'rgba(44,196,160,0.5)':a.sessionCount>0?'rgba(191,160,96,0.3)':'rgba(255,255,255,0.08)'),
                      color:isNew?T.good:a.sessionCount>0?T.accent:T.textFaint,
                      fontSize:15,fontWeight:700,fontVariantNumeric:'tabular-nums',
                      display:'flex',alignItems:'center',justifyContent:'center',
                      animation:isNew?'countPop 0.6s ease, pulse 1.4s ease infinite':'none',
                      transition:'all 0.3s'
                    }}>{a.sessionCount}</div>
                    <div style={{fontSize:8,color:T.textFaint,fontWeight:700,letterSpacing:0.4,textTransform:'uppercase'}}>séances</div>
                  </div>
                  <Icon name="chevronRight" size={18} stroke={T.textFaint}/>
                </div>
              </GlassCard>
            );
          })}
        </div>
      )}

      {/* Menu appui long */}
    {longPressMenu&&(
      <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',zIndex:9000,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={()=>setLongPressMenu(null)}>
        <div style={{background:'#1a1a28',borderRadius:'20px 20px 0 0',padding:'8px 0 32px',width:'100%',maxWidth:480}} onClick={e=>e.stopPropagation()}>
          {/* Handle */}
          <div style={{width:36,height:4,borderRadius:2,background:'rgba(255,255,255,0.15)',margin:'8px auto 16px'}}/>
          {/* Nom */}
          <div style={{padding:'0 20px 14px',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
            <div style={{fontSize:16,fontWeight:700}}>{longPressMenu.firstName||longPressMenu.email.split('@')[0]} {longPressMenu.lastName}</div>
            <div style={{fontSize:11,color:T.textFaint,marginTop:2}}>{longPressMenu.email}</div>
          </div>
          {/* Actions */}
          <div style={{padding:'8px 12px 0'}}>
            <button onClick={()=>{setLongPressMenu(null);openDetail(longPressMenu);}} style={{width:'100%',height:52,borderRadius:13,border:'none',background:'transparent',color:T.text,fontSize:14,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:14,padding:'0 12px'}}>
              <div style={{width:36,height:36,borderRadius:10,background:'rgba(90,138,224,0.12)',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="user" size={17} stroke="#5A8AE0"/></div>
              Voir la fiche
            </button>
            <button onClick={()=>{const a=longPressMenu;setLongPressMenu(null);openEditAthlete(a);}} style={{width:'100%',height:52,borderRadius:13,border:'none',background:'transparent',color:T.text,fontSize:14,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:14,padding:'0 12px'}}>
              <div style={{width:36,height:36,borderRadius:10,background:'rgba(44,196,160,0.12)',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="edit" size={17} stroke="#2CC4A0"/></div>
              Modifier
            </button>
            <button onClick={()=>{const a=longPressMenu;setLongPressMenu(null);removeAthlete(a);}} style={{width:'100%',height:52,borderRadius:13,border:'none',background:'transparent',color:T.danger,fontSize:14,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:14,padding:'0 12px'}}>
              <div style={{width:36,height:36,borderRadius:10,background:'rgba(184,80,112,0.12)',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="trash" size={17} stroke={T.danger}/></div>
              Supprimer le compte
            </button>
          </div>
        </div>
      </div>
    )}

    {/* Modal modification athlète */}
    {showEditAthlete&&selected&&(
      <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',zIndex:9000,display:'flex',alignItems:'center',justifyContent:'center',padding:20}} onClick={e=>{if(e.target===e.currentTarget)setShowEditAthlete(false);}}>
        <div style={{background:'#13131e',border:'1px solid rgba(255,255,255,0.1)',borderRadius:22,padding:24,width:'100%',maxWidth:380}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
            <div style={{fontSize:17,fontWeight:700}}>Modifier l'athlète</div>
            <button onClick={()=>setShowEditAthlete(false)} style={{width:30,height:30,borderRadius:15,border:'none',background:'rgba(255,255,255,0.06)',color:T.textDim,cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
          </div>
          <form onSubmit={submitEditAthlete} style={{display:'flex',flexDirection:'column',gap:12}}>
            <div style={{display:'flex',gap:10}}>
              <div style={{flex:1,display:'flex',flexDirection:'column',gap:4}}>
                <div style={{fontSize:10,color:T.textFaint,fontWeight:600,textTransform:'uppercase',letterSpacing:0.4}}>Prénom</div>
                <input value={editForm.firstName} onChange={e=>setEditForm(f=>({...f,firstName:e.target.value}))} placeholder="Prénom" style={{height:40,padding:'0 12px',borderRadius:11,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.text,fontSize:14,outline:'none'}}/>
              </div>
              <div style={{flex:1,display:'flex',flexDirection:'column',gap:4}}>
                <div style={{fontSize:10,color:T.textFaint,fontWeight:600,textTransform:'uppercase',letterSpacing:0.4}}>Nom</div>
                <input value={editForm.lastName} onChange={e=>setEditForm(f=>({...f,lastName:e.target.value}))} placeholder="Nom" style={{height:40,padding:'0 12px',borderRadius:11,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.text,fontSize:14,outline:'none'}}/>
              </div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              <div style={{fontSize:10,color:T.textFaint,fontWeight:600,textTransform:'uppercase',letterSpacing:0.4}}>Email</div>
              <input type="email" value={editForm.email} onChange={e=>setEditForm(f=>({...f,email:e.target.value}))} style={{height:40,padding:'0 12px',borderRadius:11,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.text,fontSize:14,outline:'none'}}/>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              <div style={{fontSize:10,color:T.textFaint,fontWeight:600,textTransform:'uppercase',letterSpacing:0.4}}>Nouveau mot de passe <span style={{fontWeight:400,textTransform:'none'}}>(laisser vide = inchangé)</span></div>
              <input type="password" value={editForm.password} onChange={e=>setEditForm(f=>({...f,password:e.target.value}))} placeholder="Nouveau mot de passe…" style={{height:40,padding:'0 12px',borderRadius:11,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.text,fontSize:14,outline:'none'}}/>
            </div>
            <button type="submit" disabled={editing} style={{height:46,borderRadius:13,border:'none',background:'linear-gradient(135deg,#2CC4A0,#5A8AE0)',color:'#000',fontSize:14,fontWeight:700,cursor:editing?'not-allowed':'pointer',opacity:editing?0.6:1,marginTop:4}}>
              {editing?'Enregistrement…':'Enregistrer'}
            </button>
          </form>
        </div>
      </div>
    )}

    {/* Modal création athlète */}
    {showCreateAthlete&&(
      <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',zIndex:9000,display:'flex',alignItems:'center',justifyContent:'center',padding:20}} onClick={e=>{if(e.target===e.currentTarget)setShowCreateAthlete(false);}}>
        <div style={{background:'#13131e',border:'1px solid rgba(255,255,255,0.1)',borderRadius:22,padding:24,width:'100%',maxWidth:380}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
            <div style={{fontSize:17,fontWeight:700}}>Créer un athlète</div>
            <button onClick={()=>setShowCreateAthlete(false)} style={{width:30,height:30,borderRadius:15,border:'none',background:'rgba(255,255,255,0.06)',color:T.textDim,cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
          </div>
          <form onSubmit={submitCreateAthlete} style={{display:'flex',flexDirection:'column',gap:12}}>
            <div style={{display:'flex',gap:10}}>
              <div style={{flex:1,display:'flex',flexDirection:'column',gap:4}}>
                <div style={{fontSize:10,color:T.textFaint,fontWeight:600,textTransform:'uppercase',letterSpacing:0.4}}>Prénom</div>
                <input value={createForm.firstName} onChange={e=>setCreateForm(f=>({...f,firstName:e.target.value}))} placeholder="Prénom" style={{height:40,padding:'0 12px',borderRadius:11,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.text,fontSize:14,outline:'none'}}/>
              </div>
              <div style={{flex:1,display:'flex',flexDirection:'column',gap:4}}>
                <div style={{fontSize:10,color:T.textFaint,fontWeight:600,textTransform:'uppercase',letterSpacing:0.4}}>Nom</div>
                <input value={createForm.lastName} onChange={e=>setCreateForm(f=>({...f,lastName:e.target.value}))} placeholder="Nom" style={{height:40,padding:'0 12px',borderRadius:11,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.text,fontSize:14,outline:'none'}}/>
              </div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              <div style={{fontSize:10,color:T.textFaint,fontWeight:600,textTransform:'uppercase',letterSpacing:0.4}}>Email *</div>
              <input required type="email" value={createForm.email} onChange={e=>setCreateForm(f=>({...f,email:e.target.value}))} placeholder="email@exemple.com" style={{height:40,padding:'0 12px',borderRadius:11,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.text,fontSize:14,outline:'none'}}/>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              <div style={{fontSize:10,color:T.textFaint,fontWeight:600,textTransform:'uppercase',letterSpacing:0.4}}>Mot de passe *</div>
              <input required type="password" value={createForm.password} onChange={e=>setCreateForm(f=>({...f,password:e.target.value}))} placeholder="6 caractères minimum" style={{height:40,padding:'0 12px',borderRadius:11,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)',color:T.text,fontSize:14,outline:'none'}}/>
            </div>
            <div style={{fontSize:11,color:T.textFaint,lineHeight:1.5,marginTop:2}}>Le compte est créé actif et immédiatement rattaché à toi. L'athlète peut se connecter avec ces identifiants.</div>
            <button type="submit" disabled={creating} style={{height:46,borderRadius:13,border:'none',background:'linear-gradient(135deg,#2CC4A0,#5A8AE0)',color:'#000',fontSize:14,fontWeight:700,cursor:creating?'not-allowed':'pointer',opacity:creating?0.6:1,marginTop:4}}>
              {creating?'Création…':'Créer l\'athlète'}
            </button>
          </form>
        </div>
      </div>
    )}
    </div>
  );
}

// ── Auth Screen ───────────────────────────────────────────
const AUTH_ERR_FR={
  invalid_credentials:'Email ou mot de passe incorrect',
  email_already_used:'Cet email est déjà utilisé',
  password_too_short:'Mot de passe trop court (8 caractères minimum)',
  invite_invalid:'Code coach invalide ou déjà utilisé',
  email_password_required:'Email et mot de passe requis',
  no_token:'Session expirée, reconnecte-toi',
  pending_approval:'⏳ Compte en attente d\'approbation du coach principal',
  main_coach_only:'Réservé au coach principal',
  invalid_email:'Email invalide',
  invalid_or_expired_token:'Lien expiré ou déjà utilisé. Refais une demande.',
  token_password_required:'Champs manquants',
  email_required:'Entre ton email',
  account_locked:'Trop de tentatives. Compte verrouillé temporairement.',
  too_many_auth_attempts:'Trop de tentatives. Réessaie dans 15 minutes.',
  too_many_requests:'Trop de requêtes. Patiente un peu.',
  email_not_verified:'📧 Vérifie ta boîte mail et clique sur le lien de confirmation.',
};

function AuthScreen({onLogin,onSignup}){
  const params=(()=>{try{return new URLSearchParams(window.location.search);}catch{return new URLSearchParams();}})();
  const resetTokenFromUrl=params.get('reset');
  const verifyTokenFromUrl=params.get('verify');
  const[mode,setMode]=React.useState(resetTokenFromUrl?'reset':'login');
  const[email,setEmail]=React.useState('');
  const[password,setPassword]=React.useState('');
  const[role,setRole]=React.useState('athlete');
  const[code,setCode]=React.useState('');
  const[err,setErr]=React.useState(null);
  const[loading,setLoading]=React.useState(false);
  const[pendingMsg,setPendingMsg]=React.useState(null); // {email, emailVerification}
  const[infoMsg,setInfoMsg]=React.useState(null);
  const[verifyDone,setVerifyDone]=React.useState(false);
  const[resendLoading,setResendLoading]=React.useState(false);
  const[resendDone,setResendDone]=React.useState(false);

  // Traitement du lien de vérification email (?verify=TOKEN)
  React.useEffect(()=>{
    if(!verifyTokenFromUrl)return;
    window.history.replaceState({},'',window.location.pathname);
    apiCall(`/api/auth/verify-email?token=${encodeURIComponent(verifyTokenFromUrl)}`,{noAuth:true})
      .then(r=>{if(r?.ok)setVerifyDone(true);else setErr('Lien de vérification invalide ou expiré.');})
      .catch(()=>setErr('Lien de vérification invalide ou expiré.'));
  },[]);

  // Demande de réinitialisation : envoie un email avec le lien (ou log côté serveur)
  const submitForgot=async e=>{
    if(e&&e.preventDefault)e.preventDefault();
    setErr(null);setInfoMsg(null);setLoading(true);
    try{
      const r=await apiCall('/api/auth/forgot-password',{method:'POST',body:{email:email.trim().toLowerCase()},noAuth:true});
      setInfoMsg(r.message||'Si un compte existe avec cet email, un lien de réinitialisation a été envoyé.');
    }catch(ex){setErr(AUTH_ERR_FR[ex.message]||ex.message||'Erreur');}
    setLoading(false);
  };

  // Applique le nouveau mot de passe avec le token reçu
  const submitReset=async e=>{
    if(e&&e.preventDefault)e.preventDefault();
    setErr(null);setLoading(true);
    try{
      if(password.length<8){setErr('Mot de passe trop court (8 minimum)');setLoading(false);return;}
      const r=await apiCall('/api/auth/reset-password',{method:'POST',body:{token:resetTokenFromUrl,password},noAuth:true});
      // Token valide → on est reconnecté
      localStorage.setItem('pa_token',r.token);
      window.history.replaceState({},'',window.location.pathname);
      window.location.reload();
    }catch(ex){setErr(AUTH_ERR_FR[ex.message]||ex.message||'Lien invalide ou expiré');}
    setLoading(false);
  };

  const submit=async e=>{
    if(e&&e.preventDefault)e.preventDefault();
    setErr(null);setPendingMsg(null);setLoading(true);
    try{
      if(mode==='login')await onLogin(email.trim(),password);
      else await onSignup(email.trim(),password,role,code.trim().toUpperCase()||undefined);
    }catch(ex){
      if(ex.pending){setPendingMsg({detail:ex.detail||'Demande envoyée.', emailVerification:ex.emailVerification, email:email.trim(), coachName:ex.coachName});}
      else setErr(AUTH_ERR_FR[ex.message]||ex.message||'Erreur');
    }
    setLoading(false);
  };

  const resendVerify=async()=>{
    setResendLoading(true);
    try{await apiCall('/api/auth/resend-verify',{method:'POST',body:{email:email||pendingMsg?.email},noAuth:true});}catch(e){}
    setResendDone(true);setResendLoading(false);
  };


  // ── Écran en attente d'approbation ────────────────
  if(pendingMsg){
    const coachLabel=pendingMsg.coachName||'ton coach';
    return(
      <div style={{minHeight:'100vh',background:'radial-gradient(ellipse at 30% 0%,#1d1410 0%,#0a0a0e 55%)',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px 20px',color:T.text}}>
        <div style={{maxWidth:420,width:'100%'}}>

          {/* Icône animée */}
          <div style={{width:84,height:84,margin:'0 auto 18px',borderRadius:22,padding:2,background:HOLO.iris,backgroundSize:'200% 200%',animation:'holoShift 8s linear infinite'}}>
            <div style={{width:'100%',height:'100%',borderRadius:20,background:'linear-gradient(135deg,#C89040,#BFA060)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:42,animation:'pulse 2s ease-in-out infinite'}}>⏳</div>
          </div>

          {/* Titre */}
          <div style={{textAlign:'center',marginBottom:24}}>
            <div style={{fontSize:11,color:T.textDim,fontWeight:700,letterSpacing:0.6,textTransform:'uppercase',marginBottom:6}}>Demande envoyée</div>
            <div style={{fontSize:26,fontWeight:700,letterSpacing:-0.5,marginBottom:10}}><HoloText>Bienvenue !</HoloText></div>
            <div style={{fontSize:14,color:T.textDim,lineHeight:1.55,maxWidth:340,margin:'0 auto'}}>
              Ta demande a été envoyée à <strong style={{color:T.text}}>{coachLabel}</strong>. Tu recevras un accès dès qu'il approuve ton compte.
            </div>
          </div>

          {/* Statut visuel des étapes */}
          <div style={{marginBottom:22,padding:'14px 16px',borderRadius:14,background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.07)'}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:10}}>
              <div style={{width:26,height:26,borderRadius:13,background:'rgba(44,196,160,0.18)',border:'1px solid rgba(44,196,160,0.5)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:14,color:T.good,fontWeight:700}}>✓</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:T.text}}>Compte créé</div>
                <div style={{fontSize:11,color:T.textFaint,marginTop:1}}>{pendingMsg.email}</div>
              </div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:10}}>
              <div style={{width:26,height:26,borderRadius:13,background:'rgba(191,160,96,0.15)',border:'1px solid rgba(191,160,96,0.5)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:13,color:T.accent}}>📬</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:T.text}}>{coachLabel} a été notifié</div>
                <div style={{fontSize:11,color:T.textFaint,marginTop:1}}>Email + notification push envoyés</div>
              </div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <div style={{width:26,height:26,borderRadius:13,background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.12)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:13,color:T.textFaint}}>⏳</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:T.textDim}}>En attente d'approbation</div>
                <div style={{fontSize:11,color:T.textFaint,marginTop:1}}>Tu seras prévenu par email</div>
              </div>
            </div>
          </div>

          {/* Boutons */}
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            <button onClick={async()=>{
              try{
                const r=await apiCall('/api/auth/login',{method:'POST',body:{email:pendingMsg.email,password}});
                if(r.token){localStorage.setItem('pa_token',r.token);window.location.reload();}
              }catch(e){
                if(e.message==='pending_approval'){alert('Ton compte est toujours en attente. Patiente un peu...');}
                else{setPendingMsg(null);setMode('login');setErr(AUTH_ERR_FR[e.message]||e.message);}
              }
            }} style={{minHeight:48,padding:'0 22px',borderRadius:13,border:'none',background:'linear-gradient(135deg,#BFA060,#B85070)',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',boxShadow:'0 6px 18px rgba(191,160,96,0.4)'}}>
              🔄 Vérifier si je suis approuvé
            </button>
            <button onClick={()=>{setPendingMsg(null);setMode('login');setPassword('');}} style={{minHeight:44,padding:'0 22px',borderRadius:13,border:'1px solid rgba(255,255,255,0.12)',background:'rgba(255,255,255,0.04)',color:T.textDim,fontSize:13,fontWeight:600,cursor:'pointer'}}>
              ← Revenir à la connexion
            </button>
          </div>

          {/* Aide */}
          <div style={{marginTop:18,padding:'10px 14px',borderRadius:11,background:'rgba(90,138,224,0.05)',border:'1px solid rgba(90,138,224,0.18)',fontSize:11,color:T.textFaint,lineHeight:1.5,textAlign:'center'}}>
            💡 Conserve l'onglet ouvert pour être prévenu en temps réel quand ton coach t'approuve.
          </div>

        </div>
      </div>
    );
  }

  const inputStyle={width:'100%',background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.12)',borderRadius:12,color:T.text,fontSize:15,fontWeight:500,padding:'13px 14px',fontFamily:'inherit',outline:'none',boxSizing:'border-box'};

  const titleByMode={login:'Connexion',signup:'Créer un compte',forgot:'Mot de passe oublié',reset:'Nouveau mot de passe'};

  return(
    <div style={{minHeight:'100vh',background:'radial-gradient(ellipse at 30% 0%,#1d1410 0%,#0a0a0e 55%)',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px 20px',color:T.text}}>
      <div style={{width:'100%',maxWidth:380}}>
        {/* Logo */}
        <div style={{textAlign:'center',marginBottom:28}}>
          <img src="/logo.svg" alt="Prime Athl" style={{width:90,height:90,borderRadius:22,objectFit:'cover',display:'block',margin:'0 auto 14px',boxShadow:'0 8px 32px rgba(0,0,0,0.5)'}}/>
          <div style={{fontSize:11,color:T.textDim,fontWeight:700,letterSpacing:0.6,textTransform:'uppercase'}}>Prime Athl</div>
          <div style={{fontSize:30,fontWeight:700,letterSpacing:-0.6,marginTop:4}}><HoloText>{titleByMode[mode]}</HoloText></div>
        </div>

        {/* ── Email vérifié avec succès ── */}
        {verifyDone&&(
          <div style={{marginBottom:16,padding:'12px 16px',borderRadius:13,background:'rgba(44,196,160,0.12)',border:'1px solid rgba(44,196,160,0.35)',color:T.good,fontSize:13,fontWeight:600,textAlign:'center'}}>
            ✅ Email confirmé ! Tu peux maintenant te connecter.
          </div>
        )}

        {/* ── Forgot password ── */}
        {mode==='forgot'&&(
          <form onSubmit={submitForgot} style={{display:'flex',flexDirection:'column',gap:11}}>
            <div style={{fontSize:13,color:T.textDim,lineHeight:1.5,marginBottom:2,textAlign:'center'}}>Entre ton email, on t'envoie un lien pour choisir un nouveau mot de passe.</div>
            <input style={inputStyle} type="email" autoComplete="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} required/>
            {err&&<div style={{padding:'11px 14px',borderRadius:11,background:'rgba(184,80,112,0.1)',border:'1px solid rgba(184,80,112,0.35)',color:'#ff7eb6',fontSize:13,fontWeight:600,textAlign:'center'}}>{err}</div>}
            {infoMsg&&<div style={{padding:'11px 14px',borderRadius:11,background:'rgba(44,196,160,0.10)',border:'1px solid rgba(44,196,160,0.30)',color:T.good,fontSize:13,fontWeight:600,textAlign:'center'}}>{infoMsg}</div>}
            <button type="submit" disabled={loading} style={{height:50,marginTop:6,border:'none',borderRadius:14,cursor:loading?'wait':'pointer',background:'linear-gradient(135deg,#BFA060,#B85070)',color:'#fff',fontSize:15,fontWeight:700,boxShadow:'0 8px 24px rgba(191,160,96,0.4)',opacity:loading?0.7:1}}>{loading?'…':'Envoyer le lien'}</button>
            <button type="button" onClick={()=>{setMode('login');setErr(null);setInfoMsg(null);}} style={{height:38,marginTop:4,border:'none',background:'transparent',color:T.textDim,fontSize:12,fontWeight:600,cursor:'pointer'}}>← Retour à la connexion</button>
          </form>
        )}

        {/* ── Reset (via lien email) ── */}
        {mode==='reset'&&(
          <form onSubmit={submitReset} style={{display:'flex',flexDirection:'column',gap:11}}>
            <div style={{fontSize:13,color:T.textDim,lineHeight:1.5,marginBottom:2,textAlign:'center'}}>Choisis ton nouveau mot de passe (8 caractères minimum).</div>
            <input style={inputStyle} type="password" autoComplete="new-password" placeholder="Nouveau mot de passe" value={password} onChange={e=>setPassword(e.target.value)} required minLength={8}/>
            {err&&<div style={{padding:'11px 14px',borderRadius:11,background:'rgba(184,80,112,0.1)',border:'1px solid rgba(184,80,112,0.35)',color:'#ff7eb6',fontSize:13,fontWeight:600,textAlign:'center'}}>{err}</div>}
            <button type="submit" disabled={loading||!resetTokenFromUrl} style={{height:50,marginTop:6,border:'none',borderRadius:14,cursor:loading?'wait':'pointer',background:'linear-gradient(135deg,#BFA060,#B85070)',color:'#fff',fontSize:15,fontWeight:700,boxShadow:'0 8px 24px rgba(191,160,96,0.4)',opacity:loading?0.7:1}}>{loading?'…':'Valider'}</button>
            {!resetTokenFromUrl&&<div style={{fontSize:11,color:T.textFaint,textAlign:'center',marginTop:4}}>Aucun token. Ouvre le lien reçu par email.</div>}
          </form>
        )}

        {(mode==='login'||mode==='signup')&&(<>
        {/* Tab toggle */}
        <div style={{display:'flex',padding:3,background:'rgba(255,255,255,0.04)',borderRadius:12,border:'1px solid rgba(255,255,255,0.06)',marginBottom:18}}>
          {['login','signup'].map(m=>(
            <button key={m} type="button" onClick={()=>{setMode(m);setErr(null);}} style={{flex:1,height:38,border:'none',borderRadius:10,background:mode===m?'rgba(191,160,96,0.16)':'transparent',color:mode===m?T.accent:T.textDim,fontSize:13,fontWeight:700,cursor:'pointer'}}>{m==='login'?'Se connecter':'S\'inscrire'}</button>
          ))}
        </div>

        <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:11}}>
          <input style={inputStyle} type="email" autoComplete="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} required/>
          <input style={inputStyle} type="password" autoComplete={mode==='login'?'current-password':'new-password'} placeholder={mode==='login'?'Mot de passe':'Mot de passe (8 min)'} value={password} onChange={e=>setPassword(e.target.value)} required minLength={mode==='signup'?8:undefined}/>

          {mode==='signup'&&(
            <>
              <div>
                <div style={{fontSize:10,color:T.textFaint,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase',marginBottom:7,marginTop:4}}>Tu es</div>
                <div style={{display:'flex',gap:8}}>
                  {[{v:'athlete',l:'Athlète'},{v:'coach',l:'Coach'}].map(o=>(
                    <button key={o.v} type="button" onClick={()=>{setRole(o.v);if(o.v==='coach')setCode('');}} style={{flex:1,height:42,border:role===o.v?'1px solid transparent':'1px solid rgba(255,255,255,0.12)',borderRadius:11,background:role===o.v?T.accentSoft:'rgba(255,255,255,0.03)',color:role===o.v?T.accent:T.textDim,fontSize:13,fontWeight:700,cursor:'pointer'}}>{o.l}</button>
                  ))}
                </div>
              </div>
              {role==='athlete'&&(
                <div>
                  <div style={{fontSize:10,color:T.textFaint,fontWeight:600,letterSpacing:0.4,textTransform:'uppercase',marginBottom:7}}>Code coach (facultatif)</div>
                  <input style={{...inputStyle,letterSpacing:1.5,textTransform:'uppercase',fontFamily:'JetBrains Mono,ui-monospace,monospace'}} placeholder="PA-XXXXXX" value={code} onChange={e=>setCode(e.target.value.toUpperCase())} maxLength={10}/>
                  <div style={{fontSize:11,color:T.textFaint,marginTop:6}}>Donné par ton coach. Laisse vide pour t'inscrire seul.</div>
                </div>
              )}
            </>
          )}

          {err&&(
            <div style={{padding:'11px 14px',borderRadius:11,background:'rgba(184,80,112,0.1)',border:'1px solid rgba(184,80,112,0.35)',color:'#ff7eb6',fontSize:13,fontWeight:600,textAlign:'center'}}>
              {err}
              {err===AUTH_ERR_FR['email_not_verified']&&(
                <div style={{marginTop:8}}>
                  {resendDone?(

// ── AI Program Generator ─────────────────────────────────────────────────────
function AIGeneratorCard({onStartWorkout,standalone=false}){
  const[level,setLevel]=React.useState('');
  const[goal,setGoal]=React.useState('');
  const[days,setDays]=React.useState('');
  const[equip,setEquip]=React.useState('');
  const[gender,setGender]=React.useState('');
  const[age,setAge]=React.useState('');
  const[weight,setWeight]=React.useState('');
  const[height,setHeight]=React.useState('');
  const[loading,setLoading]=React.useState(false);
  const[result,setResult]=React.useState(null);
  const[err,setErr]=React.useState(null);
  const[open,setOpen]=React.useState(standalone);

  const canGenerate=level&&goal&&days&&equip&&gender;

  const generate=async()=>{
    setLoading(true);setErr(null);setResult(null);
    try{
      const d=await apiCall('/api/ai/generate-program',{method:'POST',body:{level,goal,days,equipment:equip,gender,age:age||null,weight:weight||null,height:height||null}});
      setResult(d.program);
    }catch(e){
      if(e.message==='ai_not_configured')setErr('Clé API Anthropic non configurée sur le serveur.');
      else setErr('Erreur : '+(e.message||'génération échouée'));
    }finally{setLoading(false);}
  };

  const launch=()=>{
    if(!result||!Array.isArray(result.exercises)||result.exercises.length===0)return;
    const exercises=result.exercises.map(ex=>({
      id:Math.random().toString(36).slice(2),
      name:ex.name,muscle:ex.muscle||'',style:'CLASSIQUE',
      rest:ex.rest||'60s',restSeconds:parseInt(ex.rest)||60,
      weightStr:'',repsStr:String(ex.reps||''),cardio:null,
      sets:Array.from({length:typeof ex.sets==='number'?ex.sets:3},()=>({
        weight:0,reps:0,done:false,
        target:parseInt(String(ex.reps))||10,
        targetStr:String(ex.reps||''),
      })),
    }));
    onStartWorkout({name:result.name,muscles:result.muscles||'',exercises});
    setResult(null);setOpen(false);
  };

  const reset=()=>{setResult(null);setErr(null);};

  const SEL_STYLE=(active,color='#6366f1')=>({
    flex:1,height:36,borderRadius:10,border:active?`1px solid ${color}60`:'1px solid rgba(255,255,255,0.08)',
    background:active?`${color}18`:'rgba(255,255,255,0.03)',
    color:active?color:T.textDim,fontSize:12,fontWeight:700,cursor:'pointer',
  });

  return(
    <div style={{marginBottom:20}}>
      {/* Carte fermée */}
      {!open&&!result&&(
        <button onClick={()=>setOpen(true)} style={{width:'100%',padding:'16px 18px',borderRadius:18,border:'1px solid rgba(99,102,241,0.35)',background:'linear-gradient(135deg,rgba(99,102,241,0.10),rgba(139,92,246,0.06))',cursor:'pointer',textAlign:'left',display:'flex',alignItems:'center',gap:14,boxShadow:'0 4px 20px rgba(99,102,241,0.12)'}}>
          <div style={{width:46,height:46,borderRadius:14,background:'linear-gradient(135deg,#6366f1,#8b5cf6)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0,boxShadow:'0 6px 18px rgba(99,102,241,0.4)'}}>🤖</div>
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:800,color:T.text,letterSpacing:-0.3}}>Générer avec l'IA</div>
            <div style={{fontSize:12,color:T.textDim,marginTop:2}}>Programme personnalisé en 5 secondes</div>
          </div>
          <Icon name="chevronRight" size={16} stroke={T.textFaint}/>
        </button>
      )}

      {/* Formulaire ouvert */}
      {open&&!result&&(
        <div style={{padding:'18px 16px',borderRadius:18,border:'1px solid rgba(99,102,241,0.25)',background:'rgba(99,102,241,0.05)'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
            <div style={{fontSize:15,fontWeight:800,color:T.text}}>🤖 Générer avec l'IA</div>
            {!standalone&&<button onClick={()=>setOpen(false)} style={{background:'none',border:'none',color:T.textFaint,cursor:'pointer',padding:4}}><Icon name="x" size={16} stroke={T.textFaint}/></button>}
          </div>

          <div style={{fontSize:11,color:'#a5b4fc',fontWeight:700,letterSpacing:0.4,textTransform:'uppercase',marginBottom:6}}>Niveau</div>
          <div style={{display:'flex',gap:6,marginBottom:14}}>
            {['Débutant','Intermédiaire','Avancé'].map(v=>(
              <button key={v} onClick={()=>setLevel(v)} style={SEL_STYLE(level===v,'#6366f1')}>{v}</button>
            ))}
          </div>

          <div style={{fontSize:11,color:'#a5b4fc',fontWeight:700,letterSpacing:0.4,textTransform:'uppercase',marginBottom:6}}>Objectif</div>

function exportAINutritionPDF(plan, goalLabel){
  const DAYS=['LUNDI','MARDI','MERCREDI','JEUDI','VENDREDI','SAMEDI','DIMANCHE'];
  const dateStr=new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
  const daysHtml=DAYS.map(dayKey=>{
    const dayData=plan.days[dayKey]; if(!dayData)return'';
    const meals=dayData.meals||[];
    const dayKcal=meals.reduce((s,m)=>s+(m.items||[]).reduce((ss,it)=>ss+(+it.kcal||0),0),0);
    const dayP=meals.reduce((s,m)=>s+(m.items||[]).reduce((ss,it)=>ss+(+it.p||0),0),0);
    const dayC=meals.reduce((s,m)=>s+(m.items||[]).reduce((ss,it)=>ss+(+it.c||0),0),0);
    const dayF=meals.reduce((s,m)=>s+(m.items||[]).reduce((ss,it)=>ss+(+it.f||0),0),0);
    const mealsHtml=meals.map(meal=>{
      const mKcal=(meal.items||[]).reduce((s,it)=>s+(+it.kcal||0),0);
      const rows=(meal.items||[]).map((it,i)=>`<tr class="${i%2===1?'alt':''}">`+
        `<td>${it.name}</td><td class="r">${it.qty}<span class="unit">${normalizeUnit(it.unit).toLowerCase()}</span></td>`+
        `<td class="r">${it.p}<span class="unit">g</span></td>`+
        `<td class="r">${it.c}<span class="unit">g</span></td>`+
        `<td class="r">${it.f}<span class="unit">g</span></td>`+
        `<td class="r">${it.kcal}<span class="unit">kcal</span></td></tr>`).join('');
      return`<div class="meal"><div class="meal-head"><span class="meal-emoji">${meal.emoji||'🍽️'}</span>`+
        `<span class="meal-name">${meal.label}</span><span class="meal-time">${meal.timeStart||''}</span>`+
        `<span class="meal-kcal-badge">${Math.round(mKcal)} kcal</span></div>`+
        `<table><thead><tr><th>Aliment</th><th class="r">Qté</th><th class="r">Prot</th><th class="r">Gluc</th><th class="r">Lip</th><th class="r">Kcal</th></tr></thead>`+
        `<tbody>${rows}</tbody></table></div>`;
    }).join('');
    return`<div class="day"><div class="day-header">`+
      `<div class="day-name">${dayKey}</div>`+
      `<div class="day-chip">${Math.round(dayKcal)} kcal · P${Math.round(dayP)}g G${Math.round(dayC)}g L${Math.round(dayF)}g</div>`+
      `</div>${mealsHtml}</div>`;
  }).join('');

  const html=`<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>Plan nutrition IA</title>
