<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code — Miss Martinique 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<script src="vendor/qrcode.min.js"></script>
<style>
  :root{ --green:#1d5b3a; --red:#c0392b; --gold:#d4af37; --cream:#fffaf0; }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Poppins',sans-serif;
    background:var(--cream);
    padding:24px;
  }
  .card{
    max-width:380px;
    width:100%;
    background:#fff;
    border:3px solid var(--gold);
    border-radius:18px;
    padding:28px 20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
  }
  .crown{ font-size:2rem; }
  h1{
    font-family:'Playfair Display',serif;
    color:var(--green);
    margin:6px 0 0;
    font-size:1.3rem;
    letter-spacing:2px;
  }
  h1 .year{ color:var(--gold); }
  .subtitle{
    color:var(--red);
    font-weight:600;
    letter-spacing:2px;
    text-transform:uppercase;
    font-size:.75rem;
    margin:6px 0 18px;
  }
  canvas{ margin:0 auto; display:block; }
  .scan{
    font-weight:700;
    color:var(--green);
    margin-top:14px;
    font-size:1rem;
  }
  .url{
    font-size:.7rem;
    color:#777;
    word-break:break-all;
    margin-top:10px;
  }
  .btn{
    margin-top:20px;
    border:2px solid var(--green);
    background:var(--green);
    color:#fff;
    border-radius:999px;
    padding:10px 24px;
    font-family:inherit;
    font-weight:600;
    cursor:pointer;
    font-size:.85rem;
  }
  @media print{
    body{ background:#fff; }
    .card{ box-shadow:none; }
    .btn{ display:none; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="crown">👑</div>
    <h1>Miss Martinique <span class="year">2026</span></h1>
    <div class="subtitle">Fiche de vote — Soirée entre filles</div>
    <canvas id="qrCanvas"></canvas>
    <div class="scan">📱 Scanne pour voter !</div>
    <div class="url" id="qrUrl"></div>
    <button type="button" class="btn" onclick="window.print()">🖨️ Imprimer</button>
  </div>
<script>
  const targetUrl = new URL('miss-martinique-2026.html', location.href).href;
  document.getElementById('qrUrl').textContent = targetUrl;
  if(window.QRCode){
    QRCode.toCanvas(document.getElementById('qrCanvas'), targetUrl, {
      width: 240, margin: 1, color: { dark: '#1d5b3a', light: '#ffffff' }
    });
  }
</script>
</body>
</html>
