  html{-webkit-text-size-adjust:100%;text-size-adjust:100%}

  ::-webkit-scrollbar{width:0;height:0}

  @keyframes holoText{0%{background-position:0% 50%}100%{background-position:200% 50%}}
  @keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
  @keyframes celebrationPop{0%{transform:scale(0.85);opacity:0}60%{transform:scale(1.02);opacity:1}100%{transform:scale(1);opacity:1}}
  @keyframes imgFade{0%{opacity:0;transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
  @keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
  @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

<div id="root"></div>
<div id="splash" style="position:fixed;inset:0;background:#0a0a0e;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:9999;transition:opacity 0.4s ease">
  <img src="/logo.svg" alt="Prime Athl" style="width:52px;height:52px;border-radius:16px;object-fit:cover;display:block"/>
  <div style="color:rgba(240,240,242,0.5);font-size:13px;font-family:Inter,system-ui,sans-serif;letter-spacing:0.3px">Chargement…</div>
  <div style="width:120px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden">
    <div id="splash-bar" style="height:100%;width:0%;background:linear-gradient(90deg,#BFA060,#D4B060);border-radius:2px;transition:width 0.4s ease"></div>
  </div>
</div>
<script>
// Splash : animer la barre pendant le chargement des CDN
(function(){
  const bar = document.getElementById('splash-bar');
  let w = 0;
  const t = setInterval(() => { w = Math.min(w + (w < 70 ? 8 : 1), 92); if(bar) bar.style.width = w + '%'; }, 200);
  window.__splashDone = function(){
    clearInterval(t);
    if(bar) bar.style.width = '100%';
    setTimeout(() => {
      const s = document.getElementById('splash');
      if(s){ s.style.opacity = '0'; setTimeout(() => s.remove(), 400); }
    }, 300);
  };
})();
</script>
